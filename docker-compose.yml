version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/ephe:/app/ephe:ro
    environment:
      - ASTRO_AI_API_KEY=${ASTRO_AI_API_KEY:-}
      - ASTRO_AI_PROVIDER=${ASTRO_AI_PROVIDER:-openai}
      - ASTRO_AI_MODEL=${ASTRO_AI_MODEL:-gpt-4o-mini}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend
    restart: unless-stopped

  # Optional: Grafana/Prometheus for monitoring (if needed)
  # prometheus:
  #   image: prom/prometheus
  #   ports:
  #     - "9090:9090"
  #   volumes:
  #     - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
  #     - prometheus-data:/prometheus

volumes:
  ephe:
  prometheus-data:
