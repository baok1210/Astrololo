dominant_fire: "Fire element dominant: You are a person of action, full of inspiration and enthusiasm. Your strength lies in initiating and inspiring others. Balance with patience and practicality."
dominant_earth: "Earth element dominant: You are practical, reliable and able to build solid foundations. Your strength is patience and persistence. Stay open to new ideas."
dominant_air: "Air element dominant: You are intelligent, communicative and objective. Your strength is connecting ideas and people. Connect more with emotions and practicality."
dominant_water: "Water element dominant: You are sensitive, intuitive and compassionate. Your strength is understanding emotions and connecting deeply. Protect your emotional boundaries."
deficient_fire: "Lacking Fire: You may lack drive and enthusiasm. Find ways to connect with fire energy through sports, healthy competition, or pursuing passions."
deficient_earth: "Lacking Earth: You may lack practicality and patience. Focus on building disciplined habits and careful financial management."
deficient_air: "Lacking Air: You may struggle with communication and objective thinking. Practice analytical skills and exchange ideas with others."
deficient_water: "Lacking Water: You may find it hard to connect with your own and others' emotions. Take time to listen inward and develop emotional intelligence."
