New Moon: "New Moon: You were born during the New Moon — a time of new beginnings and fresh cycles. You carry pure, initiating energy and tremendous potential. Your life revolves around self-discovery and launching new projects. You have strong intuition and the ability to start anew."
Waxing Crescent: "Waxing Crescent: Born during the Crescent Moon — a time of hope and intention. You have faith in the future and the ability to turn dreams into reality. This phase brings optimism and a desire for growth."
First Quarter: "First Quarter: Born during the First Quarter Moon — a time of action and decision. You have a fighting spirit and readiness to face challenges. Your life features turning points that demand courage and decisiveness."
Waxing Gibbous: "Waxing Gibbous: Born during the Gibbous Moon — a time of refinement and adjustment. You have the ability to analyze, perfect, and improve things. You are a perfectionist always seeking to do better."
Full Moon: "Full Moon: You were born during the Full Moon — a time of culmination, peak awareness, and polarity. You carry powerful energy of opposites. Your life revolves around relationships and balancing polarities. You can see both sides of every issue."
Waning Gibbous: "Waning Gibbous: Born during the Disseminating Moon — a time of sharing and teaching. You have the ability to inspire and teach others. You are a gifted storyteller with a mission to share knowledge."
Last Quarter: "Last Quarter: Born during the Last Quarter Moon — a time of release and transformation. You have the ability to end things cleanly. Your life is a series of reorientations and fundamental changes."
Waning Crescent: "Waning Crescent: Born in the final phase of the lunar cycle — a time of rest and regeneration. You have deep spiritual intuition and connection to the unconscious. Your soul is sensitive and richly imaginative."
