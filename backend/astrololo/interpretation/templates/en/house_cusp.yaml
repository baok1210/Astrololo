    detailed: People with Capricorn on the 12th house cusp are usually Aquarius Rising,
      and are more conservative than they like to admit. Although they’re sometimes
      limited by unconscious fears, their hidden strength is the discipline that enables
      them to work hard behind the scenes. They can be trusted with secrets, and they
      often work on secret projects. Back to Interpretations Top
    source: astrolibrary.org
