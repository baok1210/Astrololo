    detailed: The yod can be accentuated when an opposition is thrown in, with two semisextile aspects too. The **T-square** aspect pattern is formed when points in opposition also form a square with another point (or points). The pattern resembles the letter T when viewed in the chart. It is like the rarer Grand Cross (see explanation below), but is missing the fourth point. The squared planet/point is referred to as the focal planet. The point opposite the focal planet, which is unoccupied, is nevertheless a sensitive point in the chart (I tend to think of it as a ghost leg). A T-square stimulates drive and courage, but also tension and conflict. The native can be very active and achievement-oriented, especially if this aspect pattern falls in cardinal or fixed signs, but much energy can be squandered in needless conflicts and frustrations. Cardinal T-squares can be very impatient, but also enterprising and initiating. Fixed T-squares can be persevering, but also stubborn, unyielding,
      or they can hold on to problems and frustrations for too long.
