  jupiter_saturn:
    title: ''
    short: ''
    detailed: 'If you also have Mars sextile or trine Saturn, or Jupiter sextile or trine Uranus, or Jupiter sextile or trine Neptune: There is a probability of wealth.

      _Some Famous People with Jupiter conjunct Saturn_ : Walt Disney (Jupiter conjunct Saturn in Capricorn), Beyonce Knowles (Jupiter conjunct Saturn in Libra), Christina Aguilera (Jupiter conjunct Saturn in Libra), Adriana Lima (Jupiter conjunct Saturn in Libra), Bruce Lee (Jupiter conjunct Saturn in Taurus), John Lennon (Jupiter conjunct Saturn in Taurus), Justin Timberlake (Jupiter conjunct Saturn in Libra), Paris Hilton (Jupiter conjunct Saturn in Libra), Ryan Gosling (Jupiter conjunct Saturn in Libra). Those with the sextile can call upon these traits when needed, and those with the trine between the Jupiter and Saturn have incorporated the traits of the aspect into their personalities, expressing them naturally and consistently._

      Jupiter trine Saturn: *You have a good balance between idealism, optimism, and vision for the future on one hand and a realistic sense of what can actually be achieved on the other hand.'
    strength: See description
    weakness: See description
  jupiter_uranus:
    title: ''
    short: ''
    detailed: 'Look for other factors in the chart that could help with follow-through and concentration.

      _Some Famous People with Jupiter conjunct Uranus_ : Rene Descartes (in Aries), Hedy Lamarr (in Aquarius), Annie Lennox (in Cancer), Denzel Washington (in Cancer), Paul Rudd (Virgo/Libra), Jennifer Aniston (in Libra), Mariah Carey (in Libra), Michael Schumacher (in Libra), Donald Glover (in Sagittarius), Amy Winehouse (in Sagittarius), Henry Cavill (in Sagittarius), Miranda Kerr (in Sagittarius), Jennifer Lopez (in Libra), Camilla Cabello (in Aquarius), Brendan Fraser (in Libra), Norman Reedus (in Libra), Dave Grohl (in Libra), Bob Dylan (in Taurus), Maite Perroni (in Sagittarius), Javier Bardem (in Libra), Donatella Versace (in Cancer), Neil Simon (in Aries), Scott Bakula (in Cancer), Chaz Bono (in Libra).

      _Some Famous People with the Jupiter in Hard Aspect to Uranus:_

      With _Jupiter forming a sextile to Uranus_ in the birth chart, you have faith in the future, trust your visions, and welcome change and innovation if you expect it will improve your life.'
    strength: See description
    weakness: See description
  jupiter_neptune:
    title: ''
    short: ''
    detailed: 'With _Jupiter forming a sextile to Neptune_ in your birth chart, you are gracious and compassionate, and you appreciate subtleties. Some Famous People with Jupiter conjunct Neptune: Elon Musk (in Scorpio/Sagittarius), Ellen DeGeneres (in Scorpio), Tupac (scorpio/sagittarius), Jada Pinkett Smith (sag/sag), Selena (sag/sag), Kim Jong-Un (sag/sag), Erykah Badu (sag/sag), Kid Cudi (cap/cap), Katharine Hepburn (cancer/cancer), Virginia Woolf (taurus/taurus), Lance Armstrong (sag/sag), Calvin Harris (sag/sag), David Tennant (sag/sag), Amy Poehler (sag/sag), Mary J. With _Jupiter trine Neptune_ in the birth chart, you have an intuitive or spiritual approach to solving problems and a compassionate and tolerant worldview or perspective. See quincunx,  semi-sextile, and the quintile/biquintile. The Astrology of 2026 with Horoscopes for All Signs

      Explore the meaning of Jupiter in Leo, including horoscopes for each sign, with our feature article: Jupiter in Leo June 2026 to July 2027.'
    strength: See description
    weakness: See description
  jupiter_pluto:
    title: ''
    short: ''
    detailed: 'With Jupiter forming a conjunction to Pluto in the birth chart, you are skilled at sniffing out an opportunity. Some Famous People with _Jupiter conjunct Pluto_ : Louis Braille (pisces/pisces), Mahatma Gandhi (taurus/taurus), Will Smith (virgo/virgo), Mick Jagger (leo/leo), Kris Jenner (leo/leo), Hugh Jackman (virgo/virgo), Thom Yorke (virgo/virgo), Naomi Watts (virgo/virgo), Whoopi Goldberg (leo/leo), Billy Idol (virgo/leo), Bryan Cranston (leo/leo), Geena Davis (leo/leo), Alexa Demie (sag/scorpio), La Toya Jackson (leo/leo), Bill Gates (leo/leo), Maria Shriver (leo/leo), Howie Mandel (virgo/leo), Nat King Cole (cancer/cancer), Frank Iero (libra/libra), Bill Nye (virgo/leo), Dacre Montgomery (scorpio/scorpio). With _Jupiter square Pluto_ in the birth chart, you have big plans and ambitions, and some might say too big at times! See quincunx,  semi-sextile, and the quintile/biquintile. The Astrology of 2026 with Horoscopes for All Signs

      Explore the meaning of Jupiter in Leo, including horoscopes for each sign, with our feature article: Jupiter in Leo June 2026 to July 2027.'
