    title: ''
    short: ''
    detailed: 'Venus is a peace-making, harmony-loving planet, and those with Sun conjunct Venus do their best to seek peace and harmony. If you want things to go smoothly, call upon a Sun conjunct Venus person to restore balance. Because the Sun and Venus are never more than 48 degrees apart, the only aspects they can make to each other are the semi-sextile, semi-square, or the conjunction. Others sense the value people with this aspect tend to place on the feminine.

