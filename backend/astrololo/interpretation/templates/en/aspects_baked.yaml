  jupiter_saturn:
    title: ''
    short: ''
    detailed: 'If you also have Mars sextile or trine Saturn, or Jupiter sextile or trine Uranus, or Jupiter sextile or trine Neptune: There is a probability of wealth.

      _Some Famous People with Jupiter conjunct Saturn_ : Walt Disney (Jupiter conjunct Saturn in Capricorn), Beyonce Knowles (Jupiter conjunct Saturn in Libra), Christina Aguilera (Jupiter conjunct Saturn in Libra), Adriana Lima (Jupiter conjunct Saturn in Libra), Bruce Lee (Jupiter conjunct Saturn in Taurus), John Lennon (Jupiter conjunct Saturn in Taurus), Justin Timberlake (Jupiter conjunct Saturn in Libra), Paris Hilton (Jupiter conjunct Saturn in Libra), Ryan Gosling (Jupiter conjunct Saturn in Libra). Those with the sextile can call upon these traits when needed, and those with the trine between the Jupiter and Saturn have incorporated the traits of the aspect into their personalities, expressing them naturally and consistently._

      Jupiter trine Saturn: *You have a good balance between idealism, optimism, and vision for the future on one hand and a realistic sense of what can actually be achieved on the other hand.'
