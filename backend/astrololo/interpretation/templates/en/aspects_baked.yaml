  venus_saturn:
    title: ''
    short: ''
    detailed: 'Those with the sextile can call upon these traits when needed, and those with the trine between the Venus and Saturn have incorporated the traits of the aspect into their personalities, expressing them naturally and consistently. Alternate, short interpretation: Venus sextile Saturn or Venus trine Saturn: #Your sense of duty makes you a stable factor in difficult situations. You need to learn to value and love yourself more and to express your appreciation for others more openly.

      _Some Famous People with Venus conjunct Saturn_ : Hank Aaron, Ian Scott Anderson, Ray Bradbury, Edgar Cayce, Richard Chamberlain, Bill Gates, Steffi Graf, Lena Horne, Ashley Judd, Julianne Moore, Kim Novak, Yoko Ono, James Spader, Gloria Steinem, Donald Trump, Stephanie Poetri. Giving and receiving love are not flowing and natural for people born with Venus in hard aspect to Saturn. People with Venus in hard aspect to Saturn might either downplay their physical appearance or pay excessive attention to it.'
    strength: See description
