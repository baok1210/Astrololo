    weakness: See description
  venus_neptune:
    title: ''
    short: ''
    detailed: However, it can be an ongoing struggle for people with Venus-Neptune square, opposition, semi-square, sesquiquadrate, and quincunx. _All Venus-Neptune aspects in the natal chart point to a movement towards spiritualizing the love nature._ This comes naturally to those people with Venus-Neptune conjunct, sextile, and trine. Those with Venus in conjunction to Neptune in their birth chart are generally sensitive, creative, and attractive people. An impractical nature when it comes to love, money, and personal possessions is notable, even if Venus-Neptune people approach the rest of their lives in a more sensible manner.
    strength: See description
    weakness: See description
