  mars_jupiter:
    title: ''
    short: ''
    detailed: 'Harmonious Mars/Jupiter aspects are a marker of worldly comfort and financial success. The energy of Mars combines with the expansiveness of Jupiter to increase your enthusiasm, liveliness, and optimism. Some Famous People with _Mars conjunct Jupiter_ : Halle Berry (Mars conjunct Jupiter in Cancer), Willem Dafoe, Jon Bon Jovi (Mars conjunct Jupiter in Aquarius), Aretha Franklin (in Gemini), Lloyd Bridges, Chelsea Clinton, Amelia Earhart (Mars tightly conjunct Jupiter in Virgo), Michael C. Hall (Mars conjunct Jupiter and Neptune in Sagittarius), Val Kilmer, Dean Martin, Margaret Mead, Gene Wilder, Shari Lewis, Pharrell Williams (Mars conjunct Jupiter in Aquarius), Queen Elizabeth II (Mars conjunct Jupiter in Aquarius). Niall Horan (Mars conjunct Jupiter in Libra), Liam Payne (Mars conjunct Jupiter in Libra), Lenny Kravitz (Mars conjunct Jupiter in Taurus), Ozzy Osbourne (Mars conjunct Jupiter in Capricorn), Christina Ricci (Mars conjunct Jupiter in Virgo). There is a real spirit
      of adventure with Mars-Jupiter aspects.'
    strength: See description
    weakness: See description
  mars_saturn:
    title: ''
    short: ''
    detailed: 'Some Famous People with Mars conjunct Saturn: Henry Winkler, Venus Williams (in Virgo), Aubrey Plaza (in Scorpio), Pierre Trudeau, Dick Van Dyke, Nikki Glaser (in Scorpio), John Saul, Dolly Parton (in Cancer), Nostradamus, Margaret Mead, Naomi Judd, Al Gore, Ellen De Generes (in Sagittarius), Sammy Davis Jr., Geena Davis, Roger Daltrey, Billy Crystal, Ted Knight, Birgundi Baker (in Aquarius), Steven Tyler (in Leo, both retrograde), Victoria Beckham (in Gemini), Rihanna (Mars in late Sagittarius, Saturn in early Capricorn), Cindy Crawford (in Pisces), Jessica Biel (in Libra), Paris Jackson (in Aries), Élodie Frégé (in Libra), David Gilmour (in Cancer), Amirah Vann (in Virgo). Mars-Saturn people can take on too much or shoulder far too much responsibility. People with Mars in hard aspect to Saturn can feel they face more obstacles than most to achieve their desires and goals. People with Mars square Saturn or Mars opposition Saturn in their natal charts have a strong sense of
      duty, even if they sometimes feel overwhelmed by it!'
    strength: See description
    weakness: See description
  mars_uranus:
    title: ''
    short: ''
    detailed: 'Some Famous People with Mars conjunct Uranus: Frida Kahlo (in Capricorn), Ava Gardner (in Pisces), Michael J. Wells, Alfred Tennyson, Frank Sinatra Jr. (in Gemini), Rihanna (Mars in Sagittarius, Uranus in Capricorn, also conjunct Saturn), Keith Richards (in Gemini), Jim Morrison (in Gemini), Steve Martin (in Gemini), Ruby Rose (in Sagittarius), Paul Lynde, Johnny Depp (in Virgo), Sophie Marceau (in Virgo), Ryan Reynolds (in Scorpio), Sarah Jessica Parker (in Virgo), Tracee Ellis Ross (in Libra), Ian Anderson (in Gemini), Jimmy Page (in Gemini), Usher (in Scorpio), Ruby Rose (in Sagittarius), Booboo Stewart (in Capricorn, also conjunct Neptune) Aidan Gallagher (Mars in early Pisces, Uranus in late Aquarius), Gabrielle Union (in Libra), Princess Aiko (in Aquarius), Florence Pugh (in Capricorn, also conjunct Neptune). Especially with the opposition, you could experience this Mars-Uranus energy in an externalized way through unusual or frequent attacks on your character.

      _Mars square Uranus or Mars opposition Uranus:_ *Intensely restless, dynamic, and energetic, you are always on the go.'
    strength: See description
    weakness: See description
  mars_neptune:
