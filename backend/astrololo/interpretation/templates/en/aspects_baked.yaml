      **More Aspects of Mercury in the Natal Chart:** Mercury-Sun aspects  Mercury-Ascendant aspects

      Looking for interpretations for other aspects? When Mercury is in aspect to Saturn in the birth chart, you are more deliberate with your speech or communications, learning, and plans. With Mercury conjunct Saturn in your natal chart, you are of a serious mind. You approach new endeavors or information with caution, reluctance, and skepticism.

      _Mercury in hard aspect to Saturn:_ Saturn connected to a personal planet in hard aspect has a censoring effect on the planet involved. With Mercury in hard aspect to Saturn, whatever the person says and writes is self-censored to some degree.'
