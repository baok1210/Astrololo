  moon_venus:
    title: ''
    short: ''
    detailed: 'There is a basic drive to appreciate and taste life.

      *Mars Transits Trine Venus:Right now you are more magnetic and sexually attractive, and your love life is likely to be both harmonious and satisfying. Because you assert yourself in a positive manner, a leadership role or an opportunity to do something you have wanted to do on your own is likely to be offered to you.

      *Trine: Your vitality and self-confidence are high, and you can achieve your goals with much more ease than usual. Also, you are energized and invigorated now and eager to be involved in projects that benefit your children, family, or home.

      *Trine: Your feelings run hot now, and you are more likely to act on instinct, emotion, and impulse rather than reason. You have mental drive.

      *Trine: You speak very clearly, convincingly, and forcefully now, so that there is no mistaking what your views and opinions are.'
