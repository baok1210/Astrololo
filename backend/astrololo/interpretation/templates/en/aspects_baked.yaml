    title: ''
    short: ''
    detailed: With _Jupiter forming a trine to Uranus_ in your birth chart, very little escapes your attention regarding potential opportunities or possibilities! With Jupiter forming a conjunction to Uranus in the birth chart, you naturally connect with your intuition and trust your visions, often acting on inspiration.
