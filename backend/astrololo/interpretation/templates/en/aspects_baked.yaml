    detailed: 'Moon Conjunct Sextile Trine Square Opposition Jupiter Aspects

      Generosity of spirit is most evident when Moon conjuncts Jupiter in the natal chart. Those with the sextile can call upon these traits when needed, and those with the trine between the Moon and Jupiter have incorporated the traits of the aspect into their personalities, expressing them naturally and consistently.

      **More Aspects of the Moon in the Natal Chart:** Moon-Sun aspects  Moon-Ascendant aspects

      Looking for interpretations for other aspects? Jupiter aligned with the Moon offers _perspective_ to the emotions, so that the natives are able to reason themselves out of depression, foul moods, and the like. Not everyone wants to deal with their emotions in such a rational manner, however, so Moon conjunct Jupiter people can sometimes support people in a way that is not always appreciated, but their kind-hearted approach is generally well-received. The reason behind it is that their emotional natures (Moon) work hand-in-hand with their higher minds (Jupiter).'
