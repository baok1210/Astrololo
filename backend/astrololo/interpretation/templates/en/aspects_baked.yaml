    short: ''
    detailed: 'Where are Neptune and Pluto placed by zodiacal sign in your birth chart? Learn what Neptune, the planet of dreams, and Pluto, the planet of regeneration, mean when posited in the signs of the zodiac. If a birth date in question falls on any of the cutoff dates, you will need to use a natal chart calculator and know the time of birth to determine the signs of Neptune or Pluto. See also: Neptune in the Houses and Pluto in the Houses. See our Uranus, Neptune, & Pluto Signs Tables to look up the position of these planets by zodiac sign for a particular birthday. Calculate your free birth chart and receive a free report, including the position of your Neptune and Pluto as well as other planets and points here: Free Astrology Reports. Please also note that dates given are not inclusive. Your vision of an ideal world may center around superior health and work systems as well as the commitment to service. Simplicity, purity, and selfless service can be your ideals. However, you could
