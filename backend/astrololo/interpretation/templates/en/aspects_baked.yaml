  sun_moon:
    title: ''
    short: ''
    detailed: '**You may be especially dynamic and assertive just now. There is a lot of energy and drive available, and you may have an urge to push forward.

      *You experience a burst of energy and are more vigorous, bold, assertive, and impatient at this time. You feel ambitious and capable of doing a lot and meeting challenges successfully. However, if your will is blocked, you become quite angry now. You are less willing to accommodate others and meet people half way. Your ego-drive and competitiveness are very strong. You may have an emotional confrontation with someone older than you or with an authority figure. Your feelings and emotions may be running against your best interests.

      *Intense competition or conflict is quite likely at this time; you feel you must fight or stand up for your rights in the face of some person or situation that opposes you. You may actually seek out a battle in order to test your own powers. Beware of acting so abruptly or aggressively that you bring harm to yourself or other people. Emotions may flare up or arguments occur that work against your own best interests.'
    strength: See description
    weakness: See description
  sun_mercury:
    title: ''
    short: ''
    detailed: Because the Sun and Mercury are never more than 28 degrees apart, the only major aspect they can make in a natal chart is the conjunction.
    strength: See description
    weakness: See description
  sun_venus:
    title: ''
    short: ''
    detailed: 'Because the Sun and Venus are never more than 48 degrees apart, the only aspects they can make to each other are the semi-sextile, semi-square, or the conjunction. Venus is a peace-making, harmony-loving planet, and those with Sun conjunct Venus do their best to seek peace and harmony. If you want things to go smoothly, call upon a Sun conjunct Venus person to restore balance. Others sense the value people with this aspect tend to place on the feminine.

      **More Aspects of the Sun in the Natal Chart:**

      Looking for interpretations for other aspects? They are diplomatic and veritable experts at smoothing over (and sometimes _glossing over_) problems. They are openhanded with others, tolerant and accepting. People with this aspect tend to be quite attractive, pleasing, and charming. See quincunx,  semi-sextile, and the quintile/biquintile. Interpretations written by Annie unless otherwise noted. Find out what the year has in store for you with a personal forecast report:

      The Time Line Forecast explores the year''s transits and progressions.'
    strength: See description
    weakness: See description
  sun_mars:
    title: ''
    short: ''
    detailed: 'The Sun is our ego and our will, and Mars is a courageous, daring, confrontational planet. Some Famous People with Sun conjunct Mars: Gloria Steinem (in Aries), Billy Bob Thornton (in Leo), Peter Jennings, Matt Dillon, Ben Affleck, Cameron Diaz, Ed Asner (Sun conjunct Mercury and Mars in Scorpio), Salvador Dali, Raquel Welch, Buster Keaton, Desi Arnaz, Marianne Faithfull, Erik Estrada, Justina Machado (in Virgo), Brie Larson (in Libra and opposite Ascendant), Danny DeVito (in Scorpio), Shailene Woodley (also conjunct Pluto, in Scorpio), Aaliyah (in Capricorn), Nikolaj Coster-Waldau (in Leo, also conjunct Lilith), Georgina Amorós (in Leo). Sun opposition Mars people are more confrontational and argumentative than active.'
    strength: See description
    weakness: See description
  sun_jupiter:
    title: ''
    short: ''
    detailed: 'Although not especially competitive, Sun conjunct Jupiter individuals have a cheerful outlook and tend to accomplish quite a bit. Although largely positive and optimistic, Sun-Jupiter people are not immune to depression. Although their intentions are generally good, people with challenging aspects between the Sun and Jupiter are given to overdoing things. They can easily gloss over realistic details and get themselves into debt, overindulge in pleasures such as food and drink, and promise more than they can deliver.

      **More Aspects of the Sun in the Natal Chart:**

      Looking for interpretations for other aspects? The Astrology of 2026 with Horoscopes for All Signs

      Explore the meaning of Jupiter in Leo, including horoscopes for each sign, with our feature article: Jupiter in Leo June 2026 to July 2027. Generally able to win over others, theirs is a nature that is willing to help out others rather than argue with them. They come across as fair, big-hearted, and sincere. Generous with their time and money, these people are easy to like.'
    strength: See description
    weakness: See description
  sun_saturn:
    title: ''
    short: ''
    detailed: 'Those born under a Sun conjunct Saturn aspect, in their youth, are humbled in some way such that they do not feel free to express their will in an outgoing and direct manner. Eventually, Sun-Saturn people carve their own identity. The face of Saturn is generally serious, but Sun-Saturn people can also have a hilariously sarcastic sense of humor. Famous People with _Sun conjunct Saturn_ : Robert Duvall (the aspect is exact, or partile), O. See also Sun square Saturn and Sun opposition Saturn pages. It is easy and natural for those born under a harmonious aspect between the Sun and Saturn to accept responsibilities, to lead a rather ordered life, and to apply caution in their financial and business dealings. Explore these aspects more deeply: Sun sextile Saturn or Sun trine Saturn

      See also: Sun quincunx Saturn, Sun quintile or biquintile Saturn, Sun semi-sextile Saturn.

      **More Aspects of the Sun in the Natal Chart:**

      Looking for interpretations for other aspects? There is a strong need to be recognized as accomplished, but some fear of the spotlight at the same time.'
    strength: See description
    weakness: See description
  sun_uranus:
    title: ''
    short: ''
    detailed: 'Anything that seems to threaten their individuality pulls up resistance in these people.

      _Sun conjunct Uranus_ people are refreshingly honest, highly independent, intuitive, and somewhat erratic or inconsistent.'
