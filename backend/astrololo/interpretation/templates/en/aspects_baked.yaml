    detailed: 'Jupiter opposition Saturn: *You tend to seesaw between hope, optimism, and faith versus doubt and oppression by limitations and practical realities. If you also have Mars square or opposition Saturn: You have a swifter rise, more aggressive nature, and less certain tenure of public approval. If you also have Mars sextile or trine Saturn, or Jupiter sextile or trine Uranus, or Jupiter sextile or trine Neptune: There is a probability of wealth.

      _Some Famous People with Jupiter conjunct Saturn_ : Walt Disney (Jupiter conjunct Saturn in Capricorn), Beyonce Knowles (Jupiter conjunct Saturn in Libra), Christina Aguilera (Jupiter conjunct Saturn in Libra), Adriana Lima (Jupiter conjunct Saturn in Libra), Bruce Lee (Jupiter conjunct Saturn in Taurus), John Lennon (Jupiter conjunct Saturn in Taurus), Justin Timberlake (Jupiter conjunct Saturn in Libra), Paris Hilton (Jupiter conjunct Saturn in Libra), Ryan Gosling (Jupiter conjunct Saturn in Libra). With Jupiter in hard aspect to Saturn in the natal chart, you might often swing between faith and doubt or optimism and pessimism.'
