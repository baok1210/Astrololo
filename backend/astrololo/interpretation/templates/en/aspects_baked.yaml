    weakness: See description
  jupiter_pluto:
    title: ''
    short: ''
    detailed: 'With Jupiter forming a conjunction to Pluto in the birth chart, you are skilled at sniffing out an opportunity. Some Famous People with _Jupiter conjunct Pluto_ : Louis Braille (pisces/pisces), Mahatma Gandhi (taurus/taurus), Will Smith (virgo/virgo), Mick Jagger (leo/leo), Kris Jenner (leo/leo), Hugh Jackman (virgo/virgo), Thom Yorke (virgo/virgo), Naomi Watts (virgo/virgo), Whoopi Goldberg (leo/leo), Billy Idol (virgo/leo), Bryan Cranston (leo/leo), Geena Davis (leo/leo), Alexa Demie (sag/scorpio), La Toya Jackson (leo/leo), Bill Gates (leo/leo), Maria Shriver (leo/leo), Howie Mandel (virgo/leo), Nat King Cole (cancer/cancer), Frank Iero (libra/libra), Bill Nye (virgo/leo), Dacre Montgomery (scorpio/scorpio). With _Jupiter square Pluto_ in the birth chart, you have big plans and ambitions, and some might say too big at times! The Astrology of 2026 with Horoscopes for All Signs

