    detailed: 'The native has the feisty planet Mars in opposition to the expansive planet Jupiter. Harmonious Mars/Jupiter aspects are a marker of worldly comfort and financial success. The energy of Mars combines with the expansiveness of Jupiter to increase your enthusiasm, liveliness, and optimism. Some Famous People with _Mars conjunct Jupiter_ : Halle Berry (Mars conjunct Jupiter in Cancer), Willem Dafoe, Jon Bon Jovi (Mars conjunct Jupiter in Aquarius), Aretha Franklin (in Gemini), Lloyd Bridges, Chelsea Clinton, Amelia Earhart (Mars tightly conjunct Jupiter in Virgo), Michael C. Hall (Mars conjunct Jupiter and Neptune in Sagittarius), Val Kilmer, Dean Martin, Margaret Mead, Gene Wilder, Shari Lewis, Pharrell Williams (Mars conjunct Jupiter in Aquarius), Queen Elizabeth II (Mars conjunct Jupiter in Aquarius). Niall Horan (Mars conjunct Jupiter in Libra), Liam Payne (Mars conjunct Jupiter in Libra), Lenny Kravitz (Mars conjunct Jupiter in Taurus), Ozzy Osbourne (Mars conjunct Jupiter
