  sun_mars:
    title: ''
    short: ''
    detailed: 'Some Famous people with Sun square or opposition Mars: Frida Kahlo (Sun opposite Mars and Uranus), Jennifer Aniston (Sun square Mars and Neptune in fixed signs), Al Capone (opposition), Judy Garland (opposition), Bob Dylan (square), Tina Turner (square), Priyanka Chopra (square), Madonna, Muhammad Ali (square), Anne Heche (opposition), Jim Morrison (opposition), Ashley Liao (square), Shannen Doherty (square), Bo Burnham (square). The Sun is our ego and our will, and Mars is a courageous, daring, confrontational planet. Some Famous People with Sun conjunct Mars: Gloria Steinem (in Aries), Billy Bob Thornton (in Leo), Peter Jennings, Matt Dillon, Ben Affleck, Cameron Diaz, Ed Asner (Sun conjunct Mercury and Mars in Scorpio), Salvador Dali, Raquel Welch, Buster Keaton, Desi Arnaz, Marianne Faithfull, Erik Estrada, Justina Machado (in Virgo), Brie Larson (in Libra and opposite Ascendant), Danny DeVito (in Scorpio), Shailene Woodley (also conjunct Pluto, in Scorpio), Aaliyah (in
      Capricorn), Nikolaj Coster-Waldau (in Leo, also conjunct Lilith), Georgina Amorós (in Leo).'
