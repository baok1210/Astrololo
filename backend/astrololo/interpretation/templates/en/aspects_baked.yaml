  sun_pluto:
    title: ''
    short: ''
    detailed: 'There is a distinct intensity to people born under a Sun-Pluto conjunction. Famous people with Sun conjunct Pluto: Peter Jennings, Lena Horne, Ian Scott Anderson (Jethro Tull), Loni Anderson, Pierre Cardin, Mick Jagger, Kathie Lee Gifford, Gwyneth Paltrow, Mark Knopfler (Dire Straits), Arnold Schwarzenegger, Martha Stewart, Donald Sutherland, Patrick Swayze, Elisabeth Kubler-Ross (devoted most of her life to helping people to deal with death). People born under a challenging aspect between the Sun and Pluto are prone to inner tension and negative, self-destructive behavior. And, effectiveness is something Sun-Pluto craves. See also the Sun square Pluto page and the Sun opposition Pluto page. See also the Sun trine Pluto page and the Sun sextile Pluto page. Note from Annie: I have perhaps used more words to describe Sun-Pluto aspects than I have with other planetary aspects. See also the Sun semi-sextile Pluto.

