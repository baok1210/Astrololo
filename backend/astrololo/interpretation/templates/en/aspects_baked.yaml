    detailed: 'Some Famous People with Jupiter conjunct Neptune: Elon Musk (in Scorpio/Sagittarius), Ellen DeGeneres (in Scorpio), Tupac (scorpio/sagittarius), Jada Pinkett Smith (sag/sag), Selena (sag/sag), Kim Jong-Un (sag/sag), Erykah Badu (sag/sag), Kid Cudi (cap/cap), Katharine Hepburn (cancer/cancer), Virginia Woolf (taurus/taurus), Lance Armstrong (sag/sag), Calvin Harris (sag/sag), David Tennant (sag/sag), Amy Poehler (sag/sag), Mary J. With _Jupiter forming a sextile to Neptune_ in your birth chart, you are gracious and compassionate, and you appreciate subtleties. With _Jupiter trine Neptune_ in the birth chart, you have an intuitive or spiritual approach to solving problems and a compassionate and tolerant worldview or perspective. The Astrology of 2026 with Horoscopes for All Signs

