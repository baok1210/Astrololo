  sun_saturn:
    title: ''
    short: ''
    detailed: 'Those born under a Sun conjunct Saturn aspect, in their youth, are humbled in some way such that they do not feel free to express their will in an outgoing and direct manner. Famous People with _Sun conjunct Saturn_ : Robert Duvall (the aspect is exact, or partile), O. Eventually, Sun-Saturn people carve their own identity. The face of Saturn is generally serious, but Sun-Saturn people can also have a hilariously sarcastic sense of humor. See also Sun square Saturn and Sun opposition Saturn pages. It is easy and natural for those born under a harmonious aspect between the Sun and Saturn to accept responsibilities, to lead a rather ordered life, and to apply caution in their financial and business dealings. Explore these aspects more deeply: Sun sextile Saturn or Sun trine Saturn

      See also: Sun quincunx Saturn, Sun quintile or biquintile Saturn, Sun semi-sextile Saturn.

