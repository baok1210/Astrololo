  moon_mercury:
    title: ''
    short: ''
    detailed: 'Those with the sextile can call upon these traits when needed, and those with the trine between the Moon and Mercury have incorporated the traits of the aspect into their personalities, expressing them naturally and consistently.

      **More Aspects of the Moon in the Natal Chart:** Moon-Sun aspects  Moon-Ascendant aspects

      Looking for interpretations for other aspects? Moon conjunct Mercury people are accommodating and curious, but they are not as well equipped to handle heavy emotional demands. Some Famous People with Moon conjunct Mercury: Muhammad Ali (in Aquarius), Danny Devito (in Sagittarius), Laura Dern (Moon conjunct Mercury in Pisces), Megan Mullally (Moon conjunct Mercury in Sagittarius), Robert Redford (in Virgo), Valerie Bertinelli (Moon conjunct Mercury in Aries), Dustin Hoffman, Clint Black, Whoopi Goldberg, Bruce Lee (Moon conjunct Mercury in Scorpio), Mylène Farmer (in Libra), Halle Berry (in Leo), Miley Cyrus (Moon conjunct retrograde Mercury in Scorpio), Lili Reinhart (in Virgo), and Zooey Deschanel (in Capricorn).'
    strength: See description
    weakness: See description
  moon_venus:
    title: ''
    short: ''
    detailed: 'There is a lot of energy and drive available.

      *Sextile: Your physical drive and energy level are high now, and you can accomplish a great deal fairly easily. There could be some hard feelings, especially from younger persons, if you become too aggressive.

      *Sextile:You easily become fired up emotionally at this time, especially about people, places, or causes you have a strong attachment to from the past (such as your alma mater, your home town, etc.). There is a basic drive to appreciate and taste life.

      *Mars Transits Trine Venus:Right now you are more magnetic and sexually attractive, and your love life is likely to be both harmonious and satisfying. Exercise or romance is in order.

      *Mars Transits Sextile Mars: You are capable of forceful, decisive action, and you have the will to carry through on your intentions at this time. The path is open and clear.

      *Mars Transits Sextile Jupiter: Doors open and new opportunities for personal and professional growth present themselves.'
    strength: See description
    weakness: See description
  moon_mars:
    title: ''
    short: ''
    detailed: 'Those with the sextile can call upon these traits when needed, and those with the trine between the Moon and Mars have incorporated the traits of the aspect into their personalities, expressing them naturally and consistently.

      **More Aspects of the Moon in the Natal Chart:** Moon-Sun aspects  Moon-Ascendant aspects

      Looking for interpretations for other aspects? Some Famous People with Moon conjunct Mars: Bruce Lee, Howard Cosell, e.e. See quincunx,  semi-sextile, and the quintile/biquintile.

      **Don''t know the position of the Moon in your natal chart?** Find out how you can get your astrology chart positions free with our simple steps. Or, Cafe Astrology''s Moon Sign Calculator tool will help you find an answer quickly and accurately. Spontaneous to a fault, these people react quickly to stimuli. Their temper is quick, but it can disappear just as rapidly. Cummings, Natalie Cole, David Carradine, Liza Minnelli, Ricky Martin, Billy Graham, Dorothy Hamill. Their bluntness can be both appreciated and considered offensive, depending on their audience.'
    strength: See description
    weakness: See description
  moon_jupiter:
    title: ''
    short: ''
    detailed: 'Moon Conjunct Sextile Trine Square Opposition Jupiter Aspects

      Generosity of spirit is most evident when Moon conjuncts Jupiter in the natal chart. Those with the sextile can call upon these traits when needed, and those with the trine between the Moon and Jupiter have incorporated the traits of the aspect into their personalities, expressing them naturally and consistently.

      **More Aspects of the Moon in the Natal Chart:** Moon-Sun aspects  Moon-Ascendant aspects

      Looking for interpretations for other aspects? Jupiter aligned with the Moon offers _perspective_ to the emotions, so that the natives are able to reason themselves out of depression, foul moods, and the like. Not everyone wants to deal with their emotions in such a rational manner, however, so Moon conjunct Jupiter people can sometimes support people in a way that is not always appreciated, but their kind-hearted approach is generally well-received. The reason behind it is that their emotional natures (Moon) work hand-in-hand with their higher minds (Jupiter).'
    strength: See description
    weakness: See description
  moon_saturn:
    title: ''
    short: ''
    detailed: 'Moon Conjunct Sextile Trine Square Opposition Saturn Aspects

      The emotional reserve and ability to detach themselves emotionally can certainly help these people to succeed on a professional level. Those with the sextile can call upon these traits when needed, and those with the trine between the Moon and Saturn have incorporated the traits of the aspect into their personalities, expressing them naturally and consistently.

      **More Aspects of the Moon in the Natal Chart:** Moon-Sun aspects  Moon-Ascendant aspects

      Looking for interpretations for other aspects? See quincunx,  semi-sextile, and the quintile/biquintile.

      **Don''t know the position of the Moon in your natal chart?** Find out how you can get your astrology chart positions free with our simple steps. With hard Saturn aspects, individuals are often plagued with doubts, not only about the self but about what to expect from life itself. Ironically, many people with hard Saturn aspects can be quite sarcastic, skeptical, and rigid in manner.'
    strength: See description
    weakness: See description
  moon_uranus:
    title: ''
    short: ''
    detailed: 'Moon Conjunct Sextile Trine Square Opposition Uranus Aspects

      You possess an independent spirit, and you resist being labeled or pigeon-holed as a result. Those with the sextile can call upon these traits when needed, and those with the trine between the Moon and Uranus have incorporated the traits of the aspect into their personalities, expressing them naturally and consistently.

      **More Aspects of the Moon in the Natal Chart:** Moon-Sun aspects  Moon-Ascendant aspects

      Looking for interpretations for other aspects? Some Famous People with Moon conjunct Uranus: Anais Nin, Bob Dylan, Ann-Margret, Drew Carey, Jodie Foster, Lorne Greene. More often than not, Moon-Uranus people had unusual early home lives. See quincunx,  semi-sextile, and the quintile/biquintile.

      **Don''t know the position of the Moon in your natal chart?** Find out how you can get your astrology chart positions free with our simple steps. Or, Cafe Astrology''s Moon Sign Calculator tool will help you find an answer quickly and accurately.'
    strength: See description
    weakness: See description
  moon_neptune:
    title: ''
    short: ''
    detailed: 'Moon Conjunct Sextile Trine Square Opposition Neptune Aspects

      Sensitive to a fault, they live in the world of feelings. Those with the sextile can call upon these traits when needed, and those with the trine between the Moon and Neptune have incorporated the traits of the aspect into their personalities, expressing them naturally and consistently.

      **More Aspects of the Moon in the Natal Chart:** Moon-Sun aspects  Moon-Ascendant aspects

      Looking for interpretations for other aspects? Some Famous People with Moon conjunct Neptune: Bill Cosby, Mike Farrell, Tommy Hilfiger, Dustin Hoffman, Billy Joel, Sting, Justin Timberlake, Shirley MacLaine, Anne Frank, Bono (U2). Because of their dreamy natures and big hopes, it is too easy for those with Moon in hard aspect to Neptune to become disenchanted. While everyone enjoys music, people with Moon in harmonious aspect to Neptune respond to music as a vehicle to heal, relax, and to uplift the soul.'
    strength: See description
    weakness: See description
  moon_pluto:
    title: ''
    short: ''
    detailed: 'Moon Conjunct Sextile Trine Square Opposition Pluto Aspects

      Emotional satisfaction for you runs deep and is very complex. Those with the sextile can call upon these traits when needed, and those with the trine between the Moon and Pluto have incorporated the traits of the aspect into their personalities, expressing them naturally and consistently. Women with this aspect (sample from the Astrology Profile for Women report): With the easy flow of energy between the Moon and Pluto indicated by their sextile aspect to one another, you can be quite adept in your understanding of human emotion. Some Famous People with Moon conjunct Pluto: Jeffrey Archer, Meredith Baxter, Judy Blume, Bette Davis, Adelle Davis, Catherine Deneuve, Leonardo DiCaprio, Phyllis Diller, Amelia Earhart, Jodie Foster, Eva Gabor, Anne Heche, k.d. Through the tense square between your Moon and Pluto in your chart, your emotionality is extremely intensified.'
    strength: See description
    weakness: See description
