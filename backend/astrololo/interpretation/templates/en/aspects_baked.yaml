    detailed: 'Some Famous People with Venus conjunct Pluto: Amelia Earhart (Venus conjunct Pluto in Gemini), Jessica Hahn (Venus in late Leo conjunct Pluto in early Virgo), Judy Reyes (Venus conjunct Pluto in Virgo), Ian Scott Anderson (Venus conjunct Pluto in Leo), Charles Dickens (Venus conjunct Pluto in Pisces), Phil Hartman (Venus conjunct Pluto in Leo), Victor Hugo (Venus conjunct Pluto in Pisces), Jeremy Irons (Venus conjunct Pluto in Leo), Liberace (Venus conjunct Pluto in Cancer), Heather Locklear (Venus conjunct Pluto in Virgo), Barry Manilow (in Leo), Dr. Those with the sextile can call upon these traits when needed, and those with the trine between the Venus and Pluto have incorporated the traits of the aspect into their personalities, expressing them naturally and consistently.

