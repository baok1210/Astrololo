      Your drive and energy are directed toward practical material accomplishment and achieving concrete results. You are
      hard-working and capable of foregoing immediate comfort in order to achieve your long-range goals. You can easily become
      a workaholic and are very responsible and conscientious about doing a thorough job. You don’t tend to gamble when it
      comes to implementing your plans but generally prefer the conservative, tried-and-true route and then following through
      with it. You rely on your own efforts and perseverance rather than luck or good fortune. There is a natural shrewdness
      and instinct for business or organizational management. You tend to be ambitious, persistent, patient, self-reliant
      and responsible. You are apt to be slow in learning, but there is total assimilation of knowledge. Your energy is carefully
      used. Success is very important to you. On the negative side you may have a quick irritability which needs to be controlled
      and a tendency to feel resentment toward others for supposed hurts. You need to learn how to forgive and forget and
      how to release your emotions and frustrations positively. Top
    source: astrolibrary.org
  aquarius:
    title: ''
    short: If you have Mars in Aquarius, your energies are expressed in unique and original ways. There may be genius shown
      in the way you go about things. You are inventive, scientific, a bit eccentric, unconve
    detailed: If you have Mars in Aquarius, your energies are expressed in unique and original ways. There may be genius shown
      in the way you go about things. You are inventive, scientific, a bit eccentric, unconventional and perhaps a bit rebellious.
      Working with others to get things done appeals to you. You enjoy taking part in sociable, group activities and unite
      with others of similar ideals and persuasions. You are progressive, democratic and you are not concerned with hogging
      personal power or having authority over others. You are a team player. New and unusual methods of work, planning and
      technology appeal to you. Your energy levels are usually high, but they can be erratic at times and you may find a tendency
      to work in spurts. Thus, you can be impatient and inconstant in pursuing your desires. You are intellectual, cautious,
      independent, freedom-loving and enterprising. You respond well to emergencies. There may be interests in mechanical
      or scientific subjects. Science fiction may intrigue you. You may need to control a radical or rebellious streak within
      and remember that in certain cases haste does make waste. On the negative side you can be too aggressive, quarrelsome,
      contentious and perverse. Top
    source: astrolibrary.org
  pisces:
    title: ''
    short: If you have Mars in Pisces, your energies and aggressiveness tend to come out in non-combative and noncompetitive
      ways. You are a bit of a pacifist and do not enjoy tackling anyone or anything head-on
    detailed: If you have Mars in Pisces, your energies and aggressiveness tend to come out in non-combative and noncompetitive
      ways. You are a bit of a pacifist and do not enjoy tackling anyone or anything head-on in a directly confrontational
      manner. Working around people or situations or working behind the scenes, in secret, is more your preferred style. If
      necessary, it is more your tendency to give up something rather than to fight for it. Because your ego is not especially
      interested in personal achievement, glorification, material advantage, or winning at the expense of someone else, you
      may come across to others as weak-willed or ineffectual. Being on top, being the best, or being first doesn’t mean much
      to you, hence you can be quite happy in a supporting role, working for the benefit of others or for a cause that you
      believe in. You may experience difficulties in planning clear and definite goals for yourself in the real world. You
      are not sure what you want out of life, except you instinctively seem to know that you do have and need to find a spiritual
      purpose. You have many dreams, high ideals, and a strong mystical or religious impulse. You also have a creative imagination
      and can successfully apply yourself to art or music. You are intuitive, humorous and diplomatic, quiet on the outside,
      but restless within. On the negative side you can be indecisive, procrastinating, too interested in the sensual side
      of life, and may resort to using drugs or alcohol as a way to escape the pressures and responsibilities of dealing with
      everyday life. Learning self-control is important for you. Take action, don't only day-dream. Top
    source: astrolibrary.org
