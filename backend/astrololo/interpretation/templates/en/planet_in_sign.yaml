    detailed: If you have Mars in Virgo, you are an energetic worker, a perfectionist, and you have high standards for your
      own work. You often feel that if you want something done right, then you must do it yourself, for others never do as
      thorough a job as you do. Doing a task well is very important to you, and you may labor over minute details that others
      wouldn’t bother with. You constantly work for accuracy, efficiency, and precision, and you become very irritable when
      things are not done “right.” On the other hand, you can become so much of a perfectionist and so self-critical that
