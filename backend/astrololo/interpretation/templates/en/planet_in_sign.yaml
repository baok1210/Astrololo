    source: astrolibrary.org
  sagittarius:
    title: ''
    short: If you have Mars in Sagittarius, you are aspiring, enterprising, idealistic, and forever following some bright
      and distant star, planning some new venture or investigating new potentials that will exp
    detailed: If you have Mars in Sagittarius, you are aspiring, enterprising, idealistic, and forever following some bright
      and distant star, planning some new venture or investigating new potentials that will expand your horizons. You are
      a rolling stone. You aim high and are not content simply with a quiet, secure existence. You like to stretch your limits,
      to see how far you can go, and to take risks. You are a positive thinker, expect success for yourself, and are philosophical
      about failures. You are flexible and bounce back from disappointment rather quickly, usually with another hopeful new
      idea you want to try. Your enthusiasm and confidence are contagious and enable you to enlist the aid and support you
      need for your projects. However, you sometimes promise more than you can actually deliver, due to over-optimism or insufficient
      attention to the practicalities involved. You also tend to get distracted and sometimes have too many things going at
      once. Although it may be very difficult for you, there are times when you must simply develop and show commitment, perseverance,
      and persistence in order to make your dreams and goals a concrete reality. Too often you fall short of what you could
      attain because you are unwilling to persist through the difficult or less exciting times. You also enjoy competition
      and usually do not take it too seriously. You tend to be friendly, optimistic, impulsive, enthusiastic, independent
      and argumentative. You may be an active traveler. Your energies need to be used in physical outlets and you may be an
      athlete. You have a tendency to exaggerate. You may also have strong religious and philosophic convictions and can go
      “crusading” if you feel the cause is just. On the negative side you may be sharp-tongued, quarrelsome, disagreeable,
      self-righteous, verbose, intolerant, and dishonest (or you may exaggerate the truth). > Top
    source: astrolibrary.org
  capricorn:
    title: ''
    short: If you have Mars in Capricorn, your actions serve your ambitions for power, recognition, distinction, and status.
      You are not content to follow, but must have a leading role in whatever you do. If not
    detailed: If you have Mars in Capricorn, your actions serve your ambitions for power, recognition, distinction, and status.
      You are not content to follow, but must have a leading role in whatever you do. If not handled well, the energies of
      this placement can make you appear ruthless, manipulative and bull-dozing over anyone who stands in your way. You are
