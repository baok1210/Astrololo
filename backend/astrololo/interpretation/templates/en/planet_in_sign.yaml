jupiter:
  aquarius: Attracts the most good fortune when they are tolerant and fair, inventive, impartial, and cooperative. Values
    people and personal freedom most. Wants to show a unique perspective or original and unique skills and talents. Open to
    new methods and progress. Great tolerance and humanitarianism.
  aries: Believes in the power of positivity, that life is what you make of it. Loves competition, doing things independently.
    Values instant results. Attracts the most good fortune when he/she takes the lead, initiates, inspires, and demonstrates
    enthusiasm and courage.
  cancer: Attracts the most good fortune when they are sympathetic and charitable. Uses their powers to save and accumulate,
    and comforts others. Real estate and the food industry can be prosperous avenues. Values tradition and works towards security.
    Relies mostly on gut instincts when it comes to pursuing goals and business success.
  capricorn: Attracts the most good fortune when they organize and direct, conduct themselves with integrity, are ethical
    and mature. Values the long term, achievement, responsibility, and manifestation. Succeeds through resourcefulness and
    avoiding activities that waste time, energy, or resources. Good at streamlining. Position or status is important to them.
  gemini: Attracts the most good fortune when they use their wit and ingeniousness, are versatile, sociable, curious, and
    put others at ease with friendliness and sincere curiosity. Values the intellect and sees opportunities to grow and succeed
    through intellectual, verbal, and written channels. Believes that intelligence and knowledge are the keys to solving problems.
  leo: Attracts the most good fortune when they express magnanimity, are generous with others, inspire confidence in those
    around them, conduct themselves with dignity and sincerity, and avoid the pitfall of excessive egotism. Prosperous areas
    are creative ones, entertainment, children, and recreation. They take pride in everything they do. Generosity brings success.
  libra: Attracts the most good fortune when they are fair-minded, treat others with equality, are bending and compromising
    without being a “doormat”, are gracious, and use their talents at promoting and mediating. They value people and relationships,
    and might succeed best in partnership. Relating as equals is important to them. The arts, architecture, law, math, mediating,
    and politics are possible avenues for success. Use of charm and grace to reach goals.
  pisces: 'Attracts the most good fortune when they are charitable, tender, devoted, compassionate, looking out for the underdog,
    and giving generously. Values compassion and charity, and is motivated by a universal vision. Peaceful personal philosophy. 
    Faith in the goodness of life brings rewards.

    See also: Jupiter in the Signs and Luck and Jupiter in the Houses.

    Back to Jupiter page.

    See more Natal Astrology.'
  sagittarius: Attracts the most good fortune when they are open-handed and generous, tolerant, and practice what they preach.
    Can be inspirational, and find success in travel, education, teaching, sports, publishing, and foreign cultures. Very
    philosophical, forward-looking, and enthusiastic. Has strong morals. Strongly values freedom of movement and expression.
  scorpio: Attracts the most good fortune when they put their “all” into a project or undertaking, and use their magnetic
    powers to heal others. Enthusiastic for deeper studies and meanings, all that is taboo or mysterious, psychology. Values
    decisiveness, intensity, willpower, commitment, and strength. Very strong problem solver who cuts to the chase. Science
    and research may be prosperous avenues.
  taurus: Delights in sensual pleasures and wants the good life. A strong feeling of what they are worth attracts success.
    Good instincts for finances, what things are worth/good products, and investing. Attracts the most “good fortune” when
    they are charitable, generous but discriminating, and patient. They should watch for over-indulgence.
  virgo: Attracts the most good fortune when they are helpful, honest, orderly, and when they pay attention to details. The
    service industries, nutrition, and health are prosperous avenues. Practical and technical knowledge and skills are most
    valued. A real problem solver and others appreciate their help. Doesn’t always feel lucky or especially ambitious. Instead,
    hard work is valued.
neptune:
  aquarius: 'Dates when Pluto is in Aquarius:

    The quest to distinguish yourself from others is a powerful one. Yet, you’re determined to transform, reform, and improve
    how we team up and view groups, our societal practices, and individuality. You may put undue pressure on yourself to achieve
    these goals.

    Because you take your social role so seriously, you should watch that you don’t deny yourself the pleasures of group connections.
    Friendships and group associations can be complicated, powerful, and complex. Power struggles, obsessions, “all or nothing”
    scenarios (many friends or none at different times), and intensity in your social life can be more frequent than most.
    However, the potential for healing and transformation is also great. Friends and groups can be more influential on your
    lifestyle than the family unit.

    You believe in the power of cooperation and the team to make groundbreaking progress in science, health, social structures,
    and the community. You also assign much power to words, slogans, the mind, and ideas, and you use these things fully to
    effect change. At the same time, you tend to approach making changes radically or by stirring controversy, which can push
    you in the wrong direction or work against you if you take this too far.

    If Pluto is strong in your chart, you are persuasive and unconventional. You’re not afraid to approach problems in new,
    unusual ways. Some might call you a cynical idealist. You could find that you’re not as sentimentally tied to the past
    as others. While you should answer a call to make changes and reforms, pacing yourself and keeping these efforts moderate
    and healthy will serve you best.

    See also: Neptune in the Houses and Pluto in the Houses.

    Back to the Neptune page or Pluto page.

    See more Natal Astrology.'
  capricorn: 'Dates when Pluto is in Capricorn:

    The quest to distinguish yourself through your responsibilities is a powerful one. In fact, you may put undue pressure
    on yourself to achieve your goals. Reforming and improving business, government, commerce, society, and other practical
    affairs can be critical to you. Watch that you don’t deny yourself youthful play and abandon since the tendency is real
    that you’ve had to grow up or mature too quickly. Curb tendencies to cynicism. While you see many areas that need fixing,
    you prefer to approach things critically and carefully rather than radically. Stirring controversy, in your opinion, doesn’t
    help you get to your goals as efficiently as a determined and organized approach.

    If Pluto is strong in your chart, you’re wise and capable of a great understanding of systems and structures. You’re likely
    to love order but despise heavy-handed rule. Impermanency can both haunt and drive you, and you can go to great lengths
    to conserve your resources. Keeping these things moderate and healthy is a challenge but most rewarding.'
  leo: 'Dates when Pluto was in Leo:

    Your feelings about love, romance, destiny, self-expression, children, and creativity are intense. You can readily go
    to extremes in your pursuit of these things or when following your heart and finding your joy. The quest to distinguish
    yourself through any of these life departments can be so fraught with pressure at times that you rarely feel satisfied
    with your accomplishments in these areas, always expecting more.

    Discovering your joy can thus become a mission that subtracts from your happiness if you’re not careful, and this, of
    course, defeats the purpose. The goal should be to gain personal power by expressing love and creativity, not from these
    things.'
  libra: 'Dates of Pluto in Libra:

    The quest to bring reform to–or to distinguish yourself through–your relationships and connections with others can be
    so fraught with pressure at times that you have a hard time letting go or feeling content and satisfied with your accomplishments
    in these areas. The goal should be to feel more personally powerful through your ability to compromise and treat others
    fairly, not to seek your power from your relationships. You have brilliant insights into people and relationships. You
    know that improving the world starts with reforming the ways we interact with one another.'
  pisces: 'Dates of Neptune in Pisces:

    Your vision of an ideal world may center around compassion, mercy, empathy, service, sacrifice, intuition, artistry, or
    spirituality. This Neptune sign position is especially sensitive, intuitive, and imaginative. It can also be rather escapist!
    It’s probably best to watch for avoidant behavior since you can be quite comfortable in the non-material world. You are
    capable of great devotion when you believe in something, and your dreams know few bounds.'
  sagittarius: 'Dates of Pluto in Sagittarius:

    You take your beliefs and philosophy of life very seriously, more than most. You believe deeply in personal freedom, tolerance,
    and bringing cultures together. Uncovering the truth can be a mission. You tend to question beliefs and ideologies in
    place if you consider them limiting, and your quest to distinguish yourself through–or bring reform to–beliefs is so intense
    or pressured that you may rarely feel satisfied with your efforts in this area.

    It’s wise to watch for a tendency to move from one cause to the next or one project to another, perhaps as a result of
    this dissatisfaction or from inhuman expectations. However, your faith in humanity is strong, and you are moved and motivated
    by your positive vision of a better world.'
  scorpio: 'Dates of Pluto in Scorpio:

    Your feelings about intimacy, sexuality, dependency, attachment, and support are intense. You can readily go to extremes
    as you seek a deeper connection to someone or a special project or goal. The quest to distinguish yourself in any of these
    areas can be so fraught with pressure at times that you rarely allow yourself to feel content and satisfied.

    It’s possible you need to work harder than most to let yourself be anything less than strong. You are not afraid to call
    evil for what it is! You are a rare combination of compassionate and practical. With Pluto working at its best, you are
    brilliantly perceptive and understanding–quick to see the many different layers of any given situation.'
  virgo: 'Dates of Pluto in Virgo:

    The quest to distinguish yourself through your work, self-care, routines, services, or attention to health and wellness
    can be so fraught with pressure at times that you don’t always feel satisfied with your accomplishments in these areas.
    The goal should be to gain personal power through your love of your work or quest for better health rather than attempting
    to find your purpose or sense of power from your work or health pursuits. Self-improvement is important to you, but you
    should watch for an endless feeling of discontent with your efforts. With Pluto working well, you have brilliant ideas
    for healing the body and mind.'
