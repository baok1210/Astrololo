    source: astrolibrary.org
  libra:
    title: ''
    short: 'If you have Mars in Libra, you swing from being too pushy, aggressive, confrontational, and insistent on doing
      things your own way to being too eager to please and too compromising. You have a strong '
    detailed: If you have Mars in Libra, you swing from being too pushy, aggressive, confrontational, and insistent on doing
      things your own way to being too eager to please and too compromising. You have a strong attraction to the opposite
      gender and if Mars is well aspected, then this brings popularity and good will. But if Mars is badly aspected, then
      this can bring opposition and criticism from the public and the opposite gender, fickleness in love relationships, and
      trouble from toying with the affections of others. Desire for competition and cooperation swing back and forth. You
      seek a balance between acting independently and assertively and working cooperatively and interdependently with others.
      You may feel frustrated at times that you cannot simply do what you want to, that you must always accommodate the needs
      and desires of others. Or you may feel hesitant to act in a positive, assertive manner if you do not have the support
      and approval of other people. Either way, you are not a loner. You achieve your goals by collaborating and joining forces
      with others, by being a team player. You are very concerned with the concept of fairness and become quite vocal if you
      sense someone is being taken advantage of. You may be attracted to legal pursuits. You avoid extremism and favor a balanced,
      moderate approach to living. You are unlikely to push yourself too hard or to become fanatically driven to reach your
      goals. You tend to be persuasive, perceptive, enthusiastic and easygoing, although at times you can be argumentative.
      Diplomacy and patience may need to be cultivated. Top
    source: astrolibrary.org
  scorpio:
    title: ''
    short: If you have Mars in Scorpio, you are extremely strong-willed and you pursue your goals and desires with passionate
      dedication and determination. You are capable of total concentration and tremendous d
    detailed: If you have Mars in Scorpio, you are extremely strong-willed and you pursue your goals and desires with passionate
      dedication and determination. You are capable of total concentration and tremendous discipline, and you are very difficult
      to influence once your mind is made up. When you want something, you can be very one-sided and almost obsessed with
