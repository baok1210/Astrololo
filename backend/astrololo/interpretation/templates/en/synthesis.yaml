asc_ruler_angular: "Your Ascendant is {asc_sign}, with its ruler {ruler_name} placed in {ruler_sign} in the {ruler_house_ordinal} House ({house_type_text}) — a powerful angular position. {ruler_short_desc}. This indicates you are {sign_kw}. You express yourself directly and powerfully to the outside world. Your life is closely tied to areas of House {ruler_house}: {house_kw}. If you focus your energy, you can create significant impact on your environment."
asc_ruler_succedent: "Your Ascendant is {asc_sign}, with its ruler {ruler_name} placed in {ruler_sign} in the {ruler_house_ordinal} House ({house_type_text}). {ruler_short_desc}. Your nature is {sign_kw}, oriented toward building and sustainable development. You strengthen your resources quietly rather than showing off. Areas of House {ruler_house}: {house_kw} are where you find stability to express yourself."
asc_ruler_cadent: "Your Ascendant is {asc_sign}, with its ruler {ruler_name} placed in {ruler_sign} in the {ruler_house_ordinal} House ({house_type_text}) — a cadent position oriented toward thought and introspection. {ruler_short_desc}. Your {sign_kw} nature is expressed through intellect and analysis rather than direct action. You think deeply before acting. Areas of House {ruler_house}: {house_kw} are where your strengths shine."
sun_moon_synthesis: "Sun in {sun_sign} combined with Moon in {moon_sign} creates a unique personality synthesis. {sun_sign} — {sun_short_desc}. {moon_sign} — {moon_short_desc}. This combination {synthesis_text}. The {sun_core} nature of your Sun is nurtured by your Moon's need for {moon_core}. {closing}."
dominant_planet: "{planet_name} is the most prominent planet in your chart. {planet_name} in {sign_name} in House {house} ({dignity_label}) — {dignity_text} — with {aspect_count} aspects ({harmonious_count} harmonious, {challenging_count} challenging). {planet_short_desc}. {planet_closing}."
conjunction_cluster: "A notable conjunction cluster is found at {location}: {planets_list}. This is a powerful concentration of energy forming a 'stellium' — a group of planets working as a team. {theme_desc}. Strengths: {strengths}. Challenges: {challenges}."
element_quality_house: "Your chart favors {element_desc} ({elem_pct}%), with {quality_desc} ({qual_pct}%) and concentration in {house_type_desc} ({house_pct}%). {element_closing} {quality_closing} {house_closing} {combined_closing}"
