dominant_cardinal: "Cardinal (Cardinal) dominant: You are a person of action and initiation. Your strength lies in starting new projects, taking initiative, and leading others. You have a pioneering spirit — daring to think and act, never afraid of challenges. People with strong Cardinal energy are often natural leaders who charge ahead in work and life. Learn to cultivate patience and complete what you start, rather than always chasing new beginnings."
dominant_fixed: "Fixed dominant: You are steadfast, persistent and reliable. Your strength lies in maintaining, focusing and protecting what has been built. You have an iron will — once decided, you rarely change course. People with strong Fixed energy stand firm in crisis and persevere through any obstacle. Learn to be more flexible and embrace change rather than resist it."
dominant_mutable: "Mutable dominant: You are adaptable, flexible and versatile. Your strength lies in adapting to any circumstance, connecting and communicating effectively. You easily adjust when the environment changes and always find creative solutions. People with strong Mutable energy excel in intermediary, diplomatic and communicative roles. Learn to focus on a long-term goal rather than spreading energy too thin."
deficient_cardinal: "Lacking Cardinal energy: You may struggle to start new projects and seize opportunities proactively. You tend to wait for others to take the lead rather than acting on your own. Practice small daily acts of initiative, set specific goals, and begin without waiting for the perfect moment."
deficient_fixed: "Lacking Fixed energy: You may lack patience and find it hard to maintain long-term commitments. Easily distracted by new ideas before completing current work. Build discipline — focus on finishing one task before moving to the next, and develop stable routines."
deficient_mutable: "Lacking Mutable energy: You may struggle to adapt to change and adjust plans. Tendency toward rigidity, stubbornness, and difficulty accepting different viewpoints. Practice being open to new approaches, listen to others' opinions, and be more flexible in your thinking."
