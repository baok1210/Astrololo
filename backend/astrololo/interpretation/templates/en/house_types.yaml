dominant_angular: "Most planets in angular houses (1-4-7-10): You are a person of action with strong drive and ambition. Angular houses relate to direct self-expression in the world. You tend to make a noticeable impact on your surroundings and are easily noticed. This is a powerful placement indicating you can hardly live an ordinary life."
dominant_succedent: "Most planets in succedent houses (2-5-8-11): You focus on building lasting value, developing talents and consolidating resources. Succedent houses relate to stability and growth from what has been initiated. You have talent in financial management, relationship development and enjoying the fruits of your labor."
dominant_cadent: "Most planets in cadent houses (3-6-9-12): You are thoughtful, love learning and exploring. Cadent houses relate to knowledge, communication, service and spirituality. You tend toward introspection, analysis and contemplation. Your strength lies in adaptability, learning and serving others."
balanced_houses: "Planets are fairly evenly distributed among angular, succedent and cadent houses. This indicates good balance between action (angular), building (succedent) and thinking (cadent). You can act decisively, build sustainably, and think deeply."
