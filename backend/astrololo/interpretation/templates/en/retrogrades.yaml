intro: "You have {count} retrograde planets in your chart ({planets}). Retrograde motion turns planetary energy inward, making its expression more internal and karmic."
none: "No planets are retrograde. Your energy flows outward directly and clearly without internal obstruction."
many: "You have {count} retrograde planets — a sign of deep inner life and strong karmic patterns to resolve."
sun: "Sun retrograde: Your ego and self-expression are introspective. You may be uncomfortable in the spotlight but have rich inner depth."
moon: "Moon retrograde: Your emotions are suppressed or hard to express outwardly. You have a complex and sensitive inner emotional life."
mercury: "Mercury retrograde: Your thinking and communication are internal. You think deeply and often review before speaking."
venus: "Venus retrograde: Your love and values are formed from within. You may face lessons about self-worth and personal values."
mars: "Mars retrograde: Your energy and drive turn inward. You may suppress anger or find it hard to be assertive."
jupiter: "Jupiter retrograde: Your luck and expansion come from within. You find meaning through personal philosophy rather than external pursuit."
saturn: "Saturn retrograde: Your discipline and responsibility lessons are internal. You may feel burden by family or past karma."
uranus: "Uranus retrograde: Your breakthroughs and freedom come from within. You have a unique nature but express it subtly."
neptune: "Neptune retrograde: Your spirituality and intuition are powerful but deeply personal. You may need to overcome past illusions."
pluto: "Pluto retrograde: Your transformation happens quietly and deeply within. You have a powerful ability to regenerate after crisis."
chiron: "Chiron retrograde: Your deepest wound relates to the past. The healing journey requires looking back at the origin of the hurt."
