mars:
  '1': 'Mars in the first house of your chart is a commanding position and is even
    more so if Mars is also conjunct the Ascendant. Your reactions to new situations
    are immediate and pressing. You are an active, energetic, dynamic, enterprising,
    and possibly even forceful or aggressive person at times (unless Mars is in strong
    aspect to Saturn or Neptune).

    You often begin new endeavors with enthusiasm, although follow-through may not
    be present, depending on the rest of your chart. Some of you might be rash, inconsiderate,
    or overly assertive. People are often impressed with your energy and stamina!
    You need to be involved, take the lead, and act independently. You don’t enjoy
    following others or playing waiting games.

    Fiercely independent, you are usually direct and straightforward–and this is wonderfully
    refreshing! Spontaneity is extremely important to you. Some of you might stir
    up trouble–whether consciously or not–when you’re bored. Your approach to life
    is physical and active, and your love of competition is notable.'
  '10': 'An urge to organize and to be practical can amount to a minor obsession with
    this position! Your career motivation is constant and relentless, and people in
    your life need to respect your independent drive and focus. You are task-oriented,
    and you are at your best and most effective when you are in control of your time.
    In your relationships, you may often take the lead when it comes to organizing
    activities.

    With Mars in the tenth house, you can be quite driven, goal-oriented, and competitive.
    You thrive in careers in which you can pioneer, take the lead, or enjoy a certain
    amount of freedom or independence. You’re a self-starter! You also need to be
    active and dominant in your field or profession. More interested in pursuing your
    goals than gaining others’ approval, you can certainly create some waves in your
    life from time to time.

    Sample from the KidZone report: “This child has Mars in the 10th House. These
    little ones will not need any coaxing. They are born wanting to succeed. And success
    should come to them easily and from quite a young age. They will know that in
    order to get to where they want to be, they will have to work hard, and they will
    do just that. These youngsters set goals early on. They will then push to reach
    those goals, or even push the boundaries further. This child will always want
    to get ahead in life. The father figure could be a problem for this child in some
    way.

    This child will be more serious than most. Although there will be a strong need
    to be respected by peers, it is only those people that are considered important
    that will count. These youngsters will discriminate, and generally, they are not
    concerned with the opinions of others. Even while young, the eye will be on the
    future. The stakes of popularity will not matter to this little one. He/she will
    want to be recognized as being smart, not cute.

    These kids can have quite the superior air about them. If this is not recognized
    and addressed, the child can go out into the workforce with that same attitude.
    An attitude of superiority can work against this child. He/she will need to learn
    to be more compromising, to accept that no man is an island.

    The child has a need for appraisal and approval, but to achieve this, he/she must
    learn to be more human and less mechanical. Failing this, he/she should probably
    look for a career that is basically some type of self-employment. The other avenue
    is to seek work where there is a great deal of freedom. This position of Mars
    suggests several kinds of jobs, especially those that require a lot of physical
    energy or hard work. This would be advantageous in any field requiring independent
    and original work.

    Mars here will give the child the courage to act quite independently, and to be
    a self-starter that can make decisions. The ambition that he/she feels will carry
    this child far. But they should learn to develop some “people” skills as well.
    It is then that their choices will be without limit.”'
  '11': 'With Mars in the 11th house of your natal chart, you like to organize events
    and activities, and sometimes take the lead a little too often! However, for the
    most part, you’re an engaging, helpful friend who is ready to jump in and take
    action when need be, and this is a wonderful, rare quality.

    Your mind needs to be engaged in order for you to be at your most passionate,
    and for this reason, you can seem a little detached or impersonal in close personal
    relationships. You’re not afraid to be different or to march to the beat of a
    different drummer. It’s likely that you enjoy working towards an important cause,
    and you can be quite a crusader!

    You may be attracted to intense, passionate, or energetic people, and your friendships
    can be quite colorful and possibly strife-ridden at times.

    Sample from the  Spirit Success report: You will use your ability to work with
    people to achieve your personal goals. You may have only a few close friends,
    because you are too busy enlarging your circle to establish many permanent relationships.
    You weren’t born to be a team-player, but will find that support is necessary<
    to further your ambitions. Cooperation and coordination should be your key words
    for success and play a major part in your life-pattern of expansion.'
  '12': 'With Mars in the twelfth house of the natal chart, you can struggle with
    asserting yourself in direct, natural ways in your youth, but with time and experience
    (and perhaps some hard work), you’re likely to learn to work with this energy
    rather than allow it to work against you. Watch for a tendency to feel defeated
    before you’ve given something a real shot. You are extraordinarily resourceful,
    and you can handle many things on your own or in uniquely creative ways.

    Though you may have a great deal of energy and drive, you lack confidence or the
    desire to put yourself and your interests first. Positively you can be very unselfish,
    working more on behalf of others than for yourself. You deny your own desires
    and needs too much, however, and you are likely to secretly become very angry,
    which can sabotage your finest efforts.

    There is a touch of the incurable romantic in your nature. Your daydreaming and
    fantasizing world is rich and precious to you. You also bring imagination into
    your sexual relationships, although you can take a bit of time to feel comfortable
    and to warm up to a new person in your life. Overcoming a vague and persistent
    feeling of guilt or doom can go a long way towards a healthier, happier approach
    to the pursuit of your desires.

    Sample from the KidZone report: “This child has Mars in the 12th House, which
    is not an easy placement for Mars. The energy can be stifled in this house. These
    children may often be afraid to assert themselves. They can feel defeated before
    they start, convinced that making any efforts to be seen, or heard, would be futile.
    The child could express this by being tired all the time. This attitude may have
    resulted from being with people who have not encouraged him or her very much.
    Somehow the self-confidence needs to be built and the courage instilled to disregard
    anyone that tries to inflict negativity.

    These children tend to work in secret and to act behind people’s backs. They should
    try to avoid this. Unfortunately, this child can possibly be blamed for things
    for which they are not responsible, so always check the facts. A total lack of
    self-confidence can make him/her so afraid of direct action that the natural course
    is to do everything indirectly. But deep down, this can be a very strong little
    person. He or she will just need to get over these hang-ups. Or the child will
    need to be fortunate enough that someone recognizes early to start building up
    that confidence. Many athletes and surgeons have this placement.

    These children can work very well on their own, as they do not need supervision.
    They just do not need anyone to discourage them or to put them down. As they mature,
    these kids will come to believe in themselves naturally. The child with Mars in
    the twelfth House has a tendency to “think” about what they want to do, rather
    than just getting on and doing it. This can cause some frustration. These youngsters
    “know” but they are reluctant to push themselves, or their efforts, or their ideas.
    Again, this is a lack of confidence.

    The sensitivities in this child can run deep through to the psychic nature of
    things. He/she is likely to have very vivid dreams. These youngsters will stand
    firm on principles, but may not openly express or explain where the ideas are
    coming from. He/she can find it easier to project an attitude or a mood to make
    a point rather than openly express the true feelings within.”

    < Back to the Mars main page

    Interpretations are written by Annie Heese, unless otherwise noted.

    Don’t know the house position of your Mars? Find out how you can get your astrology
    chart positions free with our simple steps. Or, calculate your birth chart and
    receive a free report, including the position of your Mars by sign and house,
    as well as other planets here: Free Astrology Reports.

    Featured at Cafe Astrology:

    Synastry Relationship Reports

    Future Forecast Reports'
  '2': 'You are likely to be a hard worker, although you appreciate the process and
    might be slower than some as you focus on the method and tend to each step deliberately
    and carefully. You love to produce things of practical value. With making money
    and acquiring possessions, you are ambitious but you might be impatient or impulsive
    when it comes to spending. You can be quite possessive, both of material things
    and of people.

    You like a physical challenge, and your physical abilities and energy make up
    a strong part of your sense of self-worth. Working independently is most appealing,
    or you value things most when you have achieved something on your own. The world
    of the five senses is most important to you on sensual and sexual levels. You
    have a hearty appetite with strong stamina. You defend your values fervently.

    Sample from the KidZone report: “This child with Mars in the second house will
    be of the slow and steady variety. He/she will not like to be rushed. However,
    the attention span will be good and this child will plod through and produce good,
    solid results.

    This child will be very interested in amassing as much as possible. When these
    children see something that they want, they will want it very much. And they will
    work hard to get it. He/she will probably be great at saving pocket money, and
    will then buy their goodies independently. This child may insist on having complete
    control over their spending power. They need to be taught early on to reject a
    sudden impulse to just go and get whatever it is that they want.

    The “solid and steady” tag does not apply to acquiring assets. It should be suggested
    that this child think things through, and to decide whether they truly do want
    something. Any interference will be met with disdain, because he/she will have
    very set views. But because of the compulsive nature of Mars, these kids are quite
    likely to be careless with money. This impulsiveness to “own” can become a big
    problem. This child will have a very strong sense of ownership and anyone who
    challenges this will stir up a real anger. This is a lesson better learned while
    young.

    These children may not be absolutely selfish, but they will want to share only
    on their own terms, not because they have to. If a brother or sister takes something
    without asking, this youngster will really blow up. And there will be real fireworks
    if someone damages something of theirs. He/she may be careless, but no one else
    can be! This will particularly apply to personal belongings. Help this child to
    learn to be less possessive. A possessive attitude can cause toys and belongings
    to bring more pain than pleasure, keeping him/her from fully enjoying them.”'
  '3': 'You speak your mind quite readily, sometimes shooting from the hip when it
    comes to expressing your ideas and opinions. You tend to know a lot about a variety
    of subjects, and like to share that knowledge with others (sometimes too forcefully!).
    When communicating, you are generally very direct and clear. You can easily get
    worked up about what others might think are trivial matters.

    You love a good debate. Whether you know it or not, or no matter your intentions,
    you can be provocative in your communication style. You are likely gifted with
    manual dexterity, although you might easily become impatient with tasks. At your
    best, you are enthusiastic, animated, and lively in the way you express yourself,
    and this can inspire others. You will fervently defend your opinions and beliefs,
    as well as your family and childhood.

    Sample from the  Spirit Success report: You will have a lot to say on almost any
    subject, and can be really informative, or merely disruptive. You may take a difference
    of opinion as a personal affront because of your strong beliefs, but remember
    that someone else may have something important to contribute, so is worth listening
    to. No one is better than you at presenting your ideas. As long as you remain
    confident, rather than “cocky,” you’ll always find an audience to share your store
    of knowledge.'
  '4': 'You are fiercely protective of your close friends and family. Anger may be
    deeply felt and possibly deeply buried, and it can be very hard for others to
    uncover your true motives. You might be passive-aggressive in your approach, which
    could lead to resentments if you are not careful or confident enough to take a
    more direct approach to getting what you want.

    Family dynamics are lively and often intense. Regarding family members, you may
    frequently have arguments with them, about them, or on their behalf! You’re likely
    to possess much energy for domestic projects or activities. Your actions are often
    governed by your instincts, and you don’t appreciate being manipulated or forced
    into doing something that doesn’t come from your gut. You might attempt to rule
    the roost on the home front, or you often take on a leadership role at home and
    with family.

    Sample from the Merlin Report: “It is not easy for you to show the world at large
    your angry or competitive side, but your family sees this side of you more often.
    Temper tantrums, tumultuous family relationships, or a great deal of competition
    between you and one or more of your relations is likely. You like to be the one
    in charge in your home and you put a lot of energy into making it the way you
    want it.”'
  '5': 'You have a strong love of pleasure, and you tend to directly and perhaps impulsively
    pursue romance. Many of you are sports lovers, and anything with an element of
    risk appeals to you or entertains you. You put a lot of energy into the pursuit
    of entertainment, satisfaction, games, and pleasure.

    Possibly a very active hobbyist, you want a passion project that excites you.
    You tend to be very playful and demonstrative, and you could really enjoy putting
    on a show. In truth, you can be very competitive. Your children, and especially
    a first child, may be especially active and boisterous.

    Sample from the Spirit Success report: You are openly affectionate. Like an engaging
    puppy, you wheedle to get your way. If an old slipper is torn in the process,
    you know you’ll be forgiven. You shine in physical contact sports. Your many friends
    admire you, but relationships suffer because you change partners often. Discipline
    is a hard, but necessary task-master, if you are to grow beyond the child that
    is no longer charming, but becomes a foolish adult, clinging to childish ways.'
  '6': 'You tend to work hard, sometimes to the point of exhaustion! You put a lot
    of energy into your work, and would do best working for yourself or for someone
    else but independently, as you can quickly become impatient if other members of
    a team are not working as fast as you. You are also easily upset with procrastination.
    You can be very skilled at organizing and re-organizing, sorting, classifying,
    and analyzing. You put a lot of energy into any job you do, and you can easily
    become riled up or defensive if someone criticizes or intrudes upon the work that
    you do.

    Sample from the Spirit Success report: You are impatient to achieve success. You
    identify with any project personally, so always do your best. As a team member,
    you may become frustrated if things don’t go your way. In charge, you expect your
    workers to share your enthusiasm and put forth the same effort you expend, but
    will demand the lion’s share of credit. Add the respect of your followers to your
    laurels by sharing the rewards of your labor. A demanding employer may also be
    a generous friend.'
  '7': 'With Mars in the seventh house of your natal chart, you need a partner who
    challenges you, and your close personal relationships can be especially passionate,
    active, or physical. You may be drawn to people who are more assertive or aggressive
    than you. Alternatively, you find/discover your own assertiveness through a special
    someone. There can be a marked impulsive tendency in your one-to-one relationships.
    Certainly, you need your connections to maintain a high level of passion and energy.
    You can be particularly good at mediating, counseling, troubleshooting, debate,
    politics, or working with the law.

    Sample from our LoveStyles report: You have tremendous sexual energy–like the
    Energizer bunny, you keep going and going…! You need a partner who challenges
    you. In fact, someone who holds their own in an argument turns you on.

    Your close personal relationships are a source of conflict in your life, and you
    tend to pick partners who bring out the most aggressive side of your nature. In
    order for your love life to be more peaceful and satisfying, you will need to
    cultivate the art of compromise. Avoid a tendency to jump into altercations with
    others without first making a genuine effort to understand their point of view.'
  '8': 'With Mars in the eighth house, shades of the sign Scorpio can be found in
    your desire nature. You may not experience true passion until later in life, but
    when you do, it is magical and infectious. You have some fears of betrayal and
    loss that compromise your trust from time to time. You can be extremely hard-working
    on projects that interest you, and you make a fabulous researcher, investigator,
    or psychologist. Passion projects are vital–they can get you out of bed in the
    morning!

    Your intuition is powerful, although it can take some time, experience, and psychological
    work to overcome a vague sense/feeling of guilt, fear, or doom. Your survival
    instinct is powerful. There is a tendency to bury things or to keep many of your
    troubles to yourself. Learning to express your anger more directly can improve
    your health and well-being.

    Sample from our LoveStyles report: With your very strong desires, once you decide
    to possess something, you usually succeed in doing so. You may experience shortages
    of love and money to encourage you to be less possessive in these areas of your
    life. You have the ability to see through the false pretenses of others.

    On the level of karma, you can make up for past lives of greed and abuse by sharing
    your resources with others in need. There may be some sexual trauma in your early
    life that you struggle with as an adult.'
  '9': 'You enjoy a healthy sense of adventure and adore a rousing debate or the challenge
    of learning new things with your Mars in the ninth house. This position has a
    Sagittarian flavor. Watch for a tendency to become angry or hurt if others disagree
    with you, as it can be all too easy to take differences of opinion very personally.
    As well, in your enthusiasm to uncover truths, you may be a little too pushy.

    You are sexually playful and energetic, and you may approach sex as a sport at
    times. Honest and sometimes downright blunt, others find your sense of humor and
    direct approach attractive. Your hearty laugh is appealing, and your zest for
    life is unmistakable. You can be mentally restless, and at times, physically too,
    as you seek new horizons to explore and experience.

    Sample from our LoveStyles report: You are open-minded and love the challenge
    of a debate. Avoid a tendency to become self-righteous and to disregard the opinions
    of others in your enthusiasm to uncover truths. You are sexually playful and energetic.
    Sex is somewhat of a sport for you.

    Honest and sometimes downright blunt, others find your sense of humor and direct
    approach attractive. Your hearty laugh is attractive to others, and your zest
    for life is unmistakable. You love a partner who makes you laugh, and one who
    has something interesting to say about life.'
mercury:
  '1': 'You are mercurial in appearance or manner, especially if Mercury is close
    to (within 10 degrees of) the Ascendant. You’re restless, adaptable, changeable,
    easily distracted, versatile, and nimble. While you enjoy talking, you might often
    monopolize the conversation or fail to listen (you might be too busy thinking
    about what you will say next to truly listen).

    You have a mischievous and even precocious manner. Lively and interesting, you
    quickly adapt to new situations. In fact, you treat most new endeavors with curiosity
    and great interest. Your first reaction to new stimuli is logical and curious
    rather than emotional.'
  '10': 'You are good with language, and you generally use this talent in your profession.
    With your authoritative air, or you’re talented at communicating and negotiating
    with those in authority. You might have more than one job going at once much of
    the time, you could change your career directions frequently, or you could be
    attracted to jobs that keep you on the move.

    You require frequent changes of setting or activities to remain stimulated and
    challenged. You’re skilled at bringing fresh energy to your conversations or to
    your job, perhaps because you need the stimulation.'
  '11': 'You are endlessly curious about people, group interactions, community affairs,
    trends, and teams. You are attracted to people who bring new ideas into your experience,
    and who have something novel to contribute on an intellectual level. You are very
    forward-looking and fair-minded.

    Fair play, impartiality, and unselfishness are important ideals for you. There
    can be many changes or fluctuations in your personal wishes, dreams, plans, and
    ideals. You might attract friends who come and go, or who are dishonest or duplicitous.'
  '12': 'You are not very quick to speak or communicate, especially in childhood,
    as you need to develop trust in your own abilities to express yourself. You make
    an excellent confidant–you are very discreet and secrets go into the vault. Making
    matters too complex comes from overanalyzing motives or hunches, and then have
    problems acting on your intuition as a result.

    You’re very attracted to symbols, sentiment, imagery, and paradoxes. Preferring
    not to focus only on facts, you learn best when ideas are presented visually,
    emotionally, or imaginatively. Learning to communicate clearly is a challenge
    for you, but one that might put an end to feelings of guilt, of being misunderstood,
    and to attracting unpleasant situations or duplicitous people into your experience.

    See Also: Mercury in the Signs

    < Back to the Mercury main page

    Interpretations are written by Annie Heese.

    Don’t know the house position of your Mercury? Find out how you can get your astrology
    chart positions free with our simple steps. Or, calculate your free birth chart
    and receive a free report, including the position of your Mercury by sign and
    house, as well as other planets here: Free Astrology Reports.

    Featured at Cafe Astrology:

    Synastry Relationship Reports

    Future Forecast Reports'
  '2': 'You have a very practical mind and intelligence, seeing the obvious, most
    logical answer to any predicament often well before others. You don’t like to
    be put on the spot or pushed into talking or coming to a conclusion. Studies are
    similar–you need to work at your own pace.

    You can be quite one-track minded at times, not very happy with multi-tasking,
    and often quite fixed in your opinions. Sensual stimuli is more relevant to you
    than abstract concepts.'
  '3': 'This is an especially curious and inquisitive position for Mercury. You are
    generally very interested in reading, teaching, speaking, exchanging ideas, keeping
    current with the daily news, and perhaps gossiping. Your interests are many and
    varied, sometimes to the point that you barely skim the surface of any one topic.

    You are also very easily distracted and your attention span can be quite short.
    Quick to learn, you are swift to share what you know with others. You can be very
    talkative when you have the chance. You’re a list maker, and you’re likely quite
    involved in/with your community. Some of you can be quite nervous or fidgety.'
  '4': 'You are an extremely imaginative person who dreams up all sorts of unusual
    ideas and plans. Your thinking is quite subjective, and in some cases narrow or
    biased. Some of you might enjoy working at home or keeping a lively, intellectual
    atmosphere in your home.

    You tend to retain a lot of information, and are usually quite interested in history,
    psychology, or politics. You’re not quick to embrace a new idea or plan, and can
    be quite traditional in your thinking.'
  '5': 'You tend to use your voice, whether written or spoken, as a means of creative
    self-expression. You can be witty and humorous, an engaging communicator, and
    a fun friend. Playing games is appealing, especially ones that employ your intellect.
    You love tricks, jokes, plays on words, and mimicry. It’s possible you’re skilled
    at impersonations. Some of you could be clever at lying. You can have a tendency
    to promise more than you can deliver, or overstate your case.

    In some way, you are very entertaining with the spoken and/or written word. Communication
    and intellectual rapport are most attractive to you with romance. In some cases,
    this can indicate more than one lover at once. Curiosity can be a strong motivator
    for making social and romantic contact. You might also take much pride in your
    children’s intellectual abilities and talents. You would make a good teacher,
    as you are very curious about how people learn and can come up with many ideas
    that allow you to teach others creatively.'
  '6': 'You are a person who thinks of all the details that others often forget. Your
    mind is almost always turned “on” which can make you a little nervous. You’re
    excellent at sorting things out, organizing, and making lists and associations.
    With your attention to the details and the mechanics, however, you might miss
    the bigger point!

    You are exceptionally helpful and others can count on you for making arrangements,
    researching, and offering advice. You truly love to feel useful. It’s possible
    you have some traits of a hypochondriac, as you notice all of the little aches
    and pains that others might overlook. Nervous tension could be at the root of
    many of your health complaints.

    You might frequently have to deal with duplicitous co-workers. Many of you are
    good at crafts, mechanics, or anything that requires good manual dexterity.'
  '7': 'You have a great love of debate, if only to get closer to your own thoughts
    and opinions. Bouncing ideas off others helps you to make a decision, although
    coming to definite conclusions can be painfully difficult for you. You see the
    other side of the coin, but you might often play devil’s advocate.

    Communication with a partner is craved, and you also love an audience for your
    own thoughts and opinions, but preferably a one-person audience, as you come alive
    verbally when it’s one-on-one. You can be quite skilled at keeping a partnership
    animated and alive with interesting tidbits, new ideas, and stimulating conversation.
    It’s easy for you to become bored in partnership if the lines of communication
    go down, even temporarily.

    You might attract partners who are not especially sincere or downright duplicitous.
    In order to put an end to this pattern, you might try to avoid scheming and overanalyzing
    in your relationships. You might also love to talk about and analyze relationships
    and marriage. You get off on new perspectives that partners or good friends give
    you.'
  '8': 'You are especially curious about what motivates people, as well as all that
    is mysterious, taboo, secret, and psychological. You’re excellent at analyzing
    people and getting at their motivations, as well as developing strategies. You
    may have a good mind for finances, medicine, and other subjects that require research
    and investigation.

    With your strong persuasive powers (which should be used carefully), you speak
    with authority and others listen. You tend to feel that everything we do and experience
    has a purpose. You have a great, investigative, and penetrating mind and you are
    excellent at developing strategies, as well as communicating them with others.'
  '9': 'You are eternally curious and hunger for knowledge. You enjoy studying and
    learning, and do it not because you have to, but because you want to. Exchanging
    ideas and personal philosophies with others is gratifying. You can be especially
    buoyant, enthusiastic, and even inspiring in your communications.

    While you may not pay enough attention to details, you are skilled at finding
    a quick solution to problems. You readily see the bigger picture and enjoy sharing
    your opinions and ideas. You get off on how information affects people’s lives,
    and you take great pleasure in learning that something you have shared or taught
    has inspired others to take action, experience something new, or make changes
    in their lives. Some of you might be too quick to offer advice, however, that
    might be lacking in thoroughness and practicality, or that you yourself don’t
    follow. You may be especially interested in learning about different cultures
    and lands.'
moon:
  '1': 'Your feelings are right out there for everyone to see, and you can come across
    as emotional and impatient, or nurturing and caring (or both). Your first reaction
    is emotional, especially if the Moon is in close proximity (within ten degrees)
    of the Ascendant degree. You need emotional stimulation, movement, and freedom
    to express yourself in order to feel happy and fulfilled.

    Your moods are very changeable, and this can be quite obvious to others. Because
    of your emotional sensitivity, you might often take things too personally, and
    react too quickly. Developing an awareness that others’ emotions are just as important,
    even if they are not as overt and immediate as yours, will be important.

    *You have a soft exterior and tend to relate very personally and sympathetically
    to other people. However, you sometimes let your emotions overpower your reasoning
    and logic, and consequently, you are sometimes biased in your opinions. You are
    impressionable and rather gentle, or at least that is the way you appear. Your
    feelings are on the surface and you can not hide your emotions.'
  '10': 'This position of the Moon indicates an emotional need for recognition, popularity,
    acknowledgement, and achievement. You can be quite charismatic. You are at your
    emotional best when you lead a structured and responsible life, but it can take
    time to get there.

    You may change your goals and ambitions, and/or your profession frequently in
    an attempt to find the perfect fit. You may worry about living up to your image,
    or the expectations of your family. Decisions may be too emotionally biased, or
    you might act on emotional whims far too often. Learning to set your own heartfelt
    goals is the challenge here, as it is unlikely you will find true happiness if
    you follow or adopt the expectations of others, which you are especially sensitive
    to.

    *You work well with the public and have an instinct for what the public wants
    and will respond to. Having a “nest” is not especially important to you, and you
    may invest more of your emotional energy into your career or public life than
    in your private life. Providing for and caring for others in a professional capacity
    is very likely.'
  '11': 'This position of the Moon indicates an emotional need for a feeling of belonging
    with, and support from, friends and associations with groups. You look to acquaintances
    for support, and offer the same in return. A changeable or unstable social life
    might be a reflection of inner emotional unrest. Waxing and waning feelings for
    others can cause problems in your relationships.

    You are a person who is filled with many dreams, wishes, and hopes for your future,
    and most of these are altruistic and good-hearted desires. However, you might
    change your aspirations frequently, with your changing moods, and have a hard
    time settling on goals to work towards as a result.

    *You get a lot of emotional fulfillment through your involvement in groups, clubs,
    organizations, community activities, or a network of close friends who support
    and care for you. You make friends your family, and feel a close kinship with
    people who share some ideals or beliefs that you hold dear. You need people outside
    of your physical family to relate to and belong to.'
  '12': 'This position of the Moon indicates an emotional attachment and sensitivity
    to all that is ethereal, groundless, and eternal. As sensitive as you are, you
    often have delayed reactions to your own emotional experiences. You need frequent
    moments of solitude in order to recharge yourself emotionally, and this need,
    while strong, can also lead to feelings of isolation and of being misunderstood.

    While you are a perceptive person, you are often either flooded with emotions
    that are hard to define, or completely out of touch with what you are feeling.
    Either extreme keeps you from truly discovering your emotional needs. Negative
    expressions of this position are avoidance of responsibility, using hypersensitivity
    as an excuse to oneself (and perhaps to others) for not participating, or emotional
    immaturity. You are sympathetic to others’ suffering, but not always emotionally
    available to help.

    *Your own feelings and emotions are something of an enigma to you, and it is often
    difficult for you to share with others what you are feeling. You frequently withdraw
    from contact with the world, and need a healing, peaceful environment in order
    to blossom and come out of yourself. You identify with the oppressed, disenfranchised
    or underdog in any situation and want to help them or care for them in some way.

    < Back to the Moon main page

    Written by Annie, unless otherwise noted. Interpretations marked with * are sample
    interpretations from the Merlin report.

    Don’t know the house position of your Moon? Find out how you can get your astrology
    chart positions free with our simple steps.'
  '2': 'When it comes to money, you can be generous and frivolous in your spending
    habits one day, and frugal the next. You can be quite afraid of being in debt,
    and you need to feel that the bills are paid in order to feel secure and safe.
    This is likely also true of savings, as you fear being without.

    Still, there are times when you can spend impulsively, on a whim, and this is
    likely when you are feeling emotionally frustrated. You might also hold onto people
    quite tightly. Vanity can be an issue. You are often looking for admiration, and
    you can be quite dependent on others for positive feedback until you learn to
    develop your own feelings of self-worth. You’re not as emotionally responsive
    as most people. You tend to hold back and wait before expressing yourself, and
    when you do it is with deliberation.

    *You are likely to be a great collector of things – a real pack rat in fact –
    for your belongings give you a sense of security and continuity with the past,
    which is important to you. Antiques or things with sentimental value from your
    past are especially dear to you.

    You may also cling rather tightly to both money and possessions, keeping them
    “in the family” rather than sharing freely with those outside of your immediate
    circle.'
  '3': 'You are very responsive, communicative, and curious. You can have a talent
    for imitating others and/or for picking up languages. It may be you either intellectualize
    your emotions rather than truly feel them and deal with them, or communicate with
    excessive emotion. Some of you may do both at different times, and as you mature
    and develop, you learn to find a balance.

    Your opinions and ideas change often, and you might find that sometimes you adopt
    others’ points of view and express their ideas as if they were your own. This
    is not necessarily because you are a copy-cat, but because you sometimes fail
    to own your own thoughts, and you are so very sensitive to others’ opinions. You
    might be quite nervous and restless, requiring frequent changes of scenery, even
    if the movement or travel takes place locally.

    *You often make decisions solely for emotional or personal reasons, because something
    “feels right” or because you’ve always done it a certain way and you are uncomfortable
    changing it. Even when you think you’re being rational, your prejudices, intuitions,
    and feelings influence your thoughts a great deal. You are comfortable talking
    about feelings and personal subjects, and sharing confidences, which enables others
    to express their own inner feelings with you as well. You have good psychological
    insight into others.'
  '4': 'You long for a sense of true belonging, but you may be quite restless in your
    search. You might change residence frequently, or simply feel the need to make
    many changes in your home.

    Moving frequently may be a healthy thing if it keeps you emotionally stimulated,
    but if you find that you do so on whims and later regret the changes, you might
    want to treat it as a symptom of emotional unrest–as a sign that you are in a
    constant search for the perfect mood and setting, when in fact a feeling of belonging
    should be worked on from the inside out, not the outside in! Some of you might
    remain rather immature on an emotional level, never wanting to truly grow up and
    take care of yourself. Attachments to your past, traditions, and family are strong.

    *You have strong attachments to your past, the place where you grew up, your heritage,
    and family traditions. In fact, you may be unable to step out of the habits and
    roles you learned as a child. Your tie to your mother is very strong and you also
    seek mothering and protection from your spouse and other family members as well.'
  '5': 'You love to share emotional experiences with loved ones and have a flair for
    the dramatic. Love affairs are magnetic and intense, and you don’t take them lightly
    by any means, although you may go through much change with regard to your romances.
    You are attached to children, whether they’re your own or not. Your creative hobbies
    are subject to relatively frequent changes, and you have innate artistic talent.
    You have a vivid imagination and are given to daydreaming often. There is a sense
    that you are always in touch, or trying to get in touch, with your inner child.

    If the Moon is challenged, you may have problems with impulsive shopping or gambling,
    or with frequent love affairs that never fully satisfy you. In any of these cases,
    you are more attached to the game than the player, and this is something to work
    on if you are looking to find true fulfillment. You might take risks just for
    the fun of it, but in the process, you are being irresponsible to others and to
    yourself.

    *You are emotionally expressive and often dramatize your feelings, acting them
    out or blowing them out of proportion. You can not hide your instinctive emotional
    reactions to people or situations, and you don’t make any pretenses about your
    personal sympathies or antipathies.

    You have a childlike openness and playfulness which is very appealing to others,
    but which sometimes gets you into trouble, as you take risks on impulse or whim.'
  '6': 'You have an emotional need to be useful, to work productively, to be organized
    and on top of things, and to lead a healthy life. If these matters are chaotic
    in your life, it’s a symptom of emotional unrest. You need a lot of variety on
    the job–to be stimulated and engaged in order to feel happy. Some of you might
    seem to change jobs often, forever in search of the “perfect fit” job. Acceptance
    that any job requires some level of routine is hard for you.

    You are very sensitive, and especially aware of minor health annoyances or body
    aches and pains. Some of you have hypochondriac symptoms. Some attempt to get
    out of things they don’t want to do by emphasizing health problems or even exaggerate
    illnesses in order to gain sympathy. At your best, however, you’re a person who
    always helps out and shows your affection for others in practical ways in order
    to help them solve problems and improve their lives.

    *You have a sympathetic nature and instinctively reach out to people in need of
    help. You also have a deeply ingrained tendency to want to improve or “fix” other
    people’s lives, which can be annoying to the person who has no desire to be changed
    or “helped” in this way. For you, affection and caring must be expressed in tangible
    acts or service of some kind.'
  '7': 'You are drawn to partnerships and prefer to have a companion for emotional
    support. You are not a person who would happily take in a movie by yourself, or
    dine alone, for example. A partner awakens feelings in you that you may never
    know you had, and you seem to need a partner to learn about your own needs and
    feelings.

    You seek emotional fulfillment through relationships, but you may have many relationships
    one after another, each time believing that this is “the one.” Taking time between
    relationships is something that is hard for you to do, but quite necessary, as
    you tend to jump into relationships out of fear of being alone.

    You are very adaptable to others’ needs, and usually quite likeable as a result.
    Be careful that you don’t become overly dependent on a partner, or assume that
    a partner is going to treat you the same way as you do them.

    *You depend a great deal upon other people for emotional support and you have
    a large “family” of friends that care about you and treat you as kin. The women
    in your life are particularly important to you, and your relationship with them
    powerfully influences your sense of security and happiness. You may be overly
    dependent and unsure of yourself without a close partner.'
  '8': 'While you have a strong need for emotional security, you are also a person
    who is drawn to pushing your own limits, and many lifestyle changes can be the
    result of this need to challenge, or reinvent, yourself emotionally. You are always
    fascinated with how people work, taboos, secrets, and all that is forbidden or
    hidden. Sexual unrest, or an apparent need to constantly change sexual partners
    or to challenge yourself sexually, may be a symptom of emotional insecurity.

    Connecting with another person intimately is an emotional need, but your changeable
    emotions might often get in the way of your goal. Jealousy and possessiveness
    might also be qualities you struggle with. At your best, however, you are a person
    who is intimate, deep, and intensely loyal to a partner.

    *Though you want closeness very much, you often close yourself off and do not
    really trust others who may wish to get to know you. You are very wholehearted
    in your feelings and responses to people, and you want all or nothing from the
    people you care for.'
  '9': 'This is a position that can indicate a deep longing for stimulation above
    and beyond the everyday, mundane routine. You are a philosophical sort, interested
    and curious about the world, other people, and perhaps different cultures. You
    can be extremely restless and discontented if you don’t have a definite goal in
    mind.

    You might find yourself longing to be somewhere else when you are unhappy, imagining
    that if you were to move or travel, you would be much happier. However, this attitude
    can only keep you from enjoying and improving upon the situation you are now in,
    only serving to make you feel more unhappy in the present and with your current
    circumstances.

    Trying to avoid the attitude that “the grass is greener on the other side” will
    be important, while attending to your needs to get away from time to time will
    help scratch the seemingly incurable itch for something more.

    *You may have done extensive traveling in your early years, or in some way had
    a background which enables you to understand and identify with many different
    types of people or cultures.

    You have a craving for things which are far away and foreign or for things you
    have never experienced before. You want to completely immerse yourself in the
    feelings and tastes of a new place, rather than simply have facts or an intellectual
    appreciation. Emotionally, too, you are restless and something of a wanderer.'
venus:
  '1': 'You are a likable, magnetic, attractive, and charming person whose heart is
    often on your sleeve. Unless Venus is very challenged, you are easy to befriend,
    diplomatic, and warm in self-expression. You tend to attract others to you quite
    readily, and rarely come on too strong or aggressively.

    Negative expressions of this position include a superficial charm, a tendency
    to “play dumb” when challenged or in doubt, and two-faced, passive-aggressive
    behavior. The need to be liked by others, and/or to keep the peace, might lead
    to feelings of resentment or general unrest if you feel that you give up your
    own power to others. You might find it difficult to make solid decisions. Your
    personal sense of style and manner are things that others find fascinating, and
    you generally pay great attention to how these things benefit you in life.

    !With your natural charm and magnetic personality, you have a way of winning people
    over to your arguments. You are probably physically attractive and will maintain
    this quality well into your later years. You have a deep appreciation for art
    and enjoy surrounding yourself with beautiful objects. Your love life is very
    important to you, and you feel a lack if you have no partner in your life. Your
    appetite for life and for love is hefty, and you enjoy taking the initiative once
    you are comfortable with a partner. You are ever so charming and attractive, and
    absolutely hard to miss, no matter what you look like. Your head and face are
    your most attractive features! This is because your Venus is in the first house
    of Aries, a sign that rules this part of the body.'
  '10': 'Others tend to respect you for your charming manner, and you have many admirers,
    although some of these are admirers from afar, as there is an aura about you that
    is charming yet strangely (and intriguingly) distant. You have a great need to
    be recognized or admired for your charm, beauty, or loving manner, but should
    be careful not to become too wrapped up in what others think of you, as you might
    come across as phony or superficial.

    Some people with this position are “married” to their work or to their image.
    You are good at making contacts and organizing social events.'
  '11': 'The friendship level of your relationship needs to be genuine in order for
    you to sustain romantic interest. You tend to focus on a person’s unique qualities
    — those traits that make him or her stand out — as the most attractive. Your relationships
    must possess some kind of unconventional element in order to keep your interest
    levels high. Calves and ankles are either erogenous zones for you, or parts of
    your body that are particularly attractive!

    You may meet lovers through group activities. Although you value friendships and
    group affiliations highly, you might jump into friendships without considering
    the responsibilities they might entail.'
  '12': 'You are big on romance and you tend to live and breathe your partner once
    you’re hooked. Not the best at defining your boundaries — where your needs and
    your partner’s needs separate — you can get hurt in love rather easily. You can
    also feel used quite readily.

    You are attracted to people from all walks of life, finding a partner who has
    an unusual background or quirky personality most attractive. Partners who mistake
    your compassion for weakness can take advantage of you. Being openly affectionate
    and trusting often doesn’t seem safe to you. You may feel your love won’t be appreciated
    or reciprocated. You may get involved in secret love affairs or fall in love with
    a person who is quite unavailable to you at different points in your life.

    Love and sacrifice often seem to go hand in hand for you – having to give something
    up to be with the one you love, or having to relinquish some person or some aspect
    of an important love relationship. You value a certain amount of self-sacrifice
    and a giving attitude in a partner, as you embody these traits. You can be quite
    mysterious to others, even if you don’t mean to be, because your romantic needs
    are kept hidden. Although you are quite naturally drawn to relationships that
    are unusual, secret, challenging, and unequal, do take the time to examine why
    this may be the case. Be certain that you are not, in some way, punishing yourself
    because you don’t feel worthy of an equal and public relationship. Because Venus
    represents attraction, and the twelfth house is associated with the feet, your
    feet may be especially attractive and/or erogenous zones!

    < Back to the Venus main page

    Interpretations by Annie Heese.

    Don’t know the house position of your Venus? Find out how you can get your astrology
    chart positions free with our simple steps. Or, calculate your birth chart and
    receive a free report, including the position of your Venus by sign and house,
    as well as other planets here: Free Astrology Reports.'
  '2': 'Tangible expressions of love and affection are important to you. Your tastes
    are usually “simply extravagant”, well-defined, strong, and something you are
    proud of. Some might feel you have a talent for finding items of value and good
    taste. You are attracted to items of quality. You may use generosity for your
    own benefit–in other words, you might give gifts with expectation of reward. Some
    of you might be hedonistic and overly attached to winning admiration from a partner,
    at the expense of discovering true love. Your neck and upper chest are erogenous
    zones, and your voice is unusually attractive.

    You generally don’t jump into a new relationship. If you do, your feelings grow
    gradually. A partner who makes you feel safe and secure is ideal for you. Once
    committed, your love is long lasting and sincere. You have strong values and others
    will find it hard to sway you in this area. Sensual, the world of touch and smell
    is most appealing to you. Complex or mysterious partners are not as intriguing
    to you as simple and genuine ones.'
  '3': 'You are verbally expressive, diplomatic, and aim to be tactful. You easily
    win others over with your words, whether it’s because of a likable facility with
    language, a beautiful voice, or a diplomatic use of words. You readily give out
    compliments. Some of you might use flattery to your own benefit at the risk of
    being ingenuine. You are generally a very good mediator, aiming to settle arguments
    quickly and restoring at least temporary peace.

    You have a mischievous side, however, and your desire to be tactful and polite
    with others doesn’t always succeed. Some of you might engage in a lot of mind
    games, and others might eventually find out that you don’t always mean what you
    say or say what you mean! You value mental stimulation and frequent changes of
    scenery in your love relationships.'
  '4': 'You seek balance, beauty, harmony, and peace in your home and domestic life.
    You might be especially attracted to luxury or quality/comfort items in the home,
    and you likely have an eye for interior decorating. There is a loving, personal
    touch to the way you decorate your home. Your love is decidedly sentimental, and
    you show your affection through nurturing and displays of sympathy. You don’t
    give your heart out easily, but when you do, you do it with great emotion.

    It’s very easy for you to become attached to a partner, and possibly smothering
    or overly dependent if you are not careful. Your parents’ marriage affects your
    own partnering skills and style more than most. A parent may be especially charming,
    beautiful, or otherwise Venusian. On the negative side, this parent may have been
    especially indulgent or overprotective with you.'
  '5': 'Interest in romantic connections may have started young. Playful, sensual,
    and amorous, you are in love with love! You thrive on romantic attention, and
    it is easy and natural for you to always have a crush or romantic interest. There
    is a romantic, playful side to you that is unmistakable. It keeps you young at
    heart!

    You are sensuous and enjoy indulging in the pleasurable senses to the fullest
    possible extent. You enjoy surrounding yourself with beautiful art and music,
    and these may play a role in your ideal date scenario. There is a touch of the
    dramatic in you when it comes to love and sex. You are generally quite loyal to
    your partner, and you are both charming and easily charmed. It’s also easy to
    turn your head. You are a warm, fun and playful date.'
  '6': 'Your expressions of love and affection are practical and helpful. Being of
    service to a partner is especially important to you. In fact, you might go to
    great lengths to be available at all costs to a loved one. While you may not be
    flowery or showy when it comes to expressing love, you show your love by your
    availability, rendering services, doing practical things for a loved one, and
    other thoughtful “little” things. Many of you are talented at design work, as
    you appreciate and pay much attention to all of the little parts that make up
    a whole, with the goal of finding order and harmony in these systems.

    If you are not careful, you might pass up on true love opportunities in favor
    of relationships that serve a practical purpose in your life, or out of fear that
    you might not find better. Selling yourself short may be something that keeps
    you from going after what and who you want.'
  '7': 'You live for relationships. It is hard for you to think about being alone.
    Harmony is most important to you, so it is unlikely you will attempt to dominate
    a lover. You are a peacemaker, sometimes going to great lengths to achieve a balanced,
    harmonious relationship. Be careful not to bend over backwards just to keep the
    peace–you may be taken advantage of. Your marriage partner may be especially attractive,
    charming, or well off. You’re extremely attractive, agreeable, and charming, drawing
    others to you magnetically.

    You need an unusual amount of contact and exchange with a partner, and might find
    that you feel completely lost without one. Some of you might quickly enter into
    partnerships, perhaps too quickly and neither equipped nor prepared for the responsibilities
    that a long-term relationship demands. In some cases, there can be a shallow or
    materialistic interest in partners. Your hips and lower back may be special erogenous
    zones for you, or they may be especially attractive body parts.'
  '8': 'Intensity is what you seek in your love relationships, so that casual encounters
    are not necessarily your game. You are easily bored with mechanical interactions
    between partners, and might prefer drama in your relationships to anything mundane
    or superficial. However, you also fear being vulnerable in love, and, in youth,
    you may control your emotions in love. Fears of being betrayed may be at the heart
    of your somewhat jealous and possessive nature in love.

    When you give yourself over to love, you love wholeheartedly and expect all-consuming,
    total devotion and attention in return. You find passion a healing force in your
    life. Your charm runs deep–just below the surface. You are attracted to all that
    is taboo, hidden, forbidden, and find beauty in the broken, disenchanted, obsessed,
    and passionate. In some cases, people with this position might make a business
    out of love, romance, and eroticism. There is an intensity about you that others
    pick up readily. Either they run or they are completely intrigued!'
  '9': 'You are attracted to, or you tend to attract, people of different cultural
    backgrounds. A sense of adventure is appealing to you. Yo’are not especially clingy,
    and you expect a certain amount of freedom in a partnership. You want to feel
    like you are growing as an individual, and you won’t be happy in a relationship
    that is restrictive or confining. In fact, you have a great love for the feeling
    of freedom or limitlessness. Your hips and thighs may be especially attractive!

    You appreciate a lover who is enthusiastic and not afraid to have a good time
    (with you!). You aspire to high ideals in love, but some of you might pursue sensations
    in love rather than true or deep feelings and attachment. Beware of a tendency
    for dissatisfaction with what you have, as the tendency to think that the “grass
    is greener” elsewhere can keep you from enjoying or developing what you have.'
sun:
