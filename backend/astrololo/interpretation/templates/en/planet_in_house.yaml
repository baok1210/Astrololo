    short: If you have the Sun in the 4th house, you desire to build strong inner
      and outer foundations, but, at times, you may have the wish to retreat from
      society when life becomes difficult. The influence of
    detailed: If you have the Sun in the 4th house, you desire to build strong inner
      and outer foundations, but, at times, you may have the wish to retreat from
      society when life becomes difficult. The influence of either or both parents
      is strong for good or otherwise. There is pride in the home and that is where
