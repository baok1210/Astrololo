      are generous and ambitious, but can be extravagant and grasping. You must watch
      a tendency to be possessive of or "lord over" people and things. If the Sun
      is afflicted by aspect, perhaps you do not feel loved or feel worthy of love.
      Top
    source: astrolibrary.org
