    title: ''
    short: If you have the Sun in the 5th house, you have a desire to reveal your
      creativity, either constructively or destructively. You are interested in all
      forms of creative self- expression, such as sports,
    detailed: If you have the Sun in the 5th house, you have a desire to reveal your
      creativity, either constructively or destructively. You are interested in all
      forms of creative self- expression, such as sports, books, acting, the dramatic,
      games and romance. You have the ability to enjoy life and to give enjoyment
      to others. Happiness comes from your artistic or creative endeavors. You need
      to watch a tendency to be dictatorial or to take unnecessary risks. Top
    source: astrolibrary.org
  '6':
    title: ''
    short: If you have the Sun in the 6th house, you feel a need to serve others or
      to be of service to them. Or perhaps it's that you simply want to be served
      yourself. There may be a tendency to wallow in self
    detailed: If you have the Sun in the 6th house, you feel a need to serve others
      or to be of service to them. Or perhaps it's that you simply want to be served
      yourself. There may be a tendency to wallow in self-pity, seek sympathy for
      any little thing, or to develop hypochondriac tendencies. You are a faithful,
      diligent and loyal employee who is usually helpful to fellow employees. Some
      with this position are domineering and develop a false pride with those they
      work with or for. You can be an administrator, but you may prefer to be an employee.
      If you are in a position of authority, be careful not to be the office tyrant.
      You are very happy when you are busy and you hate being bored. You take great
      pride in your work and your workplace. This is where you want to shine and be
      better than all others. Worry and anxiety, especially over the desire to do
      things perfectly, can be detrimental to your health. You need to learn how to
      relax and not let stress and tension get to you. With this position you should
      be especially careful to take good care of your physical body. Top
    source: astrolibrary.org
  '7':
    title: ''
    short: If you have the Sun in the 7th house, you want a partner that you can be
      proud of. In some way your sense of pride is involved in the choosing of a marriage
      partner. There may be a wish to gain social
    detailed: If you have the Sun in the 7th house, you want a partner that you can
      be proud of. In some way your sense of pride is involved in the choosing of
      a marriage partner. There may be a wish to gain social prestige and to marry
      someone who can be admired and respected or someone who is higher on the social
      ladder. Your partner must be one who encourages you to be your real self and
      one who wants you to fully develop your powers of inspiration, creativity and
      will. Your partner may be in a position of authority and this may help give
      you more confidence in yourself or more security within the framework of the
      relationship. You may be challenged to display a greater degree of confidence
      and to exercise authority more effectively and with greater magnanimity. You
      must seek a relationship where both people are equal. A partnership in which
      one is "superior" and the other "inferior" is not likely to be successful. That
      "always me-first" attitude is not conducive to a rewarding partnership. A need
      to feel part of a family is present. With this position marriage and partnerships
      are likely to assume a paramount and key role in your life. There may be a tendency
      to look for a "father figure" and, as you may be inclined to surrender the initiative
      to your partner, you are rather more likely to react than act first yourself,
      so that your partner may assume a dominant role. If your natal Sun is badly
      aspected, then the partners you attract may be egotistical, domineering, vain
      and ostentatious. If your natal Sun is well aspected, then partners are likely
