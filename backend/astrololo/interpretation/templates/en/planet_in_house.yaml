      have gained. Although you are probably very open to '
    detailed: If you have the Sun in the 3rd house, knowledge is important to you
      and you chase as much of it as possible. You enjoy passing on the knowledge
      you have gained. Although you are probably very open to new ideas, there yet
      may be the desire for scientific proof before anything can be believed. Your
