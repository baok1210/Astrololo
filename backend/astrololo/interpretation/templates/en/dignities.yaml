rulership: "{planet} in {sign} is in Rulership. {planet} is extremely strong here, expressing its purest nature. You have a natural ability in this area, achieving good results without much effort."
exaltation: "{planet} in {sign} is in Exaltation. {planet} is supported by the stars, expressing its highest qualities. This is a position of honor, bringing good fortune and success."
detriment: "{planet} in {sign} is in Detriment. {planet} feels uncomfortable, struggling to express its true nature. You need more effort in this area, but this is also an opportunity for growth."
fall: "{planet} in {sign} is in Fall. {planet} is weakest here, difficult to operate effectively. However, overcoming these challenges brings deep wisdom."
neutral: "{planet} in {sign} is in a neutral position. {planet} expresses its energy at a normal level, neither particularly strong nor weak."
