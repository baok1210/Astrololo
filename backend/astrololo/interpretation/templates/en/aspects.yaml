mercury_moon_conjunction: 'With Moon conjunct Mercury, these people sometimes have
  a direct pipeline to their emotions and feelings, and are able to talk about them
  easily. On the other hand, there can be a tendency to rationalize feelings to the
  point that feelings are rarely felt. This is because the Moon is the feeling function
  and Mercury represents the lower mind–the part of our minds that processes information,
  analyzes impressions, and sorts things out. In some ways, Moon conjunct Mercury
  is similar to Moon in Gemini.

  These people are generally quite expressive and animated in their speech. They have
  outstanding memories and tend to pick up a lot of information from their environment.
  These people love to chat and to exchange ideas. Even if they are shy, once you’re
  friends, they love to talk about pretty much anything under the sun, and they do
  enjoy sharing stories from their past! For the most part, they are focused on day-to-day
  activities in their communications rather than on grander philosophies.'
mercury_moon_opposition: 'There is a conflict here between the head and the heart.
  The emotions tell them one thing and the mind tells them something else. The result
  is a wavering, and a see-saw effect is most evident with the opposition–emotional
  to the point of irrationality at one moment, and logical the next. How to blend
  the head and the heart is a constant struggle for these individuals, usually because
  there is a tendency to resist blending them!

  These people love to chat, enjoy story-telling and writing/poetry, and usually possess
  a sparkling wit! They are animated when they speak, and have a sense of humor that
  others appreciate simply because it’s very imaginative. Some are especially adept
  at satire. You can usually tell their moods by how much they’re talking. When nervous
  or excitable, they talk up a storm.

  Moodiness is a characteristic, definitely, and an especially subjective nature makes
  them prone to hypersensitivity. It usually has to do with the fact that they take
  in so very much from their environment. This is also one of the reasons why they
  tend to be indecisive.

  While Mercury conjunct Moon people tend to be quite consistently rational, the hard
  aspects of Moon-Mercury generate a swing between irrational and rational thoughts
  and feelings. This rarely transfers into action, however. It’s pretty much something
  that takes place “upstairs” in the mind, although others are sure to see the struggle
  from time to time.

  These people are always interesting, and usually funny. They have a tendency to
  misrepresent themselves with what they say from time to time, but they’re charming,
  if a little kooky, friends.'
mercury_moon_sextile: 'It is easy and natural for those born under a harmonious aspect
  between the Moon and Mercury to make easy conversation, to be inquisitive and interested
  in the world around them, and to express themselves well.

  With the ability to make sense out of emotions and feelings, these people have common
  sense and help others out readily and willingly. Need some good advice? Turn to
  these people. They factor in emotional considerations, and tend to treat you as
  an individual, hearing your problems in this manner. In other words, they won’t
  be quick to judge you.

  They believe that problems can be solved with logic, but their answers are not insensitive
  or “too” rational ones. It is not everyone who can call upon the head and the heart
  and come up with something coherent, without dishonoring either faculty.

  These people are attracted to the written word, especially poetry and imaginative
  stories. Many possess talent in writing and/or speaking, as they are able to weave
  considerable imagination and animation into either. Most are wonderful listeners.
  They do enjoy talking, but they are curious and interested enough to truly listen
  when others speak. They pick up others’ feelings and body language readily.

  The trine aspect is the more dynamic of the two harmonious aspects. Those with the
  sextile can call upon these traits when needed, and those with the trine between
  the Moon and Mercury have incorporated the traits of the aspect into their personalities,
  expressing them naturally and consistently.

