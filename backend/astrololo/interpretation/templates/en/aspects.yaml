jupiter_mars_trine: 'This aspect indicates a harmony between your intellect and your
  physical strength, and you will most likely have little difficulty achieving your
  goals in life. It may appear to others that you are lucky sometimes, but you are
  also good at applying your talents to attain the desired results. You have a natural
  ability to be in the right place to grab new opportunities or to initiate a well-timed
  project. You are often successful in competition but sometimes may not even enter
  the contest because it doesn’t seem worth it to you.

  You are honest and forthright in your dealings with others, and you tend to trust
  others readily. You can be a bit careless about spending money, however, and this
  is probably because you are so eternally optimistic that there will always be plenty
  around. The possibility of failure does not enter your mind, although success itself
  is not that important to you–you’re just being you.

  In your relationships you are attracted to others who also seek a harmonious lifestyle.
  Your sexual nature is very strong, but you seek more than physical gratification
  from your mate. You want someone who will share in your life entirely and grow to
  know and understand you intimately.

  You appreciate a partner who is intellectually strong. You have a strong sex drive,
  but without the mental component, no relationship will last very long. You also
  seek a partner with spiritual consciousness. Your warmth and enthusiasm on a sexual
  level is apparent, and you don’t tire easily. Your interest doesn’t fade easily
  over time, either.

  Interestingly, you are able to be assertive without stepping on others’ toes. This
  is an important part of your attractiveness to women. — Interpretation from our
  LoveStyles: About Him report.

  The trine aspect is the more dynamic of the two harmonious aspects. Those with the
  sextile can call upon these traits when needed, and those with the trine between
  the Mars and Jupiter have incorporated the traits of the aspect into their personalities,
  expressing them naturally and consistently.

  Alternate, short interpretations: Interpretation sample from the Merlin report –
  Mars sextile Jupiter or Mars trine Jupiter: *Your self-confidence and vitality are
  strong and you believe you can do just about anything you want to. You have an enterprising
  spirit, a good sense of timing, and the ability to sense what will succeed and what
  won’t. You usually make fortunate decisions in work or business activities. You
  enjoy healthy competition and you have a rather playful, good-humored attitude toward
  it. You mostly compete with yourself to see how far you can go or how much you can
  accomplish. You like to keep stretching your limits.

  Interpretation sample from the Your Spiritual Path report – You are usually able
  to direct your will to productive activities. You find the transcendent component
  in each relationship and build upon it. You exemplify joy in your daily activities.

  Interpretation sample from the Karmic Insight report – You have developed the capacity
  to direct your masculine/active, yang energies in healthy and positive ways. Thus,
  you have confidence in your “masculine” strengths and abilities. Ennobled by ideals
  of fair play and concern for the broader social implications of your choices, your
  actions are most often fortunate, leading to success and increased opportunities.
  A gift for leadership and inspiring others is also yours. Physical playfulness is
  an important way you can re-create and rejuvenate yourself.

  Some Famous People with Mars in Harmonious Aspect to Jupiter: Sextiles – Drew Barrymore,
  Serena Williams, Sinéad O’Connor, Richard Speck, Vanessa Redgrave, Robert Pattinson,
  Peter O’Toole, Oliver North, Galileo, Patrick Duffy, Phil Donahue, Catherine Deneuve,
  Danny DeVito; Trines – Upton Sinclair, J. R. R. Tolkien, Stephen King, Cheryl Tiegs,
  Gregory Peck, Bob Marley, Henry Miller, Brian Eno, Leonardo Di Caprio, Maite Perroni,
  Dick Butkus, Alexander Skarsgard, Roseanne Barr, Ben Affleck, Mika.

