pluto_sun_conjunction: 'Sun square or opposition Pluto

  People born under a challenging aspect between the Sun and Pluto are prone to inner
  tension and negative, self-destructive behavior. When things are going well, they
  suffer from fears that something will come along to change that. Their thought patterns
  can be negative, and if not kept in check, they can seriously undermine their happiness.
  Constantly worrying that the rug will be pulled from under their feet can easily
  become a self-fulfilling prophecy.

  Sun-Pluto have tremendous power and strength–when they learn to accept and use that
  strength, instead of fear it, they are some of the most effective, insightful, helpful,
  and healing people around!

  One of the most prominent characteristics of these aspects is the tendency to be
  intensely dissatisfied with their personal accomplishments and expressions of self.
  These people put a lot of pressure on themselves regarding their own endeavors.

  A child, for example, with a challenging Sun-Pluto aspect may work hard at a piece
  of artwork, decide it’s not right, destroy it, and start all over again. This same
  child will be especially disturbed if they feel people are watching as they create
  their artwork.

  This is a simple example, but it’s quite descriptive of the tendency for these people
  to be dissatisfied with their creative self-expressions, and to want to hide their
  expressions from others until they feel the output is “right”. This is largely due
  to a perceived inability to express or reveal their true personalities to others.
  They experience a simultaneous urge to express themselves and to hide themselves.
  They struggle with a deep need to control themselves and life itself.

  Rarely are Sun-Pluto people completely satisfied with themselves. They are especially
  sensitive to criticism, and feel the need to “redo” themselves often. There is a
  marked fear of losing control, and this might stem from some traumatic event in
  childhood, or the childhood might have been crisis-ridden or emotionally-charged
  in general.

  As such, these people are often intensely fearful of, or threatened by, change.
  This can express itself through attempts to control their lives such that they can
  manage their fears of being taken off guard. Of course, this generally backfires!

  Another characteristic of these aspects is an intense need for privacy. They fear
  being exposed or invaded. Again, this is an expression of their dissatisfaction
  with the self they are projecting, and they are generally uncomfortable with their
  evolving ego. They seem to undergo many identity crises, and they feel the need
  to control what others know about them and think about them.

  Their fear of exposing themselves might cause them problems with others, who may
  begin to mistrust them, presuming that if they are so protective of their privacy,
  they must have something sinister to hide. The truth is, they struggle with a dissatisfaction
  with themselves and their fear of being exposed is really about a fear of being
  vulnerable, as well as a manifestation of their own identity crisis.

  These people are quick to read between the lines. They need to be careful, however,
  to avoid reading negative or dark things into situations or people. They need to
  know that if their tendency is to hunt for dark “truths” rather than unbiased truths,
  this is a self-destructive behavior that stems from fear. Many people with these
  aspects are overly attached to things, habits, people, and their past. At the root
  of this is an intense fear of change that would threaten to make them vulnerable.
  Still, Pluto’s goal is to transform through change. Inevitably, Sun-Pluto people
  will have to face their fear of change and accept that they need change in order
  to grow.

  We all have a dark, irrational side, but people with Sun-Pluto in hard aspect are
  forced to confront it and integrate it into their personalities. It can be a challenging
  process, especially because the Sun rules all that is “light” – the rational, conscious
  mind. The Sun is noble and righteous by nature. Aligned with Pluto, it can have
  a hard time accepting the darker, intense, and often irrational Pluto energies into
  one cohesive whole. This is the challenge that Sun-Pluto face.

  If these people find themselves using manipulative tactics to get their way, or
  attempting to control others through subversive tactics, it is a clear cue that
  they are mishandling Pluto energies. It is a powerful indication that their self-image
  is low. There is little satisfaction derived from getting our way through manipulation.
  It only serves to make us feel less effective in the long run and on a personal
  level.

  If I were to win a favor by using subversive tactics, what will it prove to me?
  It will reinforce my feeling that I am not effective just by being myself. And,
  effectiveness is something Sun-Pluto craves.

  Especially with the opposition, these people might attract manipulative, possessive,
  or jealous people into their lives. With the square, there is more of a tendency
  to attract dangerous or upsetting situations in the life.

  Either way, these people need to get in touch with the reason why they are attracting
  these people and situations. In all likelihood, they are not handling their own
  fears effectively, and they feel they are not in control of their lives, and a looping
  pattern is thereby created. They eventually come to realize that they are very strong
  people with enormous resilience. They need to identify with, face, and accept their
  “dark” side. Self-acceptance is the key to handling this aspect. Channeling Pluto
  energy into constructive channels is also important.

  “Put Your Lights On” by Santana featuring Everlast

  Hey now, all you sinners

  Put your lights on

  Put your lights on

