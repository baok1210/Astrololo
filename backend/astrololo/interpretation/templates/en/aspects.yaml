pluto_venus_conjunction: 'Your emotions, particularly when it comes to feelings of
  love and attachment, run very deep. Your personality is magnetic, and you tend to
  arouse strong feelings in others, who may find you intriguing or somehow offensive!
  And all of this before you even open your mouth.

  In love, you can be quite possessive and possibly obsessive. At the root of obsessive
  feelings are deep fears of rejection, loss, and betrayal. Your feelings often run
  hot or cold–your love nature is generally extreme. It’s hard for you to detach yourself
  when it comes to personal relationships, and this sensitivity comes from a tendency
  to take things very much to heart.

  You are certainly most charming when you want to be. Love relationships turn your
  world upside down. You are likely to experience love at first sight, as you tend
  to work on instinct when it comes to affairs of the heart. Your relationships often
  feel fateful. You easily put pressure on your partner, as you expect much loyalty
  and honesty in your intimate relationships.

  Be careful not to let your relationships get to a point where your partner is superfluous
  and you are working through your own inner demons through him or her. Certainly,
  you will learn much about yourself through your relationships, and you may not always
  like what you see.

  You will meet yourself (the “darker” side or inner demons) through your relationships,
  and it will be critical that you recognize it as your own “material” and not project
  it onto your partner. On another level, you may have a talent for drama, writing
  lyrics, music in general, and finance.

  ~You are extremely loyal to and solicitous of those you love, without a cloying
  sentimentality. Your values and thoughts center on love, which can easily become
  the hub of your life. Early in a relationship, you are apt to be jealous and possessive,
  but with time and experience this can be transformed into a higher, more mature
  type of attachment. You are willing to give your all to your beloved but demand
  the same in return.

  Your strongest desire is for an all-consuming love that will bring you satisfaction
  on all levels: emotional, physical and spiritual. With aspects to Mars or Neptune,
  there could be a preoccupation with or compulsive attitude toward sex.  — Interpretation
  sample from the Heaven Knows What report.

  + You may not be particularly sentimental but if you love someone, you love them
  completely and forever. You live on the emotional extremes. People are either important
  to you or they don’t even exist. Your feelings are deep and volcanic. You love power
  and control which is fine if you have learned to control yourself.

  You are magnetic and surrounded with an aura of mystery. You deal with groups and
  group resources. You may have leadership in some creative project or in some financial
  enterprise. You polarize people: they either love you or hate you but are seldom
  indifferent to you. — Interpretation sample from the In-Depth Profile report.

  *You have deep, compelling love feelings that seem irresistible and often irrational.
  Your love relationships are very passionate and intense, and you experience both
  agony and ecstasy in love. You are always changed in a deep, fundamental way by
  your love experiences, though this may come about through painful and difficult
  confrontations or separations. You are something of an emotional fanatic about things
  you care about.

  #You are the stuff of saints and martyrs because you engage in your beliefs with
  a fanatical desire to conquer anyone in your path. A physical love relationship
  can make or break your spiritual connection, depending on your ability to nurture
  the depth of feeling. Interpretation sample from the Your Spiritual Path report.

  Some Famous People with Venus conjunct Pluto: Amelia Earhart (Venus conjunct Pluto
  in Gemini), Jessica Hahn (Venus in late Leo conjunct Pluto in early Virgo), Judy
  Reyes (Venus conjunct Pluto in Virgo), Ian Scott Anderson (Venus conjunct Pluto
  in Leo), Charles Dickens (Venus conjunct Pluto in Pisces), Phil Hartman (Venus conjunct
  Pluto in Leo), Victor Hugo (Venus conjunct Pluto in Pisces), Jeremy Irons (Venus
  conjunct Pluto in Leo), Liberace (Venus conjunct Pluto in Cancer), Heather Locklear
  (Venus conjunct Pluto in Virgo), Barry Manilow (in Leo), Dr. Phil McGraw (in Leo),
  Olivia Newton-John (in Leo), Sean Penn (in Virgo), Julia Roberts (in Virgo), Sarah
  Ferguson (in Virgo), William Butler Yeats (in Taurus), Billie Eilish (in Sagittarius),
  Reneé Rapp (in Sagittarius), Frida Kahlo (in Gemini).'
pluto_venus_opposition: 'In an attempt to control the outcome of a love relationship,
  or the loved one’s feelings, you can turn to manipulative games. Even if you do
  “succeed” at it, there is never a feeling that you’ve won someone over for who you
  are, and this feeds a vicious cycle that you should try to avoid getting yourself
  into. Your feelings are intense, and even extreme, when it comes to love. You might
  attract intense relationships that have love-hate themes as a result.

  You are passionate when you love, definitely, but also passionate when you hate.
  You easily put pressure on your partner, as you expect much loyalty and honesty
  in your intimate relationships.

  Be careful not to let your relationships get to a point where your partner is superfluous
  and you are working through your own inner demons through him or her. Certainly,
  you will learn much about yourself through your relationships, and you may not always
  like what you see.

  You will meet yourself (the “darker” side or inner demons) through your relationships,
  and it will be critical that you recognize it as your own “material” and not project
  it onto your partner. Letting go of a relationship can be hard for you to do, especially
  if Venus is in a fixed sign (Taurus, Leo, Scorpio, or Aquarius).

  You are capable of being a great manipulator and are often caught up trying to make
  things appear a certain way. You are the one who suffers from this tendency the
  most. You tend to get tied down to a pattern of endless repetition in relationships.

  You have difficulty in letting go even when a situation is painful. You are always
  dealing with people as symbols of others who are not even present. Love and power
  become confused with one another.

  You have a deeply lodged need to establish your sense of self worth. Once this is
  secure you can overcome your fear of being dissolved in a relationship built on
  equality and will start having more normal interactions. You need to be less concerned
  with how you appear to others and more concerned with how you are. — Interpretation
  sample from the Indra (In-Depth Profile) report.

  #Your sexual intensity can lead you into all the wrong kinds of relationships. With
  a bit of judgment however, that very intensity can set you and your partner on the
  path of creative expression, and can stimulate bursts of spiritual consciousness.
  Allow time in between to integrate your experiences. Interpretation sample from
  the Your Spiritual Path report.

  ~You are more aware of love’s burdens than its bliss. You do want a permanent, growing
  love relationship, but you seem to attract the type of people who aren’t willing
  to give as much as you need. With time you will learn the positive meanings of love,
  which will be all the more precious to you because you already know the pains.

  One of the things you may become more aware of as you experience love is that your
  relationships reflect your own inner turmoil; as soon as you start respecting yourself
  as you are now, you will find that you attract a giving, loving person more easily.

  Marriage could occur out of a strong need for financial and emotional security.
  Some of your love affairs could be secret ones, possibly with married persons. An
  intense love affair for which you are forced to give your all could bring about
  a transformation.  — Interpretation sample from the Heaven Knows What report.

  Some Famous People with Venus in Hard Aspect to Pluto: Squares – Jamie Lee Curtis,
  Kevin Kline, Justin Timberlake, Shirley Temple Black, Britney Spears, Ryan O’Neal,
  Steve McQueen, Goldie Hawn, Bruce Lee, Geri Halliwell, Lucille Ball, Marc Thiercelin,
  Sinéad O’Connor, Birgundi Baker, Alisha Boe. Oppositions – Ivana Trump, Beau Bridges,
  Celine Dion, Al Capone, Bridget Fonda, Zsa Zsa Gabor, Julian Lennon, H. G. Wells.'
pluto_venus_sextile: 'Instinctually, you observe others and have a strong feel for
  their motivations. You can use your sharp perceptions to quickly size up a person
  or situation, and to deal with either accordingly. Extremely resourceful, you are
  also excellent at determining the worth or value of material things. You can help
  others to discover their own worth as well. You are naturally attracted to relationships
  that transform you, that are growing and evolving, and that are intense.

  You can use your strong intuition and understanding of others for good or for bad,
  and this depends largely on other aspects in your chart. You are selective in taste,
  and highly devoted and passionate to the things (and people) you do love. Your charisma
  is strong and natural, often understated, and you can be quite persuasive.

  The trine aspect is the more dynamic of the two harmonious aspects. Those with the
  sextile can call upon these traits when needed, and those with the trine between
  the Venus and Pluto have incorporated the traits of the aspect into their personalities,
  expressing them naturally and consistently.

  + You are powerful and magnetic. You have a magical charm for dealing with people.
  You have a universal love for people that is non-sectarian and non-judgmental. You
  are sustained by material abundance that comes from others at some time in this
  life and may have a sizable inheritance.

  When you get involved with a project you can really pour yourself into it with seemingly
  limitless energy. This energy evaporates when you aren’t involved in a project of
  personal importance.  — Interpretation sample from the In-Depth Profile report.

  Venus sextile Pluto or Venus trine Pluto: *You love deeply, passionately, and wholeheartedly,
  and others may find your intensity either extremely attractive or threatening. You
  are charismatic and can have a powerful emotional influence on others, especially
  [on potential romantic partners]. You may use your attractiveness to manipulate
  others, sometimes without even realizing it.

  ~This aspect deepens your response to love, people and life in general. You have
  the rare quality of seeing the best in everyone, thus helping to bring it out. Beauty,
  symmetry and goodness are the things you look for in life – and find!

  Your friends come from all social classes and backgrounds. Your understanding and
  appreciation of love is instinctive, and you are fully prepared to accept the responsibilities
  of love as well as the joys. — Interpretation sample from the Heaven Knows What
  report.

  #Your powerful artistic gifts can provide the media for your spiritual expression.
  Sometimes you are driven by physical compulsion to produce tangible works. From
  the Your Spiritual Path report.

  Some Famous People with Venus in Harmonious Aspect to Pluto: Sextiles – Ella Fitzgerald,
  Prince Ranier, Sylvia Plath, Brigitte Nielsen, King Charles, Alice Faye, Justina
  Machado, Bella Ramsey, Alain Delon, Vanessa Paradis, Sofia Essaïdi, Amy Adams, Bill
  Clinton, Kristin Hersh; Trines – Bono (U2), Virginia Woolf, Leo Tolstoy, Donna Summer,
  John Steinbeck, Jessica Simpson, Amirah Vann, Harvey Korman, Bjork, Dick Clark,
  Brendan Fraser, Mia Farrow, Betty Ford, Michael J. Fox, Ana Marta Ferreira, Venus
  Williams, Sarah Shahi.

