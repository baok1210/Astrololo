jupiter_venus_conjunction: 'Whether these people are shy or outgoing, law-abiding
  or reckless, quiet or loud…they possess a very grand idea of love, and they have
  an indulgent side to them that is unmistakable, and possibly hard to control. Jupiter
  expands whatever it touches, and in this case, it’s enlarging the qualities of Venus:
  romance, relationship, pleasure, and money.

  This doesn’t necessarily mean that all of these things will come easily to natives
  with a Venus-Jupiter conjunction. But the appetite for pleasure, romance, and, in
  some cases, material things, is big.

  Their hearts are big too–most of the time, if given a choice, they’ll opt for the
  high road. They are generous with people they love (and with themselves!), dangerous
  with a credit card, and incurable romantics. They tend to assign positive traits
  to the people they love, whether those people deserve them or not!

  One of their weak spots is their love of pleasure. Some have a definite lazy streak.
  They are very affectionate people who are generous with their emotions and, usually,
  their pocketbook too. When they care about you, they are quite loyal and faithful.
  Their opinions about love and friendship are strong–they generally have lofty ideals
  in these areas.

  Their hearts are open and they have a tendency to want to give a lot to the people
  they love. They may live beyond their means, especially if the conjunction is challenged
  by other planets. They need to learn not to borrow from their future.

  They have a greater than average need to grow in their love relationships, and to
  shower their partners with acceptance and warmth. They have a strong need for growth,
  good humor, and fun in their relationships. They have a marked disdain for insincerity,
  placing great value on people with good intentions and good hearts. They do whatever
  they can to make those around them feel comfortable, accepted, and of value exactly
  as they are.

  Interpretation sample from the Your Spiritual Path report — The pursuit of wisdom
  parallels the pursuit of love in your life. Any conflict in love relationships causes
  you to consider your spiritual values all over again. You may like the stage of
  falling in love with a spiritual idea so much that you choose to do it many times
  before you establish a solid foundation.

  Some Famous People with Venus conjunct Jupiter: Drew Barrymore, Carrie Fisher (Venus
  conjunct Jupiter in Virgo), Taraji P. Henson (Venus conjunct Jupiter in Scorpio),
  John Belushi, Jeff Bridges, Garth Brooks, Dick Cavett, Patty Duke, Richard Dysart,
  Morgan Fairchild, Peter Fonda, Ann Jillian, Don Johnson, Jerry Lewis, George Nader,
  Joe Namath, Paul Newman, Roman Polanski, Trent Reznor (Venus conjunct Jupiter in
  Gemini), Paul Shaffer, Steven Spielberg, Robert Urich, Henry Winkler (Venus conjunct
  Jupiter in Libra), Dwight Yoakam, Stephanie Poetri, Brian Littrell (Venus conjunct
  Jupiter in Pisces), Scarlett Johansson (Venus conjunct Jupiter in Capricorn), Veronica
  Falcón, Halsey (Venus conjunct Jupiter in Scorpio), RuPaul (Venus conjunct Jupiter
  in Capricorn), Jane Birkin (Venus conjunct Jupiter in Scorpio), Kid Cudi (Venus
  conjunct Jupiter in Capricorn), Portia de Rossi (Venus conjunct Jupiter in Capricorn),
  Mariana Esposito (Venus conjunct Jupiter in Virgo), Karine Le Marchand (Venus conjunct
  Jupiter in Virgo), Rachel Bilson (Venus conjunct Jupiter in Libra), Alexis Louder
  (Venus conjunct Jupiter in Leo), Morven Christie (Venus conjunct Jupiter in Libra.'
jupiter_venus_opposition: 'These people are big-hearted and warm, with open hearts
  and a tendency to want to give a lot to the people they love. They can have some
  problems with following through on their promises, however–not because of any ill
  intent, but because they sometimes overestimate their personal capabilities, and
  want to do more, and give more, than is actually possible.

  At distinct times in their lives, they have a tendency to live beyond their means.
  They need to be cautious about the tendency to feel overly-optimistic or overly
  protected. Borrowing from their future and overdoing their indulgence in pleasures
  is a marked tendency.

  While people with the conjunction, sextile, or trine between Venus and Jupiter express
  their bigheartedness, tolerance, generosity, and magnanimity in a generally constant
  and natural manner, these same expressions for those people with the square, opposition,
  and quincunx between these planets tend to be problematic at times.

  Their need for growth, good humor, and fun in their relationships is marked, as
  is their disdain for insincerity. However, they may attract just those kinds of
  people simply because they are looking so hard for these traits that they assign
  them onto undeserving people!

  Moderation is the most important, and perhaps challenging, lesson in these people’s
  lives.

  Interpretation sample from the Your Spiritual Path report — Your sense of form and
  harmony extend into the important relationships of your life. You seek a strong
  philosophical connection to match the physical passion. Faithfulness is a key factor
  if your relationship is to support your spiritual growth, and trust has to work
  both ways in the partnership.

  Some Famous People with the Venus in Hard Aspect to Jupiter: Squares – America Ferrera,
  Ludwika Paleta, Jason Alexander, Pearl Buck, Julia Child, Joe Cocker, Sean Connery,
  Alice Cooper, Billy Corgan, e.e. Cummings, John Denver, Michael J. Fox, Andy Gibb,
  Linda Goodman, Jim Jones, Jessica Lange, David Lynch, Dolly Parton, Tom Paxton,
  Robert Redford, Lynn Redgrave, Oral Roberts, Maria Shriver, Britney Spears, Tina
  Turner, Jon Voight, Betty White, Audrey Tautou; Oppositions – Jennifer Aniston,
  Mahatma Gandhi, Vanessa Hudgens, Jimmy Fallon, Aubrey Plaza, Laverne Cox, Drew Carey,
  Steve Jobs, Billy Ray Cyprus, Victor Hugo, Quincy Jones, Tom Selleck, Cat Stevens,
  Richard Pryor, Busta Rhymes, Toni Morrison, Indila, Laila Ali, Pixie Lott, Barbara
  Schulz, Marc Maron, Victoria Monét.'
jupiter_venus_sextile: 'These people have an easy smile, a warm and responsive sense
  of humor, and a rather easygoing manner when they’re feeling comfortable. Although
  they are unlikely to seek out people to help, they’re quite quick to lend a helping
  hand if the need arises.

  It’s natural for these people to incorporate humor into romantic and sexual moments,
  and they don’t always understand more serious approaches. They are capable of much
  romance, but playfulness comes naturally to them. They can be extravagant, at times,
  with their pocketbook, but usually have the good sense to stop before things get
  out of hand.

  People with these aspects expect to grow in their social and personal relationships.
  Stagnation makes little if any sense to them. Their appreciation for the good things
  in life is evident but not excessive. Often people with these aspects are in a position
  to offer opportunities to others, usually with regards to work and career.

  The trine aspect is the more dynamic of the two harmonious aspects. Those with the
  sextile can call upon these traits when needed, and those with the trine between
  the Venus and Jupiter have incorporated the traits of the aspect into their personalities,
  expressing them naturally and consistently.

  Interpretation sample from the Your Spiritual Path report — Your magnetic nature
  attracts others to you, and you are popular without making much effort. Sharing
  your spiritual joy does not have to involve sharing on the physical level.

  Some Famous People with Venus in Harmonious Aspect to Jupiter: Sextiles – Dane Rudhyar,
  Mary Pickford, Keanu Reeves, Edith Piaf, Geraldine Page, Clara Barton, Ty Cobb,
  Kristine Froseth, Alfred Adler; Trines – Troy Aikman, Gene Hackman, Bob Hope, Martin
  Scorcese, Socrates, Jeon Jungkook.

