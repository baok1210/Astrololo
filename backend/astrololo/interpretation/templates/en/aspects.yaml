moon_uranus_conjunction: 'Moon conjunct Uranus

  You possess an independent spirit, and you resist being labeled or pigeon-holed
  as a result. You are not one who is drawn to traditional roles when it comes to
  family, friends, and relationships. Your emotional energy vacillates, so that you
  can be extremely sociable, friendly, and available at times, and completely aloof,
  independent, and unavailable at other times. Behavioral patterns are quirky, changing,
  and inconsistent, and this quality is most obvious when you are at home or with
  family and very close friends. You need space and freedom, and situations that allow
  for spontaneity.

  Routines bore you, particularly domestic routines. You need to mix things up a little
  in order to prevent a restless, unsatisfied feeling, for example, changing your
  “schedule” day to day. When it comes to parenting, you prefer an open and free atmosphere
  with your children. Some fear of becoming too close or attached to others is likely
  present. You detest overly serious or stuffy atmospheres, and you will do what you
  can to loosen everyone up. Sometimes you say or do something with the goal of mixing
  things up, or to shock.

  Rebelling against traditions is something that seems to come naturally, but you
  might want to be careful that you are not being irresponsible or insensitive in
  the process. You are humorous and spontaneous, and given to acting on a whim.

  Interpretation sample from the In Depth Profile Report: You have unusual habits
  and original methods of implementation of your ideas. Your sense of timing in life
  is unique; sometimes this works to your favor, sometimes it doesn’t. Your special
  rhythmic way of expressing yourself can be interpreted as being flighty, indifferent
  or irresponsible by others, so you do yourself a favor keeping people posted as
  to your ideas and procedures. Your spontaneity and creativity gives your activities
  an exciting carefree feeling. You may experience large amounts of emotional tension
  so you should learn to relax. Of course, easier said than done.

  Alternate Karmic Insight interpretation: In your incarnational past, while there
  may have been long periods of contentment and tranquility, there was also a time
  of great upheaval which forced you to turn your back on the security and way of
  life you once knew. Your home life may have been disrupted, and your inner sense
  of who “family” is, radically changed. It is possible that you were involved in
  revolutionary activities, or were in a profession that was considered unorthodox
  or even heretical by the authorities of the day, and your fellow “radicals” or sympathizers
  become your true family.

  All of this may affect you in the present in a number of subtle ways: a deep-seated
  restlessness or desire to break away totally from your past, a feeling that the
  rug could be pulled out from under you at any moment, emotional impulsiveness, a
  craving for newness and excitement for which you are willing to forego security
  or an orderly existence.

  It is important for you to try to embody the ideals and unusual interests and inclinations
  you have, without “throwing the baby out with the bath water”!

  Women with this aspect (from the Astrology Profile for Women report): With the Moon
  in conjunction with Uranus in your chart, you may feel that you are riding an emotional
  roller coaster. Your highs can be very high, and your lows, very low. Your hormonal
  cycles may also be rather extreme, and you might benefit by taking a very careful
  look at holistic ways to handle PMS. Review your dietary habits to be sure that
  you’re getting appropriate nutritional support. Your independent spirit plays a
  definite part in your resistance to taking on the traditional roles of a woman,
  although you can be a trendsetter when you’re simply doing things your own way.

  Moon square or opposition Uranus

  People with these aspects in their natal chart are studies in contradiction. When
  they are able to fulfill their emotional needs for closeness, support, and intimacy,
  another part of their personality rebels. They feel closed in, restricted, and uncomfortable
  with feelings of dependency. However, when they are left alone on an emotional level,
  they can feel left out. They begin to crave closeness and intimacy once again. They
  keep people at an emotional arm’s length often enough, yet struggle with their emotional
  independence.

  Daily routines feel too stifling for these individuals. They need to mix things
  up in order to feel creative and emotionally vital. Inconsistency is a result, and
  some level of domestic disorder is almost a guarantee. Living with them can be challenging
  for more orderly and systematic people!

  People with Moon-Uranus hard aspects despise emotional pretense. They are adamant
  about expressing themselves honestly, which generally translates to “sporadically”.
  If they don’t “feel it”, they simply won’t do it. It can be challenging to pin them
  down at times–they will feel cornered. Don’t take it too personally, however, because
  they not only rebel against your schedules, they rebel against their own as well!
  The fact is, when they try to bring more order to their lives, it can be hard to
  stick to a program, even if they were the ones who designed the program.

  Their insistence on following their own intuition and “inner code” is admirable
  on one hand. In fact, they are generally quite proud of their emotional honesty.
  However, this honesty can be difficult for others to deal with at times. They are
  sometimes accused of selfishness as a result, although they don’t see it that way
  at all.

  They are generally very creative people, although their creative output is sporadic.
  Whenever Uranus is strongly connected to a personal planet in the natal chart, you’ll
  find this “stop-and-start” energy simply because these people live on intuition.
  Uranus intuition is not the same as Neptune intuition–it’s more self-focused and
  has to do with being true to oneself.

