jupiter_moon_trine: 'Moon conjunct Jupiter

  Generosity of spirit is most evident when Moon conjuncts Jupiter in the natal chart.
  These people are ready to laugh, quick to forgive, and warm-hearted. Jupiter aligned
  with the Moon offers perspective to the emotions, so that the natives are able to
  reason themselves out of depression, foul moods, and the like. This perspective
  allows the natives to understand others unusually well. They are hospitable, kind,
  and forgiving.

  Sometimes quite opinionated, however, these people possess a strong sense of right
  and wrong. They can be quite impassioned about what is fair, what isn’t fair, and
  what everyone should do about it! When someone is down, they are the first people
  to jump in with support and advice.

  Not everyone wants to deal with their emotions in such a rational manner, however,
  so Moon conjunct Jupiter people can sometimes support people in a way that is not
  always appreciated, but their kind-hearted approach is generally well-received.

  These people have a sense of humor that makes them a joy to be around. They are
  also very intuitive. Their hunches and premonitions are often right on target. As
  such, they can have a reputation for being quite “lucky”. It’s not necessarily psychism
  that is at the root of this, however. It is more about an expansive understanding
  of human nature and the world around them. These are very generous people who respond
  in big ways to others, sometimes overdoing it to the point that they try to please
  everyone around them.

  It is interesting that these people who are so very charitable and forgiving can
  sometimes come across as a bit preachy. The reason behind it is that their emotional
  natures (Moon) work hand-in-hand with their higher minds (Jupiter). Jupiter is very
  grand and good-spirited, but it is also a planet that rules the concept of right
  and wrong. These people make excellent teachers and they are often interesting story-tellers.
  There is a strong attachment to the past, to history, and to cultures of the world.

  Moon square or opposition Jupiter

  The charitableness of Moon-Jupiter aspects is here, but it is sometimes done to
  the natives’ disadvantage. These people want to see the best in others, and are
  very quick to forgive and to accept others. Their big-heartedness, however, can
  go a little too far at times. They might promise a little more than they can deliver
  and although most will recognize their good intentions, they can quickly gain a
  reputation for not being very reliable or responsible.

  In some cases, the mother or maternal figure was overindulgent with the child, and
  the natives are always hungry for emotional experiences. An inner restlessness is
  present in spades, and it can be difficult to satiate. If the mother figure was
  over-protective with the child, which is often the case, the natives grow up with
  a feeling either that they should protect others or that they should be protected
  or pampered. There can be some laziness and expectations that others should provide
  for them, even into adulthood.

  They can come up with ideas that are not very well-grounded, and believe in them
  fully, not follow through, and then jump on a new bandwagon.

  They can also tend to overstate their emotions. Often, they become emotionally “high”
  on something that is unrealistic, and when reality inevitably hits them, the “low”
  is just as powerful. Learning to temper their enthusiasm with realism and good judgment
  is essential in order to avoid this up and down cycle that can drain them of energy
  and spirit. They are usually humorous people with good hearts and they can be quite
  generous at times as well.

  Moon sextile or trine Jupiter

  These people are generally pleasantly composed, due to an inner sense of harmony
  and emotional balance. They are optimistic–and realistically so, most of the time–which
  contributes to their overall “luck”. They are able to get a real perspective on
  emotional matters that not only benefits their outlook, they are able to offer support
  to others when needed. Broad-mindedness is a wonderful characteristic.

  Quick to find humor in situations, these people are generally warm and fun to be
  around. Deep down, they believe in the basic goodness of people and of life in general,
  and this basic and natural attitude helps them to attract positive circumstances
  and to make good connections. One of their best qualities is tolerance. Usually,
  they don’t take life too seriously in the sense that they believe in having a bit
  of fun. Their hunches are more often than not bang-on.

  The trine aspect is the more dynamic of the two harmonious aspects. Those with the
  sextile can call upon these traits when needed, and those with the trine between
  the Moon and Jupiter have incorporated the traits of the aspect into their personalities,
  expressing them naturally and consistently.

