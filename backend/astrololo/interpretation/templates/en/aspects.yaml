mars_moon_conjunction: 'The emotional life is animated and excited with this aspect.
  People with Moon conjunct Mars in their natal charts can actually feel warm. They’re
  hot-blooded, passionate, and sexual people. Most have considerable energy and intiative
  at their disposal. They are brave and spontaneous.

  There is an inherent pressure to perform and to prove oneself on a personal level,
  which sometimes spills into the professional arena, but taken alone, it points to
  a defensive nature that doesn’t easily relax.

  There is a bluntness and straightforwardness to these people that is unmistakable.
  Although they are completely ready to defend and protect their loved ones, they
  are not especially sympathetic on a more personal level. They’ll most definitely
  defend the “weak”, but they are too emotionally excitable, self-absorbed, and brusque
  to be considered gentle and sympathetic folk! They’re brave and they value personal
  freedom. Routine bores them, and they are inclined to seek out excitement in some
  form.

  Spontaneous to a fault, these people react quickly to stimuli. They are usually
  physically resilient. Their temper is quick, but it can disappear just as rapidly.
  Theirs is a raw passion.'
mars_moon_opposition: 'These people can be precocious, animated, and passionate. They
  seek emotional excitement in their lives. Although they often project a brave and
  tough image, their skin isn’t as thick as they’d have you believe. They tend to
  put up defenses due to their emotionally vulnerable and excitable disposition.

  Unrest is characteristic, as they are bored by routine and become easily frustrated
  when life is “too easy”. There’s a buzz of energy surrounding them, and they tend
  to meet with many conflicts in their lives. With the opposition, the conflict tends
  to be lived through relationships. The passions are quite raw, especially in youth.

  If they can channel their excitable energy into sports or some other competitive
  field, all the better. Although they can be amiable and interesting people, others
  always seem to sense their boundaries. Something is bound to get them worked up,
  and it’s not always clear what that something will be!

  Their bluntness can be both appreciated and considered offensive, depending on their
  audience. They are eager to make a personal impact on those around them. Some of
  them are too eager in this sense, and they come across as self-absorbed and difficult
  to stomach. Patience is definitely not their strong point! Their responses are quick,
  and they are passionate people who are usually quite courageous although their energy
  is sporadic and sometimes wasted.'
mars_moon_sextile: 'Those with the Moon in harmonious aspect to Mars in their natal
  charts are passionate people who love life. Although their emotions are powerful
  and immediate, their passion is generally controlled and directed. These people
  are sexual people who nevertheless don’t get carried away or controlled by their
  passions. Because their emotions are strong and they know how to channel them into
  constructive channels, they don’t easily understand such things as “crimes of passion”,
  impulsive behaviors, or emotional excitability in others.

  People with this aspect in their natal charts are generally open, accepting, and
  natural in their sexual expression. They need an emotional connection in order to
  feel complete on a physical level. People with these aspects often have an affection
  and talent for sports, but other factors in the natal chart are necessary to provide
  the motivation and commitment.

  The trine aspect is the more dynamic of the two harmonious aspects. Those with the
  sextile can call upon these traits when needed, and those with the trine between
  the Moon and Mars have incorporated the traits of the aspect into their personalities,
  expressing them naturally and consistently.'
