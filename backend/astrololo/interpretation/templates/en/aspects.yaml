jupiter_saturn_conjunction: 'With Jupiter forming a conjunction to Saturn in the birth
  chart, your tendency to see both the potentials and limits of any given situation
  has its perks, making you a very reasonable person. However, you don’t always allow
  yourself the pleasure of letting your mind go or of imagining something wonderful
  without also having to pull in the disclaimers! This can take its toll.

  You have a balanced outlook, with realistic optimism and optimistic realism. You’re
  serious about your principles, ideas, and beliefs. Your trustworthiness is vital
  to you, and your memory is retentive. A good teacher, you also love learning, and
  you could have a solid interest in history and/or politics. Preferring a step-by-step,
  logical approach to solving problems, you gravitate to tried-and-true methods, safe
  bets, and logical systems. You value steady progress and organization, and you’re
  excellent at making plans.

  You don’t expect things are handed to you, and you see both the potentials and limits
  of every situation.

  You have a conservative streak in you that is seeking the lowest common denominator.
  You get to your goal in life and accomplish much by slow, tenacious effort. Your
  life really takes off between the ages of 27 and 36. It is during this time that
  you “find yourself”. Your success is directly linked to the success of the culture.
  You rise and fall with the fortunes of everyone else. Seeing this principle in operation,
  perhaps you can pace yourself so that you don’t waste time and energy trying to
  push your own life forward faster than the country or the social order can assimilate
  it. — Interpretation from the InDepth report.

  *Your aspirations and dreams are always tempered by realism and practical considerations.
  You pursue your aims in a systematic, disciplined, and thorough manner, and you
  are willing to take your time, advancing slowly and steadily on your way to your
  goal.

  Sometimes you underestimate what is possible, and hold yourself back unnecessarily
  due to a lack of faith or an overly cautious attitude.

  #Patience is the key ingredient to management of change in your life. You have survived
  many previous changes, and your spiritual future will doubtless include some more.
  You make progress in seclusion.

  ~This aspect occurs about every nineteen years, lasts for a considerable period,
  and thus affects large numbers of people born during these times. In general, it
  indicates a period of law and order, and people born under it are pillars of society,
  quietly and nobly ambitious to succeed, but willing to do so only in an orthodox
  and utterly honorable fashion. If you have this aspect you are conventional, orderly,
  proud, aspiring, with a quiet dignity about you that impresses your friends. In
  whatever sphere you may be you are supported and made prosperous and secure to some
  extent.

  If you also have Moon conjunct/sextile/or trine Jupiter, or Sun conjunct/sextile
  or trine Jupiter: You will rise to considerable honor, or even fame, though you
  will have a long apprenticeship to serve before your value and worth are recognized.
  You are eager for recognition but hate notoriety, so your recognition when it comes
  will rest on secure foundations.

  If you also have Mars square or opposition Saturn: You have a swifter rise, more
  aggressive nature, and less certain tenure of public approval.

  If you also have Mars sextile or trine Saturn, or Jupiter sextile or trine Uranus,
  or Jupiter sextile or trine Neptune: There is a probability of wealth.

  This position is somewhat late in bringing its benefits, generally not being felt
  until after the thirtieth year, except in setting the mold of your personality and
  your ambitions; but after this it works steadily on your side. Positions of influence
  are most likely – government, army, ministry, the law. You may be an author, leaving
  your imprint on literature for generations.

  Some Famous People with Jupiter conjunct Saturn: Walt Disney (Jupiter conjunct Saturn
  in Capricorn), Beyonce Knowles (Jupiter conjunct Saturn in Libra), Christina Aguilera
  (Jupiter conjunct Saturn in Libra), Adriana Lima (Jupiter conjunct Saturn in Libra),
  Bruce Lee (Jupiter conjunct Saturn in Taurus), John Lennon (Jupiter conjunct Saturn
  in Taurus), Justin Timberlake (Jupiter conjunct Saturn in Libra), Paris Hilton (Jupiter
  conjunct Saturn in Libra), Ryan Gosling (Jupiter conjunct Saturn in Libra).'
jupiter_saturn_opposition: 'With Jupiter in hard aspect to Saturn in the natal chart,
  you might often swing between faith and doubt or optimism and pessimism. With time,
  effort, patience, and experience, you learn to manage your expectations and moderate
  your tendency to easily become discouraged in the face of obstacles or criticism.

  Watch for a tendency to feel a sense of doom if you’re enjoying yourself “too much”
  or, on the other side, a sense of unbearable boredom if you’re tied to a routine
  for a while. Aiming for moderation and compromise is worthwhile. It can help you
  tremendously to strive for a balanced outlook, with realistic optimism.

  See-sawing between overly optimistic and overly pessimistic options is a stronger
  tendency with the opposition. With Jupiter opposite Saturn, you might also take
  the other side when presented with a positive or negative forecast, leading to much
  indecision.

  You suffer because you remember your failures more than your successes and consequently
  have a hard time developing a picture of yourself as a winner. In this sense you
  were born old. However, this same quality engenders a childish quality in you that
  tends to look for the “quick fix”. Hard work and consistency of effort brings success
  for you just like it does for everyone else. Yes, you need some luck or some breaks,
  but these come from perspective, vision or aim in life. Work to see yourself as
  deserving good things in life, then be willing to put forth honest effort. — Interpretation
  from the InDepth report.

  Jupiter square Saturn: *You have an inner conflict between idealism, hope, and faith
  in the future versus doubt and oppression by limitations and practical realities.
  You need to develop discipline and patience in order to achieve your aspirations.
  You will grow by learning to accept frustration and to persevere in spite of obstacles.

  Jupiter opposition Saturn: *You tend to seesaw between hope, optimism, and faith
  versus doubt and oppression by limitations and practical realities. You need to
  overcome impatience and restlessness in order to achieve your dreams and desires
  for a better life.

  #In all your business and personal dealings you have the capacity for patience.
  You keep one eye on the goal and the other on the moment-to-moment activities that
  lead you forward. You find that while relationships are significant, periods of
  seclusion are needed for you to integrate the spiritual changes you are experiencing.

  Some Famous People with the Jupiter in Hard Aspect to Saturn:

  Squares – Zendaya, Angelina Jolie, Megan Thee Stallion, Monica Bellucci, Elizabeth
  II, Charlize Theron, Cher, Cindy Crawford, Enrique Iglesias, Sigmund Freud;

  Oppositions – Winona Ryder, Snoop Dogg, Azelia Banks, Sting, Brie Larson, Queen
  Latifah, Neil Armstrong.'
jupiter_saturn_sextile: 'With Jupiter sextile Saturn in the birth chart, you are an
  excellent student of life, taking important lessons from your experience and applying
  them to the present. You are able to see both the possible benefits and pitfalls
  of a potential enterprise or venture, and this keeps you from becoming overly optimistic
  or overly pessimistic. You learn from your mistakes – a trait that is not as common
  as one would think!

  You are generous but not unreasonably so, and you are judicious without being too
  strict. Moderation is the beauty of this combination — you instinctively know that
  moderation is the key to happiness and success.

  This is generally considered a fortunate aspect and is one indication of a strong
  ability to put your ideas into action and a good possibility of material success.
  There can be a knack or propensity for law, travel, and history. Qualities of this
  combination that are talents but that can always benefit from extra attention and
  development: patience, realism, practicality, credibility, modesty, and fairness.

  The trine aspect is the more dynamic of the two harmonious aspects. Those with the
  sextile can call upon these traits when needed, and those with the trine between
  the Jupiter and Saturn have incorporated the traits of the aspect into their personalities,
  expressing them naturally and consistently.

  You have an underlying self-confidence that is based on your belief that life will
  give you whatever you want if you are willing to work for it. You see the reasonableness
  in the way that things happen and are willing to invest in yourself. You are very
  industrious, believing that hard work will bring you progress. You have a taste
  for material acquisition but are willing to work for what comes to you. — Interpretation
  from the InDepth report.

  Jupiter trine Saturn: *You have a good balance between idealism, optimism, and vision
  for the future on one hand and a realistic sense of what can actually be achieved
  on the other hand. Your judgment and business sense are usually quite good. You
  possess patience and the ability to accept limitation and frustration on the way
  to your goals.

  Older, more experienced individuals or mentors are likely to play a significant
  and beneficial role in your life.

  Jupiter sextile Saturn: *You have the patience and the stamina to realize your visions
  and bring them down to earth, a fine balance between hard work and realism, and
  a positive, hopeful spirit. You grow through following systems and plans, and taking
  one step at a time. Overnight success or instant enlightenment is not what you aim
  for.

  Your patient, well-balanced approach gives you credibility with many different types
  of people, and you are apt to gain an excellent reputation for being able to do
  big things without overreaching or becoming pretentious.

  #You have the capacity to endure through the daily grind to find something of spiritual
  value in your work and relationships. You are happy to spend time in seclusion,
  studying or meditating.

  Some Famous People with Jupiter in Harmonious Aspect to Saturn:

  Sextiles – Whitney Houston, Catherine Deneuve, Salvador Dali, Aubrey Plaza, Jane
  Fonda, Jim Morrison, Ashton Kutcher, Camila Cabello, Alex R. Hibbert, Karl Marx,
  Lisa Kudrow, Mandy Moore, Diana Ross, John Stamos;

  Trines – Maya Angelou, Bette Davis, Carl Young, Laura Dern, Kurt Cobain, Bruce Willis,
  Grimes, Sophia Loren, Vin Diesel, Leonard Cohen, Angus Young, Cat Stevens, Neil
  Simon, Octavio Paz, Matt LeBlanc, Amy Adams, Sasha Grey, Alyzée Costes, Barbara
  Palvin.

