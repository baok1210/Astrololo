jupiter_pluto_conjunction: 'With Jupiter forming a conjunction to Pluto in the birth
  chart, you are skilled at sniffing out an opportunity. When something ends, you
  instinctively know how to make the best of it and move in a new direction. You always
  seem to see possibilities where others may see only one route or a dead end. You
  will do what it takes to succeed, but you refuse to stoop low or be narrow and petty.

  You quite often take an all-or-nothing approach to life, especially with your ideas,
  beliefs, goals, and ambitions. Your drive to come out on top and win can sometimes
  find you in conflict with others, especially those in authority. While you sometimes
  take things a bit too far, you are generally very good at identifying opportunities
  to grow, expand, and improve. At times, it can be helpful to ask yourself whether
  expansion is necessary–keeping things simple is not always in your vocabulary but
  can sometimes be the better route.

  You express yourself intensely when you’re engaged, and you have strong convictions.
  You may stir up some controversy as a result.

  You can concentrate when necessary, and this is not especially easy for many people!
  When you’re inspired, you can move mountains. You can be quite competent in crisis
  situations. You have inner strength and conviction, and most of this occurs on a
  mental or psychic level.

  You see opportunity in pretty much any situation, but whether or not you are an
  opportunist is something else altogether–seeing and doing are two different things!

  If this combination is challenged in the chart, it’s essential to avoid pushing
  your ideas too hard on others. Things to watch when this aspect is working poorly
  or under strain: too much self-importance, an overly entitled attitude, expecting
  to get something for nothing, or perpetual discontent.

  You’re resourceful and ready to jump on an opportunity or make changes and improvements.
  You’re passionate about their ideas, beliefs, projects, and interests, and you’ll
  readily take the lead in these areas. With your strong convictions, you go all in
  or not at all.'
jupiter_pluto_opposition: 'With Jupiter square Pluto in the birth chart, you have
  big plans and ambitions, and some might say too big at times! You benefit from great
  resourcefulness, and if you can tame your tendency to go overboard, you can do well
  with this trait. You can have an all-or-nothing approach to life.

  This can be one indication of high levels of material success or wealth. You are
  driven and might make important contacts with people who can help you achieve your
  goals. It will be important to watch for compulsive, over-the-top, or know-it-all
  behavior. Power is enticing but should be used wisely. Your drive to control can
  sometimes lead to conflicts with authority.

  Dissatisfaction with your current lot in life can be used as motivation to reach
  higher, but if it’s a perpetual issue (that is, you never feel content with your
  accomplishments), then you might want to ask yourself if expansion is always necessary.
  Take the time to count your smaller blessings and achievements.

  Oppositions – Some examples of people with Jupiter opposition Pluto in their natal
  charts include Mata Hari (Scorpio/Taurus), Morgan Freeman (Capricorn/Cancer), David
  Beckham (Aries/Libra), Adele (Taurus/

  Scorpio), Jack Nicholson (Capricorn/Cancer), Jane Fonda (Aquarius/Cancer), Paul
  Newman (Capricorn/Cancer), Christina Hendricks (Aries/Libra), Steve Carell (Pisces/Virgo),
  Tiger Woods (Aries/Libra), Willow Smith (Gemini/Sagittarius), Lizzo (Taurus/Scorpio),
  Sia Furler (Aries/Libra), and Addison Rae (Gemini/Sagittarius).'
jupiter_pluto_sextile: 'With Jupiter forming a sextile to Pluto in the birth chart,
  you have faith in your ability to effect change and grow, improve, and heal. You’re
  astute, seeing things others don’t as readily perceive, and you value what’s hidden,
  multi-layered, profound, or complicated. You believe in renewal and transformation.

  This aspect improves your ability to plan and organize. You are success- and growth-oriented.
  You believe fully in the ability to improve things, and you might often find yourself
  thinking of what you can make better–what you might grow or advance. Others tend
  to respect you as an authority.

  When you put the effort forth, you can get to the heart or truth of any matter.
  You’re perceptive and an excellent researcher. Investigations are enjoyable for
  you, and the bonus is that you excel at them. You can be determined to get to the
  bottom of issues, and you might seem a little too adamant or obsessed with finding
  the truth to others.

  Ideally, there are other aspects in your chart that point to tolerance and sensitivity
  to balance this out. Suitable careers include legislator, pharmacist, doctor, judge,
  politician, publisher, detective, and scientist. You are particularly suited for
  fields that help others heal from illness, crisis, oppression, or abuse.

  You are talented at handling others’ resources, including talents and money, and
  improving them. Few are as successful as you at creating wealth and developing talents.
  Whatever you do, you tend to take it to the next level. The desire for power, particularly
  behind the scenes, is well-developed.

  You want to make things better, and you’re excellent at doing so, although you may
  not always find it easy to leave something alone! People can have a tough time hiding
  the truth from you.

  Wealth or abundance to you is more about enjoying rich experiences than accumulating
  things.

  Trines – Jamie Bell (Pisces/Scorpio), Tina Turner (Pisces/Leo), Ava Gardner (Scorpio/Cancer),
  Tyra Banks (Aquarius/Libra), Dakota Johnson (Cancer/Scorpio), Aishwarya Rai (Aquarius/Libra),
  Lady Gaga (Pisces/Scorpio), Lenny Kravitz (Taurus/Virgo), RuPaul (Capricorn/Virgo),
  Courteney Cox (Taurus/Virgo), Lil Nas X (Aries/Sagittarius), Finn Wolfhard (Leo/Sagittarius),
  Jenna Ortega (Leo/Sagittarius), and Greta Thunberg (Leo/Sagittarius).

