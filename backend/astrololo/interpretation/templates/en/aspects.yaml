mercury_neptune_square: 'With Mercury in hard aspect to Neptune in your natal chart,
  you might have problems concentrating because your mind is often wandering. Your
  thinking is exceptionally imaginative, intuitive, and creative. Stretching the truth,
  whether done consciously or not (or a bit of both), is associated with this position.

  Bored with anything dull, routine, or lifeless, you often dramatize or connect higher
  meaning to ordinary events and situations. You are often vague in your communications,
  purposefully or not, as you resist being pinned down to any one opinion or stance.
  This is partly due to your ability to see so many different points of view and perspectives.
  Logical, detail-oriented work and studies are not designed for your way of thinking
  and learning.

  Creative presentations, ripe with images and imagery, grab your attention and interest.
  Your style of communication, or possibly thinking, is often self-defeating, and
  you should consciously avoid a tendency to give up on projects or plans before they
  even get off the ground. Planning ahead is not a preference; you prefer to move
  along, running on the fuel of inspiration and intuition.

  Your communication style may be unusual, perhaps with many pauses or digressions.
  You may be deliberately vague or unintentionally so, depending on your nature. Because
  your mind is changeable and you believe in the fluidity of life, being definite
  and concrete doesn’t come naturally. Besides, it’s not always easy for you to express
  and quantify your ideas and ideals. Some of you are great storytellers. You might
  watch for making wild assumptions about others or situations, as your imagination
  can often run ahead of you!

  Sample interpretation from the Merlin report — Your mind is highly imaginative and
  creative and you possess dramatic, artistic, or musical abilities. As a child, you
  enjoyed daydreaming, fantasizing, pretending, and probably lived in “your own little
  world” a good deal. You perceive things which are not obvious to other people and
  you have an uncanny ability to “read” people and situations without being told anything
  about them.

  However, you must learn to discriminate between a true psychic perception and your
  imagination. Learning to discipline and focus your mind is necessary if you wish
  to use all of your creative potential. Otherwise, you could be simply a dreamer.

  Communication with others is difficult for you because you often find words frustrating
  and inadequate to express your experiences and perceptions. Also, you may purposefully
  mystify or deceive others.

  Some Famous People with the Mercury in Hard Aspect to Neptune:

  Squares – Bob Dylan, Jim Morrison, Donald Trump, Jim Bakker, Mae West, Spencer Tracy,
  Tom Snyder, Rich Little, Jack London, Bob Dylan, Justina Machado, Kristine Froseth;

  Oppositions – Bono (U2), Marlene Dietrich, Richard Chamberlain, Florence Henderson,
  Charles De Gaulle, Christian Dior.'
