mars_pluto_conjunction: 'Your ability to commit yourself to a task or goal is tremendous.
  When inspired, you are able to draw upon great stores of strength and determination.
  You can be so single-minded and focused that you readily lose yourself in a particular
  task, possibly to the point of obsession!

  You can be very skilled at investigation and research. Quite automatically, you
  are interested in what motivates and drives others, which can make you a natural
  psychologist. You might find that you constantly challenge yourself to take on more
  and to do more. Aim to watch this tendency if it seems to take over your life, as
  you may never feel satisfied with your accomplishments. Your stamina and endurance
  tend to be stronger than most.

  You don’t take kindly to others’ attempts to bully or push you, and you can be extremely
  stubborn when pushed. You are always especially aware of, and sensitive to, others’
  use of power and authority. Resentment can be a problem and letting things go can
  be very challenging. Your gut reactions are rather intense and emotional in quality.
  As you mature, you are likely to learn that detaching yourself a little helps you
  to be more objective and constructive.

  You might have some fear of your own anger, assertiveness, power, and drive, particularly
  early in life if your intense nature has been misunderstood. You are not always
  forthcoming about your intentions and plans, and you typically strategize well in
  pursuit of a goal rather than go after what you want loudly and directly.

  While this means you can out-maneuver practically anyone, and although your determination
  is admirable, you might watch for a somewhat paranoid tendency to keep your plans
  to yourself if this stems from fear that your intentions will be misunderstood.

  Whether or not you choose to take advantage of others is entirely up to you. There
  is an “all or nothing” quality to your nature. You put your heart into whatever
  you do, and although breaking ties or ending things can be challenging, once you’ve
  done it, there’s no going back.

  You possess a fascinating, alluring, and even commanding aura. You prefer that others
  see you as strong and in control. Allowing trusted people to see your more vulnerable
  qualities can take time.

  Your strong desire to make things happen through your own efforts can bring you
  much success. “What will be, will be” is certainly not your motto. However, this
  same quality can sometimes limit you, as you would benefit from more detachment
  and the discovery that some things can’t–or shouldn’t–happen just now.

  #At some point in your life you may feel that the gods or goddesses step in to impose
  changes on you. What you make of these moments determines your spiritual future.
  Generally, whatever effort you make will be well worth your time.

  Some Famous People with Mars conjunct Pluto: Cher (in Leo), Josephine Baker (in
  Gemini), Emily Dickinson (in Aries), Kobe Bryant (in Libra), Sarah Jessica Parker
  (in Virgo), George Michael (in Virgo), Priyanka Chopra (in Libra), Dane Rudhyar
  (in Gemini), Kevin Kline (in Leo), Sigourney Weaver (in Leo), Ringo Starr (in Leo),
  Yves St. Laurent (in Cancer), Brooke Shields (in Virgo), Boz Scaggs (in Leo), Franklin
  Roosevelt (in Cancer), Paul McCartney (in Leo), Melanie Griffith (in Leo), Natalie
  Wood (in Cancer), Hillary Clinton (in Leo), Zelda Fitzgerald (in Gemini), Tony Curtis
  (in Cancer), Gwyneth Paltrow (Mars in late Virgo, Pluto in early Libra), Olivia
  Rodrigo (in Sagittarius), Shailene Woodley (in Scorpio), Aaron Carter (in Scorpio),
  Jared Padalecki (in Libra).'
mars_pluto_opposition: 'This is a powerful aspect in a natal chart suggesting, in
  your life time, you very often see extremes of behavior and experiences, or go through
  crises more than most. You may be no stranger to violence or abuse. You learn, through
  your experiences, self-control and self-awareness so that you are better equipped
  to deal with these extremes.

  Wonderful to have around in times of crises, you can quickly take the lead and you
  can be undaunted when it comes to defending or helping those you love. Your desires
  are deep, intense, and sometimes troubling.

  At times, you seem to attract strong opposition, perhaps because your own nature
  is rather provocative. You are a natural-born fighter. You can also be quite driven
  to find answers, and you make a good psychologist, analyst, and investigator. Compulsive
  behaviors should be watched carefully, as they can consume you and lead you to risky
  endeavors and difficult scenarios. There can be a strong desire to be in control.

  You have a tendency to impose your will upon others, which can cause severe problems
  for yourself when they react in self-defense. You have a hair-trigger temper and
  may even resort to verbal or physical abuse when upset. Learning to react to unpleasant
  circumstances with your intellect rather than your emotions comes with maturity.
  It’s also possible that you experience many extremes in life, and that you are on
  the receiving end of difficult tempers more than most.

  It is all too easy for you to find something negative about a situation. Avoid issuing
  ultimatums when you meet an obstacle. Instead, find a way to convince others to
  work with you of their own free will. Ordinary life often seems drab and uninteresting
  to you and you must have something that stirs your imagination, some vision or ideal
  or dream to motivate you. You have a strong urge to act out your fantasies or to
  live your dream, and you will DO things that others only talk about or dream about.
  Artistic creation, drama, or other areas in which you can express yourself imaginatively
  are excellent for you.

  You do not easily tolerate a dominating attitude in others. You have a healthy respect
  for power and authority, but only if it is handled fairly.

  This aspect gives you a somewhat Scorpionic attitude toward your lovers, and it
  can modify the traits associated with the sign of your Mars considerably. In other
  words, there is a distinct possessive and demanding streak in your sexual nature.
  Your approach to love and sex can be quite intense at times. Your sexual desire
  nature is a very strong one, and you may even use sex as a bargaining chip in your
  relationships in order to achieve your goals.

  More likely, however, is a very focused and intense sexual nature. This also adds
  a very magnetic quality to your appeal. When someone finds you attractive, it can
  transform into a near obsession! Your aura is strong and somewhat mysterious.

  You tend to come across as stronger than you intend. In fact, some people are intimidated
  by you, and you may not understand why this is so. When you want something (or someone!)
  you are very determined. For you, it can be “all or nothing.” When you are finished
  with something, you leave it behind you and there is no going back.

  You want a deep, soulful attachment on a sexual level. In your love life you do
  not take rejection well. You fear betrayal and abandonment, and this can skew your
  perception of your lover. You have a highly developed sex drive, but you must learn
  to rein in your aggressiveness in this area. Power struggles and control issues
  may surface often in your relationships. — Interpretation from our LoveStyles: About
  Him Report.

  #You perceive the cruel edge in people, and understand its source. As you deal with
  your own ruthlessness, you learn how to respond to it in others without risking
  your physical well-being. Self-confidence develops out of self-control in your interaction
  with others.

  Some Famous People with the Mars in Hard Aspect to Pluto: Squares – Oprah Winfrey,
  Bruce Lee, Nicki Minaj, Drake, Pink, Naomi Campbell, Mel Gibson, Jeremy Irons, Patrick
  Swayze, Dan Levy, Justin Bieber, Muhammad Ali, Courtney Love, Lorde, Antonio Banderas,
  Sophie Turner, Lizzo, Rachel Bilson. Oppositions – Michelangelo, Kirk Douglas, Farrah
  Fawcett, Kirstie Alley, Russell Brand, Ricky Martin, Kesha, Juliette Lewis, Melanie
  Brown, Mary Shelley, Camila Mendes.'
mars_pluto_sextile: "This Mars-Pluto aspect adds a layer of intensity, strategy, and\
  \ resourcefulness to the personality. You are committed, determined, and passionate.\
  \ For you, it’s all or nothing, and you are baffled by–and possibly impatient with–people\
  \ who do things only halfway or half-heartedly. You are usually quite decisive and\
  \ often unwavering once committed.\nCertainly a passionate person, you possess a\
  \ fascinating and commanding aura. You are self-motivated, physical, and generally\
  \ confident in your talents. What sets you apart from others is your easy relationship\
  \ with your subconscious, deeper desires, and ambitions. You’re satisfied most when\
  \ you’re regenerating or transforming yourself or circumstances.\nYou employ strategy\
  \ when going after something, and you are very talented at this, saving time and\
  \ energy. While you are perfectly capable of outwitting others as a natural psychologist,\
  \ whether you take advantage of this skill or not depends much on other factors\
  \ in your natal chart.\nYou’re naturally very resourceful and usually quite persistent\
  \ when pursuing a goal. You are a wonderful person to be around when there’s a crisis–very\
  \ little fazes you, and you’re especially effective when circumstances call for\
  \ a leader. No one can bribe or manipulate you, either. It’s not easy to get one\
  \ past you.\nYou innately understand passion, anger, and complicated desires and\
  \ power dynamics. Generally, you can channel these things well. Your courage is\
  \ also innate–you can draw upon it when needed, especially to stick up for yourself\
  \ or others or to do what’s required in order to carry on. More readily than most,\
  \ you’ll get your hands dirty if absolutely necessary. People can count on you not\
  \ only in times of crisis or problems but also for unquestioned support for embarrassing\
  \ or complex matters.\nWhen motivated, you’re determined and focused. You have staying\
  \ power! What’s under the surface of things, hidden, buried, or misunderstood intrigues\
  \ you. A natural detective and strategist, you don’t always follow a straight line.\
  \ You are uncomfortable with things done halfway or half-heartedly.\nIn relationships,\
  \ you seek depth, rawness, ecstasy, passion, and intensity. Superficial connections\
  \ are of little interest to you. This aspect in your natal chart boosts your personal\
  \ appeal and magnetism.\nThe trine aspect is the more dynamic of the two harmonious\
  \ aspects. Those with the sextile can call upon these traits when needed, and those\
  \ with the trine between the Mars and Pluto have incorporated the traits of the\
  \ aspect into their personalities, expressing them naturally and consistently.\n\
  Mars sextile Pluto or Mars trine Pluto: *You dream up creative solutions to problems\
  \ and take an imaginative, unusual approach to getting a job done. When difficulties\
  \ arise you prefer to avoid conflict and confrontation in favor of more peaceful\
  \ or subtle methods of resolving problems. Working to help others or for a cause\
  \ that transcends your own narrow, personal interests is satisfying for you. You\
  \ have an artistic flair and appreciate the colorful, unique, or strange.\n#You\
  \ are capable of applying tremendous effort to anything you attempt. The spiritual\
  \ lesson is to learn moderation. Moderation often means acting like one of the pack\
  \ instead of always being the leader.\nSome Famous People with Mars in Harmonious\
