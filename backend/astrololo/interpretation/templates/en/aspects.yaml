mercury_venus_conjunction: 'You are charming and gracious, poetic in your self-expression,
  and usually very polite. This position brings refinement to the nature and an appreciation
  for the arts. You aim to balance and bring harmony to your world. You can be, at
  times, quite indecisive, as you tend to see everyone’s point of view, and can see
  value in almost any perspective or opinion. You have a strong sense of fairness.

  You are very agreeable and enjoy socializing. Some with this aspect are a little
  on the lazy side, preferring to socialize than work.

  You might intellectualize or rationalize your feelings, perhaps thinking a little
  too much about love and relationship to the point that you lose touch with how you
  truly feel. You might be attracted to, or attract, intellectual sorts as partners.
  If this conjunction is challenged, you might frequently attract partners who are
  tricky or conniving.

  Many of you are talented at writing and/or speaking. You thoroughly enjoy the written
  and spoken word, literature, wordplay, puns, and enlightening conversations. Many
  with Mercury conjunct Venus in their charts are downright eloquent.

  While most people like you, your ability to tune in to the person with whom you
  are currently speaking to is so strong that you might be accused of being two-faced
  or superficial. You might also choose your words carefully in order to avoid conflict,
  and others might not know how you truly feel as a result.

  Interpretation from our LoveStyles Report: Mercury conjunct Venus

  You get along with most people and are usually willing to make compromises in relationships
  to maintain harmony. That doesn’t mean you become a doormat for others, but you
  have a strong sense of fairness and do not offend others without just cause. Others
  are seldom threatened or intimidated by you, largely because of your affable nature
  and social grace. You are willing to listen to anyone’s opinions and suggestions
  before making major decisions.

  Direct competition may be uncomfortable for you, and you may feel more at ease working
  with a small group of people. Perhaps you enjoy public speaking or performing in
  the dramatic arts. Another possible source of satisfaction for you would be writing,
  because of your natural talent for expressing yourself well. You have an imaginative
  mind and are clever at cooking up schemes to improve your economic situation. It
  is not difficult for you to turn your many creative ideas into ready cash.

  Others will usually support you in what you do because they can see that you exercise
  good judgment. They can believe in you and are glad to pitch in to help you succeed.
  Just be sure you don’t ask anyone else to take risks you yourself wouldn’t attempt.
  Actually, any chances that you take will be well considered and are probably not
  that risky after all.

  In love relationships, you have a talent for communicating your needs and desires
  to your partner. You are attracted to people who share your artistic talents or
  at least an appreciation of the arts. The worst possible mate for you would be one
  who is socially uncouth. In sex you have a healthy open attitude and can discuss
  the subject rather easily with your partner. Verbal expression during sex can be
  very stimulating for you! A lover who doesn’t communicate or who is quiet in bed
  may not be very satisfying for you in the long haul.

