mercury_saturn_conjunction: 'With Mercury conjunct Saturn in your natal chart, you
  are of a serious mind. Your mind immediately sees the practical side of a situation.
  You naturally arrange, sort, quantify, and organize information. Rarely do you overlook
  the details.

  Always ready to work for desired results, you are often very methodical in your
  approach to learning, studying, and both sharing and processing information. You
  prefer lists and clear steps, instructions, and explanations. Frequently, you put
  things into precise order, sometimes getting stuck on specific details or facts
  to get them right before moving ahead. With this tendency, you often draw your conclusions,
  formulate your plans, and communicate your messages more slowly and thoughtfully
  than others as you focus on getting things right.

  Because you’re so practical-minded and serious in thought, you may not readily believe
  in your creativity or imagination. Connecting with these elements of your personality
  can take effort, maturity, and experience. While you can believe in your mental
  abilities, you may not have grown up with reinforcement on these lines, and building
  confidence also takes work.

  You can be a master of your particular trade. You are an excellent advisor, guide,
  or teacher, as you take what you relay or teach quite seriously. Accuracy and efficiency
  are critical to you. Your morals are strong, and you can be quite principled, conscientious,
  exacting, diligent, and reliable. Your communications are notably rather controlled
  or guarded. For example, as you aim to be very clear, you might review something
  you write repeatedly before releasing or publishing it, even casual comments.

  More than most, you need some solitude, quiet, space, and an environment where you
  can focus and concentrate to work, study, or produce. Due to an innate skepticism,
  there can be some tendency or troubles with depression or loneliness. Light banter
  or social niceties can make you feel uncomfortable or unnatural. With time and maturity,
  you may learn to relax your expectations or standards for yourself and allow for
  more spontaneity and less inhibition with self-expression. Interestingly, in youth,
  you may feel more comfortable conversing with adults due to your mature thinking,
  but you feel less constrained as you age.

  This aspect gives a distinct cautious side to your personality on a mental or intellectual
  level: you don’t jump into new personal interests, as you rarely take new endeavors
  lightly. Similarly, you take your time drawing conclusions. However, once engaged
  and committed to a topic, you tend to explore and learn it in-depth, and you can
  talk at length about it! Watch for too strong of a tendency to self-justify, as
  this can limit or weaken you. The mind is stubborn and a bit resistant but also
  thorough, profound, and determined.

  In your communications, you might often come across as stern, serious, critical,
  discerning, dry, or clinical, whether or not you intend to be. In truth, you’re
  also factual, reliable, and responsible. You help others to see things realistically.

  You could sometimes suffer from feelings of doom, as you fear being taken off guard
  and prefer to be prepared for the worst. You approach new endeavors or information
  with caution, reluctance, and skepticism.

  Studies, learning, and mental efforts can be slow but sure, developing over time.
  You don’t always get the breaks or help others seem to receive, and you work hard
  for what you achieve. As such, you can be proud of what you do and produce–for good
  reason! You might take making mistakes much more seriously than others, finding
  it quite mortifying. As you mature, you learn not to be as hard on yourself.

  Mercury in hard aspect to Saturn: Saturn connected to a personal planet in hard
  aspect has a censoring effect on the planet involved. With Mercury in hard aspect
  to Saturn, whatever the person says and writes is self-censored to some degree.

  It’s hard for these people to pour out their emotions, no matter how emotional or
  needy they feel on the inside. This is because they are always aware of what others
  might think of them with what they say. They are not necessarily deliberate talkers
  or thinkers. In other words, they don’t always pick and choose their words carefully
  or speak slowly. However, they are careful with what they reveal to others. They
  make plenty of disclaimers, and often come across as negative or sarcastic without
  intending to.

  These are people who review conversations they’ve had with others, and who often
  kick themselves for saying something they didn’t intend to, or for not saying something
  witty. Saturn tends to have a hobbling effect, and when it’s attached to the planet
  of communication in hard aspect, there can be some feelings of insecurity about
  how we speak and communicate in general.

  These people tend to worry about what they’ve said and how they could have said
  it better. Some older astrology texts suggest that there can be learning disorders
  or “slowness” with this aspect, but this is rarely the case. In fact, many people
  with this aspect are very strong academically. The flow of their communication is
  blocked in some manner, however, and this is due to an automatic “self-censoring”
  tendency.

  Self-consciousness and hypersensitivity is experienced with regards to their intelligence
  and ability to get ideas across to others, especially in youth. These people need
  plenty of positive feedback from others in order to feel more confident and less
  “blocked”.

  If you have this aspect in your chart, recognize that you are most likely harder
  on yourself about how you communicate than others are. Ask people close to you for
  an objective point of view. Chances are, they find you to be astute, intelligent,
  and an effective speaker or writer.

  We often tell our kids “don’t worry about what others think,” but telling this to
  a person with a hard Saturn aspects is not enough, nor is it realistic. They will
  worry. Instead, I have found that the best way to handle difficult Saturn aspects
  is to get objective feedback from others! Mercury-Saturn people don’t accept compliments
  whole-heartedly, yet they crave them and need them. Others around them tend to stop
  complimenting them, feeling that they either don’t need compliments or don’t want
  to hear them. Nothing can be further than the truth!

  Mercury/Saturn aspects indicate intellectual discipline, a serious outlook, good
  powers of concentration, and a knack for logical reasoning. You don’t take things
  for granted, and you generally need empirical evidence to overcome your native skepticism.
  Not content with superficial understanding, you prefer to study subjects in depth.
  Some with this aspect prefer to work alone or in a quiet setting. Mathematical ability
  and a knack for working with figures are often present.

  Your work habits are careful, tenacious, methodical, and industrious. You are probably
  quite organized, hard working, and proficient at dealing with rules, regulations,
  fine points, and details. Writers with this aspect are typically masters of grammar
  and style. There is frequently great ambition, self-control, and a willingness to
  labor hard and long to achieve your goals. Others view you as honest, prudent, diligent,
  and cautious. This aspect is common in the charts of teachers, military leaders,
  and politicians.

  If this conjunction forms stressful aspects with other planets, it can indicate
  lack of self-confidence, unwillingness to admit mistakes, and a proneness to depression.
  Children may have problems learning and difficulties in school. You may suffer hardships
  in your life that lead you to become cunning, bitter, cynical, callous, narrow-minded,
  or hard-hearted toward others. Shyness or social awkwardness is often present, and
  the tension associated with the aspect commonly manifests as acid indigestion. 
  — Interpretation from our Career report.

  Some Famous People with Mercury conjunct Saturn: Nelson Mandela (Mercury conjunct
  Saturn in Leo), Edgar Cayce (Mercury conjunct Saturn in Pisces), Vanessa Hudgens
  (Mercury conjunct Saturn in Capricorn), Tina Fey (Mercury conjunct Saturn in Taurus),
