  not enjoy this fact, but if this is the case, they must examine their lives a little
  more closely. Consider a person who thinks to himself, “hey, my life has become
  pretty routine–even boring” and then shortly thereafter his life takes a sharp turn.
  The crises that he now faces may not seem like something he has literally asked
  for. However, with the Moon in hard aspect to Uranus, the basic energy is a basic
  need for emotional excitement. We may live with this basic need and not even recognize
  it. If we don’t own it, we can attract upsetting emotional situations and disruptions
  into our lives.

  It’s hard to know whether Moon-Uranus people embrace changes (these ones move house
  often, re-arrange their homes frequently, mix up their domestic routines every once
  in a while, and so forth) or resist them stubbornly. One thing is certain, however:
  the happiest people with this natal chart aspect recognize their need to do things
  differently with regards to how they approach family and home life.

  You tend to be emotionally impulsive and instinctual. Your early upbringing may
  have been unusual in some manner, and possibly a tad unstable. This is not to say
  that you are unstable–just that your early experiences with home, family, and nurturing
  had some erratic quality that left an impression on you. Some people with this aspect
  moved frequently when they were young. Others had a mother or caregiver who marched
  to the beat of a different drummer. As a result, there is an inner dichotomy at
  work: you crave emotional intimacy, yet your need for independence is just as strong.

  Your desire to be cared for and your need for emotional independence are at odds
  with one another. This may not be as apparent to you as it is to others who you
  are close with. The key to this challenging aspect is integration. While you are
  young, you may struggle with this dichotomy, and you may need to do so in order
  to achieve some sort of understanding and inner peace later in life.

  Perhaps much of your life, you struggle with routines and the “humdrum”. When life
  becomes too routine, you rebel. Emotional excitement is important to you, and if
  you are not aware of this, you attract emotional upheavals in your life. This can
  be very upsetting to you, but you must learn why you are attracting these upheavals
  in the first place. You do not feel “ordinary”, and do not want to live your life
  in an “ordinary” manner. If you are attracting upsetting emotional situations in
  your life, it may be because you are not looking for a healthy outlet for your need
  for emotional excitement.

  You are an intensely creative and inventive person, but your creative expression
  may be erratic and irregular. You have spurts of energy and creativity that come
  in flashes. You have a hard time producing much of anything when you are called
  upon to do so, preferring to produce only when your spirit is ignited, not by some
  enforced schedule. Your domestic life may be somewhat irregular or unusual to outsiders.
  Self-discipline is somewhat lacking, mainly due to this inner need to be in tune
  with your spirit and a general resistance to being imposed upon.

  Women with this aspect (from the Astrology Profile for Women report): Your Moon
  is in opposition aspect to Uranus, adding a high level of unpredictability to your
  emotional nature and a need for personal independence. You need excitement, change
  and distraction, but at levels you can tolerate without totally disrupting your
  life. You may also be more comfortable when you’re independent, instead of being
  tied to a set schedule, a certain role or a particular list of demands.

  As an independent woman, you are more likely to tolerate commitments. If you’re
  expected or demanded to do certain things, you may just rebel for the sake of rebellion.
  After all, you’re an individual! There may be other planetary aspects in your chart
  which add a level of focus and stability to your life, but this influence alone
  can disrupt even the best laid plans! At the level of your soul you cry out to be
  seen and accepted for who you are, unconditionally. That acceptance must first come
  from within yourself.

  This influence also indicates the possibility of higher than normal fluctuations
  in hormonal levels, which can also stimulate more profound emotional changeability.
  Those who are close to you probably recognize a cyclical level to your alterations
  in mood, and you can probably tie them to a cycle yourself if you pay attention.
  You may or may not decide to choose motherhood as an option, and may be more comfortable
  in non-traditional relationships.

  To maintain a relationship you need plenty of room to be yourself. And to be the
  kind of mother you want to be, you need to develop a supportive relationship with
  your children which has some levels of consistency. You may relate to teen-agers
  more easily than to small children.

  Moon sextile or trine Uranus

  Preferring to live in an open and accepting manner, you encourage others to “be
  themselves” with an attitude that anything goes and a fondness for the unusual and
  unconventional. As a parent, you may be quite open with your children, and encouraging
  the same in them. You aim to be friends with them. In fact, you are like this with
  most people you meet–you treat others as equals regardless of their status or position.
  You detest stuffiness, showiness, and pretense, and you will often do or say something
  that will break others out of an overly serious frame of mind. You are spontaneous,
  funny, perceptive, and a little quirky.

  The trine aspect is the more dynamic of the two harmonious aspects. Those with the
  sextile can call upon these traits when needed, and those with the trine between
  the Moon and Uranus have incorporated the traits of the aspect into their personalities,
  expressing them naturally and consistently.

  Moon sextile Uranus: You act on unique and experimental thoughts. You are humanitarian
  and freedom oriented in the way you explore life. You have a knack for improving
  your surroundings. — Interpretation from the In Depth Profile Report.

  Moon trine Uranus: You take bold steps in your approach to everyday problems. This
  gives your personality a sparkle and excitement that others love and respond to.
  You know how to make excitement out of everyday activities, as you search out new
  methods for performing routine activities. — Interpretation from the In Depth Profile
  Report.

