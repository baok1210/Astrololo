  After all, you’re an individual! There may be other planetary aspects in your chart
  which add a level of focus and stability to your life, but this influence alone
  can disrupt even the best laid plans! At the level of your soul you cry out to be
  seen and accepted for who you are, unconditionally. That acceptance must first come
  from within yourself.

  This influence also indicates the possibility of higher than normal fluctuations
  in hormonal levels, which can also stimulate more profound emotional changeability.
  Those who are close to you probably recognize a cyclical level to your alterations
  in mood, and you can probably tie them to a cycle yourself if you pay attention.
  You may or may not decide to choose motherhood as an option, and may be more comfortable
  in non-traditional relationships.

  To maintain a relationship you need plenty of room to be yourself. And to be the
  kind of mother you want to be, you need to develop a supportive relationship with
  your children which has some levels of consistency. You may relate to teen-agers
  more easily than to small children.

  Moon sextile or trine Uranus

  Preferring to live in an open and accepting manner, you encourage others to “be
  themselves” with an attitude that anything goes and a fondness for the unusual and
  unconventional. As a parent, you may be quite open with your children, and encouraging
  the same in them. You aim to be friends with them. In fact, you are like this with
  most people you meet–you treat others as equals regardless of their status or position.
  You detest stuffiness, showiness, and pretense, and you will often do or say something
  that will break others out of an overly serious frame of mind. You are spontaneous,
  funny, perceptive, and a little quirky.

  The trine aspect is the more dynamic of the two harmonious aspects. Those with the
  sextile can call upon these traits when needed, and those with the trine between
  the Moon and Uranus have incorporated the traits of the aspect into their personalities,
  expressing them naturally and consistently.

  Moon sextile Uranus: You act on unique and experimental thoughts. You are humanitarian
  and freedom oriented in the way you explore life. You have a knack for improving
  your surroundings. — Interpretation from the In Depth Profile Report.

  Moon trine Uranus: You take bold steps in your approach to everyday problems. This
  gives your personality a sparkle and excitement that others love and respond to.
  You know how to make excitement out of everyday activities, as you search out new
  methods for performing routine activities. — Interpretation from the In Depth Profile
  Report.

