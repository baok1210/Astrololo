jupiter_uranus_conjunction: 'With Jupiter forming a conjunction to Uranus in the birth
  chart, you naturally connect with your intuition and trust your visions, often acting
  on inspiration. Instinctually welcoming change and innovation, you want to improve,
  grow, and develop. New methods and innovations intrigue you, and you have faith
  in the future.

  You enjoy being a step ahead of others with your ideas, projects, or knowledge–and
  you often naturally are. You also prefer to explore life spontaneously. You can
  be rather averse to instruction or direction, as you want to leave some room for
  discovery and exploration.

  You are quick to imagine possibilities where others see dead ends, and your optimism
  is commendable. Authenticity means everything to you, and your sincerity and openness
  are distinctive.

  This aspect helps you detach from traditions or customs that feel restrictive. Your
  ideas, beliefs, worldview, and opinions are unconventional.

  It can be extremely challenging for you to accept restrictions, preferring the freedom
  to be spontaneous. You instinctively know that there are multiple, diverse paths
  and viewpoints that are valid. Look for other factors in the chart that could help
  with follow-through and concentration.

  Some Famous People with Jupiter conjunct Uranus: Rene Descartes (in Aries), Hedy
  Lamarr (in Aquarius), Annie Lennox (in Cancer), Denzel Washington (in Cancer), Paul
  Rudd (Virgo/Libra), Jennifer Aniston (in Libra), Mariah Carey (in Libra), Michael
  Schumacher (in Libra), Donald Glover (in Sagittarius), Amy Winehouse (in Sagittarius),
  Henry Cavill (in Sagittarius), Miranda Kerr (in Sagittarius), Jennifer Lopez (in
  Libra), Camilla Cabello (in Aquarius), Brendan Fraser (in Libra), Norman Reedus
  (in Libra), Dave Grohl (in Libra), Bob Dylan (in Taurus), Maite Perroni (in Sagittarius),
  Javier Bardem (in Libra), Donatella Versace (in Cancer), Neil Simon (in Aries),
  Scott Bakula (in Cancer), Chaz Bono (in Libra).

  With Jupiter forming a square to Uranus in the birth chart, you gravitate toward
  activities and ideas that inspire and excite you. New and original ideas can be
  attractive, and you might frequently pin your hopes on new endeavors. You might
  watch for a tendency to enjoy shiny new things just because they’re different. Your
  ideas can be fabulous, but you may lose interest in them over time or if they’ve
  become routine.

  Ideally, you have other indicators in your chart that help with follow-through and
  persistence, as this aspect if examined in isolation suggests some potential problems
  with attention span. You may sometimes rebel against not only others’ plans, but
  your own best-laid plans.

  You have great optimism about what you can take on, but it’s best to avoid taking
  on so much that you spread yourself too thin. Aim for self-discipline with projects
  and pursuits. Life is certainly more exciting when you don’t prepare, but it can
  cripple your chances of success if you don’t always do the groundwork.

  With Jupiter opposition Uranus in the birth chart, there is a bit of a risk-taker
  in you — a part of you that is attracted to high-risk situations or long shots.
  Whether or not you can control these impulses depends on other factors in your chart.

  You have a fantastic ability to entertain many different possibilities in life that
  others don’t always see. You are certainly attracted to new and improved products
  and methods. You may have difficulty sticking with your new ideas and pursuits,
  as you tend to enjoy innovating far more than practical application. Watch for bursts
  of impatience with rules and abrupt displays of independence, as you tend to build
  up frustration with restrictions until you explode.

  Some Famous People with the Jupiter in Hard Aspect to Uranus:

  Squares – Marlon Brando, James Dean, Sean Connery, Brooke Shields, Portia de Rossi,
  Niall Horan, Jamie Lee Curtis, Jenna Marbles, George Orwell, Megan Fox, Robin Williams,
  Lindsay Lohan, Kesha, Rose Byrne, Andi Osho.

  Oppositions – Taylor Swift (Cancer/Capricorn), Katharine Hepburn (Cancer/Capricorn),
  Machine Gun Kelly (Cancer/Capricorn), Philip Mountbatten (Virgo/Pisces), Stevie
  Nicks (Sagittarius/Gemini), Grace Jones (Sagittarius/Gemini), Alice Cooper (Sagittarius/Gemini),
  Prince Charles (Sagittarius/Gemini), Jon Bon Jovi (Aquarius/Virgo), Albert Einstein
  (Aquarius/Virgo), Jodie Foster (Pisces/Virgo), Demi Moore (Pisces/Virgo).

  With Jupiter forming a sextile to Uranus in the birth chart, you have faith in the
  future, trust your visions, and welcome change and innovation if you expect it will
  improve your life. New methods and innovations intrigue you.

  You enjoy being a step ahead of others with your ideas, projects, or knowledge.
  You also prefer to explore life rather spontaneously. Although you’re not averse
  to some instruction or direction, you want to leave some room for discovery and
  exploration.

  You are quick to imagine possibilities where others see dead ends, and your optimism
  is commendable. Your sincerity and openness are distinctive.

  This aspect helps you detach from traditions or customs that feel restrictive. Your
  ideas, beliefs, worldview, and opinions are somewhat unconventional.

  With Jupiter forming a trine to Uranus in your birth chart, very little escapes
  your attention regarding potential opportunities or possibilities! You know how
  to turn around almost any situation. Your intuition is powerful and serves you well.
  In fact, you often work on sudden hunches and moments of flash inspiration.

  This aspect lends some good fortune with spontaneity to your life and personality,
  even if your chart has a cautious tone. You have a strong sense of what may happen
  down the road, helping you to remain optimistic in most situations. You have a love
  of invention, or you can be quite inventive yourself.

  You have basic respect for the individual, and you advocate for freedom of speech
  and thought. Your perspective or belief system is unusual and unique. You need freedom
  and space to think, invent, and follow your own path. You can benefit significantly
  from activities that celebrate life, such as dancing, and you believe that laughter
  and celebration are the best forms of refreshment.

  Your spirit of discovery is powerful and often attracts good fortune. You are not
  tied to tradition and convention as much as most. Being able to move on when it’s
  right for you is a gift, although there are times when an unsentimental approach
  can alienate certain others. Your friends can be a very diverse group.

  Some Famous People with Jupiter in Harmonious Aspect to Uranus: Sextiles – Lana
  Del Rey, Halle Berry, Jessica Alba, Robert DeNiro, Coco Chanel;

  Trines – Selena Gomez, Zac Efron, Elizabeth Taylor, Louis Tomlinson, Sylvester Stallone,
