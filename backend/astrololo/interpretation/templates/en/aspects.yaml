mars_neptune_conjunction: 'With Mars and Neptune conjunct in your birth chart, you
  very often act on instinct or impulse, preferring to connect with your intuition
  to inform a course of action. At the same time, you may believe strongly in fate.
  You’re highly unique, original, intriguing, and appealing.

  People don’t always understand you, which can work for and against you, depending
  on the situation. It can sometimes be tempting to go along with someone’s image
  of you–you don’t want to let them down–but it can lead to some complications. In
  fact, you might often gravitate to the more complex or convoluted path.

  Expressing anger or your desires can also be complex for you. Your energy levels
  are quite variable, as you seem to be fueled by inspiration.

  This aspect on its own is an aspect of a pacifist. Your approach to pursuing your
  desires is gentle. Never one to step on others to achieve your goals, you’re a healer
  who’d rather help others. You’re magnetic, clairvoyant, and discreet, usually able
  to keep your motives or desires hidden.

  When you want to be, you can be extremely persuasive and possibly manipulative,
  depending on other aspects in the chart.

  You have powerful wisdom and idealism and often have (or seek) a higher mission/cause,
  feeling extraordinary or exceptional. You’re attracted to odd people and situations.

  From the Love Styles report: Your approach to the world is unusual, indirect, and
  even roundabout with Mars in conjunction to Neptune. You have an easy, likable charm,
  and this can be your downfall if you’re not careful! In youth, you might find that
  you attach yourself to the image that others have created for you–the good guy,
  the easygoing person, the nice guy.

  As you go along, you might discover that it’s easy to get out of sticky situations
  with this image in place, and you might resort to lies and tricks in order to come
  out looking good and “smelling like roses.”

  Another problem is that lies or tall tales are easy for you–your imagination is
  tremendous, your fantasy life is rich, and you somehow are likable enough to get
  away with deceit. The challenge in your life should be to either live up to the
  image of the good guy, or to break free from it in small ways in order to avoid
  getting caught up in a web of deception.

  You tend to act impulsively and yet you don’t always take complete responsibility
  for your actions! It is difficult for you to plan ahead, and therefore your judgment
  is sometimes cloudy. This leaves much in your life to chance, or fate, and makes
  it difficult for you to have total control over your life. Learn to look very carefully
  before you leap and to examine every situation from a realistic point of view.

  Because you have a magnetic personality, others are drawn to you and seek the pleasure
  of your company. Your active imagination is fascinating and inspiring to others.
  In love relationships you may suffer repeated disappointments until you learn to
  see your partner more realistically. You tend to look at loved ones through rose-colored
  glasses, seeing only the parts of their personality that you want to see. This may
  seem quite pleasant at the time, but it also sets you up for future disappointment
  when your loved one cannot live up to your idealistic expectations.

  Even if you are astute about most people and situations, when you are personally
  involved it can be hard to see clearly. By all means, be sure to deal with others
  honestly and to demand that they do so in return. Be cautious in choosing whom you
  will confide in and be sure to keep your friends’ confidences to yourself as well.

  It is advised with this aspect that you deal with drugs (prescription and otherwise)
  with great caution. Take good care of your health; you are more prone to infection
  than others, and practicing safe sex will be especially important for you. You are
  more a lover than a fighter, you have rich fantasies, and you are a most sensitive
  and imaginative lover. Your ‘ideal partner makes you feel completely special, and
  doesn’t bring past lovers into conversations in your bed. — Interpretation from
  our LoveStyles Report.

  Some Famous People with Mars conjunct Neptune: William Blake (Mars conjunct Neptune
  in Leo), Napoleon Bonaparte (in Virgo), Sylvia Browne (in Virgo), Carol Burnett
  (in Virgo), Albert Camus (in Cancer), Ludwika Paleta (in Sagittarius), Bill Clinton
  (in Libra), Morgan Fairchild (in Libra), Peter Gabriel (in Libra), John Gray (in
  Libra), Robert Guillaume (in Virgo), Quincy Jones (in Virgo), Evel Knievel (in Virgo),
  Michael Landon (in Virgo), Janet Leigh (in Leo), Vivian Leigh (in Cancer), John
  Lennon (Mars in early Libra conjunct Neptune in late Virgo), John Malkovich (in
  Libra), Howie Mandel (in Scorpio), Jayne Mansfield (in Virgo), Charles Manson (in
  Virgo), Yoko Ono (in Virgo), Carl Sagan (in Virgo), Erik Satie (in Aries), Cybill
  Shepherd (in Libra), Mark Spitz (in Libra), Booboo Stewart (in Capricorn), Florence
  Pugh (in Capricorn), Richard Strauss (in Aries), Marc Maron (in Scorpio).'
mars_neptune_opposition: 'This is a challenging position, as you have difficulty trusting
  in your ability to go after things that you want in a direct manner. It may also
  be that you have difficulty pinpointing what it is that you want, or that part of
  you doesn’t feel you deserve it due to a basic lack of self-confidence. You fear
  rejection as well as criticism, and often use roundabout means to go after what
  you want.

  Your imagination is so powerful that it can be hard to trust your instincts. You
  easily imagine things going wrong, just as you easily fantasize about good things!
  Your desire nature is strong yet also very suggestible. You’re attracted to mysteries
  and intrigue. Sexual experimentation is likely, as you are forever addicted to sensuality
  and unusual or perhaps even what many would consider perverted sexual scenarios.

  However, your sensual appetite might be much like a bottomless pit, and you could
  find yourself forever in a state of wanting more, tiring of regular sexual scenarios
  quickly, and endlessly searching for the next sensation. If an addiction to fantasy
  is present, you can find yourself constantly chasing a new and more complicated
  fantasy. It is only when you get into touch with your heart and discover your true
  desires that you realize that sensations are merely sensations–not deeply satisfying
  or fulfilling.

  Fears of sexual inadequacy can be great with this position, and you may either deny
  yourself as a result, or overcompensate, seeking out experiences in which you are
  pretty much assured positive feedback. Some of you will experience both of these
  extremes in your lifetime. I have a client with this position who has a “trophy”
  wife, and she often denies him, and even belittles him, on a sexual level. He accepts
  this but “gets her back” behind her back, having serial affairs with women who are
  not considered as attractive for whatever reason and with whom he attempts to reclaim
  his power.

  One of the interesting things about this position is that if you are involved in
  immoral activities, guilt has a way of cropping up in unusual ways, and could lead
  you on a self-destructive path–and you might even know that you’re heading that
  way, yet you compulsively follow that path. Part of you might want to get caught!
  You might, for example, know in your mind that doing something is risky, yet you
  compulsively do it anyhow, perhaps even finding the challenge invigorating.

  Although you can be very creative at keeping your motives and personal agenda hidden–in
  fact, many of you seem on the surface of things to be quite gentle and yielding–you
  might eventually become resentful if you feel the need to resort to sneakiness in
  order to get what you want out of life. This is one of the things that has struck
  me as the most common characteristics of Mars-Neptune people. It’s not that they
  don’t get angry or show that anger.

  However, many will give in to another’s desires more often than not, yet become
  resentful of that person who seems to have control over them. Some will give up
  their power to a partner, for example, often taking the role as the one who gives
  in or gives up things in order to make the other happy. However, resentment for
  this builds, and while people with harmonious Mars-Neptune aspects more easily yield
  to others without anger for doing so, those with hard Mars-Neptune aspects are more
  likely to feel stepped upon, and to retaliate in covert ways.

  If you do feel resentment for giving up your power to someone else, learn to avoid
  giving it up unless you truly understand that you are doing it for yourself, and
  not for someone else. Resentments have a way of building and distorting themselves
  into ugly matter if you don’t deal with them properly and directly. You are often
  passive-aggressive in your approach to others, and this can cause a lot of problems
  in your life.

  You are usually found chasing a dream… or a fantasy. The former is probably the
  better path.

  Somehow, others are bound to eventually sense that you are not to be trusted, and
  this is often for good reason! You may not like to admit this to yourself, as you
  may have built excuses for your deceptive or sneaky behavior. However, adopting
  a more direct and assertive approach to life is something that you should be working
  towards. You will need to get over your feelings of guilt when you do adopt this
  approach. Learning to take responsibility for your actions, and to avoid blaming
  others for failures, is important.

  At your worst, you can be disorganized in your approach to life, easily procrastinating
  and lacking follow-through when you do begin a task. Some of the most important
  lessons you need to learn in life are self-control, self-assertion, and trust in
  yourself. At your best, you are a creative person with a powerful imagination and
  great stores of compassion.

  Your attempts to assert yourself often result in turmoil for you and/or for others.
  You tend to swing from one extreme to the other–asserting your needs powerfully
  at times and at others slipping into a state of total apathy. Passive-aggressiveness
  can be a problem in your life. Ordinary life often seems drab and uninteresting
  to you and you must have something that stirs your imagination, some vision or ideal
  or dream to motivate you.

  You have a strong urge to act out your fantasies or to live your dream, and you
  will DO things that others only talk about or dream about. Artistic creation, drama,
  or other areas in which you can express yourself imaginatively are excellent for
  you. You tend to either overestimate or underestimate your own power and abilities.

  You may lead a somewhat sexually repressed life although your sexual needs are significant.
  You could suffer from anxieties regarding your sexuality (probably carried over
  from parental conditioning around sex) and therefore find it difficult to find satisfaction
  in this area. However, this tends to change as you mature. As you overcome the urge
  to indulge in momentary physical pleasures, you build the capacity for spiritual
  ecstasy.

  You may be attracted to persons who are unavailable, perhaps because they are already
  married or simply hard to reach. Sometimes you find it more convenient to see your
  lover as you wish her to be rather than as she really is. You may find that you
  lower your standards when choosing a lover and end up with someone who is interested
  in you primarily for sex, or that the relationship is largely unfulfilling.

  Disappointments in love may be frequent, although this is also something that improves
  with age! You are an extremely imaginative lover, and you frequently engage in fanciful
  and intricate fantasies. This may sometimes interfere with “real life”, but if you
  channel this energy well, it can most certainly improve your sex life. Your imagination
  is powerful, but it can also get the best of you. You may imagine complex scenarios
  and get yourself all riled up about what your partner may have done when she wasn’t
  around! — Interpretation from our LoveStyles Report.

  Some Famous People with the Mars in Hard Aspect to Neptune:

  Squares – Betty White, Ben Affleck, James Barber, Erma Bombeck, Jimmy Buffet, Charles
  Baudelaire, Barbara Bush, Sandra Dee, Melissa Etheridge, Britney Spears, Tori Spelling,
  Zoe Kravitz, Millie Bobby Brown, Demi Moore, Eddie Fisher, Jodie Foster, Conan O’Brien,
  Diana Ross, Rod Stewart, Patti Smith, Andy Warhol, Sharon Tate, Barbra Streisand,
  Zac Efron, Niall Horan, Dua Lipa, Vanessa Hudgens, Dakota Johnson, Naya Rivera,
  Amirah Vann;

  Oppositions – Frida Kahlo, Paula Abdul, Alan Alda, Maya Angelou, Jim Bakker, Truman
  Capote, Johnny Cash, Rita Coolidge, Terry Fox, Katharine Hepburn, Tommy Hilfiger,
  Jimmy Hoffa, Steve McQueen, Joe Namath, Burt Reynolds, George Segal, Elizabeth Taylor,
  Alicia Witt, Tiger Woods, Steve Jobs, Zayn Malik, Zendaya, Lenny Kravitz, Iggy Pop,
  Rose Byrne.'
mars_neptune_sextile: 'With Mars in harmonious aspect to Neptune, you have a powerful
  sense of mystery, nuance, and drama. You’re intriguing and magnetic–people want
  to know more about you, and you leave a lasting impression on others.

  You seek a life mission, or you naturally gravitate to one! Fundamentally sensitive
  and romantic, you see all the layers of a situation and won’t draw rigid conclusions.
  In fact, vibes are everything to you. Even if many other factors in your chart favor
  the intellect, this Mars-Neptune aspect indicates a powerful reliance on instincts
  and intuition. You naturally feel out situations. Spiritual sustenance is essential
  to you in virtually any pursuit.

  You can be very persuasive and inspiring, as well. Others want to do things for
  you, and it’s easy to enjoy! You visualize what you want and often find yourself
  attracting it. You’re idealistic, believing in the dream. Taking after or benefiting
  from a parent can be marked with this position. You can be artistically talented
  and notably creative.

  Your methods are rarely straightforward–the route to fulfilling your desires is
  often meandering, creative, and unique. Because you appreciate the unusual, you
  attract out-of-the-ordinary experiences into your life. You can be a healer with
  a gentle but powerful touch. Your senses work overtime. Working on inspiration as
  your fuel, you are capable of much when you’re motivated. However, you’re not one
  who would step over others to achieve.

  Note on the differences between trines and sextiles: The trine aspect is the more
  dynamic of the two harmonious aspects. Those with the sextile can call upon these
  traits when needed, and those with the trine between the Mars and Neptune have incorporated
  the traits of the aspect into their personalities, expressing them naturally and
  consistently.

  You have a good understanding of the “give and take” of life and are sensitive to
  the needs of others. Anything that will benefit society as a whole has your approval.
  You would find satisfaction in a career that allows you to touch the lives of others.

  You are a romantic at heart and very sensitive in love. You must have honesty in
  your relationships and will accept nothing less. You are able to see through others
  to their real motivations, so insincerity is not easy to hide from you. Sometimes
  you can communicate with your lover without words, through expressions, gestures
  or “vibes.”

  You have strong emotional as well as physical needs, but your partner must also
  be refined and respectable. You seem to simply “know” things on a sexual level,
  which makes you an especially good lover. You pick up even the subtlest of nuances,
  and this intuitive understanding and “soft touch” is extremely attractive to many
  women.

  Your instinctive ability to be at the right place at the right time assists you
  greatly in life. This inherent spirituality can express itself well through the
  arts as well. Sexual fantasies are especially strong. In your life, you may become
  attracted to spiritual forms of sexuality, such as Tao and Tantra.  — Interpretation
  from our LoveStyles About Him Report.

  Mars trine Neptune

  You are highly perceptive and can detect insincerity or dishonesty in others. Because
  you are kind and sympathetic, others come to you with their problems and you always
  have a patient ear. You have the ability to balance your needs for both spiritual
  growth and physical achievement and can usually manage to do both simultaneously.

  Others find you magnetic, charming and very sociable. You prefer an uncomplicated
  yet stimulating love life and are a warm and tender lover. You are honest and sincere
  with loved ones, although you are quick to cut ties if you feel that interest is
  declining. The flush of romantic love may fade, but your former lovers will always
  respect you. You can inspire your lover and bring much joy into her life.

  You have a good understanding of the “give and take” of life and are sensitive to
  the needs of others. You are a romantic at heart and very sensitive in love. You
  must have honesty in your relationships and will accept nothing less. You are able
  to see through others to their real motivations, so insincerity is not easy to hide
  from you. Sometimes you can communicate with your lover without words, through expressions,
  gestures or “vibes.”

  You have strong emotional as well as physical needs, but your partner must also
  be refined and respectable. You seem to simply “know” things on a sexual level,
  which makes you an especially good lover. You pick up even the subtlest of nuances,
  and this intuitive understanding and “soft touch” is extremely attractive to many
  women.

  Your instinctive ability to be at the right place at the right time assists you
  greatly in life. This inherent spirituality can express itself well through the
  arts as well. Sexual fantasies are especially strong. In your life, you may become
  attracted to spiritual forms of sexuality, such as Tao and Tantra.  — Interpretation
  from our LoveStyles About Him Report.

