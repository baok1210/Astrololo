  not enjoy this fact, but if this is the case, they must examine their lives a little
  more closely. Consider a person who thinks to himself, “hey, my life has become
  pretty routine–even boring” and then shortly thereafter his life takes a sharp turn.
  The crises that he now faces may not seem like something he has literally asked
  for. However, with the Moon in hard aspect to Uranus, the basic energy is a basic
  need for emotional excitement. We may live with this basic need and not even recognize
  it. If we don’t own it, we can attract upsetting emotional situations and disruptions
  into our lives.

