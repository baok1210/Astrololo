mercury_pluto_conjunction: 'You are capable of great focus and depth of thought, as
  well as concentration. You easily become serious and pensive. Determined and sometimes
  exhaustive effort is a strength, and depth of perception as well. However, sometimes
  your desire to turn ideas inside out can work against you, to the point of obsession,
  suspicion, and mistrust. You are a born skeptic of anything that appears superficial
  or overly straightforward.

  You always look for a hidden meaning, desiring to get to the bottom line, and with
  people, to lay bare motivation. You are intellectually fascinated with all that
  is hidden, taboo, secret, or suppressed. While it’s often a subtle thing, you can
  be provocative in your communications. You can also be sarcastic and cutting.

  You can be so determined to find answers, or even to convert others to your frame
  of mind, that you end up wasting energy beating a dead horse. You are excellent
  at developing strategies and can be very clever and cunning, although this is essentially
  on an intellectual level — manipulation is more an intellectual exercise rather
  than something coming from the heart. Of course, it is up to you how to use your
  abilities. You enjoy a good mystery to solve, clever plot twists, and darker art
  forms.

  You have a powerful and stubborn mind. You are a great researcher and a good detective.
  This doesn’t always help in your personal life. Others may find you too suspicious,
  too challenging, or too secretive. You are always mulling things over inside of
  yourself. You live in a sea of mental symbolism.

  You respond to implications and inferences rather than to people, circumstances
  and events. You have a special knack for mathematics, symbolic logic, computers,
  biology, and meditation. At times your mind will overload and you seem to do a reversal,
  overlooking the simplest details that others take for granted. Get rest and learn
  when to stop and start. – Interpretation sample from the In-Depth Profile report.

  Some Famous People with Mercury conjunct Pluto:

  Charles Darwin (Mercury conjunct Pluto in Pisces), Tchaikovsky (Mercury conjunct
  Pluto in Aries), Franz Schubert (Mercury conjunct Pluto in Aquarius), Harry S. Truman
  (Mercury conjunct Pluto in Gemini), Angela Bassett (Mercury conjunct Pluto in Virgo),
  Sylvester Stallone (Mercury conjunct Pluto in Leo), Della Reese (Mercury conjunct
  Pluto in Cancer), River Phoenix (Mercury conjunct Pluto in Virgo), Stanley Kubrick
  (Mercury conjunct Pluto in Cancer), Whitney Houston (Mercury conjunct Pluto in Virgo),
  Elizabeth Barrett Browning (Mercury conjunct Pluto in Pisces, also conjunct Mars),
  Miley Cyrus (Mercury conjunct Pluto in Scorpio), Kareena Kapoor (Mercury conjunct
  Pluto in Sagittarius), Bon Scott (Mercury conjunct Pluto in Leo), Keanu Reeves (Mercury
  conjunct Pluto in Virgo), Steve Carell (Mercury conjunct Pluto in Virgo).'
mercury_pluto_opposition: 'You are so perceptive and you dig so deep for answers that
  you can sometimes be your own worst enemy. As a result, you might find ulterior
  motives or dark intent where there is none, and your suspicious, provocative attitude
  can cause some problems in your personal life, particularly if it reaches the level
  of paranoia. Not many people enjoy being second-guessed all the time, yet that is
  something that you are inclined to do, and a tendency that should be kept in check
  in your dealings with others.

  However, your determination to get to the bottom of any matter, to rip away falsehoods
  and expose true motives, can be used for good if you employ it in your work, for
  example, which can involve investigation and research, psychology, or revealing
  and perhaps dark creative arts.

  You can be insatiably curious about all that is hidden, taboo, repressed, or secret.
  You have a great love of debate, but should be careful that you don’t overpower
  others with your strong opinions, attempting to “convert” them to your frame of
  mind, or treat regular debate or exchanges of opinion as battlegrounds.

  Many of you do learn to harness your intense mental energy and apply it productively.
  You are capable of very hard work and effort.

  Interpretation sample from the In-Depth Profile report — You are bright and insightful
  but the very strength and depth of your vision can mislead you. In consequence,
  you get in your own way a lot. The magnitude of a project can intimidate you so
  that you don’t even embark on it. You are a perfectionist and compulsive. You fear
  being judged by others as inadequate and this quality has you afraid to act.

  Of course, you do overcome this many times in your day to day life, but it goes
  smoother for you when you stop attributing negative motives to those around you.
  You are able to do this when you feel better about yourself. Periods of meditation
  and contemplation are necessary to get to know yourself.

  Some Famous People with the Mercury in Hard Aspect to Pluto:

  Squares – Hank Williams, Brigitte Bardot, Bjork, Bo Derek, Cloris Leachman, Sydney
  Sweeney, George Lucas, Mickey Rooney, Franklin D. Roosevelt, Lee Iacocca, D. H.
  Lawrence, Harry Styles, Selena Gomez;

  Oppositions – Oprah Winfrey, Boris Yeltsin, Elvis Presley, Shaquille O’Neal, Kurt
  Cobain, Janis Joplin, Azealia Banks, Charlotte Rampling, Rosie O’Donnell, John McEnroe.'
mercury_pluto_sextile: 'With Mercury in harmony with Pluto, you naturally seek truths,
  looking for the hidden layers and zoning in on core meanings. Your mind is deep,
  thoughtful, thorough, and investigative.

  You’re incredibly perceptive and resourceful. When you need it, you can successfully
  draw upon your ability to focus, concentrate, diagnose, and discern matters intelligently.

  Highly observant, you quickly grasp a situation, but you’re also inclined to investigate
  things fully, preferring not to jump to conclusions or miss anything important.
  You’re crafty, persuasive, subtle, skeptical, and critical. Not content with superficial
  explanations, you approach learning and special topics deeply.

  People take great interest in your insights, ideas, and viewpoints. Even so, when
  young, you may have felt your interests and mindset were far different than those
  of other kids. With maturity and experience, your unique mind will likely be seen
  as valuable.

  Leave it to you to solve a complex problem or mystery! You’re strategic in your
  thinking and communicating.

  Interpretation sample from the In-Depth Profile report — You go to the origin of
  a problem once you start working on it. You communicate with a quick, soft-spoken
  force that others pick up on magnetically. You have both broad range and depth of
  interest.

  You are very versatile and make a great problem solver. Your mind is naturally interested
  in security issues which can run the gambit from ordinary cops and robber stuff,
  to high tech computer theft, national security, and the international monetary fund.

  To fully use your skills you should spend time analyzing your motives. Do a thorough
  investigation as to your own beliefs about the meaning of life. Once you have these
  issues resolved, you will not feel as secretive and your mental energy will be freer.

  The trine aspect is the more dynamic of the two harmonious aspects. Those with the
  sextile can call upon these traits when needed, and those with the trine between
  the Mercury and Pluto have incorporated the traits of the aspect into their personalities,
  expressing them naturally and consistently.

  Some Famous People with Mercury in Harmonious Aspect to Pluto:

  Sextiles – Princess Diana, Zendaya, Demi Moore, Alyssa Milano, Blake Lively, Bernie
  Sanders, RuPaul, Stephen King, Nelly Furtado, Lili Reinhart, Helen Keller, Bruce
  Springsteen, Tatum O’Neal, Peter Lynch, Amelia Earhart, Troy Aikman;

  Trines – Drew Barrymore, Danny DeVito, Kesha, Lenny Kravitz, Johann Sebastian Bach,
  Michael B. Jordan, Brad Pitt, Larry Bird, Bridget Fonda, Crispin Glover, Jean Harlow,
  Larry King, Moliere, Ralph Nader, Sylvia Plath, Alicia Keys, Phoebe Tonkin, Ed Harris.

