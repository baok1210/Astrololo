mercury_saturn_opposition: 'Saturn connected to a personal planet in hard aspect has
  a censoring effect on the planet involved. With Mercury in hard aspect to Saturn,
  whatever the person says and writes is self-censored to some degree.

  It’s hard for these people to pour out their emotions, no matter how emotional or
  needy they feel on the inside. This is because they are always aware of what others
  might think of them with what they say. They are not necessarily deliberate talkers
  or thinkers. In other words, they don’t always pick and choose their words carefully
  or speak slowly. However, they are careful with what they reveal to others.

  They make plenty of disclaimers, and often come across as negative or sarcastic
  without intending to. These are people who review conversations they’ve had with
  others, and who often kick themselves for saying something they didn’t intend to,
  or for not saying something witty.

  Saturn tends to have a hobbling effect, and when it’s attached to the planet of
  communication in hard aspect, there can be some feelings of insecurity about how
  we speak and communicate in general. These people tend to worry about what they’ve
  said and how they could have said it better.

  Some older astrology texts suggest that there can be learning disorders or “slowness”
  with this aspect, but this is rarely the case. In fact, many people with this aspect
  are very strong academically. The flow of their communication is blocked in some
  manner, however, and this is due to an automatic “self-censoring” tendency. Self-consciousness
  and hypersensitivity is experienced with regards to their intelligence and ability
  to get ideas across to others, especially in youth. These people need plenty of
  positive feedback from others in order to feel more confident and less “blocked”.

  If you have this aspect in your chart, recognize that you are most likely harder
  on yourself about how you communicate than others are. Ask people close to you for
  an objective point of view. Chances are, they find you to be astute, intelligent,
  and an effective speaker or writer. We often tell our kids “don’t worry about what
  others think”, but telling this to a person with a hard Saturn aspects is not enough,
  nor is it realistic. They will worry. Instead, I have found that the best way to
  handle difficult Saturn aspects is to get objective feedback from others!

  Mercury-Saturn people don’t accept compliments whole-heartedly, yet they crave them
  and need them. Others around them tend to stop complimenting them, feeling that
  they either don’t need compliments or don’t want to hear them. Nothing can be further
  than the truth!

  Mercury opposition Saturn

  Your intellectual capabilities are well developed, and you can accomplish anything
  that you set your mind to. You are likely to possess academic “smarts” and writing
  ability. In some ways you are a loner. This is likely because your greatest feelings
  of security arise from a job well done.

  Be sure to exercise caution in entering into contracts. Don’t overlook the important
  details that can boomerang against you later. It may be best to hire an attorney
  or other advisor to help you with these tasks. You might find that you are the victim
  of “red tape”, mix-ups, and communication problems more than most.

  You sometimes come across as more stern or harsh than you actually are! There is
  likely to be a negative or sarcastic style to your speech that you may not always
  be aware of, but that others pick up quickly. You will find that others often misunderstand
  your intentions rather easily, or that you misrepresent yourself unwittingly. You
  often kick yourself for saying (or, more often, not saying) something after a conversation
  is over. — Interpretation from our LoveStyles Report.

  Some Famous People with the Mercury in Hard Aspect to Saturn:

  Squares – Isaac Newton, Salvador Dali, J.R.R. Tolkien, Maya Angelou, Benjamin Franklin,
  Hermann Hesse, Sheena Easton, Kevin Kline, Adriana Lima, Priyanka Chopra, John Legend,
  James Gandolfini, Amy Poehler, Eliza Dushku, Ian Somerhalder, Jada Pinkett Smith,
  Will Ferrell, Matt LeBlanc, Joan Jett, Thalía, Tyrese Gibson;

  Oppositions – Rembrandt, Hans Christian Andersen, Steven Seagal, Kurt Russell, Tiger
  Woods, Robert Redford, Patrick Duffy, Zendaya, Selena Gomez, Keke Palmer, Charlie
  Hunnam, Lisa Kudrow, Phoebe Tonkin, Eve Hewson, Llewellyn George, Teri Garr.'
mercury_saturn_sextile: 'Your mind is well-disciplined when it needs to be, and you
  possess strong powers of organization and orderliness. You are good at detail work.
  With Mercury in harmony with Saturn in your natal chart, you are a person who says
  what you mean and means what you say, and you can be baffled by, or impatient with,
  those who don’t.

  You are very trustworthy and reliable, showing up on time for appointments due to
  basic respect for others and for schedules and orderliness. Certainly, you make
  a loyal friend.

  You are capable of exceptionally clear and realistic thinking. Making plans comes
  naturally to you–you consider consequences and possible scenarios before arriving
  at a decision or embarking on something entirely new. You are somewhat of a doubting
  Thomas, and you don’t naturally jump up and down with excitement about new ideas
  or plans. Your conversations may, at times, be spare but to the point.

  The trine aspect is the more dynamic of the two harmonious aspects. Those with the
  sextile can call upon these traits when needed, and those with the trine between
  the Mercury and Saturn have incorporated the traits of the aspect into their personalities,
  expressing them naturally and consistently.

  Some Famous People with Mercury in Harmonious Aspect to Saturn:

  Sextiles – Ella Fitzgerald, Edgar Allan Poe, Edgar J. Hoover, Paul Newman, Grace
  Jones, Venus Williams, Olivia Newton-John, Carmen Electra, Rita Hayworth, John Krasinski,
  Priscilla Presley, Martha Stewart, Pierre Trudeau, Cameron Diaz, Charles III, Grimes,
  Jennifer Garner, Rob Zombie;

  Trines – Wilem Dafoe, Sally Field, Sinéad O’Connor, Betty White, Taraji P. Henson,
  Jason Segel, Tchaikovsky, Ed McMahon, Raquel Welch, Robert Urich, Jennifer Lawrence,
  Aaliyah, Janis Joplin, Aubrey Plaza, Kelly Ripa, Kamala Harris, Mitski, Zooey Deschanel,
  Portia de Rossi.

