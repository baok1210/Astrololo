  Cole Sprouse, Dylan Sprouse, Julia Stiles, Tonya Harding, Wesley Snipes, Dax Shepard,
  Stephenie Meyer, Brent Faiyaz, Sridevi, Tisha Campbell, Bob Saget, Amandla Stenberg,
  and Kurt Russell.

  See also Sun square Saturn and Sun opposition Saturn pages.'
