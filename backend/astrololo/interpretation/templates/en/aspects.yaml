  in work or in your personal relationships, you can be highly expressive of your
  opinions and feelings, and appreciate the same honesty and expressivity from others.

  There is a healing quality about you which may draw others into your life who are
  seeking support and understanding. As a mother you can be deeply connected to your
  children and may even find that their friends come to you for your sincere understanding
  and insight. In your intimate relationship with a partner, your passion can be immense,
  and you may experience a level of unity and bonding which completely transforms
  your life. Since you’re not likely to do anything halfway, you usually take the
  time to be discriminating in your choices. Leaving yourself vulnerable is simply
