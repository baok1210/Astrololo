mars_sun_conjunction: 'It’s difficult to be indifferent towards people with Sun conjunct
  Mars in their natal charts. They have presence. There is a courageous air about
  them, and they exude confidence even if they don’t own it! If they’re not highly
  active and energetic people, they are most certainly confrontational. They get right
  to the point, go right for the jugular, and they make things happen. You might call
  them impatient, but not in a nervous sense of the word–they simply can’t wait around
  for something to happen. They want something, and they want it now.

  These people have a competitive spirit. They like to win. Channeled into sports
  and games, they make formidable opponents, although sports that require strategy
  may not be their forte, simply because they are apt to apply force to get to their
  goals. If not channeled this way, they make formidable business opponents.

  Because we are combining two masculine planets, people with this aspect might be
  considered masculine in expression, regardless of their gender. In love, they like
  to be the ones who do the pursuing. They love the thrill of the chase, but they
  might tire easily once they have “conquered”. If you don’t really like them, no
  problem. They take that as a dare.'
mars_sun_opposition: 'There is an unmistakable competitiveness and a “me-first” attitude
  with those who have Sun square or opposition Mars in their natal charts. The fighter
  persona is most apparent in youth, when the child is described as a “bundle of energy”,
  or it is remarked that he or she “can’t sit still”. The abundant energy generated
  by the hard aspects (especially the square) between the Sun and Mars is hard to
  direct in childhood. Later in life, ideally, those with these aspects have learned
  to channel some of their excess energy into productive avenues–perhaps through career,
  sports, or any area where competitiveness is considered an asset.

  Nevertheless, people with these aspects can meet up with more than their share of
  conflict, and they can most certainly rub people the wrong way. They are very motivated
  to get things done, to take action rather than simply talk about something, and
  to get from point A to point B as quickly as possible. Those who know them quite
  well might describe these people as hot-headed and temperamental at times. They
  are easily frustrated, and they’re given to impulsive actions and assertion of their
  wills.

  If the aspect is found in cardinal signs, it gives impulsiveness and a short temper.
  If the aspect is found in fixed signs, the natives can be very hard-headed and willful.
  If it’s in mutable signs, it gives a restless and frustrated impatience.

  Essentially, those with Sun square Mars in their charts have faced conflict and
  are not particularly afraid of it. They have faced having their need to assert themselves
  blocked. Their parents may have done as much as they could to “tame” what they felt
  was excess energy or aggression. In other words, they know all about conflict and
  blockages, so that when they are faced with a challenge or a roadblock, they don’t
  run away from it or hide under the covers feeling sorry for themselves. They meet
  challenges head-on.'
mars_sun_sextile: 'People born with flowing aspects between the Sun and Mars are generally
  enterprising. They have powerful stores of energy that they can draw upon when needed.
  These people respond to problems or challenges with a spirited and enthusiastic
  confidence that is admirable. They are naturally competitive, and this trait is
  generally well-received by others simply because it is unforced, unaffected, and
  sincere.

  These people truly believe in fair play, and they seem to be in love with life.
  When they are expressing competitiveness and courage, it’s easy to smile and accept
  these traits as positive rather than being rubbed the wrong way. These people generally
  have good physical vitality.

  It is interesting to note that these people are not naturally combative. Many enjoy
  sports or games that are competitive, but not violent. Breaking the rules of a competitive
  game is particularly upsetting to those with Sun in easy aspect to Mars.

  This is largely due to the fact that the will (Sun) is connected to the desire nature
  (Mars) in a pleasing manner, so that the natives are more able than most to control
  their desires, aggressions, and instincts. They know how to be fair, and they expect
  others to be fair. As such, sneaky behaviors, uncontrolled impulses, violence, and
  rage are offensive to them. They know how to direct and control their own impulses
  and desire natures, and they fully expect others to be able to do so!

  The main difference between the sextile and trine of the Sun and Mars: The trine
  is a more natural energy. Those with Sun trine Mars naturally and without thought
  are courageous and enterprising. Those with Sun sextile Mars have the opportunity
  to draw upon their courageous and enterprising spirit, but effort is required to
  pull these energies out of themselves and apply these energies in their lives.

  With the trine, the characteristics of Sun-Mars come so naturally that the natives
  may not even realize just how much endurance, confidence, and enthusiasm they possess.
  Because the sextile requires some effort and thought, those with Sun sextile Mars
  often have many creative tools at their disposal, and they can be effective strategists
  and leaders.

  Trines:- Zoë Kravitz (Sun trine Mars), Robert Pattinson (Sun trine Mars), Jennifer
  Lopez (Sun trine Mars), Abraham Lincoln (Sun trine Mars), Edith Piaf (Sun trine
  Mars), Zoë Kravitz (Sun trine Mars), Johann Sebastian Bach (Sun trine Mars), Madison
  Beer (Sun trine Mars), Stevie Wonder (Sun trine Mars), David Gilmour (Sun trine
  Mars), Warren Beatty (Sun trine Mars), Charles Darwin (Sun trine Mars), Richard
  Wagner (Sun trine Mars), Jayne Mansfield (Sun trine Mars), Hermann Hesse (Sun trine
  Mars), David Navarro (Sun trine Mars) Roch Voisin (Sun trine Mars), Angela Davis
  (Sun trine Mars), Ted Danson (Sun trine Mars), Carol Burnett (Sun trine Mars).

