mars_saturn_conjunction: 'Mars conjunct Saturn is a determined, gritty, and realistic
  combination. People with this aspect in their charts prefer to plan ahead, organize,
  and stay on top of things. They’re intelligent and sometimes sarcastic. Workaholic
  tendencies can be in play, but they do learn to pace themselves with time. Not inclined
  to rush things, people with a Mars-Saturn conjunction know that good things take
  time to build and develop.

  Mars-Saturn is responsible, realistic, hard-working, and reasonable. They make excellent
  managers and organizers. They’re not afraid of repetitive work. They can be quite
  naturally reserved, but if outgoing, they are known for their wit. This is largely
  due to some insecurities or fears related to asserting themselves, body ego issues,
  and other such struggles in youth. Managing these things comes more readily with
  time and age. In fact, they develop tremendous self-reliance.

  Endurance is their forte! Mars-Saturn is persistent and, while their realism can
  bring them down at times, they’re good at picking themselves up and carrying on.
  It’s true they might underestimate their capabilities. However, they’ll give it
  their all once they take on an endeavor. They’re not very spontaneous or obviously
  enthusiastic, naturally tempering their reactions with realism.

  Mars-Saturn people should probably watch for building resentment because others
  expect too much of them or rely on them to pick up their pieces. They are harder
  on themselves than most people. Their sense of responsibility is mighty. Expressing
  vulnerability isn’t always easy.

  People with a Mars-Saturn alignment in their natal charts are not only exceptionally
  aware of the limits of time, they also see their own limits more clearly than most.
  They have strong survival instincts and are practical. While others may give up
  at the first or second obstacle, people with a Mars-Saturn conjunction expect ups
  and downs. They’re enduring and learn patience.

  You hold yourself back in life and though you are kind and very patient with others,
  your timing can be poor and it stops you from getting what you think you want in
  life. You are always trying to reform your desires and when you assert a want, a
  fear surfaces simultaneously. You give up many times, just when the world would
  have given you what you were asking for. You will think about a project and start
  it one minute too late to accomplish it.

  The difficulty with this aspect of your character is very slow to change. When it
  does change it is because you overcome your fears and your unbalancing desires.
  To the degree that this is accomplished you will achieve security in life. You should
  get strenuous physical exercise at least three times a week in order to have your
  energy work evenly and to be in good health. — Interpretation sample from the In Depth report.

  *You are very serious about reaching your goals and feel that keeping your nose
  to the grindstone is the only way to do it. Hard work, persistent effort, and concentration
  upon a single objective are the ways you achieve your aims in life. You exercise
  great self-control, even self-denial, in order to accomplish what you desire. You
  meet obstacles stoically and will struggle patiently through difficult circumstances.
  You feel that you must rely on yourself alone, that it’s all on your shoulders,
  and you can be a harsh disciplinarian, expecting far too much from yourself and
  others.

  Often you hold yourself back, doubting your own power and ability. You may feel
  that you meet great resistance whenever you try to assert yourself or take initiative,
  and that is very frustrating to you. However, you have the power of endurance and
  a dogged determination to overcome all obstacles.

  #Generally you feel that endings and beginnings are the pits. When you see the end
  coming you resist, and when you feel some new idea about to take hold, you resist.
  Your life of resistance prevents you from the rate of progress you deserve, and
  you need to lighten up.

  Some Famous People with Mars conjunct Saturn: Henry Winkler, Venus Williams (in
  Virgo), Aubrey Plaza (in Scorpio), Pierre Trudeau, Dick Van Dyke, Nikki Glaser (in
  Scorpio), John Saul, Dolly Parton (in Cancer), Nostradamus, Margaret Mead, Naomi
  Judd, Al Gore, Ellen De Generes (in Sagittarius), Sammy Davis Jr., Geena Davis,
  Roger Daltrey, Billy Crystal, Ted Knight, Birgundi Baker (in Aquarius), Steven Tyler
  (in Leo, both retrograde), Victoria Beckham (in Gemini), Rihanna (Mars in late Sagittarius,
  Saturn in early Capricorn), Cindy Crawford (in Pisces), Jessica Biel (in Libra),
  Paris Jackson (in Aries), Élodie Frégé (in Libra), David Gilmour (in Cancer), Amirah
  Vann (in Virgo).'
mars_saturn_opposition: 'With Mars square or opposite Saturn in the natal chart, there
  can often be a feeling that desires are denied or blocked. The challenge is to temper,
  moderate, and control one’s energy, anger, and desire nature more smoothly.

  People with this aspect can be determined to achieve their goals, and they’ll work
  hard for them. However, it can be difficult for them to pace themselves or choose
  the right time to push ahead, especially in their youth. Over time and with maturity,
  they learn more strategies to moderate their energy. Before then, going hard at
  the wrong times can produce some real ups and downs.

  In relationships, timing can often be a problem. They may come on too strong or
  retreat or withdraw at all the wrong times. Getting this right is a challenge. Blowing
  hot and cold can be a frustrating theme. Insecurities and self-defeating tendencies
  can be a struggle. Mars-Saturn people can take on too much or shoulder far too much
  responsibility. They can often feel imposed upon. Treating themselves and others
  with patience and grace is an important strategy.

  People with Mars in hard aspect to Saturn can feel they face more obstacles than
  most to achieve their desires and goals. They can have strong compulsions to bow
  out of their pursuits, but doing so can lead to further struggles. They should probably
  examine whether these urges are self-sabotaging. Oppressive circumstances in early
  childhood may be behind this.

  They should also watch for taking unnecessary risks. Somewhat accident-prone, they
  may have more scrapes and bruises than average. Physical issues often relate to
  overstraining. They can become so absorbed in a pursuit that they ignore their need
  to rest or take a break from it. Difficulties with authority figures can be a theme.
  Getting something started or deciding on a definite course of action can often be
  a struggle–because Mars-Saturn people take their actions and plans so seriously,
  settling on them can be a heavy, drawn-out affair!

  Dealing with anger, resentment, and self-assertion can be a struggle at times, and
  people who don’t know the Mars-Saturn person’s full story could sometimes see them
  as harsh, unfeeling, or insensitive. Of course, this image can further work against
  them.

  People with Mars square Saturn or Mars opposition Saturn in their natal charts have
  a strong sense of duty, even if they sometimes feel overwhelmed by it! Over time,
  they learn to assert themselves and pursue their desires with discipline and moderation.
  Achieving their goals can sometimes be complicated or lengthy, but it comes with
  great rewards.

  A major key to managing this Mars-Saturn aspect well lies in accepting and working
  with their limits on physical and desire levels. Tempering the desire to be in total
  control is also important, as relaxing this compulsion can reduce stress.

  “You are a perfectionist. You can pick at yourself and others unmercifully, trying
  to get circumstances in your life to match some unspecified standard. Your energy
  becomes freer to work in an unencumbered way when you recognize that you aren’t
  really looking to match an objective standard at all. What you want is to find some
  emotionally and psychologically defendable ground to stand on.

  The real trick in life for you is to keep moving. This is not easy since you should
  really only move ahead on a project after forethought or planning; your judgments
  tend to be colored by your fears or your momentary desires. You work very hard for
  what comes to you. This is unavoidable. But, you could end up working very hard
  for no gain. This is avoidable through balancing your drives with your responsibilities.
  You find that you have better health and much freer energy if you get vigorous physical
  exercise at least three times a week. “– Interpretation sample from the In Depth report.

  Mars square Saturn or Mars opposition Saturn: *You work hard and patiently to achieve
  your objectives, persevering and continuing on in spite of difficulties and discouragement.
  Concentrating on a single, clearly defined goal, you are able to accomplish much,
  but you often feel that the way is long and arduous, and that you must struggle
  on alone, that it’s all on your shoulders.

  You are capable of great self-control and self-denial and can be a hard task master,
  expecting far too much of yourself. You also tend to hold yourself back, to doubt
  your own power and ability. You feel that you meet with great resistance whenever
  you try to assert yourself or take initiative. Anger and frustration can be big
  problems for you, especially when you try to work with other people or depend too
  much on others for support. You work best in solitude.

  #Your involvement with other people often focuses on the harshest side of human
  experience. You become aware of destructive energies around you and learn to overcome
  these difficulties. Your spiritual life can become the source of nearly inexhaustible
  energy. You face tests through separation.

  Some Famous People with the Mars in Hard Aspect to Saturn: Squares – Susan Sarandon,
  Ella Fitzgerald, Claudia Schiffer, River Phoenix, Margot Robbie, Charlie Chaplin,
  Conor McGregor, Kevin Hart, Jacob Latimore, Phil Hartman, Jane Austen, Julius Caesar;
  Oppositions – Sheena Easton, Farrah Fawcett, Brooke Shields, Darryl Hannah, Martin
  Luther King, George Clooney, Todd Bridges, Jean-Claude Van Damme, Ariana Grande,
  Dennis Rodman, Robert Downey Jr., Marc Thiercelin, Trent Reznor, Sarah Jessica Parker,
  RuPaul, Azealia Banks, Isa Briones.'
mars_saturn_sextile: "People who have Mars in easy aspect to Saturn in their birth\
  \ charts are builders and workhorses. They’re reliable, determined, and resourceful.\
  \ This aspect adds more self-discipline to the personality.\nWhen they need it,\
  \ they can draw on great strength, resistance, ability, and patience. People with\
  \ Mars-Saturn trines and sextiles pour their energy and talents into overcoming\
  \ obstacles. They often do their best when given some solitude, privacy, or independence.\
  \ But just because they do well working on their own doesn’t mean they can’t cooperate\
  \ reasonably with others–they can. Mars-Saturn people are respectful of others’\
  \ boundaries and rules. However, they prefer to have control of their projects and\
  \ pursuits.\nThere’s a certain toughness, reserve, or strictness to the personality.\
  \ It may not be dominant, but it’s there! They’re persistent, enduring, obstinate,\
  \ and calculating as they consider and plan for all possible consequences. When\
  \ necessary, they can temporarily mute their desires to work for the better good\
  \ or toward their future security.\nWhile they may not necessarily be popular (other\
  \ aspects tell that story), they’re usually respected. This aspect highlights well-laid\
  \ plans, shrewdness, seriousness when working, and powerful resistance. After a\
  \ setback, they get right back up again and carry on. Their success story can be\
  \ slow but steady. Their enthusiasm is often tempered, as Mars-Saturn people are\
  \ realistic, seeking balance and exercising moderation. They tend to conserve their\
  \ energy for priorities, and they have an exceptional sense of their limits.\nYou\
  \ know how to get to your goals in life by steady, patient, and persistent progress.\
  \ You have good, practical overviews of the final result of your efforts. You are\
  \ good at planning a strategy and sticking to it. You build your projects and your\
  \ life with bedrock security in mind, with as little risk as possible. Discipline,\
  \ patience, hard work, and the blessing of good judgment work together to form a\
  \ picture that looks like “luck” to others. — Interpretation sample from the In Depth report.\n\
  The trine aspect is the more dynamic of the two harmonious aspects. Those with the\
  \ sextile can call upon these traits when needed, and those with the trine between\
  \ the Mars and Saturn have incorporated the traits of the aspect into their personalities,\
  \ expressing them naturally and consistently.\nMars sextile Saturn or Mars trine\
  \ Saturn: *You possess the gifts of endurance and perseverance, the willingness\
  \ to work hard and seriously to achieve your objectives. Once you decide you want\
  \ something or make a commitment, you’ll do it “even if it takes forever”. Self-discipline\
  \ is natural to you and you instinctively realize that any creative achievement\
  \ is “10% inspiration, 90% perspiration.”\nYou choose practical, realistic goals\
  \ and pursue them step-by-step in a well-planned, orderly way. You like to concentrate\
  \ on one thing at a time and do a thorough job. You enjoy working in solitude, and\
  \ often feel your best work is done when you are alone.\n#You may find that you\
  \ go from one transformational situation to another, never really settling into\
  \ any one thing. Yet you have the endurance necessary for the long haul.\nSome Famous\
  \ People with Mars in Harmonious Aspect to Saturn: Sextiles – Thomas Edison, Alfred\
  \ Adler, Galileo, Camilla Parker Bowles, Freddie Prinze, Corbin Bernsen, Catherine\
  \ the Great, Omar Sharif, Ben Stiller, Carl Lumbly, Drake, Barbara Walters, Timothée Chalamet;\
