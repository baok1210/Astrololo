mars_neptune_trine: 'With Mars in harmonious aspect to Neptune, you have a powerful
  sense of mystery, nuance, and drama. You’re intriguing and magnetic–people want
  to know more about you, and you leave a lasting impression on others.

  You seek a life mission, or you naturally gravitate to one! Fundamentally sensitive
  and romantic, you see all the layers of a situation and won’t draw rigid conclusions.
  In fact, vibes are everything to you. Even if many other factors in your chart favor
  the intellect, this Mars-Neptune aspect indicates a powerful reliance on instincts
  and intuition. You naturally feel out situations. Spiritual sustenance is essential
  to you in virtually any pursuit.

  You can be very persuasive and inspiring, as well. Others want to do things for
  you, and it’s easy to enjoy! You visualize what you want and often find yourself
  attracting it. You’re idealistic, believing in the dream. Taking after or benefiting
  from a parent can be marked with this position. You can be artistically talented
  and notably creative.

  Your methods are rarely straightforward–the route to fulfilling your desires is
  often meandering, creative, and unique. Because you appreciate the unusual, you
  attract out-of-the-ordinary experiences into your life. You can be a healer with
  a gentle but powerful touch. Your senses work overtime. Working on inspiration as
  your fuel, you are capable of much when you’re motivated. However, you’re not one
  who would step over others to achieve.

  Note on the differences between trines and sextiles: The trine aspect is the more
  dynamic of the two harmonious aspects. Those with the sextile can call upon these
  traits when needed, and those with the trine between the Mars and Neptune have incorporated
  the traits of the aspect into their personalities, expressing them naturally and
  consistently.

  You have a good understanding of the “give and take” of life and are sensitive to
  the needs of others. Anything that will benefit society as a whole has your approval.
  You would find satisfaction in a career that allows you to touch the lives of others.

  You are a romantic at heart and very sensitive in love. You must have honesty in
  your relationships and will accept nothing less. You are able to see through others
  to their real motivations, so insincerity is not easy to hide from you. Sometimes
  you can communicate with your lover without words, through expressions, gestures
  or “vibes.”

  You have strong emotional as well as physical needs, but your partner must also
  be refined and respectable. You seem to simply “know” things on a sexual level,
  which makes you an especially good lover. You pick up even the subtlest of nuances,
  and this intuitive understanding and “soft touch” is extremely attractive to many
  women.

  Your instinctive ability to be at the right place at the right time assists you
  greatly in life. This inherent spirituality can express itself well through the
  arts as well. Sexual fantasies are especially strong. In your life, you may become
  attracted to spiritual forms of sexuality, such as Tao and Tantra.  — Interpretation
  from our LoveStyles About Him Report.

  Mars trine Neptune

  You are highly perceptive and can detect insincerity or dishonesty in others. Because
  you are kind and sympathetic, others come to you with their problems and you always
  have a patient ear. You have the ability to balance your needs for both spiritual
  growth and physical achievement and can usually manage to do both simultaneously.

  Others find you magnetic, charming and very sociable. You prefer an uncomplicated
  yet stimulating love life and are a warm and tender lover. You are honest and sincere
  with loved ones, although you are quick to cut ties if you feel that interest is
  declining. The flush of romantic love may fade, but your former lovers will always
  respect you. You can inspire your lover and bring much joy into her life.

  You have a good understanding of the “give and take” of life and are sensitive to
  the needs of others. You are a romantic at heart and very sensitive in love. You
  must have honesty in your relationships and will accept nothing less. You are able
  to see through others to their real motivations, so insincerity is not easy to hide
  from you. Sometimes you can communicate with your lover without words, through expressions,
  gestures or “vibes.”

  You have strong emotional as well as physical needs, but your partner must also
  be refined and respectable. You seem to simply “know” things on a sexual level,
  which makes you an especially good lover. You pick up even the subtlest of nuances,
  and this intuitive understanding and “soft touch” is extremely attractive to many
  women.

  Your instinctive ability to be at the right place at the right time assists you
