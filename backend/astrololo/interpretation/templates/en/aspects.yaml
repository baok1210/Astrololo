moon_venus_conjunction: 'Because this aspect aligns two “yin” energies, it’s not one
  of those aspects that defines a person, but the characteristics are there, even
  if they’re in hiding! Every conjunction is modified by any planets that aspect it,
  and with Moon-Venus, perhaps even more so, as both the Moon and Venus are receptive
  energies and easily modified. And, this concept extends to character traits.

  There is a part of the nature that is very sensitive, and although they’re not necessarily
  “easily modified”, their sensitivity to others and to their environment suggests
  a part of the personality that automatically acquiesces.  Whether this is an obvious
  trait or one that is carefully hidden, it’s there, and it often has roots in the
  experience of the mother. For whatever reason, this experience gave the message
  to the child that one has to submit to others in order to find happiness, although
  in absolute terms, of course, it is not true.

  Different expressions of this aspect can include people who constantly feel the
  need to adapt to others, those who use roundabout ways to charm others into getting
  what they want, or people who do everything they can to avoid conflict.

  The mother or mother figure may have herself displayed these tendencies–using charm
  rather than directness to get what she wanted, or she may have been submissive and
  adaptable, always tiptoeing around others so as to avoid conflict. Or she may have
  been susceptible to charm–the child may have discovered early in life that to get
  what he or she wanted (attention, generally) from the mother, the most effective
  vehicle was charm, pretense, and other indirect tactics.

  These people are highly sensitive to criticism and rejection. They usually spend
  a lot of time and energy finding ways to avoid both. Men with this aspect can be
  especially appealing to women, as they seem to be quite sympathetic to women, or
  at the very least they possess a romantic and gentle side that makes women feel
  very comfortable. Both sexes attract women to them easily, in fact.

  Some of these people have an air of accessibility surrounding them–an unmistakable
  charm. The nature of that charm is found in the characteristics of the sign the
  Moon and Venus occupy. If in signs like Aries or Scorpio, the charm is less accessible
  in nature, but it’s still present in spades. Appearances are often important to
  these individuals, and/or there is a distinct need for peaceful, beautiful, and
  balanced home environments.

  There is often a strong connection to animals, and most people with this aspect
  truly hate to see others in pain. They are empathic people, possessing much sensitivity
  themselves. However, they generally don’t like getting their “hands dirty”, and
  would prefer that others deal with difficult emotional, or other such “messy”, situations.

  The Moon represents our innermost needs, and with Venus attached to it, Venus is
  one of the vehicles by which Moon-Venus people attempt to satisfy their emotional
  needs, and the Moon is one of the vehicles by which they try to satisfy their needs
  for companionship. The desire for companionship, therefore, becomes a need. A soft,
  gentle, and charming approach is generally employed in order to attempt to satisfy
  emotional needs.

  There can be a great love of comfort food and a sensuality that is sometimes felt
  to be insatiable. These people shop–or eat–when they’re unhappy! It’s especially
  important to avoid the tendency to mistake pleasure for love, or to use pleasure
  as a substitute for love.'
moon_venus_opposition: 'Because these people value harmony, they may find themselves
  giving in to others too easily, especially in the first half of life. Resentment
  is possible, as they feel that they are the ones who seem to do all the acquiescing.
  There can be a distinct tendency to become friends (and lovers) with people too
  readily, simply because there is a strong need for approval and a hunger for receiving
  affection. As such, these people may get involved with people who seem to really
  like them, and they don’t consider whether they actually like them back!

  It’s somewhat of a weakness, as these people are very charmed by the idea that someone
  seems to really like them and appreciate them. Generally, one of life’s lessons
  for these people is to learn to discriminate more and to get in touch with what
  they truly want and need.

  The functions of the Moon (which rules the emotions and feelings, amongst other
  things) and the functions of Venus (which rules social relationships, harmony, and
  partnership, amongst other things) are at cross-purposes. When these people attempt
  to feed the needs of one function, it is often at the expense of the other, until
  they find some sort of balance.

  This can play out in a variety of ways. For example, there can be conflicts in partnerships
  about parenting or whether or not to have a family. They can find themselves compromising
  their own emotional needs in order to find and keep love. Peace and harmony are
  important to these people–perhaps too much so, as they can easily be taken advantage
  of. Insecurity is something that these people need to deal with at some point in
  their lives.

  Very sensual, people with Moon in hard aspect to Venus sometimes replace love with
  food or shopping! They are also usually quite sexually active and sometimes quite
  lustful. They are usually skilled in the arts. There is a distinct lazy streak.
  Most are able to work hard, but they truly appreciate luxuriating and enjoying as
  many pleasures as possible, and self-discipline simply isn’t always at their disposal!'
moon_venus_sextile: 'Amiability is a distinct characteristic of those people who have
  the sextile or trine of the Moon and Venus in their natal charts. There is something
  soft and yielding about them, and their natural charm is usually obvious. Highly
  imaginative and sympathetic, these people make excellent mediators and go-betweens.
  They are keenly aware of their need for relationships and for intimacy.

  Whether male or female, these people have well-developed respect for qualities typically
  associated with the feminine. As such, men with this aspect are often unusually
  popular with women, as they seem to be in touch with their softer, sympathetic side
  in a most natural manner that takes nothing away from their “masculinity”. People
  appreciate both sexes for their tender hearts and friendly, diplomatic disposition.

  Unless afflicted, these aspects usually promise a good measure of personal popularity
  and success. Although generally considered “lucky” with relationships and with money,
  this is less about luck than it is about a certain level of inner peace and positive
  energy that attracts pleasant situations.

  The only real downside to these aspects is a tendency to be somewhat complacent,
  downright lazy, and over-indulgent in the “pleasures” of life. If unchallenged,
  there may be a tendency to expect things to come to them without much effort, perhaps
  relying too heavily on charm. However, people with these aspects are often peace-makers
  at heart and have an unusual ability to help and heal others.

  The trine aspect is the more dynamic of the two harmonious aspects. Those with the
  sextile can call upon these traits when needed, and those with the trine between
  the Moon and Venus have incorporated the traits of the aspect into their personalities,
  expressing them naturally and consistently.'
