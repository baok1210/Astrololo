jupiter_mercury_sextile: 'Your ideas are big, and your intentions are noble. You are
  excellent at seeing the big picture, drawing conclusions, problem-solving, and making
  accurate observations. With Mercury and Jupiter in harmony in your natal chart,
  you spend your life actively absorbing information. Many of you make good teachers
  with your sincere love of learning and sharing ideas with others.

  You are also very positive in your communications, readily inspiring others with
  what you say and how you say it. You are skilled at turning information into an
  advantage and, in some ways, seem to be quite lucky.

  You are tolerant of other perspectives and ideas and naturally avoid narrow-minded
  thinking–in fact, you have a considerable distaste for it. Generally, you’re at
  ease conversing with people from all walks of life. People greatly respect your
  viewpoint, often seeking your advice or input. You might be especially attracted
  to learning other languages and learning about foreign cultures. Travel can hold
  a strong appeal.

