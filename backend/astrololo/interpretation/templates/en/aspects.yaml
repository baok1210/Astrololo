pluto_sun_opposition: 'Sun sextile or trine Pluto

  It is easy and natural for those born under a harmonious aspect between the Sun
  and Pluto to find a passion and pursue it, and to focus on a goal. These people
  are not much scared of anything. They enjoy and embrace growth, especially of the
  psychological kind. They love a good mystery, and they are adept at solving it.
  Many people with these aspects feel they have a “calling” or destiny. They readily
  assign meaning to what others might consider “ordinary” events. They look for symbols,
  and read between the lines in most any situation. The physical vitality is generally
  strong, and the body is usually able to heal quickly.

  Others tend to respect those born under a harmonious aspect between the Sun and
  Pluto. They are not afraid to get their hands dirty, and they are usually quick
  to help others–not only with mundane tasks, but also on a spiritual or psychological
  level. Their insight is sharp and sometimes awe-inspiring. These are perceptive
  people who are not easily rattled or surprised in life. They are not do-gooders,
  and they are unlikely law-breakers.

  However, they are not afraid of the “dark side” of human nature, and they will bend
  the rules from time to time if they feel the need to do so. Many take particular
  pleasure in growth and life’s lessons. They are not fond of superficiality, and
  are generally the first to spot pretense of any kind. Some experiment with their
  powers to deceive at some early point in their lives, but generally grow in their
  strength and integrity. In fact, many do their best to rid themselves of any self-delusion
  that we are all susceptible to at times.

  These people are passionate and can be intense. They have a hunger to experience
  more than just an “ordinary” life, and they can be quite ambitious. Some are perfectionists,
  demanding much from themselves and reasonable amounts of effort and honesty from
  others.

  The trine aspect is the more dynamic of the two harmonious aspects. Those with the
  sextile can call upon the talents of this aspect when necessary, and those with
  the trine have incorporated the traits of the aspect into their personalities, expressing
  them naturally and consistently.'
