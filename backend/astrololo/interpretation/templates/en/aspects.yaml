mars_mercury_conjunction: 'With Mercury conjunct Mars in your natal chart, your mind
  is sharp, and your wit is quick. You have the energy to act on your ideas, and you’re
  very often ready and willing to put your plans into motion. With your independent-mindedness,
  you go your own way and are often ahead of others in your thinking.

  With this aspect in your birth chart, you readily get your point across. You’re
  not one to back down from a debate. Strong-minded and decisive, you’re straightforward
  and direct and sometimes blunt or insensitive with your words. Your enthusiasm is
  marked, and you’re especially observant, noticing far more details than most people.
  Mental stimulation and challenges are important to you. However, it can be hard
  to turn your mind off when you need peace!

  Problems with impulsive decisions and sharp words are possible. There can be tension
  with neighbors or siblings and impatience with mechanical processes. Unafraid of
  stirring up a bit of controversy, you believe in your ideas. You also need to have
  the last word!

  You are at your best when you learn to use your sharp, quick intellect to boost
  your life rather than allow it to run ahead of you and cause problems for you.

  You are curious, enthusiastic, and energetic in your communications. You enjoy a
  good debate and have a competitive nature, particularly when it comes to mental
  games. You can be quite impatient with vagueness or slowness in others, preferring
  to keep things simple and direct. You are excellent at getting to the heart of a
  subject and easily rid yourself of wasteful activities, and this means you can be
  especially productive.

  At times, you can be aggressive or overly blunt in your self-expression. You can
  also take things very personally, and your defensiveness can make it challenging
  for others to engage in healthy dialogue with you. You are forthright, and this
  can be refreshing to some and offensive to others.

  You have an enthusiastic, incisive and energetic mind. You are practical and compulsive.
  You think quickly and draw your inferences from empirical observation. Your life
  suffers at times by being too “me” oriented. You don’t give an opinion as much as
  assert a point of view.

  You are a fighter for a cause whether or not there is a fight, or for that matter,
  a cause. Your mind is on fire so you often express yourself with anger. You have
  a natural talent for occupations involving change and physical movement. — Interpretation
  sample from the In-Depth Profile report.

  Some Famous People with Mercury conjunct Mars: Salvador Dali (Mercury conjunct Mars
  in Taurus), Dick Clark (Mercury conjunct Mars in Sagittarius), Prince Edward (Mercury
  conjunct Mars in Pisces), Jason Alexander (Mercury conjunct Mars in Libra), Sally
  Field (Mercury conjunct Mars in Sagittarius), Kathie Lee Gifford (Mercury conjunct
  Mars in Leo), Merv Griffin (Mercury conjunct Mars in Leo), Gene Hackman (Mercury
  conjunct Mars in Capricorn), Don Ameche (Mercury conjunct Mars in Cancer), James
  Blish (Mercury conjunct Mars in Gemini), Hank Aaron (Mercury in late Aquarius conjunct
  Mars in early Pisces), Tommy Hilfiger (Mercury conjunct Mars in Aries), Wynonna
  Judd (Mercury conjunct Mars in Taurus), Kelly Ripa (Mercury conjunct Mars in Virgo),
  Barbara Walters (Mercury conjunct Mars in Libra), Rosie O’Donnell (Mercury conjunct
  Mars in Pisces), James Gandolfini (Mercury conjunct Mars in Libra), Bob Newhart
  (Mercury conjunct Mars in Libra, also tightly conjunct the Moon), Martin Scorsese,
  Meryl Streep (Mercury conjunct Mars in Gemini), Juliette Binoche (Mercury conjunct
  Mars in Pisces), Debra Winger, Lenny Kravitz (in Taurus), Timothée Chalamet (Mercury
  conjunct Mars in Capricorn), Sam Elliott (Mercury conjunct Mars in Virgo), Kendrick
  Lamar (Mercury conjunct Mars in Cancer), Justin Bieber (Mercury conjunct Mars in
  Aquarius), Heath Ledger (Mercury conjunct Mars in Pisces), Nicole Zignago (in Capricorn),
  Terry Hu (in Capricorn), Orlando Bloom (Mercury conjunct Mars in Capricorn), Ludwika
  Paleta (in Sagittarius), Alicia Keys (Mercury conjunct Mars in Aquarius), Elijah
  Wood (Mercury conjunct Mars in Aquarius), Blake Lively (Mercury conjunct Mars in
  Virgo), Deepak Chopra (Mercury conjunct Mars in Scorpio), Stephanie Poetri (Mercury
  conjunct Mars in Gemini).'
mars_mercury_opposition: 'You can be quick on the trigger regarding verbal reactions
  to others, and you are not always courteous, discreet, or tactful when expressing
  your opinions. You often take things quite personally, and your defensiveness can
  sometimes make it hard for others to have peaceful or productive conversations with
  you. However, you’re passionate about your ideas, decisive, and mentally brave.

  You might often compete for the floor when expressing your ideas, thoughts, and
  opinions. Stirring up controversy with what you say or how you say it can be frequent,
  whether you intend to do so or not.

  You are very quick with your perceptions, and you might speak quickly and move quickly
  as well. You are an energetic worker and excellent at rallying for what you believe
  in.

  You are very witty and often sarcastic. You are quick to offer an opinion and express
  your thoughts, not always with sensitivity. Some with this aspect in their charts
  enjoy storytelling, word games, and playing with ideas. You love a good debate but
  sometimes turn conversations that needn’t be stressful into arguments.

  Ideally, with time and experience, you learn to relax your mind enough to use your
  great mental energy and passion in ways that benefit you rather than get in your
  way.

  It’s a good idea to watch for communicating your opinions or reactions too soon
  since there is some tendency for others to misunderstand or jump to conclusions
  about you. You could too often find others gossiping about or misrepresenting you.
  Also possible is that you attract opposition from others or attract people into
  your life who are nitpicky, unusually opinionated, or critical of you.

  Your mind is very sharp and critical, and you are insatiably curious. Your mental
  courage is admirable. Your mind can be so quick that you are nervous, easily stressed,
  often over-stimulated, and prone to headaches. Impatience, especially while driving
  or operating machinery, could lead to mishaps. Extremely observant, you notice far
  more details than most people. Ideally, your natal chart has helpful other aspects
  and factors that calm and center you.

  Some Famous People with the Mercury in Hard Aspect to Mars:

  Squares – Bjorn Borg, Sylvia Plath, Cher, Aretha Franklin, Lizzo, Helen Mirren,
  Betty White, Norman Reedus, Jean Piaget, Sheena Easton, Demi Moore, Meat Loaf, Tina
  Turner, Randy Travis, Oprah Winfrey, Nicole Kidman, Mick Jagger, Avril Lavigne,
  Hugh Grant, Conor McGregor, Anthony Bourdain;

  Oppositions – Dinah Shore, Nina Simone, Peter Dinklage, Alice Cooper, Bernadette
  Peters, Ludwig van Beethoven, Christina Ricci, Zayn Malik, Steffi Graf, Anne Heche,
  Chuck Berry, Simone Biles.'
mars_mercury_sextile: 'Your mind is very restless and you will never cease to learn.
  You are quick, practical, perceptive, brave and can easily detect the weaknesses
  of others. You are very creative and you can excel both in writing and in manual
  arts. You are very secure and firm in your decisions without being aggressive. Your
  mind never rests and it is important that you keep yourself active.

  You make an expressive and lively conversationalist, and you generally mean what
  you say and say what you mean. You have the ability to speak truths without coming
  across as too blunt or offensive. You often make the best decisions at the very
  last minute!

  You can be very productive when you’re focused, spending less time on work that
  others labor over. You often take “busy-ness” in stride. You are alert and aware,
  and can easily turn ideas into workable projects. Your communications are refreshingly
  direct and to the point, although not especially sympathetic unless other factors
  in your chart mitigate this trait.

  The trine aspect is the more dynamic of the two harmonious aspects. Those with the
  sextile can call upon these traits when needed, and those with the trine between
  the Mercury and Mars have incorporated the traits of the aspect into their personalities,
  expressing them naturally and consistently.

  Some Famous People with Mercury in Harmonious Aspect to Mars:

  Sextiles – Beyonce Knowles, Fiona Apple, Sandra Bullock, Nelson Mandela, Leonard
  Cohen, Sophia Loren, Ava Gardner, Anne Frank, Leslie Jones, Tom Brokaw, Bill Clinton,
  David Spade, Edgar Cayce, Harry Hamlin, Princess Diana, Billie Eilish, Jay-Z, Fernando
  Savater, Navarone Garibaldi, Jamie Foxx, Jacob Latimore, Kevin Hart, Kesha, Anthony
  Hopkins;

  Trines – Shari Lewis, Joyce Brothers, Megan Fox, Kate Bush, Stevie Wonder, Ray Davies,
  Henry Winkler, Sonny Bono, Beau Bridges, Stacy Keach, Cheiro, Jessica Biel, Aubrey
  Plaza, Sigmund Freud, Pinar Altuğ, Emma Roberts, Zoe Kravitz, Kirsten Dunst, Paul
  Rudd, Brandon Lee, Bill Cosby, Prince William, F. Scott Fitzgerald, Billy Corgan,
  Ted Danson, Rina Sawayama, Jay Leno, Miley Cyrus, Jennifer Lopez, Jennifer Lawrence,
  Bo Burnham.

