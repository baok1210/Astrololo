jupiter_mercury_conjunction: 'Those with a conjunction of Mercury and Jupiter in the
  natal chart speak warmly, grandly, and rarely sparingly! They express themselves
  with openness and enthusiasm (unless Saturn is involved with the aspect). They are
  dreamers, and often assess any given situation with perhaps too much confidence
  and optimism. They are natural teachers, with an unmistakable warmth and breadth
  of knowledge, although they can also be long-winded and come across as opinionated.

  The truth is, these people are simply enthusiastic about sharing information with
  others. They are tolerant and broad-minded, at least in theory. Although they may
  come across as “know-it-alls” at times, if you dig deep, you will find they are
  very charitable souls with a love of learning…and perhaps even more so, a love of
  spreading the information they have learned.

  Their thirst for knowledge is insatiable, but they often gloss over details, preferring
  to focus on the “big picture.” They make truly exciting conversationalists for those
  who tire of simple small talk. These people usually have a lot to say about religion,
  philosophy, the law, education–anything that involves the advancement of humanity.

  Unless the conjunction is seriously afflicted, people with this aspect are generally
  well-respected not only for their knowledge, but for their integrity. Their wit
  and expressiveness are unmistakable. They are usually more than willing to lend
  a hand and to support others.

  They visualize in broader terms and see the “big picture” rather than the picky
  little details. They are prone to exaggerating the facts due to enthusiasm.

  People with a natal Mercury-Jupiter conjunction can be procrastinators. Although
  they are never short on big ideas, the implementation of these ideas (especially
  the detail work) might be better left to someone else. Routine, detail work, and
  other such “mental drudgery” is simply not their cup of tea. Even so, their enthusiasm
  may lead them to take on more projects than they can handle.

  With an exceedingly frank and straightforward manner, these people can put their
  foot in their mouths often enough, as subtlety is not their strong point! (Saturn
  or the Moon involved with the conjunction will add subtlety and comedic talent).
  If stretch things, it is likely due to their own over-estimation and their love
  of entertaining others through their stories. In other words, it comes naturally
  and the intent is not to deceive or mislead.

  With a powerful sense of possibilities, they’re never short of ideas. They’re also
  talented at motivating and inspiring others. People with a Mercury-Jupiter alignment
  in their natal charts enjoy philosophizing, exploring, discovering, and speculating
  on mental levels.

  Some Famous People with Mercury conjunct Jupiter: Brigitte Bardot (in Libra), Aleister
  Crowley (Mercury conjunct Jupiter in Scorpio), Michael Douglas (Mercury conjunct
  Jupiter in Virgo), Kevin Hart (Mercury conjunct Jupiter in Leo), Harvey Korman (Mercury
  conjunct Jupiter in Pisces), Charles Manson (in Scorpio), Paul Newman (Mercury conjunct
  Jupiter in Capricorn), Peter O’Toole (Mercury in Virgo conjunct Jupiter in Leo),
  Gregory Peck (in Aries), Jahking Guillory (in Gemini), Woody Allen (in Sagittarius),
  Madison Beer (Mercury conjunct Jupiter in Aries), Rose Byrne (in Leo), Jennifer
  Jason Leigh (in Aquarius), Billy Bob Thornton (in Leo), Carl Sagan (in Scorpio),
  Catherine Zeta-Jones (in Libra), Susan Sarandon, Lorne Greene, Zach Braff (in Aries),
  Kurt Vonnegut (in Scorpio), Tracy Chapman (in Aries), Jim Carrey (Mercury conjunct
  Jupiter in Aquarius), Angela Merkel (in Cancer), Lenny Kravitz (Mercury conjunct
  Jupiter in Taurus).'
jupiter_mercury_opposition: 'You love to express your ideas, sharing them with others
  quite readily. However, jumping to conclusions can create problems. In your race
  to get to the big picture, you often overlook details. Your thinking and studying
  habits aren’t always orderly or disciplined, which can, of course, result in sloppiness.
  You often prefer to leave the specializing to others–you prefer to explore and discover
  on mental levels, leaving yourself open to possibilities.

  Especially with the opposition, you might vacillate between logical, precise thinking
  and an optimistic conclusion-drawing bent of mind. In the process, it can be challenging
  for you to truly get to the heart of a subject or to focus for very long. You may
  confuse others with a critical flaw-finding conversation one moment and an overly
  faithful and unrealistic opinion the next.

  While your intentions are generally good, you might overestimate what you are capable
  of and promise more than you can deliver. Be careful not to develop a reputation
  for being unreliable simply because you desire to make others happy with what you
  say or promise.

  You are inclined to exaggerate, often without meaning to, and you might have difficulty
  putting your ideas into practice. In an attempt to attach greater meaning to your
  thoughts and ideas, you might frequently overstate or overestimate. However, you
  can be extraordinarily funny and interesting, and you’re never short of ideas. You
  can see possibilities where others don’t.

  You possess an acute but disorderly mind; you can come to rapid conclusions without
  knowing all the facts. You must learn to be more disciplined, to concentrate more
  on details and to be more persistent with your projects. You are very generous and
  optimistic though your optimism can sometimes distance you from reality. — sample
