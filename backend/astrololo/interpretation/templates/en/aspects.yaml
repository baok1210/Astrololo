  Sun-Mars aspects in more detail:'
mars_uranus_conjunction: 'You have a rather provocative and often dogmatic personality.
  You tend to make your own rules and don’t much like taking orders. You refuse to
  be labeled or put in a box! There is a natural, latent impulse to disrupt, rebel,
  and question.

  You are original, inventive, and sometimes erratic, often acting on blind impulse.
  Many find you attractive and intriguing. You might easily become bored, but you
  are also clever and inventive enough to create exciting new projects, challenges,
  and endeavors.

  You don’t respond well to pressure or to direct orders. Shocking others by breaking
  rules and taboos can be enjoyable for you at times. You could become a pioneer in
  a field, and you certainly are able to lead the way for others, although your focus
  needs improvement with this position. Not a believer in fate alone, you see things
  in such a way that you know there are always choices and options. You are an individualist
  who can relate to pretty much anyone in the world from all walks of life. You are
  often the first to embrace new, improved, cutting-edge products, things, and ideas.

  *Dynamic, self-willed, and fiercely independent, you have extraordinary drive and
  energy. When you want something, you want it NOW, and you act quickly, impulsively,
  and decisively. Your impatience inclines you to be abrupt with people and reckless.
  You need a great deal of personal freedom to do things in your own way and do not
  happily conform to schedules, rules, or regimes imposed by others.

  You are intolerant of authority and can be very rebellious. You are very frank with
  others, sometimes brutally so. You may have an explosive temper. High-strung and
  often nervous and tense, you find it difficult to slow down, pace yourself, or relax.
  You are always on the go. You are restless, daring, and experimental.

  #Like certain of the Christian saints, you tend to accidentally fall into the spiritual
  experiences you need. This could be through a physical accident, or it may be that
  your intuition and energy bring you to the proper crossroads again and again.

  Some Famous People with Mars conjunct Uranus: Frida Kahlo (in Capricorn), Ava Gardner
  (in Pisces), Michael J. Fox (in Leo), Robin Williams (in Cancer), Toni Collette
  (in Libra), Arnold Schwarzenegger (in Gemini), H.G. Wells, Alfred Tennyson, Frank
  Sinatra Jr. (in Gemini), Rihanna (Mars in Sagittarius, Uranus in Capricorn, also
  conjunct Saturn), Keith Richards (in Gemini), Jim Morrison (in Gemini), Steve Martin
  (in Gemini), Ruby Rose (in Sagittarius), Paul Lynde, Johnny Depp (in Virgo), Sophie
  Marceau (in Virgo), Ryan Reynolds (in Scorpio), Sarah Jessica Parker (in Virgo),
  Tracee Ellis Ross (in Libra), Ian Anderson (in Gemini), Jimmy Page (in Gemini),
  Usher (in Scorpio), Ruby Rose (in Sagittarius), Booboo Stewart (in Capricorn, also
  conjunct Neptune) Aidan Gallagher (Mars in early Pisces, Uranus in late Aquarius),
  Gabrielle Union (in Libra), Princess Aiko (in Aquarius), Florence Pugh (in Capricorn,
  also conjunct Neptune).'
mars_uranus_opposition: 'You prefer to stand out in a crowd than to follow. Even if
  your fundamental personality is introspective, you naturally do stand out.

  Watch for a tendency to be stubborn or dogmatic, which can impede your progress
  in life and cause unnecessary delays or obstacles. You can be temperamental, but
  you tend to get over things quickly.

  While you’re in touch with your needs and character, being hasty, impatient, and
  impulsive can lead to unnecessary struggles. This combination can indicate eccentricity,
  nervousness, or ups and downs with energy, desires, and motivation. Fussiness or
  irritability is marked when you’re upset.

  You don’t do well with schedules, especially those imposed upon you, but often,
  not even those you create for yourself! You can have great disdain for certain formalities
  and social niceties or maneuvering.

  It’s best to watch for abrupt, rebellious moves since they don’t always serve you
  well. Consider that impulses to take sudden risks may be self-sabotage. With time
  and maturity, you recognize the value of developing more patience and humility.

  You can be notably original, headstrong, rebellious, and contradictory. You are
  independent and individualistic. Inventing, designing, and pioneering are your strengths.

  Especially with the opposition, you could experience this Mars-Uranus energy in
  an externalized way through unusual or frequent attacks on your character.

  Mars square Uranus or Mars opposition Uranus: *Intensely restless, dynamic, and
  energetic, you are always on the go. When you want something, you want it NOW, and
  you act decisively, impulsively, sometimes hastily and prematurely. Impatient, high-strung,
  and often nervous and tense, you find it difficult to slow down, pace yourself,
  or relax. You are fiercely individualistic and independent, self-willed and intolerant
  of restraints and restrictions imposed by others. You have a reckless disregard
  for authority and can be extremely rebellious.

  Cooperating with others is not your strong point! You are often brutally frank and
  abrupt with people, and can be quite impersonal when you are pursuing a desired
  goal. You may have an explosive temper when your will is blocked. You have a superabundance
  of energy and need much personal freedom to do things in your own style and at your
  own pace.

  #Your life is peppered with dangerous intersections where you may be physically
  injured. These very events, however, form the substance of your spiritual path.
  It takes courage to follow this independent path, and effort to maintain strong
  relationships as you do so. Intuition can be a great asset.

  Some Famous People with the Mars in Hard Aspect to Uranus: Squares – Alexander Graham
  Bell, Catherine Zeta Jones, Patrick Duffy, Johannes Kepler, Madonna, Sissy Spacek,
  Gwen Stefani, Elton John, Bruno Mars, Conor McGregor, Alanis Morissette, Meg Ryan,
  Kim Basinger, Nicolas Duvauchelle, Charlie Hunnam, Kelly Rowland, Brandy Norwood,
  Billy Idol Oppositions – Rembrandt, Roman Polanski, Regis Philbin, Tyra Banks, Chris
  Brown, Jackie Gleason, Monica Lewinsky, Arnold Palmer, Zayn Malik, Cardi B, Frank
  Zappa, Roseanne Barr, Molly Ringwald, Minnie Driver, Lili Reinhart, Monica Seles,
  Babe Ruth, B. B. King, Jordan Hewson.'
mars_uranus_sextile: "You’re naturally inventive, bold, impulsive, and courageous.\
  \ You dare to be different! Highly original, you stand out pleasantly from the crowd\
  \ and have a strong impact on others.\nRarely bored when on your own, you have many\
  \ interests, goals, and projects to occupy your time. However, if you’re caught\
  \ in a routine, your love of variety and freedom leads to restlessness. You’re averse\
  \ to doing everything by the book, restrictions, and limiting schedules. In fact,\
  \ you thrive best when given the room and space to connect with your powerful instincts\
  \ and impulses.\nYour methods and plans are highly original, and you have excellent\
  \ troubleshooting and multitasking abilities. Because you thrive on spontaneity,\
  \ you can surprise people, keeping them on their toes.\nThe trine aspect is the\
  \ more dynamic of the two harmonious aspects. Those with the sextile can call upon\
  \ these traits when needed, and those with the trine between the Mars and Uranus\
  \ have incorporated the traits of the aspect into their personalities, expressing\
  \ them naturally and consistently.\nYou are highly original and very enthusiastic\
  \ about life. You express yourself with creative drama, which leaves a lasting effect\
  \ on others. In order to explore your numerous creative potentials, you demand a\
  \ great deal of personal freedom from those who are close to you. You have seemingly\
  \ unlimited energy with which to pursue your goals and have many projects to occupy\
  \ your time.\nYou sometimes become impatient because you have so much you want to\
  \ accomplish and only a limited amount of time to do so. You truly enjoy having\
  \ limitless options in your life and feel sorry for those who lead a more boring\
  \ existence! Never bored, you want to surround yourself with others who are exciting\
  \ and futuristic in their outlook.\nOne lesson of this aspect is to learn to be\
  \ patient with others who are not similarly inclined. Also, learn to do things in\
  \ moderation. Take a vacation and unwind from time to time. In your love life, you\
  \ are impulsive and can become restless if the relationship doesn’t seem to be going\
  \ somewhere. The idea that you can grow as an individual while maintaining a partnership\
  \ is important to you.\nYour sexual needs are strong, and you need a partner who\
  \ shares this quality. You have inexhaustible reserves of physical energy when it\
  \ comes to sex, and you find it extremely natural to experiment and to introduce\
  \ variety into your sex life. You don’t quite understand it when a partner doesn’t\
  \ have the same need! To you, changing the way you make love is completely natural,\
  \ and you wouldn’t have a good time with a partner who prefers to keep things status\
  \ quo in the bedroom. However, you are willing to accept your partner’s limits,\
  \ and you take things in stride. An exciting and fun lover, you don’t bore a lover\
  \ or get into the kinds of sexual “ruts” that some people do.\nYou may find marriage\
  \ rather restrictive and prefer to enter into a more unconventional arrangement,\
  \ such as a live-in relationship. You have a wide circle of friends, and your mate\
  \ must be willing and able to not restrict your access to them through possessiveness\
  \ or jealousy. There is no quicker way to lose you! — Interpretation sample from\
  \ our LoveStyles Report.\nAlternate, short interpretations: Mars sextile Uranus\
  \ or Mars trine Uranus: *You are dynamic, decisive, and somewhat impulsive. You\
  \ respond quickly and spontaneously to challenges, and you enjoy vigorous physical\
  \ activities that require fast reflexes and a good sense of rhythm and timing. You\
  \ have an abundance of energy and vitality, and a restless desire to see progress\
  \ and change – you hate stagnation. You are individualistic and make a good leader,\
  \ spearheading new projects and inspiring others to act.\n#You find yourself brushing\
  \ up against dangerous situations. Spiritually you learn from each one, eventually\
  \ learning how to help others without taking unnecessary risks yourself.\nSome Famous\
  \ People with Mars in Harmonious Aspect to Uranus:\nSextiles – Cher, Ali Wong, Agatha\
  \ Christie, Orson Welles, Ella Fitzgerald, Eliza Dushku, Marlon Brando, Emily Dickinson,\
  \ O. Henry, Mia Kirshner, Alfred Hitchcock, Fred Savage, Jennifer Lopez, Chrissy\
  \ Teigen, Kirsten Dunst, Nicole Scherzinger, Kyliegh Curran.\nTrines – Fiona Apple,\
  \ Oprah Winfrey, Oliver Stone, Jada Pinkett Smith, Andre Agassi, Pink, Michael Fassbender,\
  \ Kylian Mbappe, Sylvia Plath, Michael B. Jordan, Val Kilmer, Phil Collins, Thalia,\
  \ Maite Perroni, Dolores O’Riordan, Amy Poehler, Camila Mendes, Dan Levy, Morven\
  \ Christie, Rip Taylor.\nBack to  Planetary Aspects\nBack to Mars article\nMore\
  \ Aspects of Mars in the Natal Chart: Mars-Sun aspects | Mars-Moon aspects | Mars-Mercury\
  \ aspects | Mars-Venus aspects | Mars-Jupiter aspects | Mars-Saturn aspects | Mars-Uranus\
  \ aspects | Mars-Neptune aspects | Mars-Pluto aspects | Mars-Chiron aspects | Mars-Ascendant\
  \ aspects\nBack to Planetary Aspects\nLooking for interpretations for other aspects?\
  \ See quincunx,  semi-sextile, and the quintile/biquintile.\nDon't know the position\
  \ of Mars in your natal chart? Find out how you can get your astrology chart positions\
  \ free with our simple steps.\nInterpretations written by Annie Heese, unless otherwise\
  \ noted.\n Alternate interpretations marked with a * are from the Kepler program,\
  \ and with a # are from Your Spiritual Path software."
