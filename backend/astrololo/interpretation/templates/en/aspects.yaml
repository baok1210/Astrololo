  You can be very productive when you’re focused, spending less time on work that
  others labor over. You often take “busy-ness” in stride. You are alert and aware,
  and can easily turn ideas into workable projects. Your communications are refreshingly
  direct and to the point, although not especially sympathetic unless other factors
  in your chart mitigate this trait.

  The trine aspect is the more dynamic of the two harmonious aspects. Those with the
  sextile can call upon these traits when needed, and those with the trine between
  the Mercury and Mars have incorporated the traits of the aspect into their personalities,
  expressing them naturally and consistently.

