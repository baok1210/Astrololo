saturn_venus_trine: 'You feel a strong sense of responsibility to the ones you love,
  and this is so natural to you that it is second nature. Generally, you exercise
  caution and good judgment in your relationships with others, and you are understanding
  when others are in need. You pride yourself on being responsible and trustworthy,
  and you do whatever you can to compromise when necessary.

  Perhaps because of the training of your youth, you are well-disciplined and can
  focus your efforts quite effectively in order to achieve success. Even though you
  will climb your way to the top of your own ladder, you will not hesitate to offer
  a hand up to others you meet along the way. This quality is one of the main reasons
  for your success–your sensitivity to the needs of others.

  You are a good parent and will be a benevolent disciplinarian. You expect your children
  to learn to respect others and to be conscious of needs other than their own. Instead
  of trying to mold them into being a carbon copy of yourself, you will encourage
  your children to develop their own individuality.

  In romantic matters, you do not rush headlong into affairs of the heart. You check
  out each potential partner carefully, assessing their good and bad qualities. Most
  importantly, you require that the partnership contain mutual respect and loyalty.
  You feel more comfortable in a stable, long-term relationship than in a series of
  “casual flings.” It is so natural to you that you are responsible and concerned
  about the person you love that it completely surprises you when you encounter people
  who are not the same way, or who take relationships lightly!'
sun_uranus_conjunction: 'It is natural for those born under the Sun conjunct Uranus
  aspect to question tradition. These are individualists. They naturally rebel against
  that which is established. It doesn’t mean that they consistently break all the
  rules, but they definitely do question some of the rules, especially those that
  simply don’t make much sense to them. These people have a huge distaste for routine.
  They work best when they have some say as to when and how they get things done.

  Sun conjunct Uranus people possess much self-integrity. They prefer to answer to
  no one except themselves. They avoid labeling people and are most offended when
  others attempt to label or stereotype them. Although progressive, they can be maddeningly
  stubborn at times. They do enjoy a certain level of excitement in their lives, and
  they do accept change as exciting, and they do appear to be quite open-minded–yet
  on a personal level, they can stubbornly stick to their ideas and they will resent
  anyone who tries to push them into doing something they really don’t want to do.

  The Sun, as the ego, meets Uranus, the reformer. The result is a person whose identity
  rides strongly on being unique. Compare them to someone else, and these apparently
  open-minded, freedom-loving people can quickly turn livid. This is when these “free
  spirits” redefine the word temperamental. There, you’ve done it–you’ve found their
  weak spot. If you place them in a class of their own, on the other hand, they’re
  happy as can be.

  These people are inventive, creative, and spirited. They perhaps appear more flexible
  than they are. On paper, at least, they are open-minded. If things get too personal,
  however, they can be difficult to deal with. This is largely due to the fact that
  they cling very tightly to their personal space and their personal sense of freedom.
  Anything that seems to threaten their individuality pulls up resistance in these
  people.

  Sun conjunct Uranus people are refreshingly honest, highly independent, intuitive,
  and somewhat erratic or inconsistent. They are often described as quirky, and they
  are nothing if not interesting.

  Some Famous People with Sun Conjunct Uranus: Mata Hari (in Leo), Mary Shelley (in
  Virgo), Percy Bysshe Shelley (in Leo), Willem Dafoe (in Cancer), Anjelica Huston
  (in Cancer), René Descartes (in Aries), Alois Alzheimer (in Gemini), Meredith Baxter,
  Fred Rogers (Sun in late Pisces and Uranus in early Aries), Sigmund Freud (in Taurus),
  Donald Trump (in Gemini), Meryl Streep (in Cancer), Angela Merkel (in Cancer), Antonio
  Banderas (in Leo), Walt Disney (in Sagittarius), Jordin Sparks (in Capricorn), Lindsay
  Wagner (in Cancer), Ariel Winter (in Aquarius), Clara Barton, Ram Dass (in Aries),
  Moby (in Virgo), Patti Labelle (in Gemini), Lauren London (in Sagittarius), Rosie
  Perez (in Virgo), Laura Branigan (in Cancer), Roy Orbison, Raven-Symoné (in Sagittarius),
