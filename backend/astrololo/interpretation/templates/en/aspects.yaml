  \ Steve Jobs, Benjamin Franklin, William Blake, Mark Twain, Iggy Pop, Ravi Shankar,\
  \ Kurt Russell, Charles Prince of Wales, Jackie Chan, Halsey, LeBron James, Eva\
  \ Longoria, Lili Reinhart, Lenny Kravitz, Elijah Wood, Rose Byrne.\nBack to  Planetary\
