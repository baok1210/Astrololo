aries:
  title: MC in Aries
  short: You seek a career that allows independence, leadership, and initiative.
  detailed: You seek a career that allows independence, leadership, and initiative.
    You are ambitious and competitive, drawn to pioneering fields.
taurus:
  title: MC in Taurus
  short: Your career path is steady, patient, and focused on building tangible value.
  detailed: Your career path is steady, patient, and focused on building tangible
    value. You seek financial security and comfort through persistent effort.
gemini:
  title: MC in Gemini
  short: Your career involves communication, writing, teaching, or media.
  detailed: Your career involves communication, writing, teaching, or media. You need
    variety and mental stimulation in your professional life.
cancer:
  title: MC in Cancer
  short: You are drawn to careers involving nurturing, real estate, history, or food.
  detailed: You are drawn to careers involving nurturing, real estate, history, or
    food. Emotional security and caring for others drive your professional choices.
leo:
  title: MC in Leo
  short: You seek recognition and creative expression in your career.
  detailed: You seek recognition and creative expression in your career. Leadership
    roles, entertainment, or positions that showcase your talents suit you.
virgo:
  title: MC in Virgo
  short: Your career path involves service, health, analysis, or detailed craftsmanship.
  detailed: Your career path involves service, health, analysis, or detailed craftsmanship.
    You excel at refining systems and helping others improve.
libra:
  title: MC in Libra
  short: You are drawn to careers in law, diplomacy, design, or counseling.
  detailed: You are drawn to careers in law, diplomacy, design, or counseling. Partnership
    and balance are key themes in your professional life.
scorpio:
  title: MC in Scorpio
  short: Your career involves research, investigation, psychology, or transformation.
  detailed: Your career involves research, investigation, psychology, or transformation.
    You dig deep and are drawn to uncovering hidden truths.
sagittarius:
  title: MC in Sagittarius
  short: You seek a career involving travel, education, publishing, or philosophy.
  detailed: You seek a career involving travel, education, publishing, or philosophy.
    Freedom and exploration are essential to your professional fulfillment.
capricorn:
  title: MC in Capricorn
  short: Your career is marked by ambition, discipline, and long-term planning.
  detailed: Your career is marked by ambition, discipline, and long-term planning.
    You are drawn to positions of authority and responsibility.
aquarius:
  title: MC in Aquarius
  short: Your career involves technology, social reform, innovation, or community
    organizing.
  detailed: Your career involves technology, social reform, innovation, or community
    organizing. You think outside the box and value freedom above status.
pisces:
  title: MC in Pisces
  short: You are drawn to creative, spiritual, or healing professions.
  detailed: You are drawn to creative, spiritual, or healing professions. Music, art,
    film, or charitable work aligns with your compassionate nature.
