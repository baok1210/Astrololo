intro: "Có {count} hành tinh nghịch hành trong lá số của bạn ({planets}). Nghịch hành (retrograde) là hiện tượng hành tinh di chuyển lùi so với Trái Đất, làm cho năng lượng của hành tinh đó hướng nội và mang tính nghiệp quả hơn."
none: "Không có hành tinh nào nghịch hành. Năng lượng của bạn tỏa ra ngoài một cách trực tiếp và rõ ràng."
many: "Bạn có {count} hành tinh nghịch hành — một dấu hiệu của một cuộc sống nội tâm sâu sắc và nghiệp quả mạnh mẽ."
sun: "Mặt Trời nghịch hành: Bản ngã và sự tự thể hiện của bạn mang tính nội quan. Bạn có thể không thoải mái với ánh đèn sân khấu nhưng có chiều sâu nội tâm phong phú."
moon: "Mặt Trăng nghịch hành: Cảm xúc của bạn bị kìm nén hoặc khó bộc lộ ra ngoài. Bạn có một đời sống nội tâm phức tạp và nhạy cảm."
mercury: "Sao Thủy nghịch hành: Tư duy và giao tiếp của bạn mang tính nội tâm. Bạn suy nghĩ sâu sắc, thường xem xét lại vấn đề trước khi nói."
venus: "Sao Kim nghịch hành: Tình yêu và giá trị cá nhân của bạn được hình thành từ bên trong. Bạn có thể gặp bài học về lòng tự trọng và giá trị bản thân."
mars: "Sao Hỏa nghịch hành: Năng lượng và động lực của bạn hướng nội. Bạn có thể kìm nén sự tức giận hoặc khó thể hiện quyết đoán."
jupiter: "Sao Mộc nghịch hành: Sự may mắn và mở rộng của bạn đến từ bên trong. Bạn tìm thấy ý nghĩa qua triết lý cá nhân hơn là qua thế giới bên ngoài."
saturn: "Sao Thổ nghịch hành: Bài học kỷ luật và trách nhiệm của bạn mang tính nội tại. Bạn có thể cảm thấy gánh nặng từ quá khứ hoặc nghiệp quả gia đình."
uranus: "Sao Thiên Vương nghịch hành: Sự đột phá và tự do của bạn đến từ bên trong. Bạn có tính cách độc đáo nhưng thể hiện nó một cách tinh tế."
neptune: "Sao Hải Vương nghịch hành: Khả năng tâm linh và trực giác của bạn rất mạnh nhưng mang tính cá nhân. Bạn có thể gặp ảo ảnh từ quá khứ cần vượt qua."
pluto: "Sao Diêm Vương nghịch hành: Sự chuyển hóa của bạn diễn ra âm thầm và sâu sắc bên trong. Bạn có sức mạnh tái sinh mạnh mẽ sau khủng hoảng."
chiron: "Chiron nghịch hành: Vết thương sâu thẳm nhất của bạn liên quan đến quá khứ. Hành trình chữa lành đòi hỏi bạn nhìn lại nguồn gốc tổn thương."
