intro: "Mỗi nhà trong lá số đều có hành tinh chủ (ruler) cai quản. Vị trí của hành tinh chủ cho thấy nguồn năng lượng và lĩnh vực cuộc sống ảnh hưởng đến nhà đó."
placement: "Nhà {house} (chủ bởi {ruler}) có {ruler_vi} ở nhà {ruler_house}: Những vấn đề của nhà {house} được thể hiện qua lăng kính và năng lượng của nhà {ruler_house}. {ruler} đặt tại nhà {ruler_house} ảnh hưởng trực tiếp đến cách bạn trải nghiệm lĩnh vực nhà {house}."
