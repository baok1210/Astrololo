New Moon: "Trăng Non: Bạn sinh ra trong kỳ Trăng Non — một khởi đầu mới, một chu kỳ mới. Bạn mang năng lượng của sự thuần khiết, khởi xướng và tiềm năng. Cuộc sống của bạn xoay quanh việc khám phá bản thân và khởi động những dự án mới. Bạn có trực giác mạnh mẽ và khả năng bắt đầu lại từ đầu."
Waxing Crescent: "Trăng Lưỡi Liềm Đầu Tháng: Bạn sinh ra trong giai đoạn Trăng khuyết — thời điểm của hy vọng và ý định. Bạn có niềm tin vào tương lai và khả năng biến ước mơ thành hiện thực. Giai đoạn này mang đến sự lạc quan và khát khao phát triển."
First Quarter: "Trăng Bán Nguyệt Đầu Tháng: Bạn sinh ra vào kỳ Trăng Bán Nguyệt Đầu Tháng — thời điểm của hành động và quyết định. Bạn có tinh thần chiến đấu, sẵn sàng đối mặt với thử thách. Cuộc sống của bạn thường có những bước ngoặt đòi hỏi sự can đảm và quyết đoán."
Waxing Gibbous: "Trăng Khuyết Đầu Tháng: Bạn sinh ra khi Trăng đang dần tròn — thời điểm của sự hoàn thiện và điều chỉnh. Bạn có khả năng phân tích, tinh chỉnh và hoàn thiện mọi thứ. Bạn là người cầu toàn và luôn tìm cách cải thiện."
Full Moon: "Trăng Tròn: Bạn sinh ra vào kỳ Trăng Tròn — thời điểm của sự trọn vẹn, cao trào và nhận thức. Bạn mang năng lượng mạnh mẽ của sự đối cực. Cuộc sống của bạn xoay quanh các mối quan hệ và sự cân bằng giữa các mặt đối lập. Bạn có khả năng nhìn thấy cả hai mặt của vấn đề."
Waning Gibbous: "Trăng Khuyết Cuối Tháng: Bạn sinh ra khi Trăng bắt đầu khuyết — thời điểm của sự chia sẻ và truyền đạt. Bạn có khả năng truyền cảm hứng và dạy dỗ người khác. Bạn là người kể chuyện tài ba và có sứ mệnh chia sẻ tri thức."
Last Quarter: "Trăng Bán Nguyệt Cuối Tháng: Bạn sinh ra vào kỳ Trăng Bán Nguyệt Cuối Tháng — thời điểm của sự buông bỏ và chuyển hóa. Bạn có khả năng kết thúc mọi việc một cách gọn gàng. Cuộc sống của bạn là chuỗi những lần tái định hướng và thay đổi căn bản."
Waning Crescent: "Trăng Lưỡi Liềm Cuối Tháng: Bạn sinh ra vào giai đoạn cuối của chu kỳ Trăng — thời điểm của sự nghỉ ngơi và tái tạo. Bạn có trực giác tâm linh sâu sắc và khả năng kết nối với vô thức. Bạn là người có tâm hồn nhạy cảm và giàu trí tưởng tượng."
