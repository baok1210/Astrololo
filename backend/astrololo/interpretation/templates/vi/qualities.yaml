dominant_cardinal: "Nhóm Thống Lĩnh (Cardinal) chiếm ưu thế: Bạn là người hành động và khởi xướng. Sức mạnh của bạn nằm ở khả năng bắt đầu những dự án mới, định hướng và dẫn dắt người khác. Bạn có tinh thần tiên phong, dám nghĩ dám làm và không ngại đối mặt với thử thách. Những người có nhiều năng lượng Thống Lĩnh thường là những nhà lãnh đạo tự nhiên, luôn đi đầu trong công việc và cuộc sống. Hãy học cách kiên nhẫn và hoàn thành những gì bạn đã bắt đầu, thay vì chỉ chạy theo những khởi đầu mới."
dominant_fixed: "Nhóm Cố Định (Fixed) chiếm ưu thế: Bạn là người kiên định, bền bỉ và đáng tin cậy. Sức mạnh của bạn nằm ở khả năng duy trì, tập trung và bảo vệ những gì đã xây dựng. Bạn có ý chí sắt đá, một khi đã quyết định thì hiếm khi thay đổi. Những người có nhiều năng lượng Cố Định thường vững vàng trong khủng hoảng và kiên trì vượt qua mọi trở ngại. Hãy học cách linh hoạt hơn, đón nhận sự thay đổi thay vì kháng cự nó."
dominant_mutable: "Nhóm Linh Hoạt (Mutable) chiếm ưu thế: Bạn là người thích nghi, linh hoạt và uyển chuyển. Sức mạnh của bạn nằm ở khả năng thích ứng với mọi hoàn cảnh, kết nối và giao tiếp hiệu quả. Bạn dễ dàng điều chỉnh bản thân khi môi trường thay đổi và luôn tìm ra giải pháp sáng tạo. Những người có nhiều năng lượng Linh Hoạt thường xuất sắc trong vai trò trung gian, ngoại giao và truyền đạt. Hãy học cách tập trung vào một mục tiêu dài hạn thay vì phân tán năng lượng."
deficient_cardinal: "Thiếu năng lượng Thống Lĩnh (Cardinal): Bạn có thể gặp khó khăn trong việc bắt đầu những dự án mới và chủ động nắm bắt cơ hội. Có xu hướng chờ đợi người khác khởi xướng thay vì tự mình hành động. Hãy tập thói quen chủ động nhỏ mỗi ngày, đặt mục tiêu cụ thể và bắt đầu ngay mà không cần đợi thời điểm hoàn hảo."
deficient_fixed: "Thiếu năng lượng Cố Định (Fixed): Bạn có thể thiếu kiên nhẫn và khó duy trì cam kết lâu dài. Dễ bị phân tâm bởi những ý tưởng mới trước khi hoàn thành công việc hiện tại. Hãy rèn luyện tính kỷ luật, tập trung hoàn thành từng việc trước khi chuyển sang việc khác và xây dựng thói quen ổn định."
deficient_mutable: "Thiếu năng lượng Linh Hoạt (Mutable): Bạn có thể gặp khó khăn trong việc thích nghi với thay đổi và điều chỉnh kế hoạch. Có xu hướng cứng nhắc, bảo thủ và khó chấp nhận quan điểm khác. Hãy tập mở lòng với những cách tiếp cận mới, lắng nghe ý kiến người khác và linh hoạt hơn trong tư duy."
