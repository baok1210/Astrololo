rulership: "{planet} ở {sign} là vị trí chủ tinh (Rulership). {planet} ở đây cực kỳ mạnh mẽ và thể hiện bản chất một cách thuần khiết nhất. Bạn có khả năng tự nhiên trong lĩnh vực này, không cần nỗ lực nhiều vẫn đạt kết quả tốt."
exaltation: "{planet} ở {sign} là vị trí tôn vinh (Exaltation). {planet} được các vì sao nâng đỡ, thể hiện ở mức cao nhất phẩm chất tốt đẹp của mình. Đây là vị trí danh dự, mang lại may mắn và thành công."
detriment: "{planet} ở {sign} là vị trí đối địch (Detriment). {planet} cảm thấy không thoải mái, khó thể hiện bản chất tự nhiên của mình. Bạn cần nỗ lực nhiều hơn trong lĩnh vực này, nhưng đây cũng là cơ hội để trưởng thành."
fall: "{planet} ở {sign} là vị trí suy yếu (Fall). {planet} yếu nhất ở đây, khó hoạt động hiệu quả. Tuy nhiên, khi vượt qua được thử thách, bạn sẽ đạt được sự khôn ngoan sâu sắc."
neutral: "{planet} ở {sign} ở vị trí trung tính. {planet} thể hiện năng lượng ở mức bình thường, không đặc biệt mạnh hay yếu."
