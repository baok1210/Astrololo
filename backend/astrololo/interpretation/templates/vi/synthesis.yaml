asc_ruler_angular: "Cung Mọc của bạn là {asc_sign}, với chủ tinh {ruler_name} đặt tại {ruler_sign} Nhà {ruler_house} ({house_type_text}) — một vị trí nhà góc mạnh mẽ. {ruler_short_desc}. Điều này cho thấy bạn là người có {sign_kw}. Bạn thể hiện bản thân một cách trực tiếp và mạnh mẽ ra thế giới bên ngoài. Cuộc đời bạn gắn liền với những lĩnh vực thuộc Nhà {ruler_house}: {house_kw}. Nếu biết tập trung năng lượng, bạn có khả năng tạo ra ảnh hưởng lớn đến môi trường xung quanh."
asc_ruler_succedent: "Cung Mọc của bạn là {asc_sign}, với chủ tinh {ruler_name} đặt tại {ruler_sign} Nhà {ruler_house} ({house_type_text}). {ruler_short_desc}. Điều này cho thấy bản chất {sign_kw} nhưng thiên về xây dựng và phát triển bền vững. Bạn không phải người phô trương, mà âm thầm củng cố nội lực và nguồn lực. Các lĩnh vực Nhà {ruler_house}: {house_kw} là nơi bạn tìm thấy sự ổn định để thể hiện bản thân."
asc_ruler_cadent: "Cung Mọc của bạn là {asc_sign}, với chủ tinh {ruler_name} đặt tại {ruler_sign} Nhà {ruler_house} ({house_type_text}) — vị trí nhà cuối, thiên về tư duy và nội tâm. {ruler_short_desc}. Bản chất {sign_kw} nhưng được thể hiện qua trí tuệ, phân tích và giao tiếp hơn là hành động trực diện. Bạn suy nghĩ sâu sắc trước khi hành động. Các lĩnh vực Nhà {ruler_house}: {house_kw} là nơi bạn phát huy thế mạnh của mình."
sun_moon_synthesis: "Mặt Trời ở {sun_sign} kết hợp với Mặt Trăng ở {moon_sign} tạo nên sự tổng hòa tính cách đặc biệt. {sun_sign} — {sun_short_desc}. {moon_sign} — {moon_short_desc}. Sự kết hợp này {synthesis_text}. Bản chất {sun_core} của Mặt Trời được nuôi dưỡng bởi nhu cầu {moon_core} của Mặt Trăng. {closing}."
dominant_planet: "{planet_name} là hành tinh nổi bật nhất trong lá số của bạn. {planet_name} ở {sign_name} tại Nhà {house} ({dignity_label}) — {dignity_text} — với {aspect_count} góc chiếu, trong đó {harmonious_count} hỗ trợ và {challenging_count} thách thức. {planet_short_desc}. {planet_closing}."
conjunction_cluster: "Có một cụm hội tụ đáng chú ý tại {location}: {planets_list}. Đây là sự tập trung năng lượng mạnh mẽ, tạo nên một 'stellium' — nhóm hành tinh cùng hoạt động như một đội. {theme_desc}. Điểm mạnh: {strengths}. Thách thức: {challenges}."
element_quality_house: "Lá số của bạn thiên về {element_desc} ({elem_pct}%), với {quality_desc} ({qual_pct}%) và tập trung ở {house_type_desc} ({house_pct}%). {element_closing} {quality_closing} {house_closing} {combined_closing}"
