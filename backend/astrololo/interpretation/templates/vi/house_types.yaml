dominant_angular: "Đa số hành tinh ở nhà góc (angular houses 1-4-7-10): Bạn là người hành động, có định hướng và khát vọng mạnh mẽ. Nhóm nhà góc liên quan đến sự thể hiện bản thân trực tiếp ra thế giới. Bạn có xu hướng tạo ra tác động rõ rệt đến môi trường xung quanh, dễ được chú ý và có ảnh hưởng. Đây là vị trí mạnh mẽ cho thấy bạn khó có thể sống một cuộc đời tầm thường."
dominant_succedent: "Đa số hành tinh ở nhà kế (succedent houses 2-5-8-11): Bạn là người tập trung vào xây dựng giá trị bền vững, phát triển tài năng và củng cố nguồn lực. Nhóm nhà kế liên quan đến sự ổn định và phát triển từ những gì đã được khởi xướng. Bạn có tài năng trong việc quản lý tài chính, phát triển mối quan hệ và tận hưởng thành quả lao động."
dominant_cadent: "Đa số hành tinh ở nhà cuối (cadent houses 3-6-9-12): Bạn là người có tư duy, thích học hỏi và khám phá. Nhóm nhà cuối liên quan đến tri thức, giao tiếp, dịch vụ và tâm linh. Bạn có xu hướng sống nội tâm, phân tích và chiêm nghiệm. Thế mạnh của bạn nằm ở khả năng thích nghi, học hỏi và phục vụ người khác."
balanced_houses: "Các hành tinh phân bố tương đối đều giữa ba nhóm nhà góc, kế và cuối. Điều này cho thấy bạn có sự cân bằng tốt giữa hành động (nhà góc), xây dựng (nhà kế) và tư duy (nhà cuối). Bạn có khả năng vừa hành động quyết đoán, vừa biết xây dựng bền vững, vừa có chiều sâu suy tư."
