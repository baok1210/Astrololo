  hoặc Mặt Trời tam hợp Sao Thổ. Ngoài ra, cũng có các khía cạnh khác như Mặt Trời bát xung Sao Thổ, ngũ phân hoặc thập phân
  Sao Thổ, và bán lục hợp Sao Thổ.'
saturn_uranus_conjunction:
  detailed: Sự Hop giữa Sao Tho và Sao Thien Vuong tạo ra một sự kết hợp hài hòa giữa kỷ luật và cấu trúc của bạn với sự đổi
    mới và thay đổi. Sự kết nối này hỗ trợ sự phát triển của bạn bằng cách đưa hai lĩnh vực này trong cuộc sống vào nhận thức
    có ý thức. Biểu hiện cụ thể phụ thuộc vào phần còn lại của bản đồ sao của bạn — các cung và nhà liên quan, cũng như cách
    khía cạnh này tương tác với các cấu hình hành tinh khác.
  short: The Conjunction between Saturn and Uranus creates a harmonious blend between your discipline and structure and your
    innovation and change.
  title: 'Conjunction: Saturn - Uranus'
saturn_uranus_opposition:
  detailed: Doi Xung giua Sao Tho va Sao Thien Vuong tao ra mot cang thang dong luc giua su kien tri va cau truc cua ban voi
    su sang tao va thay doi cua ban. Lien ket nay thach thuc ban phat trien bang cach dua hai khia canh nay trong cuoc song
    vao nhan thuc co y. Bieu hien cu the phu thuoc vao phan con lai cua so sinh thoi cua ban — cac cung va nha lien quan,
    va cach aspect nay tuong tac voi cac cau truc hanh tinh khac.
  short: The Opposition between Saturn and Uranus creates a dynamic tension between your discipline and structure and your
    innovation and change.
  title: 'Opposition: Saturn - Uranus'
