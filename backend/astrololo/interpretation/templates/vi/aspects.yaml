mercury_sun_conjunction:
  detailed: Góc Sao Mat Troi Hop Sao Thuy kết hợp bản sắc của bạn với trí tuệ. Tâm trí và cái tôi của bạn hoạt động hài hòa
    — bạn suy nghĩ về con người mình, và bạn là những gì bạn suy nghĩ. Bạn giao tiếp với sự tự tin và quyền uy, thường diễn
    đạt rõ ràng và trực tiếp. Vị trí này mang lại một tâm trí sắc bén, nhanh nhạy và khả năng diễn đạt ý tưởng một cách tự
    nhiên. Bạn có thể được đánh giá là thông minh, tò mò và hoạt động tinh thần. Thách thức là tránh bám chấp quá mức vào
    ý kiến cá nhân hoặc cần phải đúng.
  short: The Sun conjunct Mercury aspect blends your identity with your intellect.
  title: 'Conjunction: Sun - Mercury'
mercury_sun_opposition:
  detailed: Sao Mat Troi doi xung Sao Thuy tao ra mot cang thang dong giua cach ban nhin thay ban than va cach ban giao tiep.
    Ban co the kho khan de bieu lo ban chat that cua minh, hoac loi noi cua ban co the bi hieu sai boi nguoi khac. Hinh thuc
    nay co the bieu hien qua su suy nghi qua muc, su tu nghi ngo trong giao tiep, hoac xu huong dua nghi lep cua minh len
    nguoi khac. Diem quan trong la tim su can bang giua su tu suy ngam va su bieu ngoai ben ngoai.
  short: Sun opposite Mercury creates a dynamic tension between how you see yourself and how you communicate.
  title: 'Opposition: Sun - Mercury'
mercury_sun_sextile:
  detailed: Sao Mat Troi Luc Hop Sao Thuy mang lại sự tự nhiên trong giao tiếp và học hỏi. Bạn thể hiện bản thân với sự rõ
    ràng và tự tin, đồng thời có khả năng biến ý tưởng thành hành động. Góc hợp này hỗ trợ sự tò mò trí tuệ và khả năng diễn
    đạt suy nghĩ một cách thuyết phục. Bạn thích sự kích thích tinh thần và có thể có nhiều sở trường hoặc tài năng trong
    viết lách, diễn thuyết hoặc giảng dạy.
  short: Sun sextile Mercury brings a natural ease to communication and learning.
  title: 'Sextile: Sun - Mercury'
mercury_sun_square:
  detailed: Sao Mat Troi vuong goc Sao Thuy tạo ra sự căng thẳng giữa cái tôi và trí tuệ của bạn. Bạn có thể gặp khó khăn
    trong việc diễn đạt bản thân một cách rõ ràng, hoặc các ý tưởng của bạn có thể mâu thuẫn với nhận thức về bản thân. Góc
    aspect này có thể biểu hiện như xu hướng tranh luận, quá bảo thủ ý kiến, hoặc cảm thấy bị hiểu lầm. Con đường phát triển
    bao gồm học cách lắng nghe nhiều như nói, và tách biệt các ý tưởng của bạn khỏi giá trị bản thân.
  short: Sun square Mercury creates tension between your ego and your intellect.
  title: 'Square: Sun - Mercury'
mercury_sun_trine:
  detailed: Sao Mat Troi Tam Hop Sao Thuy hài hòa tâm trí và bản sắc của bạn. Bạn suy nghĩ sáng tạo và thể hiện bản thân với
    sự tự tin tự nhiên. Ý tưởng tuôn trào dễ dàng, và bạn có tài năng giao tiếp theo cách chân thực và mạnh mẽ. Góc hợp này
    hỗ trợ các hoạt động trí tuệ, viết lách, giảng dạy, và bất kỳ lĩnh vực nào nơi sự thể hiện bản thân rõ ràng là quan trọng.
  short: Sun trine Mercury harmonizes your mind and your identity.
  title: 'Trine: Sun - Mercury'
mercury_uranus_conjunction: 'Bạn là một người tư duy độc lập với những ý tưởng cấp tiến. Tuyệt vời theo cách riêng của mình,
  bạn có khả năng nắm bắt nhiều chủ đề khác nhau một cách nhanh chóng, dù không phải lúc nào bạn cũng được hiểu đúng.

  Tư duy của bạn thường đi trước thời đại. Bạn nói lời thật lòng, và có thể rất ngoan cố về điều đó — bạn nói những gì bạn
  nghĩ, và nếu điều đó không được đón nhận, đó không phải là điều khiến bạn quá bận tâm.

  Bạn không tuân thủ chấp nhận các quy tắc một cách phục tùng, đặc biệt là các quy tắc xã hội, và thích làm việc theo nhịp
  độ của riêng mình. Bạn có thể cảm thấy khó chịu khi phải tuân theo các quy chuẩn, và bạn có sự ghét bỏ mạnh mẽ khi tham
  gia vào các nhiệm vụ tinh thần mà bạn không hoàn toàn tin tưởng.

  Bạn không thích "giả vờ" bất cứ điều gì, và điều này có thể gây khó khăn trong những năm tháng đi học khi bạn có thể thường
  xuyên được yêu cầu viết về những chủ đề không khiến bạn quan tâm. Năng lượng và sản phẩm tinh thần của bạn khá thay đổi,
  vì bạn thích làm việc khi được truyền cảm hứng. Bạn là một người trò chuyện rất thú vị, đưa ra những quan điểm và góc nhìn
  khác thường.

  Bạn không phải lúc nào cũng hiểu rõ bản thân, và nên dành thời gian để chiêm nghiệm để không gắn mình với những ý tưởng
  dựa nhiều hơn vào việc kích động và thách thức tư duy đã được thiết lập hơn là những gì bạn thực sự tin tưởng. Bạn...


  Dễ chán, đặc biệt là với các công việc thường ngày. Suy nghĩ và có thể cả lời nói của bạn có thể bị phân tán và lộn xộn,
  dù bạn thường biết mọi thứ ở đâu ngay cả khi có vẻ không phải vậy. Bạn không thích sự đạo đức giả, và sự thật là điều quan
  trọng nhất đối với bạn.

  Mẫu diễn giải từ báo cáo Hồ sơ chuyên sâu — Bạn có một ý tưởng mới mỗi phút và khó khăn trong việc chờ đợi để bày tỏ nó.
  Bạn thực sự đổi mới và độc đáo trong quá trình tư duy. Mặc dù bạn hay lo lắng, bạn có khả năng cơ khí tốt. Nếu bạn có thể
  kiểm soát được đôi tay và tâm trí, bạn có thể khá sáng tạo. Bạn yêu thích các chủ đề kỹ thuật và làm việc tốt nhất khi đi
  tiên phong trên ranh giới của tri thức.

  Hầu hết khó khăn của bạn bắt nguồn từ những tình huống yêu cầu bạn phải đều đặn, bình thường và nhất quán, tuân theo quy
  trình của mọi người. Thật không may cho bạn, một số lượng nhất định các bài tập huấn luyện truyền thống là cần thiết nếu
  không sẽ không ai hiểu được ý tưởng của bạn thực sự tốt đến đâu. Bạn có một dòng chảy thông tin Thời đại Mới trong mình.
  Bạn cần tìm một cách để bày tỏ nó.

