  \ để vị vua lý trí của ánh sáng (Sao Mat Troi) đồng nhất với năng lượng của vị vua của bóng tối (Sao Diem Vuong). Không\
  \ ai được lợi ích nếu các mô tả về các khía cạnh quá cực đoan đến mức bị bác bỏ nhanh chóng là \"sai\"."
pluto_uranus_conjunction:
  detailed: Sự Hop giua Sao Thien Vuong va Sao Diem Vuong tao ra mot su ket hop hai hoa giua su doi moi va thay doi cua ban
    voi su chuyen hoa va suc manh. Moi lien he nay ho tro su phat trien cua ban bang cach dua hai khia canh nay trong cuoc
    song ban vao su nhan thuc co y. Bieu hien cu the phu thuoc vao phan con lai cua so sinh thien cua ban — cac cung va nha
    lien quan, va cach khia nay взаимодействие voi cac cau hinh hanh tinh khac.
  short: The Conjunction between Uranus and Pluto creates a harmonious blend between your innovation and change and your transformation
    and power.
  title: 'Conjunction: Uranus - Pluto'
pluto_uranus_opposition:
  detailed: Sự đối xung giữa Sao Thien Vuong và Sao Diem Vuong tạo ra một căng thẳng động lực giữa sự đổi mới, thay đổi của
    bạn và sự chuyển hóa, quyền lực của bạn. Mối liên kết này thách thức bạn phát triển bằng cách đưa hai lĩnh vực này trong
    cuộc sống của bạn vào nhận thức có ý thức. Biểu hiện cụ thể phụ thuộc vào phần còn lại của biểu đồ sinh của bạn — các
    cung và nhà liên quan, và cách khía cạnh này tương tác với các cấu hình hành tinh khác.
  short: The Opposition between Uranus and Pluto creates a dynamic tension between your innovation and change and your transformation
    and power.
  title: 'Opposition: Uranus - Pluto'
pluto_uranus_sextile:
  detailed: Luc Hop giua Sao Thien Vuong va Sao Diem Vuong tao ra su ket hop hai hoa giua su doi moi va thay doi cua ban voi
    su chuyen hoa va suc manh cua ban. Moi lien he nay ho tro su phat trien cua ban bang cach dua hai khia canh nay trong
    cuoc song ban vao y thuc ro rang. Bieu hien cu the phu thuoc vao phan con lai cua so sinh thoi cua ban - cac cung va nha
    lien quan, va cach khia nay tuong tac voi cac cau hinh hanh tinh khac.
  short: The Sextile between Uranus and Pluto creates a harmonious blend between your innovation and change and your transformation
    and power.
  title: 'Sextile: Uranus - Pluto'
pluto_uranus_square:
  detailed: Góc vuông giữa Sao Thien Vuong và Sao Diem Vuong tạo ra sự căng thẳng năng động giữa đổi mới, thay đổi của bạn
    với sự chuyển hóa và quyền lực. Sự kết nối này thách thức bạn phát triển bằng cách đưa hai lĩnh vực này trong cuộc sống
    vào nhận thức có ý thức. Biểu hiện cụ thể phụ thuộc vào phần còn lại của biểu đồ sinh của bạn — các cung và nhà liên quan,
    và cách khía cạnh này tương tác với các cấu hình hành tinh khác.
  short: The Square between Uranus and Pluto creates a dynamic tension between your innovation and change and your transformation
    and power.
  title: 'Square: Uranus - Pluto'
pluto_uranus_trine:
  detailed: Tam Hop giữa Sao Thien Vuong và Sao Diem Vuong tạo ra sự kết hợp hài hòa giữa đổi mới, thay đổi của bạn với sự
    chuyển hóa và sức mạnh. Sự kết nối này hỗ trợ sự phát triển của bạn bằng cách đưa hai khía cạnh này trong cuộc sống vào
    nhận thức có ý thức. Biểu hiện cụ thể phụ thuộc vào phần còn lại của biểu đồ sinh của bạn — các cung và nhà liên quan,
    và cách khía cạnh này tương tác với các cấu hình hành tinh khác.
  short: The Trine between Uranus and Pluto creates a harmonious blend between your innovation and change and your transformation
    and power.
  title: 'Trine: Uranus - Pluto'
pluto_venus_conjunction: 'Cảm xúc của bạn, đặc biệt khi nói đến tình yêu và sự gắn bó, rất sâu sắc. Bạn có sức hút mạnh mẽ,
  và bạn có thể khơi dậy những cảm xúc mãnh liệt ở người khác, những người có thể thấy bạn thú vị hoặc theo cách nào đó gây
  khó chịu! Và tất cả điều này trước khi bạn thậm chí mở miệng. Trong tình yêu, bạn có thể khá chiếm hữu và có thể ám ảnh.
  Gốc rễ của những cảm giác ám ảnh là nỗi sợ hãi sâu xa về sự từ chối, mất mát và phản bội. Cảm xúc của bạn thường nóng hoặc
  lạnh – bản chất tình yêu của bạn thường cực đoan. Bạn khó có thể tách mình ra khi nói đến các mối quan hệ cá nhân, và sự
  nhạy cảm này đến từ xu hướng coi mọi thứ rất nghiêm túc.


  Bạn chắc chắn quyến rũ nhất khi bạn muốn vậy. Các mối quan hệ tình yêu làm thế giới của bạn đảo lộn. Bạn có khả năng trải
  nghiệm tình yêu sét đánh, vì bạn có xu hướng hành động theo bản năng khi nói đến chuyện tình cảm. Các mối quan hệ của bạn
  thường mang cảm giác định mệnh. Bạn dễ dàng tạo áp lực lên đối tác, vì bạn kỳ vọng rất nhiều lòng trung thành và sự trung
  thực trong mối quan hệ thân mật của mình.


  Trong các mối quan hệ tình cảm, hãy cẩn thận để không để chúng rơi vào tình trạng partner trở nên thừa thãi, và bạn chỉ
  đang giải quyết những vấn đề nội tâm của mình thông qua họ. Chắc chắn, bạn sẽ học được nhiều điều về bản thân thông qua
  các mối quan hệ, và bạn có thể không phải lúc nào cũng thích những gì mình thấy. Bạn sẽ gặp lại chính mình (phía "tối tăm"
  hơn hay những vấn đề nội tâm) thông qua các mối quan hệ, và điều quan trọng là bạn phải nhận ra đó là "nguyên liệu" của
  riêng mình chứ không phải projection lên partner. Ở một cấp độ khác, bạn có thể có năng khiếu về kịch, viết lời bài hát,
  âm nhạc nói chung, và tài chính.


  Bạn cực kỳ trung thành và quan tâm đến những người bạn yêu thương, mà không hề sến súa hay sướt mướt. Giá trị và suy nghĩ
  của bạn xoay quanh tình yêu, thứ dễ dàng trở thành trung tâm cuộc đời bạn. Ở giai đoạn đầu của một mối quan hệ, bạn có xu
  hướng dồn hết tâm sức và sự tập trung vào đối phương.'
pluto_venus_opposition: 'Trong nỗ lực kiểm soát kết quả của một mối quan hệ tình cảm, hoặc cảm xúc của người mình yêu, bạn
  có thể tìm đến những trò chơi thao túng. Ngay cả khi bạn "thành công" trong việc đó, cũng không bao giờ có cảm giác rằng
  bạn đã chinh phục được ai đó bởi con người thật của mình, và điều này nuôi dưỡng một vòng xoáy tiêu cực mà bạn nên cố gắng
  tránh để không rơi vào. Cảm xúc của bạn rất mãnh liệt, thậm chí cực đoan, khi nói đến tình yêu. Kết quả là, bạn có thể thu
  hút những mối quan hệ mãnh liệt mang chủ đề yêu-ghét. Bạn đầy đam mê khi yêu, chắc chắn rồi, nhưng cũng đầy đam mê khi ghét.
  Bạn dễ dàng tạo áp lực lên đối tác, vì bạn kỳ vọng sự trung thành và trung thực cao trong các mối quan hệ thân mật của mình.


  Hãy cẩn thận để không để mối quan hệ của bạn rơi vào điểm mà đối tác trở nên thừa thãi và bạn đang giải quyết những con
  quỷ nội tâm của chính mình thông qua họ. Chắc chắn, bạn sẽ học được nhiều điều về bản thân thông qua các mối quan hệ của
  mình, và bạn có thể không phải lúc nào cũng thích những gì mình thấy. Bạn sẽ gặp lại chính mình (phía "tối tăm" hơn hay
  những con quỷ nội tâm) thông qua mối quan hệ, và điều quan trọng là bạn phải nhận ra đó là "vật liệu" của riêng mình chứ
  không phóng chiếu lên đối phương. Việc từ bỏ một mối quan hệ có thể rất khó khăn với bạn, đặc biệt nếu Sao Kim nằm ở cung
  cố định (Kim Ngưu, Sư Tử, Bọ Cạp hoặc Bảo Bình).


  Bạn có khả năng trở thành một bậc thầy thao túng và thường mắc kẹt trong việc cố gắng tạo ra vẻ ngoài hoàn hảo cho mọi thứ.
  Chính bạn là người chịu đựng xu hướng này nhiều nhất. Bạn có xu hướng bị ràng buộc vào một mô hình lặp lại vô tận trong
  các mối quan hệ. Bạn gặp khó khăn trong việc buông bỏ ngay cả khi tình huống đau khổ. Bạn luôn đối xử với mọi người như
  những biểu tượng của những người khác thậm chí không có mặt ở đó. Tình yêu và quyền lực trở nên lẫn lộn với nhau. Bạn có
  nhu cầu sâu sắc cần thiết lập ý thức về giá trị bản thân. Khi điều này được đảm bảo, bạn có thể vượt qua nỗi sợ bị hòa tan
  trong một mối quan hệ.'
pluto_venus_sextile: 'Bản năng, bạn quan sát người khác và có cảm nhận mạnh mẽ về động cơ của họ. Bạn có thể sử dụng sự nhận
  thức sắc bén để nhanh chóng đánh giá một người hoặc tình huống, và xử lý phù hợp. Rất tháo vát, bạn cũng xuất sắc trong
  việc xác định giá trị hay worth của vật chất. Bạn cũng có thể giúp người khác khám phá giá trị của chính họ. Bạn tự nhiên
  bị thu hút bởi các mối quan hệ biến đổi bạn, đang phát triển và tiến hóa, và đầy mãnh liệt.


  Bạn có thể sử dụng trực giác mạnh mẽ và sự hiểu biết về người khác cho mục đích tốt hoặc xấu, điều này phần lớn phụ thuộc
  vào các khía cạnh khác trong biểu đồ của bạn. Bạn có gu thẩm mỹ chọn lọc, và rất tận tụy và đam mê với những thứ (và người)
  bạn thực sự yêu thích. Sức hút của bạn mạnh mẽ và tự nhiên, thường khiêm tốn, và bạn có thể rất thuyết phục.


  Khía cạnh Tam Hợp là năng động hơn trong hai khía cạnh hài hòa. Những người có Lục Hợp có thể kêu gọi những phẩm chất này
  khi cần, và những người có Tam Hợp giữa Sao Kim và Sao Diêm Vương đã tích hợp và các đặc điểm của khía cạnh vào tính cách
  của họ, thể hiện chúng một cách tự nhiên và nhất quán. Bạn có sức mạnh và sự quyến rũ. Bạn có một ma thuật thu hút trong
  việc đối xử với mọi người. Bạn có tình yêu phổ quát đối với con người, không bè phái và không phán xét. Bạn được duy trì
  bởi sự dồi dào vật chất đến từ người khác vào một thời điểm nào đó trong đời này và có thể thừa kế một tài sản đáng kể.


  Khi bạn tham gia vào một dự án, bạn có thể thực sự dồn hết tâm sức vào đó với năng lượng có vẻ không giới hạn. Năng lượng
  này sẽ bốc hơi khi bạn không tham gia vào một dự án có ý nghĩa cá nhân. — Mẫu diễn giải từ báo cáo Hồ sơ chuyên sâu.


  Sao Kim Lục Hợp Sao Diêm Vương hoặc Sao Kim Tam Hợp Sao Diêm Vương: Bạn yêu sâu sắc, mãnh liệt và hết lòng, và người khác
  có thể thấy sự mãnh liệt của bạn cực kỳ hấp dẫn hoặc đe dọa. Bạn có sức hút và có thể có ảnh hưởng cảm xúc mạnh mẽ đến người
  khác, đặc biệt là đối với những đối tác lãng mạn.'
