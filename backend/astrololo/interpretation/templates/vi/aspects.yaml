  họ, thể hiện chúng một cách tự nhiên và nhất quán. Bạn mạnh mẽ và có sức hút ma mị. Bạn có sự quyến rũ kỳ diệu trong việc
  giao tiếp với mọi người. Bạn có tình yêu thương bao la dành cho con người, không phân biệt bè phái hay phán xét. Bạn được
  duy trì bởi sự sung túc vật chất đến từ người khác vào một thời điểm nào đó trong đời này và có thể nhận được một khoản
  thừa kế đáng kể.


  Khi bạn tham gia vào một dự án, bạn có thể thực sự dồn hết tâm sức vào đó với năng lượng dường như vô tận. Năng lượng này
  sẽ tan biến khi bạn không tham gia vào một dự án có ý nghĩa cá nhân.


  Sao Kim Lục Hop Sao Diem Vuong hoặc Sao Kim Tam Hop Sao Diem Vuong: Bạn yêu sâu sắc, mãnh liệt và hết lòng, và người khác
  có thể thấy sự mãnh liệt của bạn cực kỳ hấp dẫn hoặc đe dọa. Bạn có sức hút và có thể tạo...'
saturn_sun_conjunction: 'Đây là một khía cạnh khá nghiêm túc. Những người sinh ra với Sao Mat Troi hợp Sao Tho, trong thời
  trẻ, bị hạ bệ theo một cách nào đó khiến họ không cảm thấy tự do thể hiện ý chí của mình một cách cởi mở và trực tiếp. Khi
  còn là trẻ em, sự thể hiện cái tôi của họ bị cản trở, dẫn đến một số sự tự ý thức về việc tự biểu đạt. Họ nhận thức rõ ràng
  một cách đau đớn rằng những gì họ muốn, họ không phải lúc nào cũng có được. Khi trưởng thành, họ không cảm thấy thoải mái
  khi là trung tâm của sự chú ý. Vì bất kỳ lý do gì, những người có khía cạnh này trong biểu đồ sinh của họ cảm thấy cần phải
  kiểm soát những xung lực của mình. Họ dễ dàng nhận trách nhiệm nhiều hơn hầu hết mọi người. Cuối cùng, những người Sao Mat
  Troi - Sao Tho tự tạo ra bản sắc của riêng mình. Có một nhu cầu mạnh mẽ được công nhận là thành tựu, nhưng đồng thời cũng
  có một nỗi sợ ánh đèn sân khấu. Những người này có thể rất khắt khe với bản thân, vì họ đặt mục tiêu đạt được có lẽ nhiều
  hơn hầu hết mọi người. Mặt Sao Tho thường nghiêm túc, nhưng những người Sao Mat Troi - Sao Tho cũng có thể có một trí tuệ
  hài hước, mỉa mai.


  Họ không thuộc tuýp người nhảy nhót, phóng đại hay bộc lộ cảm xúc mạnh. Họ sẽ không được mô tả là "sôi nổi" hay nhiệt tình.
  Nhìn chung, họ thể hiện sự hoài nghi và bi quan nhất định, thận trọng và hơi kín đáo. Có một nét bảo thủ rõ ràng ở những
  người này. Một số người cứng nhắc và nghiêm khắc, đòi hỏi người khác phải đạt tiêu chuẩn cao của họ. Tuy nhiên, hầu hết
  những người có khía cạnh này đơn giản là rất ý thức rằng cuộc sống có những giới hạn của nó. Họ không sợ trách nhiệm, và
  có thể gánh vác nhiều hơn phần của mình. Điều tuyệt vời nhất ở khía cạnh này là biểu hiện nghiêm túc và kín đáo đặc trưng
  của tuổi trẻ họ dần dần nới lỏng theo thời gian và tuổi tác. Những người Sao Mat Troi - Sao Tho sẽ thoải mái hơn khi trưởng
  thành. Những người nổi tiếng với Sao Mat Troi hợp Sao Tho: Robert Duvall (khía cạnh chính).'
saturn_sun_opposition: 'Những người sinh ra với khía cạnh thách thức giữa Sao Mat Troi và Sao Tho phải đối mặt với khá nhiều
  khó khăn trong cuộc sống, đặc biệt là trong nửa đầu đời, khi nỗ lực thể hiện ý chí của họ bị cản trở. Có thể có cảm giác
  dai dẳng rằng họ không đạt được điều mình muốn thường xuyên hơn những người xung quanh. Họ có thể cảm thấy mình kém may
  mắn. Những nỗ lực kiểm soát môi trường, và đôi khi cả người khác, có thể diễn ra thường xuyên.


  Những người này sợ cảm giác bất lực của chính mình! Họ muốn được coi là những người thành đạt và quan trọng, và khi đối
  mặt với trở ngại, họ không phải lúc nào cũng muốn thừa nhận rằng chính họ là kẻ thù tồi tệ nhất của mình. Một người có Sao
  Mat Troi - Sao Tho có thể khao khát được coi là quan trọng trong mắt thế giới nhưng đồng thời lại sợ hãi thành công. Họ
  coi những thất bại và trở ngại nhỏ là chuyện hệ trọng, và một số người gần như tự trách móc bản thân vì chúng.


  Sự tự ý thức đến mức thực sự nhạy cảm với bản thân là đặc điểm của khía cạnh thách thức Sao Mat Troi - Sao Tho. Sự thật
  là, không ai...


  Phần 2/4 của văn bản chiêm t học. Dịch sang tiếng Việt:


  Họ luôn đặt kính hiển vi lên mọi thứ, ngoại trừ chính bản thân mình. Một chút trở ngại hay một sai lầm nhỏ không cần phải
  phân tích đến tận cùng. Không cần phải chỉ trích. Không, họ không hề làm trò cười cho thiên hạ khi mắc lỗi. Họ cần ngừng
  lo lắng về việc luôn phải đúng, hay tỏ ra lịch lãm và thành đạt. Khi họ giảm bớt áp lực đặt lên bản thân, họ sẽ thấy rằng
  mình không còn gặp phải nhiều bức tường cản trở như trước. Điều này liên quan rất nhiều đến những gì họ cảm thấy mình xứng
  đáng. Ở sâu thẳm bên trong, nếu họ để bản thân thực sự tin rằng mình xứng đáng có được hạnh phúc và sự bình an trong tâm
  trí, họ sẽ tìm thấy điều đó.


  Khi Sao Tho (Saturn) liên kết chặt chẽ với một hành tinh cá nhân, thường có hiệu ứng kiểm duyệt diễn ra đối với mọi thứ
  được cai trị bởi hành tinh mà nó kết nối qua khía cạnh. Ví dụ, với Sao Mat Trang (Moon), cai trị cảm xúc, người sở hữu cảm
  thấy cần phải kiểm duyệt cảm xúc và tình cảm của mình, quét xem chúng có bị cho là phù phiếm hay không. Với Sao Tho và Sao
  Mat Troi (Sun), có rất nhiều sự tự kiểm duyệt diễn ra. "Tôi không nên..." là một câu


  cơ chế kiểm duyệt với những người này. Họ cảm thấy mình không nên đòi hỏi quá nhiều. Khi họ thể hiện bất kỳ hình thức nào
  của cái tôi, một phần trong họ cảm thấy tội lỗi.

  Vì Sao Mat Troi cai quản ý thức của chúng ta, nó tự đủ khả năng kiểm duyệt. Nó là "người lớn" bên trong chúng ta. Ngược
  lại, Sao Tho giống như "cha mẹ" bên trong chúng ta hơn. Chúng ta cần cha mẹ hướng dẫn khi còn nhỏ, và ở một mức độ nào đó
  khi trưởng thành, nhưng phần lớn, chúng ta không cần bị kiểm duyệt vô thời hạn – điều dường như xảy ra với các góc cứng
  Sao Tho-Sao Mat Troi, ngoại trừ việc sự kiểm duyệt và vai trò cha mẹ đến từ bên trong.

  Lý tưởng nhất, những người này cuối cùng học được rằng các tiêu chuẩn họ đặt ra cho bản thân là quá cao, và đó có thể là
  lý do họ dường như gặp phải những bức tường thành. Họ nhận ra rằng nhiều hạn chế họ gặp phải trong cuộc sống thường là tự
  tạo ra, bắt nguồn từ thái độ thất bại. Họ nên nhận thức được xu hướng chọn những con đường khó khăn nhất để đi và/hoặc từ
  chối bản thân một số thú vui của cuộc sống. Làm việc trên...


  Nhận diện và quản lý những khuynh hướng này sẽ giúp họ tránh được những cạm bẫy của sự kết hợp này.

  Những người này có sự hài hước mỉa mai, trí thông minh sắc bén, và khả năng áp dụng sự thận trọng cùng chiến lược. Sức khỏe
  có thể bị ảnh hưởng, và các vấn đề về xương, răng, và tuần hoàn có thể phát sinh.


  Một số người nổi tiếng có Sao Mat Troi ở góc cạnh khó khăn với Sao Tho:

  Vuong Goc – Harry Belafonte, Wynonna Judd (Sao Mat Troi vuong goc Sao Tho, Sao Thien Vuong, và Sao Diem Vuong), Salvador
  Dali, Marilyn Manson, Oprah Winfrey, Salvador Dali, Virginia Woolf, Ben Stiller, Evan Rachel Wood, và Alec Guiness.


  Doi Xung – Jim Morrison, Amandla Stenberg, Shakira, Whitney Houston, Keith Richards, Kerry Washington, Christina Applegate,
  Jimi Hendrix, Miranda Kerr, Victor Hugo, Cole Sprouse, Dylan Sprouse, Julia Stiles, Tonya Harding, Wesley Snipes, Dax Shepard,
  Stephenie Meyer, Brent Faiyaz, Sridevi, Tisha Campbell, Bob Saget, Amandla Stenberg, và Kurt Russell.


  Xem thêm các trang Sao Mat Troi vuong goc Sao Tho và Sao Mat Troi doi xung Sao Tho.'
saturn_sun_sextile: 'Những người sinh ra dưới ảnh hưởng của khía cạnh hòa hợp giữa Mặt Trời và Sao Thổ thường dễ dàng và tự
  nhiên chấp nhận trách nhiệm, sống một cuộc đời khá có trật tự, và áp dụng sự thận trọng trong các giao dịch tài chính và
  kinh doanh. Họ hiếm khi vội vàng đưa ra kết luận hoặc mạo hiểm một cách thiếu hiểu biết. Họ có một lượng kiên nhẫn nhất
  định và đủ kỷ luật bản thân để từ từ nhưng chắc chắn đạt được những gì họ đã đặt ra. Mặc dù có phần kín đáo, họ thường là
  những người trung thành và có trách nhiệm với những người họ quan tâm.


  Đây không phải là những người hành động nhanh nhất - họ thường dành thời gian và áp dụng phương pháp tiếp cận từng bước
  đối với hầu hết các dự án - nhưng họ đạt được mục tiêu một cách vững chắc. Những người có khía cạnh lục hợp và tam hợp giữa
  Mặt Trời và Sao Thổ là những người đáng tin cậy một cách tự nhiên, và họ không có nhiều kiên nhẫn với những người không
  tôn trọng người khác, những người mạo hiểm một cách ngu ngốc, và những người sống cuộc sống vô tổ chức. Với tam hợp, tất
  cả những đặc điểm này đến tự nhiên. Với lục hợp, những đặc điểm này có sẵn khi cần thiết.


  Một số người nổi tiếng có khía cạnh này bao gồm:

  *   **Lục hợp:** Jennifer Aniston, MC Hammer, Ben Affleck, Meryl Streep, Carl Sandburg, Angelina Jolie, Winston Churchill,
  Robert DeNiro.

  *   **Tam hợp:** Justin Timberlake, Leonardo DiCaprio, Muhammad Ali, Bono, Ron Howard, Raquel Welch, Gloria Vanderbilt,
  Dinah Shore, Linda McCartney, Sheena Easton, Elton John, Catherine Deneuve, và Pearl Bailey.'
