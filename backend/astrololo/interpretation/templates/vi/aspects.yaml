mars_mercury_opposition: 'Bạn có thể phản ứng nhanh chóng bằng lời nói với người khác, và bạn không phải lúc nào cũng lịch
  sự, kín đáo hay khéo léo khi bày tỏ quan điểm. Bạn thường coi mọi thứ khá cá nhân, và sự phòng thủ của bạn đôi khi khiến
  người khác khó có thể trò chuyện bình yên hay hiệu quả với bạn. Tuy nhiên, bạn đam mê với những ý tưởng của mình, quyết
  đoán và dũng cảm về mặt tinh thần.


  Bạn có thể thường xuyên tranh giành quyền phát biểu khi bày tỏ ý tưởng, suy nghĩ và quan điểm. Việc gây ra tranh cãi với
  những gì bạn nói hoặc cách bạn nói có thể xảy ra thường xuyên, dù bạn có chủ đích hay không.


  Bạn rất nhanh nhạy trong nhận thức, và có thể nói nhanh cũng như hành động nhanh. Bạn là một người làm việc năng nổ và xuất
  sắc trong việc tập hợp mọi người cho những gì bạn tin tưởng.


  Bạn rất hóm hỉnh và thường hay mỉa mai. Bạn nhanh chóng đưa ra quan điểm và bày tỏ suy nghĩ, không phải lúc nào cũng đầy
  nhạy cảm. Một số người có khía cạnh này trong biểu đồ của họ thích kể chuyện, chơi trò chơi ngôn từ và vui đùa với ý tưởng.
  Bạn yêu thích một cuộc tranh luận hay nhưng đôi khi biến những cuộc trò chuyện không cần căng thẳng thành các cuộc cãi vã.


  Lý tưởng nhất là, theo thời gian và kinh nghiệm, bạn học được cách thư giãn đầu óc đủ để sử dụng năng lượng tinh thần và
  đam mê lớn lao của mình một cách hiệu quả.


