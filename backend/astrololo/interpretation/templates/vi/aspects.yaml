saturn_sun_trine: 'Những người sinh ra với khía cạnh hài hòa giữa Mặt Trời và Sao Thổ thường dễ dàng và tự nhiên chấp nhận
  trách nhiệm, sống một cuộc đời khá có trật tự, và thận trọng trong các giao dịch tài chính và kinh doanh. Họ hiếm khi vội
  vàng kết luận hoặc chấp nhận rủi ro thiếu suy nghĩ. Họ có một lượng kiên nhẫn nhất định và đủ kỷ luật bản thân để từ từ
  nhưng chắc chắn đạt được những gì họ đặt ra. Mặc dù có phần kín đáo, họ thường là những người trung thành và có trách nhiệm
  với những người họ quan tâm.


  Đây không phải là những người hành động nhanh nhất - họ từ tốn và thường sử dụng phương pháp từng bước cho hầu hết các dự
  án - nhưng họ đạt được mục tiêu một cách vững chắc. Những người có Mặt Trời lục hợp và tam hợp Sao Thổ tự nhiên đáng tin
  cậy, và họ không có nhiều kiên nhẫn với những người không tôn trọng người khác, chấp nhận rủi ro ngớ ngẩn, và sống một cuộc
  đời thiếu tổ chức. Với tam hợp, tất cả những đặc điểm này đến tự nhiên. Với lục hợp, những đặc điểm này có sẵn khi cần thiết.


