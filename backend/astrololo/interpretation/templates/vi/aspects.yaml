  Sự thiếu kiên nhẫn, đặc biệt khi lái xe hoặc vận hành máy móc, có thể dẫn đến tai nạn. Bạn cực kỳ quan sát, chú ý đến nhiều
  chi tiết hơn hầu hết mọi người. Lý tưởng nhất là biểu đồ sinh của bạn có các khía cạnh và yếu tố hỗ trợ khác giúp bạn bình
