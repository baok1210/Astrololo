mercury_venus_conjunction: 'Bạn là người duyên dáng và lịch thiệp, thơ mộng trong cách diễn đạt bản thân, và thường rất lịch
  sự. Vị trí này mang đến sự tinh tế cho bản chất và sự trân trọng nghệ thuật. Bạn hướng tới cân bằng và mang lại sự hài hòa
  cho thế giới của mình. Đôi khi bạn có thể khá do dự, vì bạn có xu hướng nhìn nhận quan điểm của mọi người, và có thể thấy
  giá trị trong hầu hết mọi góc nhìn hay ý kiến. Bạn có ý thức mạnh mẽ về sự công bằng.

  Bạn rất dễ gần và thích giao lưu. Một số người với khía cạnh này có phần lười biếng, thích giao tiếp hơn là làm việc.

  Bạn có thể lý trí hóa hoặc hợp lý hóa cảm xúc của mình, có lẽ suy nghĩ quá nhiều về tình yêu và mối quan hệ đến mức mất
  đi sự kết nối với những gì bạn thực sự cảm nhận. Bạn có thể bị thu hút bởi, hoặc thu hút, những người thiên về trí tuệ làm
  đối tác. Nếu hợp này bị thách thức, bạn có thể thường xuyên thu hút những đối tác tinh quái hoặc mưu mô.

  Nhiều bạn có năng khiếu viết và/hoặc nói. Bạn thực sự thích thú với ngôn ngữ viết và nói, văn học, chơi chữ, cách nói双关,
  và những cuộc trò chuyện khai sáng. Nhiều người có Sao Thuy hợp Sao Kim trong biểu đồ của họ thực sự hùng biện.

  Mặc dù hầu hết mọi người đều thích bạn, khả năng thấu hiểu người mà bạn đang...


  Hiện tại bạn đang nói chuyện với một sức mạnh rất mạnh đến mức bạn có thể bị buộc tội là hai mặt hoặc hời hợt. Bạn cũng
  có thể chọn từ ngữ cẩn thận để tránh xung đột, và do đó người khác có thể không biết cảm xúc thực sự của bạn.


  Diễn giải từ Báo cáo LoveStyles của chúng tôi: Sao Thuy Hop Sao Kim

  Bạn hòa hợp với hầu hết mọi người và thường sẵn sàng nhượng bộ trong các mối quan hệ để duy trì sự hài hòa. Điều đó không
  có nghĩa là bạn trở thành tấm thảm chùi chân cho người khác, nhưng bạn có ý thức mạnh mẽ về sự công bằng và không xúc phạm
  người khác mà không có lý do chính đáng. Người khác hiếm khi bị đe dọa hoặc đe dọa bởi bạn, phần lớn là do bản tính hòa
  nhã và sự duyên dáng xã hội của bạn. Bạn sẵn sàng lắng nghe ý kiến và đề xuất của bất kỳ ai trước khi đưa ra quyết định
  quan trọng.


  Đối đầu trực tiếp có thể khiến bạn không thoải mái, và bạn có thể cảm thấy dễ chịu hơn khi làm việc với một nhóm nhỏ người.
  Có lẽ bạn thích nói trước công chúng hoặc biểu diễn trong nghệ thuật kịch. Một nguồn hài lòng có thể khác cho bạn là viết
  lách, nhờ tài năng tự nhiên của bạn trong việc diễn đạt tốt. Bạn có trí tưởng tượng phong phú và khéo léo trong việc nghĩ
  ra các kế hoạch để cải thiện tình hình kinh tế của mình. Không khó để bạn biến


  r nhiều ý tưởng sáng tạo thành tiền mặt sẵn có.

  Người khác thường sẽ hỗ trợ bạn trong những gì bạn làm vì họ có thể thấy rằng bạn thực hành phán đoán tốt. Họ có thể tin
  tưởng bạn và vui lòng tham gia giúp bạn thành công. Chỉ cần đảm bảo rằng bạn không yêu cầu bất kỳ ai khác chấp nhận rủi
  ro mà chính bạn không dám thử. Thực tế, bất kỳ cơ hội nào bạn nắm lấy sẽ được cân nhắc kỹ lưỡng và có lẽ không quá rủi ro
  sau cùng.

  Trong các mối quan hệ tình cảm, bạn có tài năng trong việc truyền đạt nhu cầu và mong muốn của mình cho đối tác. Bạn bị
  thu hút bởi những người chia sẻ tài năng nghệ thuật của bạn hoặc ít nhất là đánh giá cao nghệ thuật. Đối tác tệ nhất cho
  bạn sẽ là người thiếu tinh tế trong giao tiếp xã hội. Trong tình dục, bạn có thái độ cởi mở lành mạnh và có thể thảo luận
  về chủ đề này khá dễ dàng với đối tác. Sự biểu đạt bằng lời trong quan hệ tình dục có thể rất kích thích đối với bạn! Một
  người yêu không giao tiếp hoặc im lặng trên giường có thể không thỏa mãn bạn về lâu dài.

  Một số người nổi tiếng với Sao Thuy Hop Sao Kim: Dan Levy (Sao Thuy Hop Sao Kim ở Xử Nữ), Maya Angelou (Sao Thuy Hop Sao
  Kim ở Song Ngư), Richard Dreyfuss, Halle Berry, Carl Jung, Winona Ryder, Hillary Rodham Clinton, Anne Archer, Erma Bombeck,
  Laura Bush, Ka


  thy Bates, Alexander Graham Bell, James Coburn, T.S. Eliot, Mark Harmon, Helen Hunt, Ricki Lake, Carlos Santana, Bono (U2),
  Jimi Hendrix, Will Smith, Celine Dion, Camila Cabello, Catulle Mendes (Sao Thuy Hop Sao Kim trong Bo Sinh), Christina Applegate
  (trong Nhan Ma), LaKeith Stanfield (Sao Thuy Hop Sao Kim trong Xu Nu), Aubrey Plaza (trong Cua), Kirk Acevedo (trong Nhan
  Ma), Austin Butler (trong Xu Nu, ca hai de nghich hanh), Alisha Boe (trong Song Ngu).'
mercury_venus_opposition:
  detailed: Sự đối đỉnh giữa Sao Thuy và Sao Kim tạo ra một căng thẳng năng động giữa tâm trí và giao tiếp của bạn với tình
    yêu và giá trị của bạn. Sự kết nối này thách thức bạn phát triển bằng cách đưa hai lĩnh vực này trong cuộc sống vào nhận
    thức có ý thức. Biểu hiện cụ thể phụ thuộc vào phần còn lại của lá số sinh của bạn — các cung và nhà liên quan, cũng như
    cách khía cạnh này tương tác với các cấu hình hành tinh khác.
  short: The Opposition between Mercury and Venus creates a dynamic tension between your mind and communication and your love
    and values.
  title: 'Opposition: Mercury - Venus'
mercury_venus_sextile: 'Bạn là người lịch sự, chọn lọc từ ngữ cẩn thận và đầy yêu thương để không làm ai phật lòng. Sự tế
  nhị của bạn bắt nguồn từ sự ghét bỏ sự bất hòa và xung đột. Bạn không phải lúc nào cũng thẳng thắn và trung thực do mong
  muốn làm hài lòng, xoa dịu và giữ hòa khí này. Với Sao Thuy Lục Hop Sao Kim trong biểu đồ sinh, bạn có khả năng thấu hiểu
  người khác và trở thành một người trò chuyện tuyệt vời. Bạn hướng đến sự công bằng trong các mối quan hệ.

  Bạn có sự đánh giá cao chân thành đối với nghệ thuật và nỗ lực đạt được sự cân bằng và hài hòa trong các mối quan hệ xã
  hội, trong lời nói và văn viết, cũng như trong môi trường cá nhân. Bạn có thể kinh doanh trong các lĩnh vực nghệ thuật,
  thiết kế, quan hệ, tư vấn hoặc làm đẹp.

  Một số người nổi tiếng với Sao Thuy Lục Hop Sao Kim: Eva Longoria, Bob Marley, Romy Schneider, William Shakespeare, Michelangelo,
  Walt Disney, Sylvia Plath, George Sand, Alison Moyet, Azealia Banks, Kirsten Dunst, Peter O’Toole, Elisabeth Kubler-Ross,
  Jerry Lewis, Rihanna, Lana Del Rey, Eminem, Jim Morrison, Orlando Bloom, Alanis Morissette, Jack Black, Sydney Sweeney,
  Kyliegh Curran, Ayọ, Hunter Page-Lochard.

