  cụt. Bạn sẽ làm mọi thứ cần thiết để thành công, nhưng bạn từ chối hạ mình hay trở nên hẹp hòi và ích kỷ.


  Bạn khá thường xuyên áp dụng cách tiếp cận "tất cả hoặc không có gì" vào cuộc sống, đặc biệt là với những ý tưởng, niềm
  tin, mục tiêu và tham vọng của mình. Khát khao muốn đứng đầu và chiến thắng của bạn đôi khi có thể đưa bạn vào xung đột
  với người khác, đặc biệt là với những người có quyền lực. Mặc dù đôi khi bạn có thể hơi quá tay, nhưng nói chung bạn rất
  giỏi trong việc nhận diện các cơ hội để phát triển, mở rộng và cải thiện. Đôi khi, việc tự hỏi bản thân liệu sự mở rộng
  có cần thiết hay không sẽ có ích – giữ mọi thứ đơn giản không phải lúc nào cũng nằm trong từ vựng của bạn, nhưng đôi khi
  đó lại là con đường tốt hơn.


  Bạn thể hiện bản thân một cách mãnh liệt khi tham gia vào việc gì đó, và bạn có những niềm tin vững chắc. Kết quả là, bạn
  có thể gây ra một số tranh cãi.


  Bạn có thể tập trung khi cần thiết, và điều này không hề dễ dàng với nhiều người! Khi được truyền cảm hứng, bạn có thể chuyển
  núi. Bạn có thể khá...


  rất giỏi trong các tình huống khủng hoảng. Bạn có sức mạnh nội tâm và sự kiên định, và hầu hết điều này diễn ra ở cấp độ
  tinh thần hoặc tâm linh.

  Bạn nhìn thấy cơ hội trong hầu hết mọi tình huống, nhưng liệu bạn có phải là người cơ hội hay không lại là một vấn đề hoàn
  toàn khác–nhìn thấy và hành động là hai việc khác nhau!

  Nếu sự kết hợp này bị thách thức trong biểu đồ, điều cần thiết là tránh đẩy ý tưởng của bạn quá mạnh lên người khác. Những
  điều cần chú ý khi khía cạnh này hoạt động kém hoặc bị áp lực: quá tự đề cao, thái độ đòi hỏi quyền lợi quá mức, mong muốn
  nhận được thứ gì đó mà không phải làm gì, hoặc sự bất mãn thường trực.

  Bạn có khả năng thích ứng và sẵn sàng nắm bắt cơ hội hoặc thực hiện những thay đổi và cải tiến. Bạn đam mê với những ý tưởng,
  niềm tin, dự án và sở thích của mình, và bạn sẽ sẵn sàng dẫn đầu trong những lĩnh vực này. Với sự kiên định mạnh mẽ của
  mình, bạn hoặc là dồn hết sức vào hoặc là không làm gì cả.'
