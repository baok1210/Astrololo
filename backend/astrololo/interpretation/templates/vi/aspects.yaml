  bản thân, phần lớn vì họ có xu hướng "tiếp nhận" nhiều năng lượng hỗn hợp từ môi trường xung quanh. Những "cảm xúc" và linh
  cảm mạnh mẽ, đột ngột có thể chi phối họ. Phần lớn thời gian, trực giác của họ chính xác, mặc dù trí tưởng tượng cũng mạnh
  mẽ và họ có thể đọc quá nhiều vào một tình huống.


