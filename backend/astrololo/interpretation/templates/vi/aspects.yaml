  Những người có Sao Kim ở góc đối với Sao Tho có thể đánh giá thấp ngoại hình của mình hoặc chú ý quá mức đến nó. Dù bằng
  cách nào, sự tự ý thức về trang sức là điều phổ biến. Thường thì, những người có vị trí này tự đánh giá thấp bản thân. Họ
