jupiter_sun_square: 'Mặc dù ý định của họ thường là tốt, nhưng những người có các khía cạnh khó khăn giữa Sao Mat Troi và
  Sao Moc có xu hướng làm quá mọi thứ. Họ có thể dễ dàng bỏ qua các chi tiết thực tế và tự đưa mình vào nợ nần, hưởng thụ
  quá mức những thú vui như ăn uống, và hứa nhiều hơn khả năng thực hiện của mình.


  Phần lớn, họ tìm được sự giúp đỡ cho những hành vi quá mức của mình. Luôn có ai đó giúp họ thoát khỏi rắc rối, vì nhiều
  người tin rằng tấm lòng họ là đúng đắn. Thường thì đúng là như vậy, nhưng nếu hành vi quá mức trở thành một mô hình, và
  người bản địa liên tục đối mặt với hậu quả nhẹ, thì có nguy cơ họ sẽ không học hỏi từ sai lầm và lạm dụng "hệ thống", dựa
  vào bạn bè và gia đình giúp đỡ quá thường xuyên. Do đó, danh tiếng tốt đẹp của họ cuối cùng có thể được sử dụng để phục
  vụ mục đích cá nhân.


  Tuy nhiên, nhiều người với khía cạnh này không rơi vào bẫy mất đi sự chân thành. Họ hào phóng, hay giúp đỡ và làm từ thiện.
  Tuy nhiên, xu hướng sống vượt quá khả năng tài chính là một mối đe dọa thực sự mà nhiều người phải đấu tranh trong suốt
  phần lớn cuộc đời. Một điều cần chú ý khác là trầm cảm. Những người này có xu hướng trải qua những giai đoạn cao trào mãnh
  liệt khi họ


  quá lạc quan. Những giai đoạn này rất nổi bật đến mức có vẻ không tự nhiên và dường như sự sụp đổ là không thể tránh khỏi.
  Họ có thể đưa ra những lời hứa mà họ dự định giữ, nhưng gặp vấn đề với việc thực hiện. Kiểm soát bản thân có thể là một
  vấn đề thực sự. Thường khá am hiểu và hào phóng với thời gian của mình, những người này có nhiều tài năng mà họ có thể coi
  là hiển nhiên.

  Một số người nổi tiếng với Sao Mat Troi ở góc cứng với Sao Moc: Vuong Goc – Billy Crystal, Ian Scott Anderson (Jethro Tull),
  Nell Carter, Edgar Cayce, Linda Goodman, George Lucas, cặp song sinh Olsen, Dolly Parton, John Ritter, Oscar Wilde, Beanie
  Feldstein; Doi Xung – Robert Duvall, Beau Bridges, Monica Lewinsky, James Earl Jones, Kevin Costner.'
jupiter_sun_trine: 'Được ban cho sự hào phóng và hòa nhã, những người này có vẻ may mắn trong cuộc sống. Họ thu hút những
  điều tốt đẹp bằng tư duy tích cực và tính cách hào phóng. Những người có Sao Mat Troi ở góc Tam Hop với Sao Moc hiếm khi
  hoàn toàn "thất bại", họ thường được đón nhận, hữu ích và am hiểu. Họ có thể thích du lịch và có tình cảm đặc biệt với những
  nơi và con người nước ngoài. Nhìn chung, họ không phải là những người cạnh tranh gay gắt, và phần lớn cũng không hay gây
  gổ. Do đó, họ thường được yêu mến.


  Những người này thường có tấm lòng nhân hậu, đạo đức vững vàng và niềm tin lớn vào cuộc sống cũng như con người. Họ thích
  tìm thấy điều tốt đẹp trong mọi tình huống và ở mọi người. Tin tưởng vào trật tự, bình đẳng và luật lệ, họ thường thiếu
  kiên nhẫn với những kẻ vi phạm quy tắc. Họ thường giữ đúng lời hứa, và sự chân thành tỏa ra từ họ có thể được tin cậy.


  Nhìn vào mặt tích cực là thế mạnh của họ – hãy tìm đến những người này để được truyền niềm tin và sự lạc quan đầy dễ chịu.
  Họ nhanh chóng bật cười và không thể cưỡng lại bất kỳ lời kêu gọi nào đến tính hài hước của mình. Một số người có khía cạnh
  này thực sự vui vẻ. Những người khác ít nổi bật hơn, nhưng niềm tin vào cuộc sống và sự sẵn sàng tìm thấy tiếng cười trong
  đời của họ vẫn luôn hiện hữu.


  Tuy nhiên, điều này vẫn rõ ràng.

