mercury_venus_trine:
  detailed: Tam Hop giua Sao Thuy va Sao Kim tao ra su ket hop hai hoa giua tri tuc va giao tiep cua ban voi tinh cam va gia
    tri cua ban. Moi lien ket nay ho tro su phat trien cua ban bang cach dua hai khia canh nay trong cuoc song vao su nhan
    thuc co y thuc. Bieu hien cu the phu thuoc vao boi canh cua so sinh thanh cua ban — cac cung va nha lien quan, va cach
    khia canh nay tuong tac voi cac cau hinh hanh tinh khac.
  short: The Trine between Mercury and Venus creates a harmonious blend between your mind and communication and your love
    and values.
  title: 'Trine: Mercury - Venus'
moon_neptune_conjunction: 'Sao Mat Trang Hop voi Sao Hai Vuong

  Khong co su thieu thieu su sang tao khi Sao Mat Trang nam trong cung Hop voi Sao Hai Vuong trong luoi sao ban do. Cach su
  dung chat luong nay phu nhieu vao cac khia canh khac doi voi cung Hop nay va muc do chung trinh cua nguoi so huu. Trong
  mot luoi sao kho khan, su nhay cam qua muc, su phu thuoc, su tu thuong ban than, su vo trach nhiem, su tron chay thuc tai,
  va nhung so hai vo ly la co the xay ra. Tuy nhien, hau het nhung nguoi co khia canh nay khong bieu hien tat ca hoa ngay
  ca hau het nhung dac diet nay trong thoi gian dai.


  Co mot nhu cau manh me ve mot kenh sang tao de bieu lo su sang tao cua ho. Truc giac va mo mo, nhung nguoi nay "nuoi duong"
