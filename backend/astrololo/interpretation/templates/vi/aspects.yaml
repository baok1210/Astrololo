  "Nhập" vào cảm xúc của người khác chắc chắn là một tài năng và món quà, nhưng điều này cũng có thể khiến bạn dễ bị tổn thương
  bởi môi trường xung quanh theo nhiều cách. Bạn vô thức hấp thụ bầu không khí tâm linh và cảm xúc của những người xung quanh,
  đến mức có thể không thể tách biệt và phân biệt cảm xúc của bản thân với cảm xúc của người khác. Do đó, bạn dễ bị thao túng,
  đặc biệt thông qua lòng thương xót. Việc để người khác lợi dụng bạn về mặt cảm xúc, tài chính, hay thậm chí tâm linh có
  thể là vấn đề đối với bạn.


  Ở một khía cạnh khác, khi mất cân bằng, bạn có thể biểu hiện sự nhạy cảm quá mức với hóa chất, chất ô nhiễm trong môi trường,
  hoặc thậm chí là thuốc kê đơn, cùng với sự không dung nạp với bất kỳ loại tiếng ồn, căng thẳng hay sự bất hòa nào. Bạn có
  xu hướng tiếp nhận tất cả thay vì chống lại hay duy trì ranh giới vững chắc. Bạn có những ranh giới khá mềm mại và thấm
  thấu. Tuy nhiên, khi mất cân bằng, bạn phản ứng tốt với các liệu pháp tinh tế chủ yếu tác động đến năng lượng cảm xúc hoặc
  vi tế, từ đó đưa bạn trở lại trạng thái hài hòa. Âm nhạc đẹp có tác dụng chữa lành đối với bạn, liệu pháp màu sắc, hương
  thơm, hay đơn giản là ở gần hoặc trong nước đều có thể rất hiệu quả với bạn.


  Điều này cũng có lợi cho bạn...


  o định kỳ rút lui để làm mới bản thân. Việc đi tĩnh tâm hoặc đến những nơi linh thiêng, thậm chí chỉ đơn giản là ở ngoài
  hoang dã, đôi khi rất cần thiết cho bạn. Bạn có khao khát mãnh liệt được trốn chạy hay rời bỏ thế giới này.


  Có vẻ như bạn nhớ về một thế giới đẹp đẽ, yên bình và thanh bình hơn nhiều (tử cung/nơi chốn quê nhà), và một phần trong
  bạn luôn khao khát được trở về. Thiền định và các thực hành chiêm nghiệm có thể thỏa mãn ham muốn được kết nối lại này;
  việc sử dụng chất kích thích, rượu bia, hoặc sa đà vào các chiến lược trốn chạy khác có thể là cách tiêu cực (ít nhất là
  không hiệu quả) để cố gắng đạt được sự bình an hay hạnh phúc tương tự.


  **Sao Mat Trang Vuong Goc hoặc Doi Xung Sao Hai Vuong**


  Vì bản chất mơ mộng và hy vọng lớn lao, những người có Sao Mat Trang ở góc cạnh khó với Sao Hai Vuong rất dễ trở nên thất
  vọng. Đổi lại, họ cũng dễ dàng được truyền cảm hứng trở lại. Kết quả là một chuyến đi trên tàu lượn siêu tốc cảm xúc. Những
  người này khao khát được truyền cảm hứng và nuôi dưỡng về mặt cảm xúc, nhưng trong khía cạnh này, họ có thể giống như một
  cái hố không đáy. Hoặc, hy vọng của họ có thể quá cao siêu và không thực tế, nên phần thưởng vô hình mà họ tìm kiếm mãi
  mãi khó nắm bắt. Đôi khi, họ cảm thấy rất bị chi phối bởi cảm xúc của mình, nhưng họ lại rất khó để thực sự hiểu rõ.


  hoặc xác định thế giới cảm xúc của họ.

  Với vị trí này, có rất nhiều khao khát từ tâm hồn, nhưng sự trống rỗng mà họ thường cảm thấy đôi khi rất khó định nghĩa.
  Rất có thể, họ đang tìm kiếm tình yêu vô điều kiện – cả để trao đi và nhận lại. Tuy nhiên, niềm tin và sự tin tưởng của
  chính họ vào người khác có sự dao động lớn. Họ muốn tin tưởng người thân yêu hơn bất cứ điều gì, nhưng khi họ làm vậy, một
  phần trong họ lại hoài nghi chính trái tim tin tưởng của mình, và họ lo lắng rằng mình tin tưởng quá nhiều. Thường thì,
  những vấn đề này bắt nguồn từ thời thơ ấu nơi sự nuôi dưỡng không nhất quán.


  Những người này có thể lãng phí nhiều thời gian vào những whim cảm xúc, khi họ theo đuổi những mục tiêu hoặc con người hão
  huyền hoặc không thực tế. Trong các mối quan hệ, một cách khá trớ trêu, những tâm hồn cảm xúc này có thể rất khó tiếp cận.
  Họ gặp khó khăn trong việc cam kết với bất kỳ con đường nào, và họ có thể rất dễ lách tránh những vấn đề khó khăn. Việc
  tránh né những chủ đề "không mấy dễ chịu" có lẽ nổi bật nhất ở nam giới với vị trí này, mặc dù cả hai giới rất thường nói
  những câu đại loại như, "chúng ta đừng nói về điều đó nữa."


  Đối mặt với thực tế và những sự thật lạnh lùng có thể rất khó khăn cho những người này. Họ có xu hướng lãng mạn hóa quá
  khứ hoặc mơ về một tương lai lý tưởng.


  Đây là phần 6 trong 8 của một văn bản chiêm t học. Dịch sang tiếng Việt:


  thực tại, và việc tận hưởng hiện tại là một điều hiếm hoi. Sự trì hoãn ở cấp độ cảm xúc là một khuynh hướng lớn.

  Đây là những linh hồn đầy lòng trắc ẩn, tuy nhiên có thể miễn cưỡng tham gia, có lẽ vì họ cảm nhận rằng họ có thể dễ dàng
  bị lạc lối trong bất kỳ mục đích nào. Họ là những miếng bọt biển tâm linh hấp thụ cảm xúc của người khác. Họ cực kỳ nhạy
  cảm với "khí hậu" cảm xúc của bất kỳ địa điểm, bối cảnh hoặc tình huống nhất định nào.

  Trong một số trường hợp, những người có khía cạnh này trong biểu đồ sinh của họ chiếu Sao Hai Vương lên môi trường của họ,
  và do đó thu hút những người và hoàn cảnh mang tính Sao Hai Vương vào cuộc sống của họ. Ví dụ, một số người thu hút những
  đối tác khó nắm bắt, nghiện ngập, vô trách nhiệm hoặc không muốn cam kết. Những sự vướng mắc và ảo tưởng cảm xúc bất thường
  là phổ biến với vị trí này. Trong một số trường hợp, "bê bối" xảy ra trong cuộc sống. Những lối thoát sáng tạo cho trí tưởng
  tượng mạnh mẽ của họ có thể cực kỳ hữu ích, vì chúng có thể cung cấp một diễn đàn cho những kịch tính cảm xúc mà họ khao
  khát.


  Sao Mat Trang Luc Hop hoặc Tam Hop Sao Hai Vuong

  Với những khía cạnh này trong biểu đồ sinh, bản chất có một khía cạnh đầy lòng trắc ẩn và thấu hiểu không thể nhầm lẫn.
  Những người này có sự gắn kết tự nhiên với âm nhạc. Mặc dù mọi người đều thưởng thức âm nhạc, những người có Sao Mat Trang


  Trong aspect hòa hợp với Sao Hai Vuong, họ đáp ứng với âm nhạc như một phương tiện để chữa lành, thư giãn và nâng cao tâm
  hồn. Bản tính nhạy bén tự nhiên, họ dễ dàng thấu hiểu cảm xúc của người khác và tâm trạng xung quanh mà không cần nỗ lực.


  Họ có nhu cầu cảm xúc rõ ràng để thoát vào thế giới tưởng tượng, và đôi khi cần rút lui khỏi mọi người để tái cân bằng bản
  thân, phần lớn vì họ có xu hướng "tiếp nhận" rất nhiều năng lượng hỗn hợp từ môi trường xung quanh. Những "cảm giác" và
  linh cảm mạnh mẽ, đột ngột có thể chi phối họ. Phần lớn thời gian, trực giác của họ chính xác, mặc dù trí tưởng tượng cũng
  rất mạnh mẽ và họ có thể đọc quá nhiều vào một tình huống.


  Sự lười biếng nhất định gắn liền với vị trí này. Điều này bắt nguồn từ sự nhút nhát và nhạy cảm tự nhiên, thể hiện rõ từ
  nhỏ. Họ có thể bị gắn nhãn "nhút nhát" khi còn trẻ, và gia đình hoặc bạn bè có thể đã can thiệp để "cứu" họ khỏi những tình
  huống đòi hỏi sự táo bạo hay hung hăng. Do đó, tính thụ động được chấp nhận, và khi trưởng thành, những người này ít kinh
  nghiệm hơn hầu hết mọi người trong việc chủ động tiếp cận hay theo đuổi điều họ muốn.


  Aspect Tam Hop là aspect năng động hơn trong hai aspect hòa hợp. Những người có aspect Luc Hop...


  bạn có thể gọi những phẩm chất này khi cần, và những người có Tam Hop giữa Sao Mat Trang và Sao Hai Vuong đã tích hợp các
  phẩm chất của khía cạnh này vào tính cách của họ, thể hiện chúng một cách tự nhiên và nhất quán.

