  tùng, hoặc đôi khi lười biếng, không chủ động khi tình huống đòi hỏi.


  Góc tam hợp là khía cạnh năng động hơn trong hai khía cạnh hài hòa này. Những người có lục hợp có thể gọi những đặc điểm
  này khi cần, trong khi những người có tam hợp đã tích hợp chúng vào tính cách, thể hiện một cách tự nhiên và nhất quán.


  Khi yêu, bạn yêu sâu sắc và trọn vẹn. Với Sao Kim ở khía cạnh lục hợp với Sao Hải Vương, bạn có khả năng hoàn toàn đầu hàng
  bản chất của Tình Yêu. Phong cách nhẹ nhàng, quan tâm của bạn thu hút một đối tác khao khát được yêu thương và che chở.
  Bạn biết khi nào mình đã tìm thấy tình yêu đích thực, bởi vì một điều gì đó sâu thẳm bên trong mở ra và đưa bạn đến một
  trạng thái khác.


  Mặc dù bạn có xu hướng đặt ra những kỳ vọng không thực tế cho người mình yêu, nhưng bạn làm điều đó với sự quan tâm chân
  thành đến mức mọi người đều ngạc nhiên trước những thay đổi kỳ diệu rõ ràng. Bạn có thể biết khi nào là lúc cần tha thứ
  và bước tiếp, điều này cho phép bạn vẫn mở lòng đón nhận niềm vui ngay cả giữa những thay đổi. Sự tận tụy với những lý tưởng
  cao đẹp cũng đóng vai trò trong các mối quan hệ tình cảm, và bạn có khả năng duy trì một tình yêu bắt nguồn từ một cấp độ
  rất mạnh mẽ và sẽ kéo dài mãi mãi. Bản chất lãng mạn của bạn được tăng cường qua ảnh hưởng của Sao Hải Vương.'
pluto_saturn_conjunction:
  detailed: Sự Hop giua Sao Tho va Sao Diem Vuong tao ra mot su ket hop thanh thoa giua kien nhan va cau truc cua ban voi
    su bien doi va quyen nang cua ban. Moi lien ket nay ho tro su phat trien cua ban bang cach dua hai khia canh nay trong
    cuoc song cua ban vao nhan thuc co y thuc. Bieu hien cu the phu thuoc vao phan con lai cua so sinh thoi cua ban — cac
    cung va nha lien quan, va cach khia nay tuong tac voi cac cau hinh hanh tinh khac.
  short: The Conjunction between Saturn and Pluto creates a harmonious blend between your discipline and structure and your
    transformation and power.
  title: 'Conjunction: Saturn - Pluto'
pluto_saturn_opposition:
  detailed: Sự Doi Xung giữa Sao Tho và Sao Diem Vuong tạo ra một căng thẳng năng động giữa kỷ luật và cấu trúc của bạn với
    sự chuyển hóa và quyền lực của bạn. Sự kết nối này thách thức bạn phát triển bằng cách đưa hai lĩnh vực này trong cuộc
    sống của bạn vào nhận thức có ý thức. Biểu hiện cụ thể phụ thuộc vào phần còn lại của biểu đồ sinh của bạn — các cung
    và nhà liên quan, và cách khía cạnh này tương tác với các cấu hình hành tinh khác.
  short: The Opposition between Saturn and Pluto creates a dynamic tension between your discipline and structure and your
    transformation and power.
  title: 'Opposition: Saturn - Pluto'
pluto_saturn_sextile:
  detailed: Luc Hop giua Sao Tho va Sao Diem Vuong tao ra su ket hop hai hoa giua kien nhan va cau truc cua ban voi su chuyen
    hoa va quyen luc cua ban. Moi lien ket nho ho tro su phat trien cua ban bang cach dua hai khia canh nay trong cuoc song
    ban vao su nhan thuc co y. Bieu hien cu the phu thuoc vao ban do sinh thanh cua ban — cac dau hoi va nha lien quan, va
    cach aspect nay tuong tac voi cac cau hinh hanh tinh khac.
  short: The Sextile between Saturn and Pluto creates a harmonious blend between your discipline and structure and your transformation
    and power.
  title: 'Sextile: Saturn - Pluto'
pluto_saturn_square:
  detailed: Hinh Vuong Goc giua Sao Tho va Sao Diem Vuong tao ra mot dong luc canh tranh giua kien nhat va cau truc cua ban
    voi su chuyen hoa va quyen luc cua ban. Moi lien ket nay thach thuc ban phat trien bang cach dua hai khia canh nay trong
    cuoc song vao su nhan thuc co y. Bieu hien cu the phu thuoc vao phan con lai cua so sinh thien cua ban - nhung dau hoi
    va nha o lien quan, va cach hinh vuong goc nay tuong tac voi cac cau hinh hanh tinh khac.
  short: The Square between Saturn and Pluto creates a dynamic tension between your discipline and structure and your transformation
    and power.
  title: 'Square: Saturn - Pluto'
pluto_saturn_trine:
  detailed: Tam Hop giua Sao Tho va Sao Diem Vuong tao ra su ket hop hai hoa giua su kien tri va cau truc cua ban voi su bien
    doi va suc manh cua ban. Moi lien he nay ho tro su phat trien cua ban bang cach dua hai khia canh cuoc song nay vao nhan
    thuc co y thuc. Bieu hien cu the phu thuoc vao phan con lai cua so sinh thoi cua ban - cac dau hoi va nha lien quan, va
    cach khia canh nay tuong tac voi cac cau hinh hanh tinh khac.
  short: The Trine between Saturn and Pluto creates a harmonious blend between your discipline and structure and your transformation
    and power.
  title: 'Trine: Saturn - Pluto'
pluto_sun_conjunction: 'Sao Mặt Trời vuông góc hoặc đối đỉnh Sao Diêm Vương: Những người sinh ra với aspect đầy thách thức
  giữa Sao Mặt Trời và Sao Diêm Vương thường có xu hướng trải qua sự căng thẳng nội tâm và hành vi tiêu cực, tự hủy hoại bản
  thân. Khi mọi thứ diễn ra tốt đẹp, họ lại sợ hãi rằng điều gì đó sẽ xuất hiện để thay đổi điều đó. Các mô hình tư duy của
  họ có thể mang tính tiêu cực, và nếu không được kiểm soát, chúng có thể làm suy giảm nghiêm trọng hạnh phúc của họ. Sự lo
  lắng thường trực rằng tấm thảm sẽ bị kéo khỏi dưới chân họ có thể dễ dàng trở thành một lời tiên tri tự ứng nghiệm.


  Sao Mặt Trời - Sao Diêm Vương sở hữu sức mạnh và năng lượng to lớn – khi họ học cách chấp nhận và sử dụng sức mạnh đó, thay
  vì sợ hãi nó, họ là một trong những người hiệu quả, sâu sắc, hữu ích và chữa lành nhất!


  Một trong những đặc điểm nổi bật nhất của các aspect này là xu hướng cực kỳ không hài lòng với thành tựu cá nhân và cách
  thể hiện bản thân. Những người này tạo ra rất nhiều áp lực cho chính mình liên quan đến các nỗ lực cá nhân. Ví dụ, một đứa
  trẻ với aspect Sao Mặt Trời - Sao Diêm Vương đầy thách thức có thể làm việc cố gắng hết sức với một tác phẩm nghệ thuật,
  quyết định nó chưa đúng, phá hủy nó, và bắt đầu lại từ đầu. Đứa trẻ này sẽ đặc biệt bị rối loạn nếu cảm thấy mọi người đang
  theo dõi khi chúng tạo ra tác phẩm nghệ thuật của mình.


  Đây là một ví dụ đơn giản, nhưng nó khá mô tả xu hướng của những người này là không hài lòng với sự thể hiện sáng tạo của
  bản thân, và muốn che giấu sự thể hiện của mình với người khác cho đến khi họ cảm thấy sản phẩm đã "đúng". Điều này phần
  lớn là do cảm giác bất lực trong việc thể hiện hoặc tiết lộ con người thật của mình cho người khác. Họ trải nghiệm cùng
  lúc khát khao thể hiện bản thân và mong muốn giấu mình đi. Họ đấu tranh với nhu cầu sâu sắc là kiểm soát bản thân và chính
  cuộc sống.'
pluto_sun_opposition: 'Sao Hỏa hợp hoặc tam hợp với Sao Kim: Những người sinh ra dưới ảnh hưởng của khía cạnh hài hòa giữa
  Sao Hỏa và Sao Kim thường dễ dàng và tự nhiên tìm thấy đam mê để theo đuổi, cũng như tập trung vào mục tiêu. Họ không sợ
  hãi nhiều điều, tận hưởng và đón nhận sự phát triển, đặc biệt là về mặt tâm lý. Họ yêu thích những bí ẩn và thành thạo trong
  việc giải mã chúng. Nhiều người cảm thấy họ có một "sứ mệnh" hoặc số phận, sẵn sàng gán ý nghĩa cho những sự kiện mà người
  khác có thể coi là "bình thường". Họ tìm kiếm biểu tượng và đọc giữa các dòng trong hầu hết mọi tình huống. Sức sống thể
  chất thường mạnh mẽ, và cơ thể có khả năng chữa lành nhanh chóng.


  Người khác có xu hướng tôn trọng những người có khía cạnh này. Họ không sợ dơ tay làm việc bẩn, và thường nhanh chóng giúp
  đỡ người khác – không chỉ với các công việc thường ngày, mà còn ở cấp độ tâm linh hoặc tâm lý. Sự sáng suốt của họ sắc bén
  và đôi khi đáng kinh ngạc. Đây là những người nhạy bén, không dễ bị lung lay hay ngạc nhiên trong cuộc sống. Họ không phải
  là người làm việc thiện, và cũng hiếm khi là người vi phạm luật pháp. Tuy nhiên, họ không sợ "mặt tối" của bản chất con
  người, và sẽ uốn cong các quy tắc từ thời gian này sang thời gian khác nếu cảm thấy cần thiết.


  Nhiều người đặc biệt thích thú với sự trưởng thành và những bài học của cuộc sống. Họ không thích sự hời hợt, và thường
  là người đầu tiên phát hiện ra sự giả tạo dưới mọi hình thức. Một số người thử nghiệm với khả năng lừa dối của mình ở giai
  đoạn đầu của cuộc đời, nhưng nói chung họ phát triển sức mạnh và sự chính trực của mình. Thực tế, nhiều người cố gắng hết
  sức để loại bỏ bất kỳ sự tự lừa dối nào. Những người này đầy đam mê và có thể rất mãnh liệt. Họ khao khát trải nghiệm nhiều
  hơn một cuộc sống "bình thường".'
pluto_sun_semisextile: 'Trở lại Các Khía Cạnh Hành Tinh

  Thêm Các Khía Cạnh của Sao Mặt Trời trong Biểu Đồ Sinh:

  Khía Cạnh Sao Mặt Trời-Sao Mặt Trăng | Khía Cạnh Sao Mặt Trời-Sao Thủy | Khía Cạnh Sao Mặt Trời-Sao Kim | Khía Cạnh Sao
  Mặt Trời-Sao Hỏa | Khía Cạnh Sao Mặt Trời-Sao Mộc | Khía Cạnh Sao Mặt Trời-Sao Thổ | Khía Cạnh Sao Mặt Trời-Sao Thiên Vương
  | Khía Cạnh Sao Mặt Trời-Sao Hải Vương | Khía Cạnh Sao Mặt Trời-Sao Diêm Vương | Khía Cạnh Sao Mặt Trời-Đỉnh Nhà

  Không biết vị trí của Sao Mặt Trời trong biểu đồ sinh của bạn? Tìm hiểu cách bạn có thể nhận được vị trí biểu đồ chiêm tinh
  miễn phí với các bước đơn giản của chúng tôi.

  Trở lại Các Khía Cạnh Hành Tinh

  Đang tìm kiếm giải thích cho các khía cạnh khác? Xem Bat Xung, Lục Hop nửa, và Ngũ Hop/Bát Ngũ Hop.

  Giải thích được viết bởi Annie.'
pluto_sun_sextile: 'Ghi chú từ Annie: Có lẽ tôi đã sử dụng nhiều từ hơn để mô tả các khía cạnh Sao Mat Troi-Sao Diem Vuong
  so với các khía cạnh hành tinh khác. Điều này là vì tôi lớn lên với những cuốn sách chiêm tinh đưa ra những mô tả khá khắc
  nghiệt và cực đoan về các khía cạnh.

  Vì lý do này, tôi gặp khó khăn trong việc đồng nhất bản thân với cách diễn giải về khía cạnh Sao Mat Troi hợp Sao Diem Vuong
  của chính mình, vốn bị mô tả là "ham quyền lực", "thống trị" và "kiểm soát". Một số mô tả còn gợi ý sự thu hút đối với tội
  phạm. Trừ những trường hợp cực đoan, những người có Sao Mat Troi-Sao Diem Vuong không phải là những kẻ cực đoan quyết tâm
  phá hủy hay thống trị mọi người xung quanh. Tuy nhiên, họ cần phải đối mặt với "bóng tối" bên trong mình, những nỗi sợ hãi
  mãnh liệt, và xu hướng tự bảo vệ bản thân rất cao.

  Một cách tiếp cận nhân văn và tâm lý học hơn để định nghĩa các khía cạnh có thể được tìm thấy trong nhiều cuốn sách chiêm
  tinh hiện đại, và tôi nghĩ điều này rất có lợi, đặc biệt vì một trong những thách thức chính cần vượt qua với Sao Mat Troi-Sao
  Diem Vuong là để vị vua lý trí của ánh sáng (Sao Mat Troi) đồng nhất với năng lượng của vị vua của bóng tối (Sao Diem Vuong).
  Không ai được lợi ích nếu các mô tả về khía cạnh cực đoan đến mức chúng nhanh chóng bị bác bỏ là "sai".'
pluto_sun_square: 'Những người sinh ra dưới sự tương hợp giữa Sao Mặt Trời và Sao Diêm Vương thường dễ dàng và tự nhiên tìm
  thấy đam mê để theo đuổi, cũng như tập trung vào mục tiêu. Họ không sợ hãi nhiều điều, tận hưởng và đón nhận sự phát triển,
