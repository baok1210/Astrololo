jupiter_sun_conjunction: 'Trừ khi Sao Tho cũng liên quan đến khía cạnh này, những người có Sao Mat Troi Hop Sao Moc trong
  biểu đồ sinh của họ thường rất nhiệt tình và lạc quan. Họ thực sự mong đợi những điều tốt đẹp nhất - từ bản thân, từ người
  khác, và từ cuộc sống. Họ thích nhìn thấy điều tốt đẹp trên thế giới.


  Sự tự tin vào mọi thứ sẽ suôn sẻ cũng có thể khiến họ gặp rắc rối. Sự buông thả quá mức trong ăn uống, cờ bạc, mua sắm -
  bất kỳ thú vui nào của họ - đều rất có khả năng xảy ra, đơn giản vì những người này có thể hay trì hoãn và đặt quá nhiều
  niềm tin vào việc cuộc sống sẽ tự "sửa chữa" mọi thứ. Họ có thể ăn chỉ vì ăn, chi tiêu vào những thứ đắt tiền mà tạm thời
  quên đi thực tế là hóa đơn sẽ đến vào tháng sau, và tương tự như vậy. Việc tiết kiệm tiền có thể rất khó khăn với họ.


  Sự thật là, nhiều lần có vẻ như những người này có một thiên thần hộ mệnh xuất hiện và cứu nguy cho họ, đôi khi vào đúng
  phút cuối. Họ có xu hướng "thoát tội" nhiều hơn hầu hết mọi người. Nhưng cuối cùng họ sẽ phải đối mặt với một số hậu quả
  cho sự buông thả của mình, chẳng hạn như vòng eo ngày càng lớn hoặc nợ nần ngày càng tăng.


  Mặc dù không đặc biệt cạnh tranh, nhưng những người có Sao Mat Troi Hop Sao Moc có cái nhìn lạc quan và có xu hướng đạt
  được khá nhiều thành tựu.


  Họ khá linh hoạt. Nhìn chung có khả năng thu phục người khác, bản chất của họ là sẵn sàng giúp đỡ người khác hơn là tranh
  cãi với họ. Họ thể hiện sự công bằng, hào phóng và chân thành. Hào phóng với thời gian và tiền bạc, những người này dễ được
  yêu mến. Bởi vì họ có xu hướng đánh giá quá cao khả năng của mình, họ có thể hứa nhiều hơn những gì có thể thực hiện.


  Một số người có khía cạnh này có thể tự cho mình là đúng và hay giáo huấn. Những người khác thể hiện khía cạnh giảng dạy
  của Sao Moc. Số khác lại dễ phóng đại, mặc dù câu chuyện của họ thú vị đến mức mọi người có xu hướng bỏ qua điều đó.


  Mặc dù phần lớn tích cực và lạc quan, những người có Sao Mat Troi Hop Sao Moc không miễn nhiễm với trầm cảm. Dù ngắn ngủi,
  những lúc xuống dốc của họ có thể rất kịch tính, đơn giản vì họ không chuẩn bị cho những thời điểm này.


  Một số người nổi tiếng có Sao Mat Troi Hop Sao Moc: Mick Jagger (cung Leo), Harry Belafonte, Woody Allen, Garth Brooks,
  Sally Field, Anais Nin, Kurt Russell, Ray Bradbury, Brooke Shields, B.F. Skinner (nhà tâm lý học gây tranh cãi), Mark Spitz
  (vận động viên bơi lội), Freddie Prinze, Lizzo (cung Kim Nguu), Raquel Sánchez Silva (cung Ma Ket), Lakeith Stanfield (cung
  Leo), Austin Butler (cung Leo), Ayọ (cung Xa Phu).'
jupiter_sun_opposition: 'Mặc dù ý định của họ thường là tốt, nhưng những người có các khía cạnh đầy thách thức giữa Sao Mat
  Troi và Sao Moc có xu hướng làm quá mọi thứ. Họ dễ dàng bỏ qua các chi tiết thực tế và tự đẩy mình vào nợ nần, hưởng thụ
  quá mức các thú vui như ăn uống, và hứa hẹn nhiều hơn khả năng thực hiện của họ.


  Phần lớn, họ tìm được sự giúp đỡ cho những hành vi quá mức của mình. Luôn có ai đó sẵn sàng cứu giúp họ, vì nhiều người
  tin rằng tấm lòng của họ là đúng đắn. Thông thường, điều này là đúng, nhưng nếu hành vi quá mức trở thành một thói quen,
  và những người bản địa liên tục phải đối mặt với hậu quả nhẹ, thì có nguy cơ họ sẽ không học hỏi từ sai lầm của mình và
  lạm dụng "hệ thống", dựa vào bạn bè và gia đình giúp đỡ quá thường xuyên. Do đó, danh tiếng tốt đẹp của họ cuối cùng có
  thể được sử dụng để phục vụ mục đích cá nhân.


  Tuy nhiên, nhiều người có khía cạnh này không rơi vào bẫy mất đi sự chân thành của mình. Họ hào phóng, hay giúp đỡ và từ
  thiện. Tuy nhiên, xu hướng sống xa hoa quá mức thực sự là một mối đe dọa mà nhiều người phải vật lộn trong suốt phần lớn
  cuộc đời. Một điều cần lưu ý khác là trầm cảm. Những người này có xu hướng trải qua những giai đoạn cao trào mãnh liệt khi
  họ


  quá lạc quan. Những giai đoạn này rõ ràng đến mức có vẻ không tự nhiên và một sự sụp đổ dường như là không thể tránh khỏi.
  Họ có thể đưa ra những lời hứa mà họ định giữ, nhưng gặp vấn đề với việc thực hiện. Kiểm soát bản thân có thể là một vấn
  đề thực sự. Thường khá am hiểu và hào phóng với thời gian của mình, những người này có nhiều tài năng mà họ có thể coi là
  hiển nhiên.

  Một số Người Nổi Tiếng với Sao Mat Troi ở Góc Cứng với Sao Moc: Vuong Goc – Billy Crystal, Ian Scott Anderson (Jethro Tull),
  Nell Carter, Edgar Cayce, Linda Goodman, George Lucas, cặp song sinh Olsen, Dolly Parton, John Ritter, Oscar Wilde, Beanie
  Feldstein; Doi Xung – Robert Duvall, Beau Bridges, Monica Lewinsky, James Earl Jones, Kevin Costner.'
jupiter_sun_sextile: 'Được ban cho sự hào phóng và hòa nhã, những người này có vẻ may mắn trong cuộc sống. Họ thu hút những
  điều tốt đẹp với tư duy tích cực và tính cách hào phóng. Những người có Sao Mat Troi ở góc hợp thuận lợi với Sao Moc hiếm
  khi hoàn toàn "thất bại", họ thường được đón nhận, hay giúp đỡ và thông thạo. Họ có thể thích du lịch và có tình cảm đặc
  biệt với những nơi và con người nước ngoài. Nhìn chung, họ không phải là những người quá cạnh tranh, và phần lớn cũng không
  hay gây gột. Do đó, họ thường được yêu mến.


  Những người này thường có tấm lòng nhân hậu, đạo đức vững vàng và niềm tin lớn vào cuộc sống cũng như con người. Họ thích
  tìm thấy điều tốt đẹp trong mọi tình huống và ở mọi người. Tin tưởng vào trật tự, bình đẳng và luật pháp, họ không kiên
  nhẫn lắm với những người phá vỡ quy tắc. Họ thường giữ đúng lời hứa, và sự chân thành tỏa ra từ họ có thể được tin cậy.


  Nhìn vào mặt tích cực là thế mạnh của họ – hãy tìm đến những người này để được một liều niềm tin và lạc quan dễ chịu. Họ
