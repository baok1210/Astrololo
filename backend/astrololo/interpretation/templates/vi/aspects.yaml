  những gì bạn nói hoặc cách bạn nói có thể xảy ra thường xuyên, dù bạn có chủ đích hay không.


  Bạn rất nhanh nhạy trong nhận thức, và có thể nói nhanh cũng như di chuyển nhanh. Bạn là một người làm việc năng nổ và xuất
  sắc trong việc tập hợp mọi người cho những điều bạn tin tưởng.


  Bạn rất hóm hỉnh và thường hay mỉa mai. Bạn nhanh chóng đưa ra quan điểm và bày tỏ suy nghĩ, không phải lúc nào cũng đầy
  nhạy cảm. Một số người có khía cạnh này trong biểu đồ thích kể chuyện, chơi trò chơi ngôn từ và vui đùa với ý tưởng. Bạn
  yêu thích một cuộc tranh luận hay nhưng đôi khi biến những cuộc trò chuyện không cần thiết phải căng thẳng thành những cuộc
  cãi vã.


  Lý tưởng nhất là, theo thời gian và kinh nghiệm, bạn học được cách thư giãn đầu óc đủ để sử dụng năng lượng tinh thần và
  đam mê lớn lao của mình.


  bằng những cách mang lại lợi ích cho bạn thay vì cản trở bạn.

  Bạn nên cẩn thận khi bày tỏ quan điểm hay phản ứng quá sớm vì có xu hướng người khác dễ hiểu lầm hoặc vội vàng kết luận
  về bạn. Bạn có thể thường xuyên thấy người khác bàn tán hoặc nói sai về mình. Cũng có khả năng bạn thu hút sự đối lập từ
  người khác hoặc thu hút những người hay soi mói, có ý kiến cứng nhắc bất thường, hoặc hay chỉ trích bạn vào cuộc đời mình.

  Tâm trí bạn rất sắc sảo và hay phê phán, đồng thời bạn có sự tò mò không bao giờ thỏa mãn. Sự dũng khí trong tư duy của
  bạn đáng ngưỡng mộ. Tâm trí bạn có thể hoạt động quá nhanh khiến bạn dễ nervous, căng thẳng, thường bị kích thích quá mức
  và dễ bị đau đầu. Sự thiếu kiên nhẫn, đặc biệt khi lái xe hoặc vận hành máy móc, có thể dẫn đến tai nạn. Bạn cực kỳ quan
  sát, chú ý đến nhiều chi tiết hơn hầu hết mọi người. Lý tưởng nhất, lá sốnatal của bạn có các khía cạnh và yếu tố hỗ trợ
  khác giúp bạn bình tĩnh và giữ vững trung tâm.


  Một số người nổi tiếng có Sao Thuy ở khía cạnh khó với Sao Hoa:

  Vuong Goc – Bjorn Borg, Sylvia Plath, Cher, Aretha Franklin, Lizzo, Helen Mirren, Betty White, Norman Reedus, Jean Piaget,
  Sheena Easton, Demi Moore, Meat Loaf, Tina Turner, Randy Travis, Oprah Winfrey, Nicole Kidman, Mick Jagger, Avri


  l Lavigne, Hugh Grant, Conor McGregor, Anthony Bourdain;

  Doi Xung – Dinah Shore, Nina Simone, Peter Dinklage, Alice Cooper, Bernadette Peters, Ludwig van Beethoven, Christina Ricci,
  Zayn Malik, Steffi Graf, Anne Heche, Chuck Berry, Simone Biles.'
mars_mercury_trine: 'Tâm trí bạn rất bất an và bạn sẽ không bao giờ ngừng học hỏi. Bạn nhanh nhẹn, thực tế, nhạy bén, dũng
  cảm và có thể dễ dàng phát hiện ra điểm yếu của người khác. Bạn rất sáng tạo và có thể xuất sắc cả trong viết lách lẫn nghệ
  thuật thủ công. Bạn rất an toàn và vững vàng trong quyết định mà không hề hung hăng. Tâm trí bạn không bao giờ nghỉ ngơi
  và điều quan trọng là bạn phải giữ cho mình luôn hoạt động.


  Bạn là một người trò chuyện đầy biểu cảm và sôi động, và bạn thường nói đúng ý mình muốn nói và nói đúng những gì mình nghĩ.
  Bạn có khả năng nói sự thật mà không tỏ ra quá thẳng thắn hoặc xúc phạm. Bạn thường đưa ra những quyết định tốt nhất vào
  phút cuối cùng!


  Bạn có thể rất hiệu quả khi tập trung, dành ít thời gian hơn cho công việc mà người khác phải vất vả làm. Bạn thường đối
  mặt với sự bận rộn một cách bình thản. Bạn tỉnh táo và nhận thức rõ, và có thể dễ dàng biến ý tưởng thành các dự án khả
  thi. Các giao tiếp của bạn mang tính thẳng thắn và đi vào trọng tâm một cách tươi mới, mặc dù không đặc biệt đồng cảm trừ
  khi các yếu tố khác trong biểu đồ của bạn làm giảm bớt đặc điểm này.


  Khía Tam Hop là khía năng động hơn trong hai khía hài hòa. Những người có khía Luc Hop có thể gọi ra những đặc điểm này
  khi cần, và những người có khía Tam Hop giữa Sao Thuy và Sao Hoa đã tích hợp


  và các đặc điểm của khía cạnh vào tính cách của họ, thể hiện chúng một cách tự nhiên và nhất quán.

