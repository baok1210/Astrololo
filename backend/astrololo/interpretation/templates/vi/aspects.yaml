  thất vọng. Đổi lại, họ cũng dễ dàng được truyền cảm hứng một lần nữa. Kết quả là một chuyến đi tàu lượn siêu tốc về mặt
  cảm xúc. Những người này khao khát sự truyền cảm hứng và nuôi dưỡng cảm xúc, nhưng họ có thể giống như một cái hố không
  đáy trong khía cạnh này. Hoặc, hy vọng của họ có thể quá cao siêu và không thực tế, nên phần thưởng vô hình mà họ tìm kiếm
  luôn nằm ngoài tầm với. Đôi khi, họ cảm thấy rất bị chi phối bởi cảm xúc của mình, nhưng lại rất khó để thực sự hiểu rõ...


  hoặc xác định thế giới cảm xúc của họ.

  Với vị trí này, có rất nhiều khao khát của tâm hồn, nhưng sự trống rỗng mà họ có xu hướng cảm thấy đôi khi quá áp đảo rất
  khó để định nghĩa. Rất có thể, họ đang tìm kiếm tình yêu vô điều kiện – cả để trao đi và để nhận lại. Tuy nhiên, niềm tin
  và sự tin tưởng của chính họ vào người khác có sự dao động lớn. Họ muốn hơn bất cứ điều gì được tin tưởng những người thân
  yêu của mình, nhưng khi họ làm vậy, một phần trong họ lại nghi ngờ chính trái tim tin tưởng của mình, và họ lo lắng rằng
  mình tin tưởng quá nhiều. Thường thì, những vấn đề này bắt nguồn từ thời thơ ấu khi sự nuôi dưỡng không nhất quán.


  Những người này có thể lãng phí rất nhiều thời gian vào những whim cảm xúc, khi họ theo đuổi những mục tiêu hoặc con người
  hão huyền hoặc không thực tế. Trong các mối quan hệ, khá mỉa mai là, những tâm hồn cảm xúc này có thể rất khó để tiếp cận.
  Họ gặp khó khăn trong việc cam kết với bất kỳ con đường nào, và họ có thể rất dễ lách tránh những vấn đề khó khăn. Việc
  tránh né những chủ đề "không mấy hay ho" có lẽ nổi bật nhất ở nam giới với vị trí này, mặc dù cả hai giới rất thường nói
  những câu đại loại như, "chúng ta đừng nói về điều đó".


  Đối mặt với thực tế và những sự thật lạnh lùng có thể rất khó khăn cho những người này. Họ có xu hướng lãng mạn hóa quá
  khứ hoặc mơ về một tương lai lý tưởng.


