sun_venus_conjunction:
  detailed: Sự Hop giua Sao Mat Troi va Sao Kim tao ra mot su ket hop hanh hoa giua ban nang va ego cua ban voi tinh yeu va
    gia tri cua ban. Moi lien he nay ho tro su phat trien cua ban bang cach dua hai khia canh nay trong cuoc song cua ban
    vao nhan thuc co y thuc. Bieu hien cu the phu thuoc vao phan con lai cua so sinh thoi cua ban — cac dau hien va nha tham
    gia, va cach khia nay tuong tac voi cac cau truc hanh tinh khac.
  short: The Conjunction between Sun and Venus creates a harmonious blend between your identity and ego and your love and
    values.
  title: 'Conjunction: Sun - Venus'
sun_venus_opposition:
  detailed: Đối Xung giữa Sao Mat Troi và Sao Kim tạo ra sự căng thẳng năng động giữa bản sắc và cái tôi của bạn với tình
    yêu và giá trị của bạn. Sự kết nối này thách thức bạn phát triển bằng cách đưa hai lĩnh vực này trong cuộc sống của bạn
    vào nhận thức có ý thức. Biểu hiện cụ thể phụ thuộc vào phần còn lại của biểu đồ sinh của bạn — các cung và nhà liên quan,
    và cách khía cạnh này tương tác với các cấu hình hành tinh khác.
  short: The Opposition between Sun and Venus creates a dynamic tension between your identity and ego and your love and values.
  title: 'Opposition: Sun - Venus'
sun_venus_sextile:
  detailed: Luc Hop giua Sao Mat Troi va Sao Kim tao ra su ket hop hanh hoa giua ban nang va ego cua ban voi tinh yeu va gia
    tri cua ban. Moi lien ket nay ho tro su phat trien cua ban bang cach dua hai khia canh nay trong cuoc song vao su nhan
    biet co y thuc. Bieu hien cu the phu thuoc vao phan con lai cua so sinh thanh cua ban - nhung dau hoi va nha lien quan,
    va cach khia nay tuong tac voi cac cau hinh hanh tinh khac.
  short: The Sextile between Sun and Venus creates a harmonious blend between your identity and ego and your love and values.
  title: 'Sextile: Sun - Venus'
