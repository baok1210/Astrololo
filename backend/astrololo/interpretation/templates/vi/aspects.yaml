  miễn phí với các bước đơn giản của chúng tôi.

  Các giải thích được viết bởi Annie trừ khi có ghi chú khác.'
sun_venus_trine:
  detailed: Tam Hop giua Sao Mat Troi va Sao Kim tao ra su ket hop thanh lich giua ban nang va ego cua ban voi tinh yeu va
    gia tri cua ban. Moi lien ket nay ho tro su phat trien cua ban bang cach dua hai khia canh cua cuoc song nay vao nhan
    thuc co y. Bieu hien cu the phu thuoc vao phan con lai cua so sinh cua ban - nhung dau hoi va nha cua lien quan, va cach
    khia nay взаимодействие voi cac cau hinh hanh tinh khac.
  short: The Trine between Sun and Venus creates a harmonious blend between your identity and ego and your love and values.
  title: 'Trine: Sun - Venus'
uranus_venus_conjunction: 'Những người có Sao Kim hợp Sao Thiên Vương trong biểu đồ sinh thường rất thu hút, bí ẩn và năng
  động. Họ coi trọng tình bạn trong tình yêu và sự chân thành của cảm xúc là phẩm chất quan trọng nhất. Đây là những người
  sẽ khinh thường hôn nhân, cho rằng điều quan trọng hơn là cảm xúc của mọi người dành cho nhau so với một tờ giấy kết hôn.
  Mặc dù thân thiện và thường khá sẵn sàng kết bạn với mọi người từ mọi tầng lớp xã hội, nhưng phong cách không thiên vị và
  thiếu cam kết của họ là không thể nhầm lẫn. Họ khinh bỉ sự giả tạo xã hội.


  Mặc dù họ tin chắc rằng sự nổi tiếng kém quan trọng hơn nhiều so với sự chân thành, họ thường là những người khá được yêu
  mến. Họ thích trở nên khác biệt, và theo nhiều cách, họ có tư tưởng cởi mở về tình yêu và lãng mạn. Tuy nhiên, họ có thể
  khá hay tranh cãi và đôi khi thiếu hợp tác – thậm chí cực kỳ cứng nhắc – khi nói đến quy tắc nội tâm của họ và việc tôn
  trọng nó. Họ không linh hoạt với kỳ vọng của người khác đối với họ như niềm tin yêu tự do của họ. Dù họ dễ dàng chấp nhận
  nhiều người khác nhau vào cuộc sống, họ vẫn bám chặt vào cách sống của riêng mình. Một số người sợ sự thỏa hiệp, coi đó
  là sự mất đi bản ngã hay mất đi cá tính. Gu thẩm mỹ và phong cách của họ khác biệt và độc đáo, điều này có thể mở rộng đến
  việc lựa chọn trang phục cũng như sở thích về nghệ thuật, nội thất, phim ảnh.


  Đôi khi Sao Thiên Vương được phóng chiếu, và những đối tác mà những người này bị thu hút thường thể hiện các đặc trưng của
  Sao Thiên Vương như tính độc lập, sự sáng tạo, tính không đáng tin, sự thiếu nhất quán và yêu thích tự do. Những người yêu
  cũ của họ có thể phàn nàn rằng họ không thực sự coi trọng mối quan hệ. Trong tình dục và vấn đề nhục cảm, những điều hấp
  dẫn nhất có thể là những gì chưa được thực hiện hoặc những gì "không nên" được thực hiện. Sự pha trộn và thử nghiệm là đặc
  trưng của họ.'
uranus_venus_opposition: 'Nhu cầu được kích thích và phá vỡ các quy tắc trong tình yêu và lãng mạn được thể hiện rõ ràng khi
  Sao Kim vuông góc hoặc đối xung Sao Thiên Vương trong biểu đồ sinh. Những người này có thể dễ dàng làm rối loạn bạn đời
  bằng năng lượng lúc gần lúc xa của họ khi nói đến vấn đề tình cảm. Với aspect đối xung, điều này đặc biệt rõ rệt – khi được
  cho quá nhiều không gian, họ cảm thấy không được yêu, nhưng khi nhận được tình yêu mà dường như họ khao khát, họ lại có
  thể cảm thấy bị ngạt thở bởi nó. Họ có thể xa lánh bạn đời bằng cách áp dụng thái độ "Tôi không quan tâm bạn làm gì" khi
  cảm thấy bị đe dọa. Sự thật là, họ cũng sợ bị từ chối như bất kỳ ai khác, nhưng họ không phải lúc nào cũng muốn thừa nhận
  điều đó, và họ có thể trở nên khá lạnh lùng khi nghi ngờ bạn đời không quan tâm. Năng lượng của Sao Kim - Sao Thiên Vương
  trong các aspect khó được thể hiện qua câu nói: "Xa mặt cách lòng." Khi ở gần người thân yêu, cuối cùng họ có thể cảm thấy
  ngạt thở hoặc bồn chồn nếu mối quan hệ trở nên quá dễ đoán. Họ cũng có thể tự tách mình ra, sống trong khoảnh khắc và tận
  hưởng tình yêu họ có. Khi xa cách, họ cảm thấy tự do hơn để yêu. Góc hợp này thường thấy trong lá số của những người duy
  trì các mối quan hệ yêu xa hoặc không ổn định. Có thể có những khởi đầu và kết thúc đột ngột trong mối quan hệ. Họ không
  giỏi lắm trong việc "kết thúc" – họ có vẻ khá vô cảm, hờ hững và thô lỗ. Thái độ "chúng ta hãy làm bạn" có thể làm tổn thương
  một đối tác cảm thấy mối quan hệ còn nhiều điều hơn thế. Những người này có sự khinh miệt đối với các mối quan hệ thông
  thường, truyền thống hoặc "bình thường". Họ cần học cách cân bằng nhu cầu gần gũi và nhu cầu tự do của mình. Họ thực sự
  ghét sự giả tạo xã hội, và khăng khăng muốn chân thành. Được yêu mến xếp sau sự chân thành. Có sự thu hút mạnh mẽ đối với
  tất cả những điều khác biệt, và tất cả những điều "không nên".'
uranus_venus_sextile: 'Khả năng hòa hợp và chấp nhận bạn bè từ mọi tầng lớp xã hội rất mạnh mẽ ở vị trí này. Những người này
  có thể dễ dàng nhận ra sự thiếu chân thành ở người khác. Trong mối quan hệ, sự khoan dung là yếu tố quan trọng nhất đối
  với họ. Sở thích tình dục của họ có phần khác thường, và họ sẽ không hạnh phúc với một đối tác cố gắng hạn chế sự thể hiện
  tình dục của mình. Họ thường rất có khả năng duy trì các mối quan hệ đòi hỏi sự tự do và khoan dung lớn, chẳng hạn như chuyện
  tình yêu xa hay những mối quan hệ mà các đối tác không thể gặp nhau thường xuyên. Phong cách trong tình yêu của họ có phần
  tự do, thoáng đãng và không ràng buộc. Họ tự nhiên chấp nhận ý tưởng rằng đối tác của mình có thể cần không gian và sự tự
  do cá nhân.


  Góc Tam Hop là khía cạnh năng động hơn trong hai khía cạnh hài hòa. Những người có góc Lục Hop có thể kêu gọi những đặc
  điểm này khi cần, còn những người có góc Tam Hop giữa Sao Kim và Sao Thổ đã tích hợp các đặc điểm của khía cạnh này vào
  phần tính cách của họ, thể hiện chúng một cách tự nhiên và nhất quán.


  Với Sao Kim Lục Hop hoặc Tam Hop Sao Thổ, bạn có thái độ cởi mở và tiến bộ trong tình yêu và lãng mạn, và tự phát, tự do
  trong cách bày tỏ tình cảm. Bạn luôn sẵn sàng thử nghiệm và đón nhận bất kỳ điều mới mẻ nào mà người yêu đề xuất, và bạn
  thích được bất ngờ. Một mối quan hệ trong đó cả bạn và người yêu đều có nhiều tự do và độc lập sẽ thu hút sự quan tâm của
  bạn nhiều hơn một mối quan hệ an toàn, dễ đoán trước. Ở cấp độ vật lý, bạn cảm nhận được tia lửa tình dục trong các mối
  quan hệ ngay lập tức. Ở cấp độ tâm linh, bạn có thể nhận ra những sự thật về tương lai của họ thông qua cùng một tia lửa
  đó.


  Một số người nổi tiếng với Sao Kim ở góc hợp hài hòa với Sao Thổ bao gồm: Marlene Dietrich, Ruth Westheimer, Gene Hackman,
  William Blake, Joe Cocker, Kristin Hersh, Billie Eilish, Audrey Tautou, David Byrne, Troian Bellisario, B. F. Skinner, Joanna
  Newsom.'
