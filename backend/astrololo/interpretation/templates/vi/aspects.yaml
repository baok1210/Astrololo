  đôi khi ham muốn lật ngược mọi ý tưởng lại có thể phản tác dụng, dẫn đến sự ám ảnh, nghi ngờ và thiếu tin tưởng. Bạn là
  người hoài nghi bẩm sinh với bất cứ điều gì có vẻ hời hợt hoặc quá đơn giản.


  Bạn luôn tìm kiếm ý nghĩa ẩn giấu, khao khát đi đến tận cùng vấn đề, và với con người, là phơi bày động cơ. Bạn bị cuốn
  hút về mặt trí tuệ bởi tất cả những gì bị che giấu, cấm kín, bí mật hoặc bị đàn áp. Mặc dù thường là những điều tinh tế,
  bạn có thể rất khiêu khích trong giao tiếp. Bạn cũng có thể mỉa mai và sắc bén.


  Bạn có thể quyết tâm đến mức tìm câu trả lời, hoặc thậm chí thuyết phục người khác theo quan điểm của mình, đến nỗi cuối
  cùng lãng phí năng lực vào việc cố gắng làm điều vô ích. Bạn xuất sắc trong việc xây dựng chiến lược và có thể rất khôn
  ngoan, xảo quyệt, dù điều này chủ yếu ở cấp độ trí tuệ — thao túng更多 là một bài tập trí tuệ hơn là xuất phát từ trái tim.
  Tất nhiên, việc sử dụng khả năng của mình như thế nào là tùy thuộc ở bạn. Bạn thích thú với một bí ẩn thực sự...


  giải quyết, tình tiết thông minh, và các hình thức nghệ thuật u ám hơn.

  Bạn có một trí tuệ mạnh mẽ và ngoan cố. Bạn là một nhà nghiên cứu tuyệt vời và một thám tử giỏi. Điều này không phải lúc
  nào cũng giúp ích cho cuộc sống cá nhân của bạn. Những người khác có thể thấy bạn quá nghi ngờ, quá thách thức, hoặc quá
  bí ẩn. Bạn luôn suy ngẫm mọi thứ bên trong chính mình. Bạn sống trong một đại dương của biểu tượng tinh thần.

  Bạn phản ứng với hàm ý và suy luận hơn là với con người, hoàn cảnh và sự kiện. Bạn có một khả năng đặc biệt về toán học,
  logic tượng trưng, máy tính, sinh học, và thiền định. Đôi khi tâm trí bạn sẽ quá tải và bạn có vẻ như đảo ngược, bỏ qua
  những chi tiết đơn giản nhất mà người khác coi là hiển nhiên. Hãy nghỉ ngơi và học cách biết khi nào nên dừng lại và khi
  nào nên bắt đầu. – Mẫu diễn giải từ báo cáo Hồ sơ Chi tiết.

  Một số Người Nổi tiếng với Sao Thuy Hop Sao Diem Vuong:

  Charles Darwin (Sao Thuy Hop Sao Diem Vuong ở Song Ngư), Tchaikovsky (Sao Thuy Hop Sao Diem Vuong ở Bạch Dương), Franz Schubert
  (Sao Thuy Hop Sao Diem Vuong ở Bảo Bình), Harry S. Truman (Sao Thuy Hop Sao Diem Vuong ở Song Tử), Angela Bassett (Sao Thuy
  Hop Sao Diem Vuong ở Xử Nữ), Sylvester Stallone (Sao Thuy Hop Sao Diem Vuong ở Sư Tử), Della Reese (Sao Thuy Hop Sao Diem
  Vuong ở Cự Giải), River Phoenix (Sao Thuy Hop Sao Diem Vuong ở Song Tử)


  Phần 3 của 3 phần văn bản chiêm t học. Dịch sang tiếng Việt:


  Sao Thuy hợp Sao Diem Vuong ở Xử Nữ), Stanley Kubrick (Sao Thuy hợp Sao Diem Vuong ở Cự Giải), Whitney Houston (Sao Thuy
  hợp Sao Diem Vuong ở Xử Nữ), Elizabeth Barrett Browning (Sao Thuy hợp Sao Diem Vuong ở Song Ngư, cũng hợp Sao Hoa), Miley
  Cyrus (Sao Thuy hợp Sao Diem Vuong ở Bọ Cạp), Kareena Kapoor (Sao Thuy hợp Sao Diem Vuong ở Nhân Mã), Bon Scott (Sao Thuy
  hợp Sao Diem Vuong ở Sư Tử), Keanu Reeves (Sao Thuy hợp Sao Diem Vuong ở Xử Nữ), Steve Carell (Sao Thuy hợp Sao Diem Vuong
  ở Xử Nữ).'
mercury_pluto_opposition: 'Bạn rất nhạy bén và luôn đào sâu tìm kiếm câu trả lời đến mức đôi khi chính bạn lại là kẻ thù lớn
  nhất của bản thân. Kết quả là, bạn có thể tìm thấy động cơ ẩn hay ý đồ đen tối ở những nơi không hề tồn tại, và thái độ
  đầy nghi ngờ, khiêu khích của bạn có thể gây ra một số vấn đề trong đời sống cá nhân, đặc biệt nếu nó đạt đến mức độ hoang
  tưởng. Không nhiều người thích bị người khác luôn đặt nghi vấn, nhưng đó lại là điều bạn có xu hướng làm, và một thói quen
  cần được kiểm soát trong các mối quan hệ với người khác.


  Tuy nhiên, sự quyết tâm của bạn để làm rõ mọi vấn đề, lột bỏ sự giả dối và phơi bày động cơ thực sự, có thể được sử dụng
  cho mục đích tốt nếu bạn áp dụng nó trong công việc, chẳng hạn, công việc có thể liên quan đến điều tra và nghiên cứu, tâm
  lý học, hoặc các ngành nghệ thuật sáng tạo mang tính khám phá và có thể là đầy bí ẩn.


  Bạn có thể tò mò không thỏa mãn về tất cả những gì bị ẩn giấu, cấm kỵ, bị đàn áp hoặc bí mật. Bạn rất yêu thích tranh luận,
  nhưng nên cẩn thận để không lấn át người khác bằng những quan điểm mạnh mẽ của mình, cố gắng "chuyển hóa" họ theo tư duy
  của bạn, hoặc coi các cuộc tranh luận hay trao đổi ý kiến thông thường là chiến trường.


  Nhiều người trong số các bạn thực sự học được cách điều khiển năng lượng tinh thần mãnh liệt của mình và áp dụng nó một
  cách hiệu quả. Bạn có khả năng...


  đây là phần 2 của 2 của một văn bản chiêm tinh học. Dịch sang tiếng Việt:


  ...là kết quả của sự làm việc và nỗ lực rất chăm chỉ.

  Mẫu giải thích từ báo cáo Hồ sơ Sâu sắc — Bạn sáng suốt và có tầm nhìn sâu sắc, nhưng chính sức mạnh và chiều sâu của tầm
  nhìn đó có thể đánh lừa bạn. Do đó, bạn thường tự cản trở mình. Quy mô của một dự án có thể khiến bạn nản lòng đến mức bạn
  không even bắt tay vào thực hiện. Bạn là người cầu toàn và có tính ép buộc. Bạn sợ bị người khác đánh giá là không đủ khả
  năng, và phẩm chất này khiến bạn sợ hành động.

  Tất nhiên, bạn đã vượt qua điều này nhiều lần trong cuộc sống hàng ngày, nhưng mọi thứ sẽ suôn sẻ hơn với bạn khi bạn ngừng
  gán những động cơ tiêu cực cho những người xung quanh. Bạn có thể làm điều này khi bạn cảm thấy tốt hơn về bản thân. Những
  khoảng thời gian thiền định và chiêm nghiệm là cần thiết để hiểu rõ bản thân.

  Một số Người Nổi Tiếng với Sao Thuy ở Góc Cứng với Sao Diêm Vương:

  Vuông Goc – Hank Williams, Brigitte Bardot, Bjork, Bo Derek, Cloris Leachman, Sydney Sweeney, George Lucas, Mickey Rooney,
  Franklin D. Roosevelt, Lee Iacocca, D. H. Lawrence, Harry Styles, Selena Gomez;

  Đối Xung – Oprah Winfrey, Boris Yeltsin, Elvis Presley, Shaquille O’Neal, Kurt Cobain, Janis Joplin, Azealia Banks, Charlotte
  Rampling, Rosie O’Donnell, John McEnroe.'
mercury_pluto_sextile: 'Với Sao Thuy hài hòa với Sao Diem Vuong, bạn tự nhiên tìm kiếm sự thật, khám phá các lớp ẩn giấu và
  tập trung vào ý nghĩa cốt lõi. Tâm trí bạn sâu sắc, chiêm nghiệm, kỹ lưỡng và mang tính điều tra.

  Bạn có khả năng nhận thức và sáng tạo phi thường. Khi cần, bạn có thể khai thác thành công khả năng tập trung, chú ý, chẩn
  đoán và phân biệt vấn đề một cách thông minh.

  Rất quan sát, bạn nhanh chóng nắm bắt tình huống, nhưng bạn cũng có xu hướng điều tra mọi thứ kỹ lưỡng, thích không vội
  vàng kết luận hay bỏ sót điều quan trọng. Bạn khéo léo, thuyết phục, tế nhị, hoài nghi và phê phán. Không hài lòng với những
  giải thích hời hợt, bạn tiếp cận việc học hỏi và các chủ đề chuyên sâu một cách nghiêm túc.

  Mọi người rất quan tâm đến những hiểu biết, ý tưởng và quan điểm của bạn. Dù vậy, khi còn trẻ, bạn có thể cảm thấy sở thích
  và tư duy của mình khác xa so với những đứa trẻ khác. Với sự trưởng thành và kinh nghiệm, tâm trí độc đáo của bạn có thể
  được đánh giá là quý giá.

  Hãy để bạn giải quyết một vấn đề hoặc bí ẩn phức tạp! Bạn có tư duy và giao tiếp mang tính chiến lược.

  Mẫu diễn giải từ báo cáo Hồ sơ Sâu — Bạn đi đến nguồn gốc của vấn đề ngay khi bắt tay vào giải quyết. Bạn giao tiếp với
  sự nhanh chóng,


  Đây là phần 2 trong 3 phần của một văn bản chiêm t học. Dịch sang tiếng Việt:


  Lực lượng nói năng nhẹ nhàng mà người khác cảm nhận được một cách tự nhiên. Bạn có cả phạm vi quan tâm rộng lớn lẫn chiều
  sâu.

  Bạn rất linh hoạt và là người giải quyết vấn đề tuyệt vời. Tâm trí bạn tự nhiên quan tâm đến các vấn đề an ninh, có thể
  trải rộng từ những tình huống cướp bóc thông thường, đến trộm cắp công nghệ cao trên máy tính, an ninh quốc gia, và Quỹ
  Tiền tệ Quốc tế.

  Để tận dụng tối đa kỹ năng của mình, bạn nên dành thời gian phân tích động cơ của bản thân. Hãy điều tra kỹ lưỡng những
  niềm tin của chính bạn về ý nghĩa của cuộc sống. Khi những vấn đề này được giải quyết, bạn sẽ không còn cảm thấy bí ẩn như
  vậy và năng lượng tinh thần của bạn sẽ tự do hơn.

  Góc Tam Hop là khía cạnh năng động hơn trong hai khía cạnh hài hòa. Những người có góc Luc Hop có thể gọi ra những phẩm
  chất này khi cần, còn những người có góc Tam Hop giữa Sao Thuy và Sao Diem Vuong đã tích hợp các phẩm chất của khía cạnh
  vào tính cách của họ, thể hiện chúng một cách tự nhiên và nhất quán.

  Một số Người Nổi Tiếng có Sao Thuy ở Góc Hài Hòa với Sao Diem Vuong:

  Góc Luc Hop – Công chúa Diana, Zendaya, Demi Moore, Alyssa Milano, Blake Lively, Bernie Sanders, RuPaul, Stephen King, Nelly
  Furtado, Lili Reinhart, Helen Keller, Bruce Springsteen, Tatum O’Neal, Peter Lynch, Amelia Earhart, Tr


  oy Aikman;

  Tam Hop – Drew Barrymore, Danny DeVito, Kesha, Lenny Kravitz, Johann Sebastian Bach, Michael B. Jordan, Brad Pitt, Larry
  Bird, Bridget Fonda, Crispin Glover, Jean Harlow, Larry King, Moliere, Ralph Nader, Sylvia Plath, Alicia Keys, Phoebe Tonkin,
  Ed Harris.

