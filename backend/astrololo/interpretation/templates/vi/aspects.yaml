  sự riêng tư, không gian riêng hoặc độc lập. Nhưng chỉ vì họ làm tốt khi làm việc một mình không có nghĩa là họ không thể
  hợp tác hợp lý với những người khác – họ có thể. Những người Sao Hoa-Tho tôn trọng ranh giới và quy tắc của người khác.
