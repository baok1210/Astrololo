jupiter_uranus_opposition:
  detailed: Sự Doi Xung giữa Sao Moc và Sao Thien Vuong tạo ra một căng thẳng năng động giữa sự mở rộng và lạc quan của bạn
    với sự đổi mới và thay đổi của bạn. Sự kết nối này thách thức bạn phát triển bằng cách đưa hai lĩnh vực này trong cuộc
    sống của bạn vào nhận thức có ý thức. Biểu hiện cụ thể phụ thuộc vào phần còn lại của biểu đồ sinh của bạn — các cung
    và nhà liên quan, và cách khía cạnh này tương tác với các cấu hình hành tinh khác.
  short: The Opposition between Jupiter and Uranus creates a dynamic tension between your expansion and optimism and your
    innovation and change.
  title: 'Opposition: Jupiter - Uranus'
jupiter_uranus_sextile:
