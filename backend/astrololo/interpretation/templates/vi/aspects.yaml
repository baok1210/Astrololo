  hoặc số phận, dễ dàng gán ý nghĩa cho những sự kiện mà người khác có thể coi là "bình thường". Họ tìm kiếm biểu tượng và
  đọc giữa các dòng trong hầu hết mọi tình huống. Sức sống thể chất thường mạnh mẽ, và cơ thể có khả năng hồi phục nhanh chóng.


  Người khác thường tôn trọng những người này. Họ không ngại dấn thân vào công việc khó khăn, và thường nhanh chóng giúp đỡ
  người khác – không chỉ trong các nhiệm vụ thông thường, mà còn ở cấp độ tâm linh hoặc tâm lý. Sự nhạy bén của họ đôi khi
  khiến người khác phải kinh ngạc. Đây là những người có khả năng nhận thức cao, không dễ bị lung lay hay ngạc nhiên trong
  cuộc sống. Họ không phải là người làm việc thiện theo nghĩa thông thường, và cũng không có khả năng là người phá vỡ luật
  lệ một cách bừa bãi. Tuy nhiên, họ không sợ "mặt tối" của bản chất con người, và sẽ uốn cong quy tắc từ thời gian đến thời
  gian nếu cảm thấy cần làm như vậy.


  Nhiều người đặc biệt thích thú với sự trưởng thành và những bài học của cuộc sống. Họ không thích sự hời hợt, và thường
  là người đầu tiên nhận ra sự giả tạo dưới mọi hình thức. Một số người thử nghiệm với khả năng lừa dối ở một giai đoạn nào
  đó trong cuộc đời, nhưng nói chung họ phát triển sức mạnh và sự chính trực của mình. Thực tế, nhiều người cố gắng hết sức
  để loại bỏ bất kỳ sự tự lừa dối nào. Những người này đam mê và có thể rất mãnh liệt, khao khát trải nghiệm nhiều hơn một
  cuộc sống "bình thường".'
