  bị lạc lối trong bất kỳ mục đích nào. Họ là những miếng bọt biển tâm linh hấp thụ cảm xúc của người khác. Họ cực kỳ nhạy
  cảm với "khí hậu" cảm xúc của bất kỳ địa điểm, bối cảnh hoặc tình huống nào.

