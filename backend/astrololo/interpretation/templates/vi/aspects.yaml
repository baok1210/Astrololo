  thể bị hiểu lầm là sự lạnh lùng. Chắc chắn, họ có xu hướng áp dụng cách tiếp cận thực tế, mang tính kinh doanh đối với thế
  giới cảm xúc. Tuy nhiên, họ rất nhạy cảm và sợ bị từ chối. Một số người tạo ra vẻ ngoài rất lạnh lùng, khiến người khác
  tin rằng họ không cần sự nuôi dưỡng và tình yêu, đơn giản vì họ kín đáo trong việc bày tỏ nhu cầu về những điều cơ bản của
  cuộc sống này. Có khả năng lớn xảy ra lời tiên tri tự thực hiện trong khía cạnh này nếu họ không cẩn thận. Việc giữ mọi
  người ở khoảng cách dường như là phản ứng bản năng của họ, và người khác có thể khó lòng đưa tay ra.


  Sự kín đáo về cảm xúc và khả năng tách mình khỏi cảm xúc chắc chắn có thể giúp những người này thành công ở cấp độ chuyên
  nghiệp. Người khác nhận thấy tính thực tế và trách nhiệm của họ. Những người có Sao Hỏa hợp Sao Thổ đôi khi quá nghiêm túc
  với cuộc sống (và bản thân họ!). Suốt đời, họ có thể thấy rằng họ dễ dàng kết nối hơn với những người lớn tuổi hơn, đặc
  biệt là trong thời niên thiếu. Nếu không cẩn thận, họ có thể phát triển một cái nhìn bi quan về cuộc sống vào một số thời
  điểm, cảm thấy rằng họ bị định mệnh phải chịu đựng về mặt cảm xúc. Bằng mọi giá, thái độ thất bại này nên được tránh, vì
  chúng ta thường nhận được những gì chúng ta mong đợi từ cuộc sống! Một số người có thể bị thu hút bởi các mối quan hệ bao
  gồm một số khó khăn hoặc nghịch cảnh, và thậm chí có xu hướng "sống dậy" khi họ được yêu cầu vượt qua thử thách. Họ cần
  cố gắng tránh cảm thấy tội lỗi vì "nuông chiều" bản thân trong những thú vui cảm xúc. Nỗi sợ có thể ngăn họ trải nghiệm
  những điều trọn vẹn. Khi họ để bản thân nhận được sự nuôi dưỡng hoặc quan tâm từ người khác, một giọng nói nội tâm cảnh
  báo...'
moon_saturn_trine: 'Những người có Sao Mặt Trăng hợp Sao Thổ trong bản đồ sao natal thể hiện sự thận trọng và phòng thủ rõ
  rệt, thực chất đây là cơ chế tự bảo vệ vì họ rất nhạy cảm. Bản chất cảm xúc kỷ luật đôi khi bị hiểu lầm là sự lạnh lùng.
  Họ có xu hướng tiếp cận thế giới cảm xúc một cách thực tế và chuyên nghiệp. Tuy nhiên, họ rất nhạy cảm và sợ bị từ chối.
  Một số người tạo ra vẻ ngoài lạnh nhạt, khiến người khác tưởng rằng họ không cần sự nuôi dưỡng và yêu thương, chỉ vì họ
  kín đáo trong việc bày tỏ nhu cầu cơ bản này. Nếu không cẩn thận, khả năng xảy ra lời tiên tri tự ứng nghiệm là rất cao.
  Việc giữ khoảng cách dường như là phản ứng bản năng của họ, và người khác có thể khó lòng đưa tay ra trước.


  Sự kìm nén cảm xúc và khả năng tách bạch khỏi cảm xúc chắc chắn giúp những người này thành công trong sự nghiệp. Người khác
  nhận thấy tính thực tế và trách nhiệm của họ. Những người có Sao Mặt Trăng hợp Sao Thổ đôi khi quá nghiêm túc với cuộc sống
  (và bản thân họ!). Trong suốt cuộc đời, họ có thể thấy rằng họ dễ dàng kết nối hơn với những người lớn tuổi hơn, đặc biệt
  là khi còn trẻ. Nếu không cẩn thận, họ có thể phát triển một cái nhìn bi quan về cuộc sống vào một số thời điểm, cảm thấy
  rằng họ bị định mệnh phải chịu đựng về mặt cảm xúc. Bằng mọi giá, thái độ thất bại này nên được tránh, vì chúng ta thường
  nhận được những gì chúng ta mong đợi từ cuộc sống! Một số người có thể bị thu hút vào các mối quan hệ bao gồm một số khó
  khăn hoặc nghịch cảnh, và thậm chí có xu hướng "sống dậy" khi họ được yêu cầu vượt qua thử thách. Họ cần cố gắng tránh cảm
  thấy tội lỗi vì "đắm chìm" trong niềm vui cảm xúc. Nỗi sợ có thể ngăn họ trải nghiệm viên mãn. Khi họ để bản thân nhận được
  sự nuôi dưỡng hoặc quan tâm từ người khác, một giọng nói nội tâm cảnh báo họ rằng điều đó có thể không chân thành, lâu dài,
  hoặc đủ! Đôi khi có vẻ dễ dàng hơn để rút lui thay vì chấp nhận rủi ro cảm xúc trong cuộc sống, thay vì để người khác trở
  nên quá e ngại trước họ.'
moon_sun_conjunction:
  detailed: Sự Hop giua Sao Mat Troi va Sao Mat Trang tao ra mot su ket hop hai hoa giua ban nang cua ban va ego cua ban voi
    cam xuc va ban nang cua ban. Moi lien he nay ho tro su phat trien cua ban bang cach dua hai khia canh nay trong cuoc song
    cua ban vao nhan thuc co y thuc. Bieu hien cu the phu thuoc vao phan con lai cua so sinh thoi cua ban - cac cung va nha
    lien quan, va cach khia nay tuong tac voi cac cau truc hanh tinh khac.
  short: The Conjunction between Sun and Moon creates a harmonious blend between your identity and ego and your emotions and
    instincts.
  title: 'Conjunction: Sun - Moon'
moon_sun_opposition:
  detailed: 'Những người có Sao Mặt Trời đối xung Sao Mặt Trăng trong biểu đồ sinh thường bị giằng xé giữa việc khẳng định
    bản sắc cá nhân và chiều lòng người khác. Họ giằng xé giữa việc trung thực với chính mình và làm hài lòng những người
    thân thiết. Họ thường cảm thấy tội lỗi chỉ vì là chính mình. Họ chịu đựng quá nhiều việc "làm hài lòng người khác." Họ
    có thể dao động, cảm thấy tội lỗi và muốn làm hài lòng người khác, sau đó cảm thấy không công bằng khi phải kìm nén bản
    thân. Điều này dẫn đến những cơn nóng nảy ích kỷ khi họ bắt đầu cảm thấy thương cho chính mình. Tính cách có thể bất ổn.


    Thay vì luôn kìm nén bản thân, rồi thỉnh thoảng bùng nổ, giải pháp là tìm sự cân bằng giữa việc thể hiện bản thân, đồng
    thời thỉnh thoảng quan tâm đến người khác.


    Sao Mặt Trời đối xung Sao Mặt Trăng tạo ra nhu cầu sâu sắc về một mối quan hệ thân thiết. Có vẻ mâu thuẫn khi vị trí này
    gây ra vấn đề trong các mối quan hệ thân mật nhưng đồng thời lại đòi hỏi những mối quan hệ đó. Người có Sao Mặt Trời đối
    xung Sao Mặt Trăng sẽ không giải quyết được gì bằng cách tránh xa con người. Sự đối xung chỉ có thể được giải quyết bằng
    cách lao vào mối quan hệ và tìm ra điểm cân bằng cần thiết để duy trì nó. Nếu thay vào đó họ chọn cách xa lánh các mối
    quan hệ thân mật, họ rất có thể sẽ không hài lòng vì khao khát một mối quan hệ gần gũi sẽ nhói lòng họ.


    Một nguy hiểm khác cần lưu ý là kỳ vọng quá nhiều từ đối tác. Sao Mặt Trời đối xung Sao Mặt Trăng thường tạo ra thái độ
    cực đoan. Hãy nhớ rằng các mối quan hệ tình yêu nhiều hơn về cho đi hơn là nhận lại. Trong một mối quan hệ tình yêu, cần
    có sự cân bằng giữa cho và nhận. Nhưng sự cân bằng này sẽ không đạt được nếu họ tập trung vào việc mình nhận được bao
    nhiêu. Sự cân bằng đạt được khi cả hai đối tác cho đi mà không mong đợi bất cứ điều gì đáp lại.


    Một vấn đề khác là họ có thể cảm thấy như mình đang chống lại cả thế giới, như thể cả thế giới đều chống lại họ. Xung
    đột thực sự nằm giữa cái tôi và nhu cầu hợp nhất với người khác.'
  short: People with sun opposition moon in the birth chart are torn between asserting their individuality and catering to
    others.
  title: 'Opposition: Sun - Moon'
moon_sun_quincunx:
  detailed: Mặt Trời Bát Xung Mặt Trăng
  nature: challenging
  text: Cần điều chỉnh giữa ý thức và tiềm thức. Bạn có thể cảm thấy khó hòa hợp giữa nhu cầu cá nhân và cảm xúc. Đòi hỏi
    sự thích nghi và điều chỉnh liên tục.
  title: Mặt Trời bát xung Mặt Trăng
  weight: 1
moon_sun_sextile:
  detailed: 'Người có Sao Mat Troi Luc Hop Sao Mat Trang là một cá nhân cân bằng tốt. Người này có thể khẳng định ý chí một
    cách hiệu quả, đồng thời cũng quan tâm đến cảm xúc của người khác. Họ công bằng trong các mối quan hệ. Họ đối xử với mọi
    người như nhau, và thường được yêu thích vì điều đó. Họ giao tiếp tốt, dành phần lắng nghe công bằng thay vì chỉ nói.


    Sao Mat Troi Luc Hop Sao Mat Trang cho thấy người này thường thành công trong cuộc sống. Họ không có quá nhiều hối tiếc
    trong đời. Họ có thể dễ dàng rút bài học từ những trải nghiệm. Những trở ngại không làm họ quá phiền lòng. Họ duy trì
    cái nhìn tích cực về tương lai. Họ không dễ dàng bỏ cuộc. Họ học được điều này từ cha mẹ.


    Họ sẽ có nhiều cơ hội và "cánh cửa mở" trong cuộc đời này. Những người này nên tận dụng nhiều cơ hội sẽ được trao cho.
    Mỗi cơ hội sẽ giúp họ tiến xa hơn và cao hơn trên con đường thành công.


    Mối quan hệ với cha mẹ rất dễ chịu. Người này đã tiếp thu thái độ lành mạnh với mọi người từ cha mẹ. Họ có thể nhờ cha
    mẹ giúp đỡ nếu cần. Không có vấn đề nghiêm trọng nào phát sinh từ việc nuôi dạy không tốt.


    Các nhà chiêm học cổ đại tin rằng Sao Mat Troi Luc Hop Sao Mat Trang, và bất kỳ khía cạnh Sao Mat Troi-Sao Mat Trang nào,
    đều có nghĩa là mẹ của người đó sẽ sống thọ.


    Nhìn chung, khía cạnh này cho thấy một cuộc sống tốt đẹp với thành công xứng đáng.'
  short: The person with natal sun sextile moon is a well-balanced individual.
  title: 'Sextile: Sun - Moon'
moon_sun_square:
  detailed: 'Đối với những người có khía cạnh Sao Hỏa vuông góc Sao Trăng trong bản đồ sao, thành công không đến dễ dàng.
    Nếu có đạt được thành công nào, đó chỉ là nhờ sự nỗ lực tuyệt đối chứ không phải nhờ sự giúp đỡ hay may mắn nào.


    Các nhà chiêm tinh cổ đại tin rằng khía cạnh này là dấu hiệu cho thấy người đó được thụ thai bởi cha mẹ không yêu thương
    nhau. Người đó sinh ra trong bầu không khí đầy căng thẳng và thù địch giữa cha mẹ. Người có Sao Hỏa vuông góc Sao Trăng
    buộc phải kìm nén cảm xúc từ khi còn nhỏ. Họ có thể đã trải qua một sự kiện cảm xúc làm chậm trễ sự phát triển của mình.
    Điều này tất nhiên dẫn đến nhiều vấn đề, bao gồm sự tự nghi ngờ, khó khăn trong việc bày tỏ cảm xúc và giá trị bản thân
    thấp. Những đặc điểm đó tự nhiên có thể cản trở thành công.


    Người đó trở nên khó khăn để cảm thấy thoải mái với chính mình. Theo thói quen, người đó trở nên cứng nhắc trong tâm trạng
    tiêu cực và cuối cùng đối xử với người khác bằng thái độ gây tranh cãi. Sự hung hăng bề ngoài thực chất chỉ là sự rối
    loạn cảm xúc thỉnh thoảng trào ra khỏi người đó, điều này gây trở ngại cho các mối quan hệ, đặc biệt là với người khác
    giới.


    Người này có cảm giác thường trực rằng mọi thứ đều khó khăn hơn đối với họ, và điều này có thể hoàn toàn đúng. Họ có thể
    không có đủ nguồn lực để đạt được điều mình muốn trong cuộc sống. Họ không có nguồn hy vọng và suy nghĩ tích cực vô tận
    như những người có Sao Hỏa tam hợp Sao Trăng. Những người có Sao Hỏa vuông góc Sao Trăng phải đối mặt với nhiều cánh cửa
    đóng lại. Đây không phải là bộ bài tốt nhất được chia. Họ dễ dàng trở nên thất vọng với cuộc sống. Khi khó khăn ập đến,
    họ có thể bỏ cuộc quá dễ dàng. Họ có thể cảm thấy nỗ lực không xứng đáng vì họ hoạt động với ít nguồn lực hoặc động lực
    tinh thần hơn so với bạn bè đồng trang lứa. Xu hướng bỏ cuộc của họ cuối cùng lại càng cản trở thành công.'
  short: For people with natal sun square moon, success does not come easy.
  title: 'Square: Sun - Moon'
moon_sun_trine:
  detailed: 'Góc Tam Hop giữa Mặt Trời và Mặt Trăng trong bản đồ sao sinh là một vị trí rất thuận lợi cho thành công, được
    coi là một trong những góc may mắn. Ngoài thành công thế tục, vị trí này còn chỉ ra sức khỏe tổng thể tốt, sức sống và
    sức bền. Khi những người này bị bệnh, họ thường hồi phục dễ dàng. Các nhà chiêm tinh cổ đại tin rằng Tam Hop giữa Mặt
    Trời và Mặt Trăng có nghĩa là người mẹ sẽ sống lâu. Họ cũng tin rằng nếu Tam Hop này nằm trong các nhà góc của bản đồ
    sao sinh (nhà 1, 4, 7 và 10), người đó sẽ giàu có. Nếu Sao Mộc hợp với đỉnh trời (Midheaven) và cũng nằm trong một Tam
    Hop lớn với Mặt Trời và Mặt Trăng, đó là dấu hiệu cho thấy người đó sẽ thăng tiến trong cuộc sống.


    Người này được nuôi dạy tốt, với cha mẹ tích cực và ủng hộ, có khả năng truyền cảm hứng để người đó phát triển tài năng
    của mình. Sự nuôi dạy tốt có thể dẫn đến việc người này có cái nhìn rất tích cực về cuộc sống. Họ có tiềm năng trở nên
    rất thành công, tiềm năng này không nên bị đánh giá thấp vì nó có nghĩa là người này có thể trở thành một trong những
    vĩ nhân.


    Người này có tính khí bình tĩnh và hòa nhã, đồng thời vẫn tinh tế và chuyên nghiệp. Họ là những người giao tiếp mạnh mẽ
    trong cả môi trường công cộng và riêng tư, luôn để lại ấn tượng lâu dài. Họ có khả năng thuyết phục trong khi giao tiếp,
    thấu hiểu và sẽ làm tốt trong bất kỳ công việc nào đòi hỏi kỹ năng giao tiếp giữa các cá nhân. Họ là những người hòa giải
    hoặc điều phối giỏi giữa những người đang tranh cãi.


    Người này thường không gặp vấn đề về cái tôi, không ngại giúp đỡ người khác và nói chung là người quan tâm. Họ là người
    lắng nghe tốt và là những người bạn chu đáo, chân thành, trung thực, ấm áp và thân thiện. Người có Sao Mặt Trời Tam Hop
    Sao Mặt Trăng có sự tự tin lành mạnh và thái độ lạc quan. Họ nên tập trung...'
  short: The natal sun trine moon aspect is a very favorable position for success.
  title: 'Trine: Sun - Moon'
moon_uranus_conjunction: 'Bạn sở hữu tinh thần độc lập, và do đó bạn chống lại việc bị gán nhãn hay ép vào khuôn khổ. Bạn
  không phải là người bị thu hút bởi các vai trò truyền thống khi nói đến gia đình, bạn bè và các mối quan hệ. Năng lượng
  cảm xúc của bạn dao động, khiến bạn đôi khi cực kỳ hòa đồng, thân thiện và sẵn sàng, nhưng cũng có lúc hoàn toàn xa cách,
  độc lập và không sẵn lòng. Các mô hình hành vi có phần lập dị, thay đổi và không nhất quán, và phẩm chất này rõ ràng nhất
  khi bạn ở nhà hoặc với gia đình và những người bạn rất thân. Bạn cần không gian và tự do, cũng như những tình huống cho
  phép sự tự phát.


  Các thói quen làm bạn nhàm chán, đặc biệt là thói quen trong gia đình. Bạn cần thay đổi một chút để ngăn chặn cảm giác bất
  an, không hài lòng, ví dụ như thay đổi "lịch trình" hàng ngày. Khi nói đến việc nuôi dạy con cái, bạn thích một bầu không
  khí cởi mở và tự do với con. Có thể có một nỗi sợ nhất định trở nên quá thân thiết hay gắn bó với người khác. Bạn ghét sự
  quá nghiêm túc hay cứng nhắc. Bạn sẽ làm những gì có thể để làm cho bầu không khí thoải mái hơn, và đôi khi bạn nói hoặc
  làm điều gì đó với mục đích khuấy động mọi thứ, hoặc để gây sốc. Nổi loạn chống lại truyền thống dường như là điều tự nhiên,
  nhưng bạn có thể muốn cẩn thận để không trở nên vô trách nhiệm hoặc thiếu nhạy cảm trong quá trình đó. Bạn hài hước và tự
  phát, và có xu hướng hành động theo ý thích.


  Ngoài ra, bạn có những thói quen bất thường và phương pháp thực hiện ý tưởng độc đáo. Cảm nhận về nhịp điệu cuộc sống của
  bạn là duy nhất; đôi khi điều này có lợi cho bạn, đôi khi không. Cách diễn đạt đặc biệt theo nhịp điệu của bạn có thể bị
  người khác hiểu là thiếu tập trung, thờ ơ hoặc vô trách nhiệm, vì vậy bạn nên giữ mọi người cập nhật về ý tưởng và quy trình
