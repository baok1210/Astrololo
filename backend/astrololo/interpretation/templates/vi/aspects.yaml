  chúng tìm đến bạn vì sự thấu hiểu và cái nhìn sâu sắc chân thành của bạn. Trong mối quan hệ thân mật với một đối tác, đam
  mê của bạn có thể vô cùng lớn lao, và bạn có thể trải nghiệm một mức độ thống nhất và gắn kết biến đổi hoàn toàn cuộc sống
  của bạn. Vì bạn không có khả năng làm bất cứ điều gì nửa vời, bạn thường dành thời gian để có sự phân biệt trong các lựa
  chọn của mình. Để bản thân dễ bị tổn thương đơn giản không phải là phong cách của bạn.


