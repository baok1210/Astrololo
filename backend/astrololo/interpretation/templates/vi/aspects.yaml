mercury_uranus_square: 'Bạn có một trí tuệ nhanh nhạy, rất trực giác, và cần rất nhiều sự kích thích tinh thần để tránh cảm
  giác nhàm chán. Thích tự chủ, bạn không phải lúc nào cũng dễ dàng tiếp nhận lời khuyên. Có một phần trong bạn thích gây
  sốc, thách thức và khơi mào bằng những lời nói; tuy nhiên, điều này có thể không phải là một quá trình có ý thức.

  Năng lượng và sản lượng tinh thần của bạn cực kỳ biến đổi – một ngày bạn có thể nỗ lực và quan tâm lớn đến một dự án, ngày
  hôm sau lại ngược lại. Điều này phần lớn là do bạn cảm thấy nhu cầu mạnh mẽ phải trung thành với bản năng và trực giác của
  mình, và nếu bạn không thực sự được truyền cảm hứng, bạn cảm thấy không đúng khi làm việc trên một dự án – bạn có thể cảm
  thấy rằng mình đang "giả vờ", và điều này không phù hợp với bạn.

  Vấn đề là trong cuộc sống luôn có những nhiệm vụ thường ngày cần hoàn thành, những việc chúng ta phải làm không hoàn toàn
  phù hợp với sở thích, và tương tự. Những năm tháng đi học có thể là thử thách do sự coi thường của bạn đối với phương pháp
  tiếp cận học tập tuyến tính, các nhiệm vụ thường ngày, và những môn học không truyền cảm hứng cho bạn, không phải do thiếu
  khả năng trí tuệ. Thực tế, bạn có thể có những khoảnh khắc thực sự của thiên tài và những ý tưởng cũng như góc nhìn của
  bạn thường rất


  Đây là phần 2 của 2 của một văn bản chiêm tinh. Dịch sang tiếng Việt:


  nguyên bản. Đôi khi bạn có thể rất giáo điều.

  Bạn có xu hướng trở thành, hoặc có vẻ là, người hay quên. Sự tập trung của bạn có thể ngắn hạn, và do đó, bạn có thể thường
  bỏ dở các dự án. Đôi khi bạn có thể có tính khí dễ cáu kinh và cần chuyển hướng một số năng lượng thần kinh của mình vào
  các hoạt động mang tính xây dựng. Hãy dành thời gian suy ngẫm về những gì bạn thực sự tin tưởng, vì nhiều khi bạn quá bận
  rộn để thách thức tư duy đã được thiết lập, hoặc đóng vai trò người biện hộ cho ma quỷ, để tiếp xúc với ý kiến và cảm xúc
  thực sự của mình. Theo cách này, trí thông minh, sự chính trực và sự sáng tạo của bạn có thể tỏa sáng.


  Một số Người Nổi Tiếng với Sao Thuy ở Góc Cứng với Sao Thien Vuong:

  Vuong Goc – Sigourney Weaver, Oliver Stone, Steven Seagal, George Clooney, Drew Carey, Paris Hilton, Björk, Alfred Hitchcock,
  Elizabeth I, Franz Kafka, Ella Fitzgerald, Joan Crawford.

  Doi Xung – Howard Stern, Voltaire, Henri Matisse, Billy Jean King, Robert Browning, Charles Chaplin, Danny DeVito, Brigitte
  Bardot, Jimi Hendrix, Dwayne Johnson, Jaden Smith, Oscar Wilde, Jane Austen, Pelé, Luciano Pavarotti.'
mercury_uranus_trine: 'Bạn cởi mở với những ý tưởng mới và tự mình đưa ra nhiều góc nhìn độc đáo. Bạn có thiên hướng kỹ thuật
  và có thể đặc biệt quan tâm đến máy tính, công nghệ và khoa học. Trực giác của bạn rất mạnh mẽ và phần lớn dẫn bạn đi đúng
  hướng. Bạn có phong cách thân thiện, khoan dung và không thiên kiến. Bạn tránh đưa ra những đánh giá thiếu công bằng, đạo
  đức giả hay rập khuôn.

  Bạn rất trung thực và căm ghét những lối tư duy thiên vị và hẹp hòi. Bạn sáng tạo, dí dỏm, và nhanh chóng nắm bắt cũng như
  hiểu được những chủ đề mới. Tư duy của bạn thường tự nhiên vượt ra ngoài khuôn khổ và rất nhanh nhạy, và bạn có thể cảm
  thấy bối rối khi quan sát những người khác không đi đến cùng kết luận như bạn trong nửa thời gian đó.

  Tuy nhiên, bạn cần nhiều không gian và tự do để tư duy theo cách riêng của mình, và bạn không dễ chịu khi ai đó cố ép bạn
  tiếp nhận thông tin hay quan điểm. Bạn hoạt động ở trạng thái tinh thần tốt nhất và hợp tác nhất khi có cơ hội tự tìm cảm
  hứng cho mình, và bạn dễ cảm thấy đạo đức giả nếu không có điều đó - một cảm giác hoàn toàn không dễ chịu đối với bạn.

  Khía Tam Hop là khía năng động hơn trong hai khía hài hòa. Những người có khía Luc Hop có thể gọi


  Khi cần, hãy sử dụng những đặc điểm này, và những người có Tam Hop giữa Sao Thuy và Sao Thien Vuong đã tích hợp các đặc
  điểm của khía cạnh này vào tính cách của họ, thể hiện chúng một cách tự nhiên và nhất quán.

  Một số người nổi tiếng với Sao Thuy ở khía cạnh thuận lợi với Sao Thien Vuong:

