  (Lưu ý rằng một số giải nghĩa của Annie sẽ được cập nhật trong tương lai). Các giải nghĩa thay thế là các mẫu trích từ Báo
  Cáo Hồ Sơ Chi Tiết và Hồ Sơ Chiêm Tinh Cho Phụ Nữ, có thể được mua bằng cách truy cập qua các liên kết.'
moon_pluto_trine: 'Sao Mat Trang Hop Sao Diem Vuong

  Sự hài lòng cảm xúc của bạn chạy sâu và rất phức tạp. Bạn khao khát sự mãnh liệt, nhưng đồng thời bạn có thể sợ bản chất
  cảm xúc của chính mình, dẫn đến việc bạn phải rất vất vả để giữ nó dưới sự kiểm soát. Sự cưỡng ép là một hệ quả, và bạn
  thấy mình dễ bị lung lay bởi những khao khát và ham muốn cảm xúc. Mong muốn hòa nhập với một con người khác rất mạnh mẽ,
  nhưng đồng thời cũng có thể là nỗi sợ hãi.

  Bạn là một nhà tâm lý học bẩm sinh, hiểu được hoạt động bên trong của những người mà bạn tiếp xúc. Có vẻ như bạn có những
  xúc tu cảm xúc, và đặc điểm này có thể được sử dụng cho và chống lại chính bạn. Khi được sử dụng một cách tích cực, bạn
  có thể chữa lành người khác bằng cách giúp họ đối mặt với những gì thúc đẩy họ, những gì họ sợ hãi, và những gì họ có thể
  đang làm mà tự hủy hoại bản thân. Tất nhiên, quá trình này chỉ có thể xảy ra sau khi bạn đã bắt đầu làm việc với chính những
  vấn đề tương tự trong bản thân mình.

  Mặt khác, nếu bạn bị sự bất an tràn ngập, bạn có thể đánh giá người khác với một thiên kiến tiêu cực. Bạn có thể tưởng tượng
  ra những động cơ xấu xa hơn thực tế có thể xảy ra. Khả năng này bắt nguồn từ nỗi sợ mất mát và phản bội của chính bạn. Nếu
  bạn mong đợi bị đối xử tệ, bạn có thể dễ...


  để "nhìn thấy" những phẩm chất ở người khác có thể không tồn tại.

  Rất có thể bạn đặc biệt nhạy cảm với cảm xúc của người mẹ, và nhận ra cảm giác bị áp đảo, quá tải, oán giận hoặc thiếu tin
  tưởng của bà ấy. Sự gắn bó yêu-ghét mạnh mẽ với bà ấy, hoặc những khủng hoảng xoay quanh trải nghiệm của bạn về bà ấy, có
  thể là điều bạn phải sống cùng và nó có thể đang làm suy yếu bạn theo một cách nào đó.

  Một số người có khía cạnh này cảm thấy cần phải độc lập sớm khỏi mẹ hoặc gia đình để cảm thấy được giải phóng khỏi những
  cảm xúc mãnh liệt và mâu thuẫn mà họ gắn liền với họ. Tuy nhiên, việc tách mình hoàn toàn khỏi vấn đề có thể không phải
  là một giải pháp lành mạnh, lâu dài về mặt tâm lý. Ở một thời điểm nào đó, đối mặt với những khuôn mẫu thời thơ ấu là một
  quá trình cần thiết. Bạn có thể thấy rằng bạn có thể sử dụng âm nhạc như một phương tiện để bày tỏ và giải phóng những kịch
  tính cảm xúc bên trong bạn.

  Nỗi sợ mất mát và bị từ chối có thể khiến bạn bám chặt rất chặt vào những người bạn yêu. Điều quan trọng là bạn phải học
  cách nới lỏng sự kiểm soát đối với những người thân yêu để họ không cảm thấy bị ngạt thở hay mắc kẹt. Nếu đi quá xa, nó
  có thể trở thành một điềm báo tự thành hiện thực. Nếu bạn thấy


  bản thân cố gắng kiểm soát cảm xúc của mình và cảm xúc của những người xung quanh, bạn có thể tự hỏi điều gì khiến bạn sợ
  hãi trong chính mình. Hành vi ám ảnh cưỡng bức có thể là một hệ quả nghiêm trọng từ nỗi sợ bị bỏ rơi của chính bạn.

  Sự hời hợt không đủ với bạn. Bạn khao khát trải nghiệm cảm xúc và muốn "nhiều hơn" từ cuộc sống chỉ đơn thuần là sống theo
  phản xạ tự động. Ở một thời điểm nào đó trong đời, bạn có thể bị thu hút bởi tâm lý học, dù bạn có xu hướng tin tưởng trực
  giác và kinh nghiệm của bản thân hơn là các lý thuyết của chuyên gia.

  Phụ nữ có khía cạnh này (từ Báo cáo Hồ sơ Chiêm tinh cho Phụ nữ): Với Mặt Trăng hợp với Diêm Vương trong biểu đồ, sự mãnh
  liệt cảm xúc của bạn rất khó bỏ qua. Bạn có thể khá cưỡng ép, và khi đang ở trong một "khuôn mẫu", có thể thấy khó thoát
  ra. Đàn ông có thể đặc biệt bị đe dọa bởi sự quyến rũ của bạn, và nếu bạn có vấn đề kiểm soát, bạn thậm chí có thể phát
  ra mộtaura quyền lực có thể lấn át bất kỳ người đàn ông nào tiếp cận bạn (ít nhất là đôi khi).

  Bạn cũng có thể hơi đe dọa đối với phụ nữ khác, đặc biệt nếu bạn mang sự không tin tưởng đối với phụ nữ. Mối liên kết bạn
  cảm nhận với mẹ có thể đặc biệt mạnh mẽ, và rất có thể...


  đó là lý do bạn cảm thấy bị tràn ngập bởi nhu cầu cảm xúc của cô ấy theo cách rất mãnh liệt khi bạn còn nhỏ.

  Nếu mẹ bạn gặp khó khăn trong việc xử lý cảm xúc của chính mình, bạn có thể còn một số sự oán giận cần được giải phóng để
  chữa lành mối quan hệ đó. Ý thức rõ ràng về khía cạnh này của bản thân có thể tạo ra sự khác biệt lớn trong cách bạn tương
  tác với người khác, và nếu bạn cảm thấy bị đe dọa hay bị chặn lại, bạn có thể lùi lại một chút để giúp giảm bớt cường độ
  năng lượng của chính mình – nếu bạn thực sự muốn để ai đó bước vào nơi thiêng liêng nhất của mình.


  Sao Mat Trang vuong goc hoac doi xung Sao Diem Vuong

  Bạn không phải lúc nào cũng cởi mở với cảm xúc của mình. Mặc dù bạn có khao khát mãnh liệt được chia sẻ những cảm xúc sâu
  kín nhất với người khác, bạn đồng thời cũng có mong muốn kiểm soát những gì người khác biết về bạn, điều này có thể bắt
  nguồn từ nỗi sợ hãi. Bạn khao khát cảm giác thuộc về sâu sắc và sự kết nối thân mật với người khác, và cách tiếp cận để
  thực hiện những mong muốn này thường tự đánh bại chính mình. Những nỗ lực kiểm soát tình huống khi bạn hướng tới mục tiêu
  này thường phản tác dụng. Nỗi sợ mất mát và phản bội có thể tiêu hao bạn, và việc thao túng người khác để giữ họ gắn bó
  với bạn chỉ mang lại sự thỏa mãn trống rỗng ở mức tốt nhất, và tuyệt vọng ở mức...


  Tệ nhất.

  Đôi khi bạn tỏ ra xa cách về mặt cảm xúc và tự bảo vệ (thậm chí còn lạnh lùng trong biểu hiện), những lúc khác bạn lại thể
  hiện một sự mãnh liệt trong cảm xúc có thể đi xa đến mức đe dọa, lấn át và làm sợ hãi người khác. Dù bạn muốn chia sẻ bản
  thân mình về mặt cảm xúc với người khác đến đâu, bạn hiếm khi tiết lộ sự dễ bị tổn thương của mình. Khi bị tổn thương và
  tức giận bởi người thân yêu, bạn có thể thể hiện bản thân với sự mãnh liệt đến mức bị coi là thù địch và thậm chí là thù
  hận. Bạn có thể im lặng, nhưng có nhiều khả năng bạn suy nghĩ mông lung hoặc thậm chí bùng nổ. Bạn có thể không nhận ra
  mình đã thể hiện bản thân mạnh mẽ đến mức nào trong những trường hợp này, và bạn có thể bị coi là nguy hiểm hoặc thù hận
  hơn nhiều so với thực tế.

  Việc xa lánh người khác thực sự có thể làm bạn bối rối, vì mục tiêu của bạn là trở nên gần gũi hơn. Trò chơi tâm lý là điều
  bạn nên cố gắng tránh. Ngay cả khi bạn "thành công" trong việc giữ một người ở bên mình thông qua thao túng cảm xúc nhất
  thời, bạn sẽ không bao giờ biết rằng họ ở bên bạn vì tự nguyện, và điều này chỉ làm tăng thêm nỗi sợ bị từ chối của bạn.
  Học cách chấp nhận cảm xúc của mình như chúng vốn là, và quan trọng hơn, thể hiện chúng theo cách cho phép người khác "đi
  vào" thay vì làm họ sợ hãi.


  loại bỏ chúng đi, là một thử thách quan trọng trong cuộc đời bạn.

  Một số người có các khía cạnh này hòa hợp với cảm xúc của mình hơn người khác, và do đó, thích đối mặt với vấn đề và tìm
  hiểu về sự phức tạp của cảm xúc, cả trong bản thân lẫn người khác. Những người khác có các khía cạnh này thì quyết tâm chôn
  vùi thay vì khai phá những cảm xúc sâu thẳm nhất của mình. Dù bằng cách nào, họ đều là những cá nhân mãnh liệt!


  Phụ nữ với khía cạnh này (từ Báo cáo Hồ sơ Chiêm tinh dành cho Phụ nữ): Với Sao Mat Trang của bạn đối xung Sao Diem Vuong,
  bạn cảm nhận mọi thứ ở một tầng sâu, mãnh liệt. Bạn hiếm khi lướt trên bề mặt, vì đắm chìm vào bất cứ điều gì bạn đang làm
  đều mang lại sự hài lòng lớn hơn. Sự mãnh liệt của bạn cũng có thể kích thích các mức độ hành vi cưỡng bức hoặc ám ảnh.


  Bạn cũng có thể là một người phụ nữ đáng gờm, đặc biệt khi bạn tập trung vào một điều gì đó (hoặc ai đó!), và có thể hoàn
  toàn chìm đắm trong cảm xúc của chính mình. Năng lượng này tuyệt vời cho việc chữa lành, vì bạn có khả năng thâm nhập vào
  chiều sâu và giải phóng những tắc nghẽn; mặc dù có thể dễ dàng hướng năng lượng này vào người khác hơn là hướng vào chính
  mình.


  Những người đàn ông cảm thấy không thoải mái với bản chất cảm xúc và sự dễ bị tổn thương của chính mình...


  Họ có thể cảm thấy phơi bày khi ở bên bạn. Dù bạn có thể không có ý định lấn át họ, nhưng đôi khi bạn vẫn làm vậy. Trong
  các mối quan hệ thân thiết, điều quan trọng là cho phép người khác là chính họ, với cả những khuyết điểm. Xu hướng của bạn
  có thể là muốn thay đổi họ, và điều đó có thể nguy hiểm. Tuy nhiên, nếu một người đang nỗ lực thay đổi, bạn chắc chắn có
  thể giúp ích, và bạn có thể là chất xúc tác cho sự thay đổi trong cuộc sống của nhiều người. Với tư cách là một người mẹ,
  bạn có thể cực kỳ chú ý và nhạy bén.


  Bạn cũng có thể quá protective và tạo ra bầu không khí ngột ngạt cho con cái nếu bạn đi quá xa. Hãy sử dụng sự nhạy cảm
  của bạn để xác định con bạn đang phản ứng thế nào, và cho phép mình lùi lại khi cần thiết. Nếu không, bạn có thể đến một
  thời điểm mà cảm giác như bạn đang bỏ rơi con thuyền giữa cơn bão.


  Thông qua góc vuông (Vuong Goc) căng thẳng giữa Sao Mat Trang và Sao Diem Vuong trong biểu đồ của bạn, sự nhạy cảm cảm xúc
  của bạn được khuếch đại cực độ. Bạn có thể mang một số oán hận sâu xa, và có thể ôm mãi sự tội lỗi trừ khi bạn nỗ lực để
  giải phóng nó. Niềm tin vào sức mạnh của chính bạn với tư cách là một người phụ nữ có thể bị lung lay, đặc biệt nếu bạn
  cảm thấy bị lạm dụng cảm xúc khi còn nhỏ. Rất có thể bạn đã bị đối xử sai trái vì...


  Một trong những bậc cha mẹ của bạn có thể đã không hài lòng khi bạn xuất hiện, nhưng bạn cũng có thể chỉ đơn giản là đang
  vật lộn để sinh tồn trong một hoàn cảnh thiếu vắng sự nuôi dưỡng cảm xúc. Dù chi tiết về sự hình thành tính cách thời thơ
  ấu của bạn là gì, bạn vẫn có khả năng chữa lành những vết thương cũ này bằng chính nguồn năng lượng đã duy trì nỗi đau của
  chúng.


  Bạn có thể bị thu hút vào các mối quan hệ vì niềm vui thuần túy về thể xác và sự kích thích mà chúng mang lại, nhưng có
  thể không muốn cảm thấy gần gũi về mặt cảm xúc do thiếu sự tin tưởng. Tuy nhiên, sâu thẳm trong tâm hồn, bạn có thể khao
  khát sự gắn kết bắt nguồn từ quá trình "giải hóa" khi hai linh hồn hòa làm một. Vì bạn không được trao một cuốn hướng dẫn
  sử dụng về cách đối xử với người khác khi bước vào cuộc đời này, bạn cần cho bản thân nhiều thời gian và không gian để nghiên
  cứu bản chất và cảm xúc con người.


  Những hoàn cảnh an toàn như tình bạn với một người chia sẻ sở thích có thể cho bạn cơ hội học về sự tin tưởng – nhưng bạn
  phải trung thực với cảm xúc của mình! Dù bạn có thể nghĩ rằng bạn thích sống tách biệt với xã hội, việc hòa nhập vào các
  tình huống xã hội có thể giúp bạn tin tưởng bản thân nhiều hơn, vì sự tương tác với người khác giúp bạn phát triển tính
  khách quan. Để có được


  tình yêu và sự dịu dàng bạn cần từ người khác, bạn cũng phải học cách tha thứ. Sự tha thứ đó bắt đầu từ chính bản thân bạn,
  và việc giải tỏa căng thẳng cũng như buông bỏ những gánh nặng từ quá khứ sẽ giúp bạn cảm thấy nhẹ nhõm, tràn đầy sức sống
  và tự do hơn nhiều. Khi đó, và chỉ khi đó, bạn mới có thể thực sự hài lòng với sức mạnh của việc trở thành một người phụ
  nữ trọn vẹn.


  **Sao Mat Trang Luc Hop hoặc Tam Hop với Sao Diem Vuong**

  Dường như không sợ bất cứ điều gì, bạn đối mặt vấn đề với sự tự tin, và trực giác chấp nhận rằng cuộc sống luôn đầy thử
  thách. Thật ra, bạn thích cuộc sống có ít nhất là những thử thách nhẹ nhàng, bởi bạn cảm thấy mình sống động và tràn đầy
  năng lượng khi trải qua những cảm xúc sâu sắc, chia sẻ sự thân mật, và đào sâu tìm kiếm câu trả lời. Bạn thể hiện sự mạnh
  mẽ và mãnh liệt, và điều này thường mang lại sự tôn trọng từ người khác, dù một số người có thể cảm thấy hơi e ngại trước
  bạn.


  Bạn có thể rất thực tế và bạn mong đợi sự trung thực, tôn trọng và thẳng thắn từ người khác giống như những gì bạn thể hiện.
  Thực tế, bạn có thể khá bối rối và thiếu kiên nhẫn với những người không thẳng thắn. Bạn là một người yêu đầy đam mê và
  giàu cảm xúc, cũng là một người bạn sâu sắc, nhạy bén và thấu hiểu.


  Khía cạnh Tam Hop là hai khía cạnh hài hòa mang tính năng động hơn. Những người có khía cạnh Luc Hop có thể gọi lên...


  Những đặc điểm này khi cần thiết, và những người có Tam Hop giữa Sao Mat Trang và Sao Diem Vuong đã tích hợp các đặc điểm
  của khía cạnh này vào tính cách của họ, thể hiện chúng một cách tự nhiên và nhất quán.

  Sao Mat Trang Luc Hop Sao Diem Vuong: Thói quen hàng ngày của bạn được tái cấu trúc định kỳ. Điều này xảy ra vì bạn cảm
  thấy cần thay đổi và đáp lại cảm giác đó một cách nhiệt tình. Bạn có động lực sâu sắc và nhu cầu mạnh mẽ về nhiều trải nghiệm
  cuộc sống đa dạng trong một lĩnh vực hoặc ngành nghề đã chọn. — Mẫu diễn giải từ Báo cáo Hồ sơ Chi tiết.

  Sao Mat Trang Tam Hop Sao Diem Vuong: Có tính ép buộc và đầy quyết tâm, bạn hoàn thành nhiều việc nhờ khả năng kiên trì
  thử các phương pháp tiếp cận khác nhau đối với một vấn đề cho đến khi nó được giải quyết. Mọi người hoặc yêu thích bạn hoặc
  ghét bỏ bạn mãnh liệt, vì bạn tập trung có ý thức và lôi cuốn về mặt cảm xúc, buộc mọi người phải chọn phe. Bản năng cảm
  xúc của bạn hoạt động trong một lĩnh vực biểu tượng, ban cho bạn kỹ năng tuyệt vời trong việc tổ chức các mô hình tư tưởng
  cũng như các nhóm người. Bạn rất khéo léo trong việc điều chỉnh những ảnh hưởng tích cực trong cuộc sống của mình. — Mẫu
  diễn giải từ Báo cáo Hồ sơ Chi tiết.

  Phụ nữ có khía cạnh này (mẫu từ Báo cáo Hồ sơ Chi tiết cho Phụ nữ): Với dòng chảy dễ dàng của


  Năng lượng giữa Sao Mat Trang và Sao Diem Vuong được thể hiện qua khía cạnh Luc Hop của họ, bạn có thể rất thành thạo trong
  việc hiểu biết cảm xúc con người. Theo nhiều cách, bạn là một nhà tâm lý học bẩm sinh, vì những hiểu biết sâu sắc của bạn
  về hoạt động bên trong của tâm lý có thể rất mạnh mẽ. Nhưng sự nhạy bén đó cũng mang lại lợi ích cho bạn trong thế giới
  kinh doanh và trong các mối quan hệ cá nhân của bạn. Dù trong công việc hay trong các mối quan hệ cá nhân, bạn có thể diễn
  đạt rất rõ ràng quan điểm và cảm xúc của mình, và đánh giá cao sự trung thực và khả năng diễn đạt tương tự từ người khác.


  Bạn có một phẩm chất chữa lành có thể thu hút những người đang tìm kiếm sự hỗ trợ và thấu hiểu vào cuộc sống của bạn. Là
  một người mẹ, bạn có thể có sự kết nối sâu sắc với con cái và thậm chí có thể thấy rằng bạn bè của chúng tìm đến bạn vì
  sự thấu hiểu và cái nhìn sâu sắc chân thành của bạn. Trong mối quan hệ thân mật với đối tác, đam mê của bạn có thể rất lớn,
  và bạn có thể trải nghiệm một mức độ thống nhất và gắn kết biến đổi hoàn toàn cuộc sống của bạn. Vì bạn không có khả năng
  làm gì nửa vời, bạn thường dành thời gian để có sự lựa chọn kỹ lưỡng. Để bản thân dễ bị tổn thương đơn giản không phải là
  phong cách của bạn.


  Thông qua sự kết nối giữa Sao Mat Trang và


  Sao Diem Vuong ở góc Tam Hop, những nhạy cảm cảm xúc của bạn khá mãnh liệt. Khả năng cảm nhận những điều ẩn giấu bên dưới
  bề mặt của bạn thật đáng kinh ngạc, bao gồm cả cảm xúc thực sự của người khác – bất kể họ nói gì! Bạn có thể là một người
  phụ nữ đáng sợ dù không cố gắng trở nên như vậy, đơn giản vì bạn sở hữu một mức độ nhận thức hoàn toàn thấu đáo. Sự đón
  nhận bản chất thực sự của quyền năng nữ tính của bạn thật đáng chú ý, và khả năng phục hồi trước những thử thách hay nghịch
  cảnh của bạn trực tiếp gắn liền với quyền năng này.


  Với khả năng sáng tạo và chuyển hóa cao, bạn có thể mang lại sự sống cho những thứ vô hồn và mục đích cho những gì đã trở
  nên nhàm chán. Bạn vốn dĩ nhận thức được và kết nối với những thay đổi mạnh mẽ xảy ra trong suốt chu kỳ kinh nguyệt của
  mình, và bằng cách làm việc với những biến đổi này trong cơ thể, tâm trí và linh hồn, bạn có thể trở thành một người phụ
  nữ hiệu quả hơn rất nhiều.


  Người khác có thể bị thu hút bởi phẩm chất chữa lành của bạn, và bạn có thể mở tâm hồn mình theo cách cho phép người khác
  tìm thấy sức mạnh của chính họ. Trong các mối quan hệ thân mật, bạn có khả năng đạt đến một mức độ gắn kết vượt lên trên
  sự bình thường. Giới tính và sự nhạy cảm của bạn là những chìa khóa đặc biệt giúp bạn đạt được sự khoái cảm.


  Hơn nữa, bạn có thể có một mối liên hệ phi thường với con cái của mình, và đặc biệt hiệu quả trong việc giúp chúng phát
  triển sự tin tưởng và hiểu biết sâu sắc về những nhu cầu và cảm xúc thâm sâu của bản thân.

