moon_venus_conjunction: 'Vì khía cạnh này kết hợp hai năng lượng "âm", đây không phải là một trong những khía cạnh định hình
  con người, nhưng các đặc điểm vẫn ở đó, dù có thể đang ẩn giấu! Mỗi lần hợp nhất đều bị ảnh hưởng bởi bất kỳ hành tinh nào
  tương tác với nó, và với Sao Hỏa - Sao Kim, có lẽ còn nhiều hơn thế, vì cả Sao Hỏa và Sao Kim đều là những năng lượng dễ
  tiếp nhận và dễ thay đổi. Và khái niệm này mở rộng đến các đặc điểm tính cách.


  Có một phần bản chất rất nhạy cảm, và mặc dù họ không nhất thiết "dễ thay đổi", sự nhạy cảm của họ đối với người khác và
  môi trường xung quanh cho thấy một phần tính cách tự động nhượng bộ. Dù đây là một đặc điểm rõ ràng hay một điều được che
  giấu kỹ lưỡng, nó vẫn tồn tại, và thường bắt nguồn từ trải nghiệm với người mẹ. Vì lý do nào đó, trải nghiệm này đã gửi
  đến đứa trẻ thông điệp rằng phải phục tùng người khác để tìm thấy hạnh phúc, mặc dù theo nghĩa tuyệt đối, tất nhiên điều
  này không đúng.


  Các biểu hiện khác nhau của khía cạnh này có thể bao gồm những người luôn cảm thấy cần phải thích nghi với người khác, những
  người dùng cách vòng vo để quyến rũ người khác nhằm đạt được điều họ muốn, hoặc những người làm mọi cách để tránh xung đột.
  Người mẹ hoặc hình tượng người mẹ có thể đã thể hiện những xu hướng này – dùng sự quyến rũ thay vì sự thẳng thắn để đạt
  được điều bà ấy muốn, hoặc bà ấy có thể đã phục tùng và dễ thích nghi, luôn rón rén xung quanh người khác để tránh xung
  đột. Hoặc bà ấy có thể đã dễ bị quyến rũ – đứa trẻ có thể đã sớm phát hiện ra rằng để đạt được điều nó muốn (chủ yếu là
  sự chú ý) từ người mẹ, phương tiện hiệu quả nhất là sự quyến rũ, sự giả tạo, và các chiến thuật gián tiếp khác.


  Những người này rất nhạy cảm với sự chỉ trích và từ chối. Họ thường dành nhiều thời gian và năng lượng để tìm cách tránh
  cả hai điều này. Đàn ông với cung này có thể đặc biệt thu hút phụ nữ, vì họ có vẻ rất thông cảm với phụ nữ, hoặc ít nhất
  họ sở hữu một khía cạnh lãng mạn và dịu dàng khiến phụ nữ cảm thấy rất thoải mái. Cả hai giới đều mang trong mình những
  phẩm chất này.'
moon_venus_opposition: 'Vì những người này coi trọng sự hài hòa, họ có thể thấy mình dễ dàng nhượng bộ người khác quá mức,
  đặc biệt là trong nửa đầu cuộc đời. Sự phẫn uất có thể xảy ra, vì họ cảm thấy dường như mình là người luôn phải nhún nhường.
