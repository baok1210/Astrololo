  Các giải thích được viết bởi Annie Heese, trừ khi có ghi chú khác.'
mercury_moon_conjunction: 'Với Sao Mat Trang hop Sao Thuy, những người này đôi khi có một đường dẫn trực tiếp đến cảm xúc
  và tình cảm của họ, và có thể nói về chúng một cách dễ dàng. Mặt khác, có xu hướng hợp lý hóa cảm xúc đến mức hiếm khi thực
  sự cảm nhận được chúng. Điều này là vì Sao Mat Trang đại diện cho chức năng cảm xúc, còn Sao Thuy tượng trưng cho trí tuệ
  thấp hơn – phần tâm trí xử lý thông tin, phân tích ấn tượng và sắp xếp mọi thứ. Theo một số khía cạnh, Sao Mat Trang hop
  Sao Thuy tương tự như Sao Mat Trang ở cung Song Tu.


  Những người này nói chung khá biểu cảm và sôi nổi trong lời nói. Họ có trí nhớ xuất sắc và có xu hướng thu thập nhiều thông
  tin từ môi trường xung quanh. Họ thích trò chuyện và trao đổi ý tưởng. Ngay cả khi họ nhút nhát, một khi trở thành bạn bè,
  họ thích nói về hầu hết mọi thứ trên đời, và họ thực sự thích chia sẻ những câu chuyện từ quá khứ của mình! Hầu hết trong
  các giao tiếp, họ tập trung vào các hoạt động hàng ngày hơn là những triết lý vĩ đại.'
mercury_moon_opposition: 'Có một sự xung đột ở đây giữa lý trí và trái tim. Cảm xúc mách bảo họ một điều, trong khi lý trí
  lại nói một điều khác. Kết quả là sự dao động, và hiệu ứng lắc lư rõ ràng nhất với aspect Đối Xung – lúc thì cảm xúc đến
  mức phi lý, lúc lại lý trí. Việc dung hòa lý trí và trái tim là một cuộc đấu tranh không ngừng cho những cá nhân này, thường
  là vì họ có xu hướng chống lại việc dung hòa chúng!


  Những người này thích trò chuyện, thích kể chuyện và viết lách/thơ ca, và thường sở hữu sự hóm hỉnh lấp lánh! Họ rất hào
  hứng khi nói chuyện, và có khiếu hài hước mà người khác đánh giá cao đơn giản vì nó rất giàu trí tưởng tượng. Một số đặc
  biệt giỏi về châm biếm. Bạn thường có thể đoán được tâm trạng của họ qua lượng lời nói. Khi lo lắng hoặc phấn khích, họ
  nói chuyện rất nhiều.


  Sự thất thường là một đặc điểm, chắc chắn, và bản chất đặc biệt chủ quan khiến họ dễ bị nhạy cảm quá mức. Điều này thường
  liên quan đến việc họ tiếp nhận rất nhiều từ môi trường xung quanh. Đây cũng là một trong những lý do tại sao họ có xu hướng
  thiếu quyết đoán.


