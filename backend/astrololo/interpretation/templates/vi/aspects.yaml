  thường gắn liền với tình yêu, và một số người có thể thấy mình mắc kẹt trong một cuộc hôn nhân không tình yêu, chẳng hạn.


  Đặc biệt trong thời trẻ, những người này có thể cảm thấy lúng túng trong một số tình huống xã hội, không chắc chắn về cách
