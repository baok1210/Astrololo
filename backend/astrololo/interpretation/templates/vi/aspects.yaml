  Đang tìm kiếm giải thích cho các khía cạnh khác? Xem Bat Xung, Luc Hop, và Quintile/Biquintile.

  Không biết vị trí của Sao Kim trong biểu đồ sinh của bạn? Tìm hiểu cách bạn có thể nhận được vị trí biểu đồ chiêm tinh miễn
