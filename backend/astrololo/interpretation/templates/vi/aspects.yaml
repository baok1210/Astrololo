  và bạn trân trọng những thứ ẩn giấu, đa tầng, sâu sắc hoặc phức tạp. Bạn tin vào sự đổi mới và chuyển hóa.

  Góc hợp này cải thiện khả năng lập kế hoạch và tổ chức của bạn. Bạn hướng tới thành công và phát triển. Bạn hoàn toàn tin
  vào khả năng cải thiện mọi thứ, và bạn có thể thường tự hỏi mình có thể làm gì tốt hơn – điều gì có thể phát triển hay tiến
  bộ. Người khác có xu hướng tôn trọng bạn như một người có thẩm quyền.

  Khi bạn nỗ lực, bạn có thể đi đến cốt lõi hay sự thật của bất kỳ vấn đề nào. Bạn nhạy bén và là một nhà nghiên cứu xuất
  sắc. Điều tra mang lại niềm vui cho bạn, và phần thưởng là bạn giỏi trong lĩnh vực này. Bạn có thể quyết tâm tìm hiểu đến
  cùng các vấn đề, và có vẻ hơi quá cứng rắn hoặc ám ảnh với việc tìm ra sự thật trong mắt người khác.

  Lý tưởng nhất là có những góc hợp khác trong lá số của bạn chỉ ra sự khoan dung và nhạy cảm để cân bằng điều này. Các nghề
  nghiệp phù hợp bao gồm nhà lập pháp, dược sĩ, bác sĩ, thẩm phán, chính trị gia, nhà xuất bản, thám tử và nhà khoa học. Bạn
  đặc biệt phù hợp


  cho các lĩnh vực giúp người khác chữa lành bệnh tật, khủng hoảng, áp bức hoặc lạm dụng.

  Bạn có tài năng trong việc quản lý tài nguyên của người khác, bao gồm cả tài năng và tiền bạc, và cải thiện chúng. Ít ai
  thành công như bạn trong việc tạo ra sự giàu có và phát triển tài năng. Dù làm gì, bạn cũng có xu hướng đưa mọi thứ lên
  một tầm cao mới. Khát khao quyền lực, đặc biệt là đằng sau hậu trường, rất phát triển.

  Bạn muốn cải thiện mọi thứ, và bạn rất giỏi trong việc đó, mặc dù bạn có thể không phải lúc nào cũng thấy dễ dàng để buông
  bỏ một vấn đề! Mọi người có thể gặp khó khăn trong việc giấu giếm sự thật với bạn.

  Sự giàu có hay sung túc đối với bạn更多是关于享受丰富的体验 hơn là tích lũy tài sản.

