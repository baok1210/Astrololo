  con đường không thoải mái. Nỗi sợ hãi khi cho đi cũng có thể biểu hiện qua sự keo kiệt với tiền bạc. Chìa khóa để xử lý
  các góc đối này là học cách thư giãn và thoải mái hơn. Hãy biết rằng bạn có thể quá nhạy cảm với sự từ chối — và cố gắng.'
saturn_venus_trine: 'Bạn cảm thấy một trách nhiệm mạnh mẽ đối với những người bạn yêu thương, và điều này tự nhiên đến mức
  trở thành bản năng thứ hai. Nói chung, bạn thận trọng và sáng suốt trong các mối quan hệ với người khác, và bạn thấu hiểu
  khi người khác cần giúp đỡ. Bạn tự hào về sự trách nhiệm và đáng tin cậy, và bạn làm mọi thứ có thể để thỏa hiệp khi cần
  thiết.


  Có lẽ nhờ sự rèn luyện từ thuở nhỏ, bạn có kỷ luật tốt và có thể tập trung nỗ lực một cách hiệu quả để đạt được thành công.
  Dù bạn sẽ tự mình leo lên đỉnh cao, bạn không ngần ngại đưa tay giúp đỡ những người gặp trên đường đi. Đặc điểm này là một
  trong những lý do chính cho sự thành công của bạn – sự nhạy cảm với nhu cầu của người khác.


  Bạn là một phụ huynh tốt và sẽ là người kỷ luật nhân từ. Bạn mong con cái học cách tôn trọng người khác và ý thức được những
  nhu cầu ngoài bản thân chúng. Thay vì cố gắng uốn nắn chúng thành bản sao của mình, bạn sẽ khuyến khích con cái phát triển
  cá tính riêng.


  Trong chuyện tình cảm, bạn không vội vàng lao vào các vấn đề trái tim. Bạn tìm hiểu kỹ từng đối tác tiềm năng, đánh giá
  cả ưu và nhược điểm của họ. Quan trọng nhất, bạn đòi hỏi mối quan hệ phải có sự tôn trọng và trung thành lẫn nhau. Bạn cảm
  thấy thoải mái hơn trong một mối quan hệ ổn định, lâu dài hơn là trong một loạt "cuộc tình thoáng qua." Bạn tự nhiên đến
  mức trách nhiệm và quan tâm đến người mình yêu, nên hoàn toàn ngạc nhiên khi gặp những người không như vậy, hoặc coi nhẹ
  các mối quan hệ!'
sun_uranus_conjunction: 'Những người sinh dưới ảnh hưởng của Sao Mặt Trời hợp Sao Thiên Vương có xu hướng tự nhiên đặt câu
  hỏi về truyền thống. Đây là những người theo chủ nghĩa cá nhân, họ tự nhiên nổi loạn chống lại những gì đã được thiết lập.
  Điều này không có nghĩa là họ liên tục phá vỡ mọi quy tắc, nhưng họ chắc chắn sẽ đặt câu hỏi về một số quy tắc, đặc biệt
  là những quy tắc mà họ thấy không hợp lý. Những người này rất ghét sự đều đặn và làm việc hiệu quả nhất khi có tiếng nói
  trong việc quyết định thời gian và cách thức hoàn thành công việc.


  Họ có tính chính trực cao, thích chỉ chịu trách nhiệm với chính mình hơn là với bất kỳ ai khác. Họ tránh việc gán nhãn cho
  người khác và cảm thấy bị xúc phạm nhất khi người khác cố gắng gán nhãn hoặc stereotyp hóa họ. Mặc dù tiến bộ, đôi khi họ
  có thể cứng đầu đến mức khó chịu. Họ thích một mức độ phấn khích nhất định trong cuộc sống, chấp nhận thay đổi như một điều
  thú vị, và có vẻ rất cởi mở – tuy nhiên, ở cấp độ cá nhân, họ có thể bướng bỉnh giữ vững ý tưởng của mình và sẽ tức giận
  với bất kỳ ai cố gắng đẩy họ vào việc làm điều gì đó họ thực sự không muốn làm.


  Sao Mặt Trời, với tư cách là cái tôi, gặp Sao Thiên Vương, người cải cách. Kết quả là một người mà bản sắc gắn chặt với
  việc trở nên độc đáo. So sánh họ với người khác, và những người có vẻ cởi mở, yêu tự do này có thể nhanh chóng trở nên giận
  dữ. Đây là lúc những "linh hồn tự do" này định nghĩa lại từ "khó chiều". Đó, bạn đã làm điều đó – bạn đã tìm ra điểm yếu
  của họ. Mặt khác, nếu bạn đặt họ vào một lớp riêng, họ sẽ rất vui vẻ. Những người này sáng tạo, đầy năng lượng và có tinh
  thần. Có lẽ họ có vẻ linh hoạt hơn thực tế. Ít nhất trên lý thuyết, họ là người cởi mở. Tuy nhiên, nếu mọi thứ trở nên quá
  cá nhân, họ có thể khó xử lý. Điều này phần lớn là do họ bám rất chặt vào không gian cá nhân và cảm giác tự do cá nhân của
  mình.'
sun_uranus_opposition: 'Khi Mặt Trời ở vị trí vuông góc hoặc đối đỉnh Thiên Vương Tinh, cái tôi thường khá lớn. Điều này phần
  lớn bắt nguồn từ việc bản sắc của những người này gắn liền với cảm giác tự do cá nhân. Khá khó để khiến họ làm những điều
  họ không muốn, đơn giản vì họ coi bất kỳ nỗ lực nào nhằm đẩy họ theo một hướng nhất định đều đe dọa sự tự do của họ. Đây
  là những cá nhân rất năng động, luôn đặt câu hỏi về truyền thống và quyền lực, nhưng một cách nghịch lý, lại khá cứng nhắc
  trong cách riêng của mình.


  Những người này có mối quan hệ yêu-ghét với sự độc đáo của chính họ. Phần lớn thời gian, họ rất tự hào về tính cách nguyên
  bản của mình. Những lúc khác, họ cảm thấy hơi bị bỏ rơi vì "khác biệt". Mặc dù họ là những người nhân đạo theo nhiều cách,
  nhưng họ có thể hơi thô lỗ khi nói đến tình cảm hoặc những gì họ cho là sự gắn bó quá mức với quá khứ hoặc truyền thống.


  Khi Mặt Trời và Thiên Vương Tinh tạo thành một khía cạnh đầy thách thức, có thể có rất nhiều năng lượng thần kinh và sự
  phòng thủ. Điều này có thể khiến họ gặp khó khăn trong việc duy trì một công việc từ 9 giờ sáng đến 5 giờ chiều hoặc phát
  triển các thói quen đều đặn. Họ làm việc hiệu quả nhất khi có thể tự quản lý lịch trình của mình, làm việc theo từng đợt.
  Khi được truyền cảm hứng sáng tạo, họ có khả năng nỗ lực phi thường.


  Tuy nhiên, họ có thể khá thất thường, và rất khó để họ dồn hết tâm sức vào điều mà họ không "cảm thấy" vào lúc đó. Họ không
  thích sự hời hợt hay giả tạo, đây là một phẩm chất đáng ngưỡng mộ. Tuy nhiên, sự khinh ghét sự giả tạo của họ có thể gây
  rắc rối trong một thế giới nơi mọi người được kỳ vọng phải thể hiện bản thân dù có được truyền cảm hứng hay không!


  Tôi biết một trường hợp điển hình: một cô con gái có Mặt Trời ở góc đối đỉnh Thiên Vương Tinh, và có một giai đoạn điều
  chỉnh khá dài khi cô bé vào lớp một - thời điểm khi trẻ em bắt đầu thực sự trải nghiệm sự khuôn khổ. Khi các bạn trong lớp
  thể dục của cô bé được bảo nh...'
sun_uranus_sextile: 'Những người sinh ra dưới ảnh hưởng của một khía cạnh Tam Hop giữa Mặt Trời và Thiên Vương Tinh rất dễ
  dàng và tự nhiên trong việc đón nhận những cách làm mới, bảo vệ cho người yếu thế, và thể hiện bản thân theo những cách
  độc đáo và truyền cảm hứng. Những người này không cần phải cố gắng nổi bật vì sự độc đáo của mình – họ vốn đã là những người
  có tư duy đổi mới, sáng tạo và tiến bộ một cách tự nhiên. Mặc dù họ có thể đặt câu hỏi về các quy tắc và truyền thống nếu
  chúng không có ý nghĩa với họ, nhưng họ không coi chúng là mối đe dọa đối với cảm giác tự do cá nhân của mình.


  Những cá nhân này hoàn toàn không hề giả tạo. Họ coi trọng sự trung thực và chân thật, và tránh tỏ ra kiêu ngạo. Họ tin
  vào sự bình đẳng của con người, và dễ dàng kết nối với mọi người từ mọi tầng lớp xã hội. Có một niềm hào hứng không thể
  nhầm lẫn với cuộc sống, và nói chung cuộc sống của họ rất thú vị vì họ chủ động mời gọi những trải nghiệm khác thường hoặc
  mạo hiểm vào đời mình. Họ thường được người khác đánh giá cao vì họ cởi mở, công bằng và không phán xét.


  Hầu như không có điều gì có thể làm họ nao núng! Họ đón nhận mọi thứ một cách bình thản, và hiếm khi bị sốc hay ngạc nhiên
  trước hành vi của con người. Nếu bạn đang giữ một điều gì đó trong lòng vì sợ rằng nếu nói ra, người khác sẽ nghĩ bạn kỳ
  lạ, bạn có thể an tâm tìm đến một người có Mặt Trời - Thiên Vương Tinh. Họ có lẽ sẽ không chớp mắt, và họ sẽ khiến bạn cảm
  thấy hoàn toàn ổn với điều đó.


  Góc Tam Hop là khía cạnh năng động hơn trong hai khía cạnh hài hòa. Những người có góc Lục Hop có thể gọi đến trực giác
  khi cần thiết, và những người có góc Tam Hop giữa Mặt Trời và Thiên Vương Tinh đã tích hợp các đặc điểm của khía cạnh vào
  tính cách của họ, thể hiện chúng một cách tự nhiên và nhất quán.


  Một số Nhân vật Nổi tiếng có Mặt Trời ở Góc Hài hòa với Thiên Vương Tinh: Lục Hop – Eartha Kitt, Pyotr Ilyic.'
sun_uranus_square: 'Khi Sao Mặt Trời vuông góc hoặc đối xung với Sao Thiên Vương, cái tôi thường khá lớn. Điều này phần lớn
  xuất phát từ việc danh tính của những người này gắn liền với cảm giác tự do cá nhân. Khá khó để khiến họ làm những điều
