  nghiệm và sự luyện tập! Ở biểu hiện tiêu cực hơn, một số người có vị trí này học cách mưu mô để có được những gì họ muốn
  từ đối tác, hoặc họ có thể đối xử với các mối quan hệ như thể đó là một công việc kinh doanh.


  Các khía cạnh này có thể khiến người sở hữu đặc biệt nhạy cảm với những "dấu hiệu" cho thấy họ không được yêu hoặc bị từ
  chối theo một cách nào đó. Những người có Sao Kim-Sao Tho ở khía cạnh cứng thường có thể "mong đợi" sự từ chối trong các
