  tục hành trình. Câu chuyện thành công của họ có thể chậm rãi nhưng vững chắc. Sự nhiệt tình của họ thường được tiết chế,
  vì những người có Sao Hoa - Sao Tho rất thực tế, tìm kiếm sự cân bằng và thực hành sự điều độ. Họ có xu hướng bảo tồn năng
