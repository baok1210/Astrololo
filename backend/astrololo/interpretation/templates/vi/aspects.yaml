mars_saturn_conjunction: 'Sao Hoa hợp Sao Tho là một sự kết hợp quyết đoán, kiên cường và thực tế. Những người có khía cạnh
  này trong bản đồ sao thích lên kế hoạch trước, tổ chức và kiểm soát mọi thứ. Họ thông minh và đôi khi có tính châm biếm.
  Xu hướng làm việc quá sức có thể xuất hiện, nhưng theo thời gian họ học được cách điều chỉnh nhịp độ. Không có xu hướng
  vội vàng, những người có sự hợp Sao Hoa-Sao Tho biết rằng những điều tốt đẹp cần thời gian để xây dựng và phát triển.


  Sao Hoa-Sao Tho có trách nhiệm, thực tế, chăm chỉ và lý trí. Họ là những nhà quản lý và tổ chức xuất sắc. Họ không sợ công
  việc lặp đi lặp lại. Họ có thể khá tự nhiên trong việc kín đáo, nhưng nếu hòa đồng, họ nổi tiếng với sự hài hước thông minh.
  Điều này phần lớn là do một số bất an hoặc sợ hãi liên quan đến việc khẳng định bản thân, vấn đề về cái tôi thể chất, và
  những khó khăn tương tự trong thời niên thiếu. Việc quản lý những điều này trở nên dễ dàng hơn theo thời gian và tuổi tác.
  Thực tế, họ phát triển sự tự lập đáng kinh ngạc.


  Sức bền là thế mạnh của họ! Sao Hoa-Sao Tho kiên trì, và mặc dù tính thực tế đôi khi có thể làm họ nản lòng, họ giỏi vực
  dậy bản thân và tiến lên phía trước. Đúng là họ có thể đánh giá thấp khả năng của mình. Tuy nhiên, một khi họ đảm nhận một
  nỗ lực, họ sẽ cống hiến hết mình. Họ không...


  rất tự phát hoặc rõ ràng là nhiệt tình, tự nhiên điều chỉnh phản ứng của họ bằng sự thực tế. Những người có Sao Hoa-Sao
  Tho có lẽ nên chú ý đến việc tích tụ sự phẫn nộ vì người khác kỳ vọng quá nhiều ở họ hoặc dựa vào họ để giải quyết hậu quả.
  Họ nghiêm khắc với bản thân hơn hầu hết mọi người. Ý thức trách nhiệm của họ rất mạnh mẽ. Việc thể hiện sự dễ bị tổn thương
  không phải lúc nào cũng dễ dàng.


  Những người có sự liên kết Sao Hoa-Sao Tho trong biểu đồ sinh của họ không chỉ đặc biệt nhận thức được giới hạn của thời
  gian, họ còn thấy rõ giới hạn của bản thân hơn hầu hết mọi người. Họ có bản năng sinh tồn mạnh mẽ và thực tế. Trong khi
  những người khác có thể bỏ cuộc ở chướng ngại vật đầu tiên hoặc thứ hai, những người có sự hợp Sao Hoa-Sao Tho lại dự đoán
  được những thăng trầm. Họ kiên nhẫn và học được tính kiên nhẫn.


  Bạn tự kìm hãm mình trong cuộc sống và dù bạn tốt bụng và rất kiên nhẫn với người khác, thời điểm hành động của bạn có thể
  không tốt và điều đó ngăn bạn đạt được những gì bạn nghĩ mình muốn trong cuộc sống. Bạn luôn cố gắng cải sửa ham muốn của
  mình và khi bạn khẳng định một mong muốn, một nỗi sợ đồng thời xuất hiện. Bạn bỏ cuộc nhiều lần, đúng lúc thế giới sẽ ban
  cho bạn điều bạn đang cầu xin. Bạn sẽ suy nghĩ về một dự án và bắt đầu nó muộn một phút để hoàn thành nó.


  Khía cạnh khó khăn trong tính cách này của bạn rất chậm thay đổi. Khi nó thay đổi, đó là vì bạn đã vượt qua nỗi sợ hãi và
  những ham muốn mất cân bằng của mình. Mức độ bạn đạt được điều này sẽ quyết định sự an toàn trong cuộc sống. Bạn nên tập
  thể dục cường độ cao ít nhất ba lần mỗi tuần để năng lượng được điều hòa và duy trì sức khỏe tốt. — Mẫu diễn giải từ báo
  cáo Phân tích Sâu.


  *Bạn rất nghiêm túc trong việc đạt được mục tiêu và cảm thấy rằng chỉ có cách làm việc cần mẫn mới thực hiện được điều đó.
  Sự chăm chỉ, nỗ lực kiên trì và tập trung vào một mục tiêu duy nhất là những phương pháp bạn sử dụng để đạt được tham vọng
  trong cuộc sống. Bạn thể hiện sự tự chủ lớn, thậm chí là tự khắt khe, để hoàn thành những gì mình mong muốn. Bạn đối mặt
  với trở ngại một cách điềm tĩnh và sẽ kiên nhẫn vượt qua những hoàn cảnh khó khăn. Bạn cảm thấy rằng chỉ có thể tự dựa vào
  bản thân, mọi trách nhiệm đều trên vai mình, và bạn có thể trở thành người kỷ luật nghiêm khắc, đòi hỏi quá nhiều ở bản
  thân và người khác.


  Thường bạn tự kìm hãm mình, nghi ngờ sức mạnh và khả năng của chính mình. Bạn có thể cảm thấy rằng mỗi khi cố gắng khẳng
  định bản thân hoặc chủ động hành động, bạn đều gặp phải sự kháng cự lớn, và điều đó rất...


  Thật bực bội đối với bạn. Tuy nhiên, bạn có sức mạnh kiên nhẫn và sự quyết tâm mãnh liệt để vượt qua mọi trở ngại.

  #Nhìn chung, bạn cảm thấy rằng những kết thúc và khởi đầu đều rất tệ. Khi thấy kết thúc đến gần, bạn chống lại; và khi cảm
  nhận một ý tưởng mới sắp hình thành, bạn cũng chống lại. Cuộc sống đầy sự kháng cự này ngăn cản bạn đạt được tốc độ tiến
  bộ xứng đáng, và bạn cần thư giãn hơn.

  Một số người nổi tiếng với Sao Hoa hợp Sao Tho: Henry Winkler, Venus Williams (cung Xử Nữ), Aubrey Plaza (cung Bọ Cạp),
  Pierre Trudeau, Dick Van Dyke, Nikki Glaser (cung Bọ Cạp), John Saul, Dolly Parton (cung Cự Giải), Nostradamus, Margaret
  Mead, Naomi Judd, Al Gore, Ellen De Generes (cung Nhân Mã), Sammy Davis Jr., Geena Davis, Roger Daltrey, Billy Crystal,
  Ted Knight, Birgundi Baker (cung Bảo Bình), Steven Tyler (cung Sư Tử, cả hai đều nghịch hành), Victoria Beckham (cung Song
  Tử), Rihanna (Sao Hoa ở cuối Nhân Mã, Sao Tho ở đầu Ma Kết), Cindy Crawford (cung Song Ngư), Jessica Biel (cung Thiên Bình),
  Paris Jackson (cung Bạch Dương), Élodie Frégé (cung Thiên Bình), David Gilmour (cung Cự Giải), Amirah Vann (cung Xử Nữ).'
mars_saturn_opposition: 'Với Sao Hoa vuông góc hoặc đối xung Sao Tho trong lá số tử vi, thường có cảm giác rằng ham muốn bị
  từ chối hoặc cản trở. Thách thức là phải điều chỉnh, kiểm soát và làm chủ năng lượng, sự nóng giận và bản chất ham muốn
  của mình một cách trôi chảy hơn.


  Những người có khía cạnh này có thể rất quyết tâm đạt được mục tiêu và sẽ làm việc chăm chỉ vì chúng. Tuy nhiên, họ có thể
  gặp khó khăn trong việc giữ nhịp độ hoặc chọn đúng thời điểm để tiến lên, đặc biệt là khi còn trẻ. Theo thời gian và trưởng
  thành, họ học được nhiều chiến lược hơn để điều chỉnh năng lượng của mình. Trước đó, việc nỗ lực quá mạnh vào những thời
  điểm sai có thể tạo ra những thăng trầm thực sự.


  Trong các mối quan hệ, vấn đề thời điểm thường là một trở ngại. Họ có thể tỏ ra quá mạnh mẽ hoặc rút lui vào những thời
  điểm hoàn toàn sai. Việc làm đúng điều này là một thách thức. Sự nóng lạnh thất thường có thể là một chủ đề gây bực bội.
  Sự bất an và khuynh hướng tự đánh bại bản thân có thể là một cuộc đấu tranh. Những người có Sao Hoa-Sao Tho có thể ôm đồm
  quá nhiều hoặc gánh vác quá nhiều trách nhiệm. Họ thường có cảm giác bị áp đặt. Đối xử với bản thân và người khác bằng sự
  kiên nhẫn và ân sủng là một chiến lược quan trọng.


  Những người có Sao Hoa ở góc đối với Sao Tho có thể cảm thấy họ phải đối mặt với nhiều trở ngại hơn hầu hết mọi người để
  đạt được ham muốn và mục tiêu của mình.


  Họ có thể có những thôi thúc mạnh mẽ muốn từ bỏ các mục tiêu của mình, nhưng việc làm như vậy có thể dẫn đến những khó khăn
  tiếp theo. Có lẽ họ nên xem xét liệu những thôi thúc này có phải là hành vi tự phá hoay hay không. Những hoàn cảnh áp bức
  trong thời thơ ấu có thể là nguyên nhân đằng sau điều này.


  Họ cũng nên đề phòng việc chấp nhận rủi ro không cần thiết. Có phần dễ gặp tai nạn, họ có thể gặp nhiều vết bầm và trầy
  xước hơn mức trung bình. Các vấn đề về thể chất thường liên quan đến việc quá sức. Họ có thể trở nên quá say mê một mục
  tiêu mà bỏ qua nhu cầu nghỉ ngơi hoặc tạm dừng lại. Khó khăn với những nhân vật quyền lực có thể là một chủ đề phổ biến.
  Việc bắt đầu một việc gì đó hoặc đưa ra một quyết định hành động cụ thể thường là một cuộc đấu tranh - bởi vì những người
  có Sao Hoa-Sao Tho coi trọng hành động và kế hoạch của họ một cách nghiêm túc, việc ổn định chúng có thể là một quá trình
  nặng nề và kéo dài!


  Việc đối phó với sự tức giận, oán giận và sự khẳng định bản thân đôi khi có thể là một cuộc đấu tranh, và những người không
  biết toàn bộ câu chuyện của người có Sao Hoa-Sao Tho đôi khi có thể coi họ là khắc nghiệt, vô cảm hoặc thiếu nhạy cảm. Tất
  nhiên, hình ảnh này có thể càng làm bất lợi cho họ.


  Những người có Sao Hoa Vuong Goc hoặc Sao Hoa Doi Xung Sao Tho trong biểu đồ sinh của họ có ý thức trách nhiệm mạnh mẽ,
  ngay cả khi đôi khi họ cảm thấy bị áp đảo bởi nó! Hơn


  Thời gian, họ học cách khẳng định bản thân và theo đuổi khao khát với sự kỷ luật và tiết chế. Đạt được mục tiêu đôi khi
  có thể phức tạp hoặc kéo dài, nhưng đi kèm với phần thưởng lớn.

  Một chìa khóa quan trọng để quản lý khía cạnh Sao Hoa-Sao Tho này tốt nằm ở việc chấp nhận và làm việc với giới hạn của
  họ ở các cấp độ thể chất và ham muốn. Việc điều chỉnh ham muốn kiểm soát hoàn toàn cũng quan trọng, vì nới lỏng sự ép buộc
  này có thể giảm bớt căng thẳng.

  "Bạn là người cầu toàn. Bạn có thể khắt khe với bản thân và người khác không thương xót, cố gắng để hoàn cảnh trong cuộc
  sống phù hợp với một tiêu chuẩn không rõ ràng nào đó. Năng lượng của bạn trở nên tự do hơn để hoạt động theo cách không
  bị cản trở khi bạn nhận ra rằng bạn thực sự không tìm cách phù hợp với một tiêu chuẩn khách quan nào cả. Điều bạn muốn là
  tìm một nền tảng có thể bảo vệ về mặt cảm xúc và tâm lý để đứng vững.

  Thủ thuật thực sự trong cuộc sống đối với bạn là luôn tiến về phía trước. Điều này không dễ vì bạn thực sự chỉ nên tiến
  lên một dự án sau khi suy nghĩ kỹ hoặc lập kế hoạch; những đánh giá của bạn có xu hướng bị ảnh hưởng bởi nỗi sợ hãi hoặc
  ham muốn nhất thời. Bạn làm việc rất chăm chỉ cho những gì đến với mình. Điều này không thể tránh khỏi. Nhưng, bạn có thể
  kết thúc việc làm việc rất chăm chỉ mà không thu được gì. Điều này có thể tránh được thông qua sự cân bằng"


  kết hợp giữa động lực và trách nhiệm của bạn. Bạn nhận thấy rằng sức khỏe tốt hơn và năng lượng tự do hơn nhiều nếu bạn
  tập thể dục mạnh ít nhất ba lần một tuần."– Mẫu giải thích từ báo cáo Chi Tiết.

  Sao Hoa vuông góc Sao Tho hoặc Sao Hoa đối xung Sao Tho: *Bạn làm việc chăm chỉ và kiên nhẫn để đạt được mục tiêu, kiên
  trì và tiếp tục bất chấp khó khăn và sự nản lòng. Tập trung vào một mục tiêu duy nhất, được xác định rõ ràng, bạn có thể
  hoàn thành nhiều việc, nhưng bạn thường cảm thấy con đường dài và gian khổ, và rằng bạn phải đấu tranh một mình, tất cả
  đều trên vai bạn.

  Bạn có khả năng tự kiểm soát và tự phủ nhận lớn và có thể là một người quản lý nghiêm khắc, đòi hỏi quá nhiều ở bản thân.
  Bạn cũng có xu hướng kìm hãm bản thân, nghi ngờ sức mạnh và khả năng của chính mình. Bạn cảm thấy rằng bạn gặp phải sự kháng
  cự lớn mỗi khi bạn cố gắng khẳng định bản thân hoặc chủ động hành động. Sự tức giận và thất vọng có thể là vấn đề lớn đối
  với bạn, đặc biệt khi bạn cố gắng làm việc với người khác hoặc phụ thuộc quá nhiều vào người khác để được hỗ trợ. Bạn làm
  việc tốt nhất trong sự cô đơn.

  #Sự tham gia của bạn với người khác thường tập trung vào khía cạnh khắc nghiệt nhất của trải nghiệm con người. Bạn trở nên
  nhận thức được các năng lượng phá hủy


  xung quanh bạn và học cách vượt qua những khó khăn này. Đời sống tâm linh của bạn có thể trở thành nguồn năng lượng gần
  như vô tận. Bạn đối mặt với thử thách qua sự chia ly.

  Một số người nổi tiếng có Sao Hoa ở góc khó với Sao Tho: Vuông Goc – Susan Sarandon, Ella Fitzgerald, Claudia Schiffer,
