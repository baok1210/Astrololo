  như tuyệt đối! Hào quang của bạn mạnh mẽ và có phần bí ẩn.


  Bạn có xu hướng xuất hiện mạnh mẽ hơn bạn dự định. Trên thực tế, một số người cảm thấy bị đe dọa bởi bạn, và bạn có thể
  không hiểu tại sao lại như vậy. Khi bạn muốn điều gì đó (hoặc ai đó!), bạn rất quyết tâm. Đối với bạn, đó có thể là "tất
