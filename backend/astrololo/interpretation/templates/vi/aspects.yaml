  Quay lại Các khía cạnh Hành tinh

  Tìm kiếm giải nghĩa cho các khía cạnh khác? Xem Bát Xung, bán lục hợp, và ngũ hợp/tam ngũ hợp.

  Không biết vị trí Sao Thuy trong biểu đồ sinh của bạn? Tìm hiểu cách bạn có thể nhận được vị trí biểu đồ chiêm tinh miễn
  phí với các bước đơn giản của chúng tôi.

  Giải nghĩa được viết bởi Annie Heese.'
mars_moon_conjunction: 'Cuộc sống cảm xúc trở nên sôi động và hào hứng với khía cạnh này. Những người có Mặt Trăng hợp Hỏa
  Tinh trong biểu đồ sinh có thể thực sự cảm thấy ấm áp. Họ là những người nóng bỏng, đầy đam mê và ham muốn tình dục. Đa
  số có năng lượng và khả năng chủ động đáng kể trong tay. Họ dũng cảm và tự phát.


  Có một áp lực ngầm để thể hiện và chứng minh bản thân ở cấp độ cá nhân, đôi khi tràn sang lĩnh vực nghề nghiệp, nhưng khi
  xét riêng, nó chỉ ra bản chất phòng thủ không dễ dàng thư giãn.


  Những người này có sự thẳng thắn và thật thà không thể nhầm lẫn. Mặc dù họ hoàn toàn sẵn sàng bảo vệ và che chở người thân
  yêu, họ không đặc biệt đồng cảm ở cấp độ cá nhân hơn. Họ chắc chắn sẽ bảo vệ "người yếu thế", nhưng họ quá dễ kích động
  về mặt cảm xúc, tự tập trung vào bản thân và thô lỗ để được coi là những người nhẹ nhàng và đồng cảm! Họ dũng cảm và coi
  trọng tự do cá nhân. Sự nhàm chán làm họ chán nản, và họ có xu hướng tìm kiếm sự kích thích dưới một hình thức nào đó.


  Tự phát đến mức lỗi, những người này phản ứng nhanh với kích thích. Họ thường có sức khỏe thể chất dẻo dai. Tính khí của
  họ nóng nảy, nhưng cũng có thể biến mất nhanh chóng. Đó là một đam mê nguyên sơ.'
mars_moon_opposition: 'Những người này có thể sớm trưởng thành, sôi nổi và đầy đam mê. Họ tìm kiếm sự kích thích cảm xúc trong
  cuộc sống. Mặc dù họ thường thể hiện hình ảnh dũng cảm và cứng rắn, nhưng lớp da của họ không dày như họ muốn bạn tin. Họ
  có xu hướng dựng lên sự phòng thủ do tính cách dễ tổn thương và dễ kích động về mặt cảm xúc.

  Sự bất ổn là đặc trưng, vì họ cảm thấy nhàm chán với thói quen và dễ trở nên bực bội khi cuộc sống "quá dễ dàng". Có một
  luồng năng lượng bao quanh họ, và họ có xu hướng gặp nhiều xung đột trong đời. Với Doi Xung, xung đột thường được trải qua
  qua các mối quan hệ. Đam mê khá thô ráp, đặc biệt là khi còn trẻ.

  Nếu họ có thể hướng năng lượng dễ kích thích của mình vào thể thao hoặc một lĩnh vực cạnh tranh nào đó, thì càng tốt. Mặc
  dù họ có thể là những người hòa nhã và thú vị, nhưng người khác dường như luôn cảm nhận được ranh giới của họ. Có điều gì
  đó chắc chắn sẽ khiến họ trở nên kích động, và không phải lúc nào cũng rõ điều đó là gì!

  Sự thẳng thắn của họ có thể được đánh giá cao hoặc bị coi là xúc phạm, tùy thuộc vào khán giả. Họ háo hức tạo ra tác động
  cá nhân lên những người xung quanh. Một số người trong số họ quá háo hức theo nghĩa này, và họ xuất hiện như thể tự tập
  trung vào bản thân và khó chấp nhận.


  Kiên nhẫn chắc chắn không phải thế mạnh của họ! Phản ứng của họ nhanh chóng, và họ là những người đầy đam mê, thường khá
  dũng cảm mặc dù năng lượng của họ thất thường và đôi khi bị lãng phí.'
mars_moon_sextile: 'Những người có Sao Mat Trang trong aspect hài hòa với Sao Hoa trong bản đồ sao sinh là những người đầy
  đam mê, yêu đời. Mặc dù cảm xúc của họ mạnh mẽ và tức thời, nhưng đam mê của họ thường được kiểm soát và định hướng. Đây
  là những người có đời sống tình dục phong phú nhưng không để bản thân bị cuốn đi hay chi phối bởi đam mê. Vì cảm xúc của
  họ mạnh mẽ và họ biết cách chuyển hướng chúng vào những kênh tích cực, họ không dễ hiểu những thứ như "tội ác do đam mê",
  hành vi bốc đồng, hay sự kích động cảm xúc ở người khác.


  Những người có aspect này trong bản đồ sao sinh thường cởi mở, chấp nhận và tự nhiên trong biểu hiện tình dục của mình.
  Họ cần một kết nối cảm xúc để cảm thấy trọn vẹn ở cấp độ thể chất. Những người có các aspect này thường có sự yêu thích
  và tài năng cho thể thao, nhưng các yếu tố khác trong bản đồ sao sinh là cần thiết để cung cấp động lực và sự cam kết.


  Aspect tam hợp là dynamic hơn trong hai aspect hài hòa. Những người có lục hợp có thể gọi đến những đặc điểm này khi cần,
  trong khi những người có tam hợp giữa Sao Mat Trang và Sao Hoa đã tích hợp các đặc điểm của aspect vào tính cách của họ,
  thể hiện chúng một cách tự nhiên và nhất quán.'
