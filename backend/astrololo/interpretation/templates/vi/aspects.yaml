mercury_uranus_opposition: 'Bạn có một trí tuệ sắc bén, bạn rất trực giác, và bạn cần rất nhiều kích thích tinh thần để tránh
  cảm thấy nhàm chán. Thích được tự chủ, bạn không phải lúc nào cũng dễ dàng tiếp nhận lời khuyên. Có một phần trong bạn thích
  gây sốc, thách thức và kích động bằng những lời bạn nói; tuy nhiên, điều này có thể không phải là một quá trình có ý thức.

  Năng lượng và sản lượng tinh thần của bạn cực kỳ biến đổi – một ngày bạn có thể có nỗ lực và sự quan tâm lớn lao đối với
  một dự án, và ngày hôm sau thì ngược lại. Điều này phần lớn là do thực tế bạn cảm thấy nhu cầu mạnh mẽ phải trung thành
  với bản năng và trực giác của mình, và nếu bạn không thực sự được truyền cảm hứng, bạn cảm thấy không đúng khi làm việc
  trên một dự án – bạn có thể cảm thấy rằng mình đang "giả vờ", và điều này không phù hợp với bạn.

  Vấn đề là trong cuộc sống luôn có những nhiệm vụ thường ngày cần hoàn thành, những việc chúng ta phải làm không hoàn toàn
  phù hợp với sở thích của mình, và tương tự. Những năm tháng đi học có thể là thử thách do sự coi thường của bạn đối với
  phương pháp tiếp cận học tập tuyến tính, các nhiệm vụ thường ngày, và những môn học không truyền cảm hứng cho bạn, chứ không
  phải do bất kỳ thiếu hụt khả năng tinh thần nào. Trên thực tế, bạn có thể có những khoảnh khắc thực sự của thiên tài và
  những ý tưởng cũng như quan điểm của bạn thường rất


  Đôi khi bạn có thể rất bảo thủ.

  Bạn có xu hướng trở thành, hoặc có vẻ như là, người hay phân tâm. Thời gian tập trung của bạn có thể ngắn, và do đó, bạn
  có thể thường xuyên bỏ dở các dự án. Đôi khi bạn có thể nóng tính và cần chuyển hướng một phần năng lượng thần kinh của
  mình vào các hoạt động mang tính xây dựng. Hãy dành thời gian để chiêm nghiệm về những điều bạn thực sự tin tưởng, vì rất
  nhiều khi bạn quá bận rộn để thách thức tư duy đã được thiết lập, hoặc đóng vai trò người phản biện, để có thể tiếp cận
  với quan điểm và cảm xúc thực sự của mình. Theo cách này, sự thông minh, chính trực và sáng tạo của bạn có thể tỏa sáng.


