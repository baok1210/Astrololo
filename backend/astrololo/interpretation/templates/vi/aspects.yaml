  sự tin tưởng của chính họ vào người khác lại chịu ảnh hưởng của những biến động lớn. Họ muốn tin tưởng người thân yêu hơn
  bất cứ điều gì, nhưng khi làm vậy, một phần trong họ lại hoài nghi chính trái tim tin tưởng đó, và họ lo lắng rằng mình
  đã tin quá nhiều. Thường thì, những vấn đề này bắt nguồn từ thời thơ ấu với sự nuôi dưỡng không nhất quán.


  Những người này có thể lãng phí nhiều thời gian vào những whim cảm xúc, khi họ theo đuổi những mục tiêu và con người hão
  huyền hoặc phi thực tế. Trong các mối quan hệ, một cách khá trớ trêu, những tâm hồn cảm xúc này lại rất khó tiếp cận. Họ
  gặp khó khăn trong việc cam kết với bất kỳ con đường nào, và họ có thể rất dễ dàng lách tránh những vấn đề khó khăn. Việc
  tránh né những chủ đề "không mấy dễ chịu" có lẽ nổi bật nhất ở nam giới với vị trí này, mặc dù cả hai giới rất thường nói
  những câu đại loại như, "chúng ta đừng nói về điều đó nữa".


  Đối mặt với thực tế và những sự thật lạnh lùng có thể rất khó khăn cho những người này. Họ có xu hướng lãng mạn hóa quá
  khứ hoặc mơ về một tương lai lý tưởng.


  Đây là phần 6 trong tổng số 8 phần của một văn bản chiêm t học. Dịch sang tiếng Việt:


  ...thực, và việc tận hưởng hiện tại là một điều hiếm hoi. Sự trì hoãn ở cấp độ cảm xúc là một khuynh hướng lớn.

  Đây là những linh hồn đầy lòng trắc ẩn, tuy nhiên vẫn có thể miễn cưỡng tham gia, có lẽ vì họ cảm nhận rằng họ có thể dễ
  dàng bị lạc lối trong bất kỳ mục đích nào. Họ là những miếng bọt biển tâm linh hấp thụ cảm xúc của người khác. Họ cực kỳ
  nhạy cảm với "khí hậu" cảm xúc của bất kỳ địa điểm, bối cảnh hay tình huống nào.

  Trong một số trường hợp, những người có khía cạnh này trong biểu đồ sinh của họ chiếu Sao Hai Vuong lên môi trường của họ,
  và do đó thu hút những người và hoàn cảnh mang tính Sao Hai Vuong vào cuộc sống của họ. Ví dụ, một số người thu hút những
  đối tác khó nắm bắt, nghiện ngập, vô trách nhiệm, hoặc không muốn cam kết. Những sự vướng mắc và ảo tưởng cảm xúc bất thường
  là phổ biến với vị trí này. Trong một số trường hợp, "bê bối" xảy ra trong cuộc sống. Các lối thoát sáng tạo cho trí tưởng
  tượng mạnh mẽ của họ có thể cực kỳ hữu ích, vì chúng có thể cung cấp một diễn đàn cho những kịch tính cảm xúc mà họ khao
  khát.


  Sao Mat Trang Luc Hop hoặc Tam Hop Sao Hai Vuong

  Với những khía cạnh này trong biểu đồ sinh, bản chất có một mặt đầy lòng trắc ẩn và thấu hiểu không thể nhầm lẫn. Những
  người này có sự gắn kết tự nhiên với âm nhạc. Mặc dù mọi người đều thích âm nhạc, những người có Sao Mat Trang...


  Trong aspect hòa hợp với Sao Hai Vuong, họ đáp lại âm nhạc như một phương tiện để chữa lành, thư giãn và nâng cao tâm hồn.
  Bản chất nhạy bén, họ tự nhiên hòa nhập vào cảm xúc của người khác và tâm trạng xung quanh mà không cần nỗ lực.


  Họ có nhu cầu cảm xúc rõ ràng để thoát vào thế giới tưởng tượng và rút lui khỏi người khác vào những lúc cần tái tập trung,
  phần lớn vì họ có xu hướng "tiếp nhận" rất nhiều năng lượng hỗn hợp từ môi trường xung quanh. Những "cảm xúc" và linh cảm
  mạnh mẽ, đột ngột có thể chi phối họ. Phần lớn thời gian, trực giác của họ chính xác, mặc dù trí tưởng tượng cũng mạnh mẽ
  và họ có thể diễn giải quá mức một tình huống.


  Sự lười biếng nhất định gắn liền với vị trí này. Điều này bắt nguồn từ sự nhút nhát và nhạy cảm tự nhiên, rõ ràng từ thuở
  nhỏ. Họ có thể bị gắn nhãn "nhút nhát" khi còn trẻ, và gia đình hoặc bạn bè có thể đã can thiệp để "cứu" họ khỏi những tình
  huống đòi hỏi sự táo bạo hay hung hăng. Do đó, tính thụ động được chấp nhận và khi trưởng thành, những người này ít kinh
  nghiệm hơn hầu hết mọi người trong việc chủ động tiếp cận hoặc theo đuổi điều họ muốn.


  Aspect Tam Hop là aspect năng động hơn trong hai aspect hòa hợp. Những người có aspect Luc Hop...


  Bạn có thể gọi những đặc điểm này khi cần, và những người có Tam Hop giữa Sao Mat Trang và Sao Hai Vuong đã tích hợp các
  đặc điểm của khía cạnh này vào tính cách của họ, thể hiện chúng một cách tự nhiên và nhất quán.

