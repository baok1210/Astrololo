  phải có khuynh hướng tâm linh. Tất nhiên, họ nhận ra điều này không phải lúc nào cũng đúng ở một giai đoạn nào đó trong
  cuộc đời. Sự thu hút của họ đối với tâm linh và các chủ đề siêu hình thường rất rõ rệt.


  Các khía cạnh này có lợi cho các nhà văn, nghệ sĩ và nhạc sĩ. Những người này nhạy cảm với những người đang đau khổ, mặc
  dù họ không dễ bị lợi dụng như những người có khía cạnh thách thức giữa Sao Mat Troi và Sao Mat Trang. Họ là những người
  nhân đạo và thường có mối liên hệ đặc biệt với động vật. Nếu các khía cạnh và vị trí khác trong biểu đồ hỗ trợ, những người
  này không phải là kiểu người thống trị người khác hay khẳng định bản thân đến mức kiêu ngạo.


  Tam Hop – Farrah Fawcett, Queen Latifah, Billy Corgan, Muhammad Ali, Leo Tolstoy, Công chúa Diana xứ Wales, Doris Day, Elvis
  Presley, Sandra Oh, Yolonda Ross, Lauren Graham, Amber Heard, Ali Wong, Lizzo, Marlon Brando, Bella Ramsey, Blake Lively,
  Janis Joplin, Michelangelo, Charlie Hunnam, Pedro Pascal, Lili Reinhart, Maisie Peters, và Jenna Ortega.'
neptune_uranus_conjunction:
  detailed: Sự Hop giữa Sao Thien Vuong và Sao Hai Vuong tạo ra sự kết hợp hài hòa giữa đổi mới, thay đổi của bạn và những
    giấc mơ, tâm linh của bạn. Mối liên kết này hỗ trợ sự phát triển của bạn bằng cách đưa hai khía cạnh này trong cuộc sống
    vào nhận thức có ý thức. Biểu hiện cụ thể phụ thuộc vào phần còn lại của biểu đồ sinh của bạn — các cung và nhà liên quan,
    và cách khía cạnh này tương tác với các cấu hình hành tinh khác.
  short: The Conjunction between Uranus and Neptune creates a harmonious blend between your innovation and change and your
    dreams and spirituality.
  title: 'Conjunction: Uranus - Neptune'
neptune_uranus_opposition:
  detailed: Sự đối xung giữa Sao Thien Vuong và Sao Hai Vuong tạo ra một căng thẳng năng động giữa đổi mới và thay đổi của
    bạn với những giấc mơ và tâm linh. Sự kết nối này thách thức bạn phát triển bằng cách đưa hai khía cạnh này của cuộc sống
    vào nhận thức có ý thức. Biểu hiện cụ thể phụ thuộc vào phần còn lại của biểu đồ sinh của bạn — các cung và nhà liên quan,
    và cách khía cạnh này tương tác với các cấu hình hành tinh khác.
  short: The Opposition between Uranus and Neptune creates a dynamic tension between your innovation and change and your dreams
    and spirituality.
  title: 'Opposition: Uranus - Neptune'
neptune_uranus_sextile:
  detailed: Luc Hop giua Sao Thien Vuong va Sao Hai Vuong tao ra su ket hop hai hoa giua su doi moi, thay doi cua ban va nhung
    giac mo, tam linh cua ban. Moi lien ket nay ho tro su phat trien cua ban bang cach dua hai khia canh nay trong cuoc song
    ban vao su nhan biet co y. Bieu hien cu the phu thuoc vao phan con lai cua so sinh thanh cua ban — nhung dau hoi va nha
    cua lien quan, va cach aspect nay tuong tac voi cac cau hinh hanh tinh khac.
  short: The Sextile between Uranus and Neptune creates a harmonious blend between your innovation and change and your dreams
    and spirituality.
  title: 'Sextile: Uranus - Neptune'
neptune_uranus_square:
  detailed: Vuong Goc giua Sao Thien Vuong va Sao Hai Vuong tao ra mot cang thang dong luc giua su doi moi, thay doi cua ban
    va nhung giac mo, tam linh cua ban. Moi lien ket nay thach thuc ban phat trien bang cach dua hai khia canh nay trong cuoc
    song vao su nhan thuc co y. Bieu hien cu the phu thuoc vao phan con lai cua so sinh thoi cua ban — nhung dau hoi va nha
    lien quan, va cach aspect nay tuong tac voi cac cau truc hanh tinh khac.
  short: The Square between Uranus and Neptune creates a dynamic tension between your innovation and change and your dreams
    and spirituality.
  title: 'Square: Uranus - Neptune'
neptune_uranus_trine:
  detailed: Tam Hop giữa Sao Thien Vuong và Sao Hai Vuong tạo ra sự kết hợp hài hòa giữa đổi mới, thay đổi của bạn với những
    giấc mơ và tâm linh. Sự kết nối này hỗ trợ sự phát triển của bạn bằng cách đưa hai khía cạnh này trong cuộc sống vào nhận
    thức có ý thức. Biểu hiện cụ thể phụ thuộc vào phần còn lại của bản đồ sao sinh của bạn — các cung và nhà liên quan, cũng
    như cách khía cạnh này tương tác với các cấu hình hành tinh khác.
  short: The Trine between Uranus and Neptune creates a harmonious blend between your innovation and change and your dreams
    and spirituality.
  title: 'Trine: Uranus - Neptune'
neptune_venus_conjunction: 'Những người có Sao Kim hợp Sao Hải Vương trong bản đồ sao sinh của họ thường là những người nhạy
  cảm, sáng tạo và hấp dẫn. Bản chất thiếu thực tế trong tình yêu, tiền bạc và tài sản cá nhân là điều đáng chú ý, ngay cả
  khi những người có Sao Kim-Hải Vương tiếp cận phần còn lại của cuộc đời một cách thực tế hơn. Họ là người hào phóng, và
  thường "cho đi" nhiều hơn nhận lại trong các mối quan hệ cá nhân thân thiết, sẵn sàng hy sinh cho người họ yêu, trung thành
  nói chung, và vô cùng nhân từ.


  Những người có Sao Kim hợp Sao Hải Vương đa cảm và đồng cảm, dễ dàng bị xúc động bởi lòng tốt của người khác, âm nhạc, thơ
  ca, khiêu vũ và hầu hết mọi loại hình nghệ thuật khơi gợi cảm xúc. Một số người thậm chí có thể nói rằng họ hơi ngây thơ
  trong tình yêu, vì họ có xu hướng dễ tha thứ và tin rằng người khác cũng tốt bụng như họ. Họ có thể thu hút những người
  lợi dụng bản chất hào phóng của họ, hoặc những người trốn tránh cam kết, hoặc gặp rắc rối hoặc cần giúp đỡ. Cũng như họ
  sẵn sàng tha thứ, họ cũng dễ bị tổn thương, và thậm chí bị sốc trong vấn đề tình cảm. Họ không thích hành vi thô lỗ, thiếu
  lịch sự và những tình huống thiếu tế nhị.


  Tuy nhiên, họ vẫn bị thu hút vào các mối quan hệ tình yêu như loài bướm lao vào ngọn lửa. Trí tưởng tượng và thế giới ảo
  tưởng của họ rất phong phú, và những người có Sao Kim-Hải Vương tin rằng có một điều gì đó dành cho họ ở ngoài kia, ngay
  cả sau những thất vọng. Họ mang một phẩm chất siêu phàm hoặc bí ẩn, có sức quyến rũ tinh tế và rất hấp dẫn. Mặc dù rất yêu
  thương, tình yêu của họ mang một phẩm chất phổ quát khiến họ vẫn giữ một khoảng cách kỳ lạ, khao khát một điều gì đó kỳ
  diệu và lý tưởng, điều này có thể khiến người yêu của họ cảm thấy bị loại trừ một cách lạ lùng – tình yêu của họ gần như
  mang tính phi cá nhân. Những người sáng tạo này thường là nghệ sĩ. Tình yêu là lực lượng định hình và duy trì cuộc sống
  của bạn khi Sao Kim hợp Sao Hải Vương. Bản chất lãng mạn của bạn truyền cảm hứng để bạn tin vào những khả năng tối thượng.'
neptune_venus_opposition: 'Góc hợp này chỉ ra bản chất lãng mạn dễ bị ảnh hưởng. Khả năng "say mê tình yêu" là rất lớn. Những
  người có góc hợp cứng giữa Sao Kim và Sao Hải Vương thường có lòng trắc ẩn tự nhiên và sẵn sàng làm mọi thứ vì người họ
  yêu. Khó có thể nói liệu kỳ vọng của họ trong quan hệ cá nhân là quá cao hay quá thấp. Một mặt, họ có xu hướng dễ chấp nhận
  những hành vi ở đối tác mà người khác không chấp nhận, vì họ trắc ẩn và thậm chí bị thu hút bởi những người mà người khác
  có thể coi là rắc rối. Mặt khác, giấc mơ lãng mạn của họ có thể mạnh mẽ đến mức họ dễ bị thất vọng với thực tế của các mối
  quan hệ.


  Sự lừa dối trong tình yêu là có thể, nhưng sự tự lừa dối còn có khả năng cao hơn. Trong tình yêu, họ thấy những gì họ muốn
  thấy, chứ không phải thực tế. Cảm giác bị lợi dụng hoặc lừa dối có thể xuất hiện ở những người này nhiều hơn so với hầu
  hết mọi người. Tuy nhiên, nếu có một mô hình rõ ràng trong đời sống tình cảm của họ liên quan đến việc họ bị thất vọng,
  lừa dối hay lợi dụng, thì điều đó đặc biệt đáng để kiểm tra xem liệu sự tự lừa dối có đang diễn ra hay không.


  Với vị trí này, khả năng bám víu vào những ảo tưởng lãng mạn là rất cao. Ví dụ, một số người có các aspect này bám víu vào
  một khái niệm lãng mạn rằng ai đó yêu họ, trong khi thực tế người đó không đáp lại tình cảm. Hoặc, họ có thể bám víu vào
  một mối tình đã mất hết hy vọng. Một khả năng khác là dành tình yêu của họ cho một người không thể với tới hoặc không thể
  cam kết.


  Một kịch bản Sao Kim-Hải Vương khác là yêu một người đối xử tệ với họ, trong khi vẫn bám víu vào hình ảnh lý tưởng hóa về
  đối tác. Dù kịch bản nào, sự khao khát và nhớ nhung lãng mạn, cũng như ảo tưởng, thường là chủ đề chính. Kỳ vọng ở đây là
  yêu một người đòi hỏi sự hy sinh bản thân. Kết quả là sự thu hút vào các mối quan hệ phụ thuộc lẫn nhau và thậm chí là lạm
  dụng. Những người có Sao Kim-Hải Vương bị thu hút vào các mối quan hệ nạn nhân/cứu thế, và họ có thể đóng vai nạn nhân.'
neptune_venus_sextile: 'Lãng mạn, sáng tạo, dịu dàng và dễ thích nghi, những người sinh ra với Sao Kim Lục Hợp Sao Hải Vương
  hoặc Sao Kim Tam Hợp Sao Hải Vương tự nhiên thể hiện những phẩm chất tinh tế của Sao Hải Vương bí ẩn và mộng mơ trong các
  mối quan hệ tình cảm của họ. Trí tưởng tượng của họ phong phú và thế giới ảo tưởng của họ phát triển tốt. Họ bị thu hút
  bởi sự thô lỗ và thô thiển, và bị hấp dẫn bởi vẻ đẹp trong nhiều hình thức khác nhau. Họ rất hào phóng và rộng lượng, nhưng
  có thể hơi hướng về phía phục tùng, hoặc đôi khi lười biếng hoàn toàn, không chủ động khi tình huống đòi hỏi.


  Góc Tam Hợp là khía cạnh năng động hơn trong hai khía cạnh hài hòa này. Những người có góc Lục Hợp có thể gọi những đặc
  điểm này khi cần, và những người có góc Tam Hợp giữa Sao Kim và Sao Hải Vương đã tích hợp các đặc điểm của khía cạnh vào
  tính cách của họ, thể hiện chúng một cách tự nhiên và nhất quán.


  Khi bạn yêu, bạn yêu sâu sắc và hoàn toàn. Với Sao Kim ở góc Lục Hợp với Sao Hải Vương, bạn có khả năng đầu hàng hoàn toàn
  vào bản chất của Tình Yêu. Phong cách nhẹ nhàng, quan tâm của bạn thu hút một đối tác mong muốn yêu thương và che chở bạn.
  Bạn biết khi nào mình đã tìm thấy tình yêu đích thực, bởi vì một điều gì đó sâu thẳm bên trong bạn mở ra và đưa bạn đến
  một trạng thái khác.


  Mặc dù bạn có xu hướng đặt kỳ vọng không thực tế lên những người bạn yêu, nhưng bạn làm điều đó với sự quan tâm chân thành
  đến mức mọi người thường ngạc nhiên trước những thay đổi kỳ diệu rõ ràng. Bạn có thể biết khi nào là lúc cần tha thứ và
  tiến về phía trước, điều này cho phép bạn luôn mở lòng với niềm vui ngay cả giữa những thay đổi. Sự tận tụy với những lý
  tưởng cao đẹp cũng đóng vai trò trong các mối quan hệ tình cảm của bạn, và bạn có khả năng duy trì một tình yêu bắt nguồn
  từ một cấp độ rất mạnh mẽ và sẽ tồn tại mãi mãi. Bản chất lãng mạn của bạn được tăng cường qua ảnh hưởng của Sao Kim trong...'
