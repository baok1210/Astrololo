  Tôi có một cô con gái có Sao Mặt Trời ở khía cạnh đầy thử thách với Sao Thiên Vương, và đã có một giai đoạn điều chỉnh khá
  dài khi cô bé vào lớp một - thời điểm mà trẻ em bắt đầu thực sự trải nghiệm sự kỷ luật. Khi các bạn trong lớp thể dục được
  yêu cầu nhảy, cô bé chỉ đứng yên, bất động. Khi được hỏi tại sao không nhảy, cô bé trả lời: "Như thế là giả tạo."'
