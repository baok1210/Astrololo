mercury_uranus_sextile: 'Bạn cởi mở với những ý tưởng mới và tự tạo ra không ít quan điểm độc đáo cho riêng mình. Bạn có thiên
  hướng kỹ thuật và có thể đặc biệt quan tâm đến máy tính, công nghệ và khoa học. Trực giác của bạn rất mạnh mẽ và phần lớn
  dẫn dắt bạn đi đúng hướng. Bạn có phong cách thân thiện, khoan dung và không thiên kiến. Bạn tránh đưa ra những đánh giá
  thiếu công bằng, đạo đức giả hay rập khuôn.

  Bạn rất trung thực và căm ghét những lối tư duy thiên vị và hẹp hòi. Bạn có khả năng thích ứng, hài hước, và nhanh chóng
  nắm bắt, hiểu được những chủ đề mới. Tư duy của bạn thường khá tự nhiên ngoài khuôn khổ và rất nhanh nhạy, và bạn có thể
  cảm thấy bối rối khi quan sát những người khác không đi đến cùng một kết luận như bạn trong nửa thời gian đó.

  Tuy nhiên, bạn cần nhiều không gian và tự do để tư duy theo cách riêng của mình, và bạn không dễ chịu khi ai đó cố ép bạn
  tiếp nhận thông tin hay quan điểm. Bạn ở trạng thái tinh thần tốt nhất và hợp tác nhất khi có cơ hội tìm thấy cảm hứng riêng
  của mình, và bạn dễ cảm thấy đạo đức giả nếu không có điều đó – một cảm giác không hề dễ chịu đối với bạn một chút nào.

