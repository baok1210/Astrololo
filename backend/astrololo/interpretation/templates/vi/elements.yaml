dominant_fire: "Nguyên tố Lửa chiếm ưu thế: Bạn là người hành động, tràn đầy cảm hứng và nhiệt huyết. Sức mạnh của bạn nằm ở khả năng khởi xướng và truyền lửa cho người khác. Hãy cân bằng với sự kiên nhẫn và thực tế."
dominant_earth: "Nguyên tố Đất chiếm ưu thế: Bạn thực tế, đáng tin cậy và có khả năng xây dựng vững chắc. Thế mạnh của bạn là kiên nhẫn và bền bỉ. Hãy mở lòng với những ý tưởng mới và linh hoạt hơn."
dominant_air: "Nguyên tố Khí chiếm ưu thế: Bạn thông minh, giao tiếp giỏi và có tư duy khách quan. Thế mạnh là kết nối và truyền đạt ý tưởng. Hãy kết nối với cảm xúc và thực tế nhiều hơn."
dominant_water: "Nguyên tố Nước chiếm ưu thế: Bạn nhạy cảm, trực giác tốt và giàu lòng trắc ẩn. Thế mạnh là thấu hiểu cảm xúc và kết nối sâu sắc. Hãy bảo vệ ranh giới cảm xúc của mình."
deficient_fire: "Thiếu nguyên tố Lửa: Bạn có thể thiếu động lực và nhiệt huyết. Hãy tìm cách kết nối với năng lượng lửa qua thể thao, cạnh tranh lành mạnh hoặc theo đuổi đam mê."
deficient_earth: "Thiếu nguyên tố Đất: Bạn có thể thiếu tính thực tế và kiên nhẫn. Hãy tập trung vào việc xây dựng thói quen kỷ luật và quản lý tài chính cẩn thận."
deficient_air: "Thiếu nguyên tố Khí: Bạn có thể gặp khó khăn trong giao tiếp và tư duy khách quan. Hãy rèn luyện kỹ năng phân tích và trao đổi ý kiến với người khác."
deficient_water: "Thiếu nguyên tố Nước: Bạn có thể khó kết nối với cảm xúc của mình và người khác. Hãy dành thời gian để lắng nghe nội tâm và phát triển trí tuệ cảm xúc."
