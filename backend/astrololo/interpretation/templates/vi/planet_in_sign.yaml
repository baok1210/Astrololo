      🔑 Từ khóa: Mercury (lần 2) → Xử Nữ → Cung 6; - Tỉ mỉ, cầu toàn, sắc sảo, khắt khe; - Cung 6: công việc, sức khỏe, phục
      vụ, kỹ năng; - Lưu ý: Cung 6 và Cung 12 đều liên quan sức khỏe — cung 6 mạnh + cung 12 yếu → bệnh tinh thần/dị ứng',
    short: 'Yêu thực tế, thể hiện qua hành động', title: Sao Kim ở Xử Nữ}
