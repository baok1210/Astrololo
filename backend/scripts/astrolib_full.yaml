      businesses that are contemporary and innovative. You have a versatile, disciplined,
      practical and original mind. You are intuitive and resourceful, with the ability
      to correctly judge human character and penetrate the mask that others wear.
      You follow your own convictions regardless of what others think of you and you
      have the ability to express your ideas clearly so that others easily comprehend.
      On the negative side you can be eccentric, bohemian, radical, revolutionary
      and stubborn. Top
  - sign: pisces
    text: If you have Mercury in Pisces, you, your thoughts, and your ways of communicating
      tend to be idealistic, psychic, intuitive, imaginative, sympathetic, diplomatic,
      extremely sensitive, compassionate, and visionary. On the negative side you
      can be lazy, impractical, day-dreamy, over-sensitive, procrastinating, indifferent
      and absent-minded. You may lack a strong desire to work or to push yourself
      into doing anything that takes a lot of strength, organization, patience, and
      responsibility. You would rather be a poet or musician than a scientist or a
      mechanic. Formal book learning may not be your area of strength, yet you can
      absorb knowledge in the most remarkable ways if you are interested in the subject
      area. You are sensitive to your environment and thus you should be careful of
      which environments you hang around in. Your nerves and your mental health require
      you to periodically rest away from the noise of the work-a-day world. Take some
      time to be alone with yourself to regroup. But not too much time, as you have
      a tendency to get carried away with yourself and your problems. Healing using
      visualization techniques or healing through the laying on of hands may appeal
