      side, you can be stubborn, quarrelsome, skeptical, cynical, headstrong, and
      always holding the opposite views to others. There is interest in the occult.
      Top
  - sign: sagittarius
    text: If you have Mercury in Sagittarius, you possess idealism, vision, and foresight,
      and your mind is often occupied with big ideas, plans, and goals for the future.
      You are interested in what is possible and what is on the horizon, rather than
      what has already been done. Subjects like philosophy, religion, politics, or
      education interest you, and you are more concerned with theories, abstractions
      and concepts than with specific applications. You are not inclined to focus
      on any one practical, concrete area. You don't particularly like details and
      may find it difficult to concentrate long enough to carry your ideas through
      to completion. You seek mental freedom, yet your thoughts are usually along
      traditional lines. Having a gambling instinct, you may enjoy gambling, speculative
      enterprises and new ventures. You are forward, blunt and direct in speech and
      you always speak your mind. People who know you know that you don't beat around
      the bush. You are apt to say the first thing that pops into your head. Thus,
      you have to learn to control your tongue, develop tact, and to think before
      speaking. Business, advertising, and promotion might be good career areas for
      you. You have a keen mind and are impulsive and versatile. You have a tendency
      to study several similar subjects, to have more than one job and to have several
      projects going all at the same time. You tend to want to keep on the move, traveling,
      in order to gain experience, knowledge and wisdom. Top
  - sign: capricorn
    text: If you have Mercury in Capricorn, your mind is clear, disciplined, serious,
      practical, organizing, objective and realistic, and you are unimpressed by exaggerated
      claims or promises. You want to know the facts behind any statement or idea
      you hear. Your natural skepticism often borders on cynicism. You have a rational
      approach to problems and are usually quite level-headed no matter what the circumstances.
      Your are capable of working long hours with focused concentration and attention
      on whatever interests you. You probably have a good memory and are very attentive
      to details. At times you appear to others as lacking a sense of humor, boring,
      or depressed. You simply have a lot on your mind. You are thorough, conscientious,
      and disciplined in your thinking, and have an aptitude for business, organization,
      and administration. You are also a good strategist, and will plan and patiently
      follow a realistic course which will lead to your eventual success. Serious-minded
      and studious, you enjoy quiet time alone for thinking or reading. You seldom
      indulge in foolish or silly chatter for you consider them a waste of valuable
      time which is better spent on more productive things. Top
  - sign: aquarius
    text: If you have Mercury in Aquarius, your thoughts tend to be unique, unusual,
      rapid and coming completely out of the blue, eccentric, unconventional, scientific,
      weird and perhaps a bit ahead of their time. You are a progressive and non-traditional
      thinker and are very open and receptive to new technologies and breakthroughs
      and the latest discoveries in any field. You believe that humanity can resolve
      their problems through creative intelligence using inventive minds and scientific
      principles. You are a bit impatient with those who are conservative and unimaginative
      and those who are afraid perhaps to think about and try new things and ideas.
      Keeping abreast of the latest developments and technologies is fun for you.
      Reading science fiction helps give you food for thought regarding radically
      new ways of looking at things. You have a strong humanitarian impulse, an aptitude
