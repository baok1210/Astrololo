      You expand your horizons and grow through using your ability to be outgoing
      with and well-liked by others. You have the ability to encourage others towards
      greater efforts. There is a love for beautiful things and perhaps an interest
      in art or law. On the negative side, there is danger of self-indulgence or extravagance,
      and a desire to improve social status through marriage rather than establishing
      a partnership based on true love. There may be more concern to demonstrate to
      the world that the marriage has been successful rather than happy. Much expense
      may be incurred through partnership, perhaps on account of the marriage partner's
      extravagant tastes. Top
  - sign: scorpio
    text: If you have Jupiter in Scorpio, you tend to be efficient and hard-working,
      with a flair for business and finance. You are resourceful and willing to do
      all the work necessary in the fulfillment of a task. You are secretive, but
      there is, also, great inner strength and courage. You have a magnetism that
      draws people to you. You have an ardent, aggressive, self-reliant nature and
      an enthusiastic, constructive mind. On the negative side, there may be trouble
      and loss through the indulgence of the lower nature and love of rich and expensive
      food and sickness on that account. Any tendencies for wild speculation and risk-taking
      should be controlled. There is interest in the occult. Strong healing abilities
      may be present. These energies are meant to be used to gain a higher consciousness
      and greater universal wisdom. Top
  - sign: sagittarius
    text: If you have Jupiter in Sagittarius, you are big-hearted, idealistic, loyal,
      generous, humane, broad-minded, philosophical and tolerant. There may be interest
      in religion, law, higher education or anything abstract. You may be prophetic
      and inspirational and you can inspire trust in other people. They are attracted
      to your sense of honor and integrity. You have a strong desire to help others
      and you have an ability to inspire them to help themselves. You may be in a
      position of power and prestige or work in the professions. You tend to be conservative
      because of a desire for people to like you. You must watch a tendency to justify
      yourself by rationalization. On the negative side, you may be too fond of sport
      or gambling, fond of cheap or extravagant display, self-righteous, narrow-minded,
      intolerant, dogmatic and atheistic. Top
  - sign: capricorn
    text: If you have Jupiter in Capricorn, your positive qualities are honesty, sincerity,
      faithfulness, ingenuity, resourcefulness and some degree of mechanical ability.
      Your attempts at growth, expansion, meeting new opportunities and getting ahead
      in the world are met with reserve, discipline, caution, system, practicality
      and organization. You have a desire for material success, yet this may not bring
      satisfaction or happiness if gained. There may be a tendency toward miserliness
      and withholding yourself from the rest of the world, financially and emotionally.
      You hate waste, are self-reliant and self-controlled, and possess a desire to
      have authority over others. You can rise to great heights if you stay honest,
      truthful, respectful, and keep your nose clean doing everything above-board.
      Top
  - sign: aquarius
    text: If you have Jupiter in Aquarius, you are a humanitarian and are concerned
      with the welfare of all people. You believe in the universality of life and
      the brotherhood of man. Reform and large group projects appeal to you as they
      give you wide scope for your own personal growth and expansion. You work well
      with others because of your inventive mind, your keen judgment, your fine intellect
      and your friendliness. You are intuitive, tolerant and sociable. You make an
      ideal diplomat, labor relation specialist or personnel manager because of your
      knack for handling various groups of people. Top
  - sign: pisces
    text: If you have Jupiter in Pisces, your needs for growth and expansion are perhaps
      best satisfied when you are working to help raise mankind to a higher spiritual
      level. You recognize that we are all in this together and what is bad for one
      is bad for all. You are sympathetic, charitable, genial, unassuming, quiet,
      visionary, intuitive, with a subtle sense of humor. You have an interest in
      spiritual or metaphysical ideas and issues, but you need to find your own path
      and experience Truth for yourself. Periodically retreating from society and
      the people closest to you is good for your nerves and your own mental health.
      The strong desire you have to help others comes out in your willingness to help
      the unfortunate. Perhaps you volunteer in hospitals, jails, or other places
      of confinement. You give hope to those who need it most. You probably love nature
      and large animals, especially horses. There may be an interest in healing. On
      the negative side you may be hypersensitive, over-emotional, too sentimental,
      have a tendency to exaggerate, or to be too extravagant or self-indulgent. Top
  saturn:
  - sign: aries
    text: The best quality of Saturn is system and the best quality of Aries is leadership.
      Therefore, if you have Saturn in Aries, you can be a very capable leader, one
      who knows what to do and is not afraid of going out and doing it no matter what
      it takes or how long it takes. Combat and competitiveness spur you on to greater
      achievements. Self-reliance is high within you and you probably feel that you
      are more capable than those around you, hence you may end up doing all the work,
      which may antagonize you if you feel that others are not holding up their end
      of things. Saturn's worst quality is selfishness and Aries worst quality is
      interference with the plans of others. Therefore, you are also capable of meddling
      and trying to run the affairs of others. You may run roughshod over them in
      trying to get them to do your will rather than their own. You can be a real
      slave-driver. You dislike restraint of any kind and do not take kindly to others
      telling you what to do. Remember this as you give the orders. Obstructions,
      frustrations, and limitations come into play in your pioneering, self-starting
      efforts. Freedom comes only through responsibility and discipline. Impatience
      can ruin all the good work you try to do. Caution may need to be developed in
      the carrying out of your plans. Stability and security are important to you
      and you work with those thoughts in mind. Feelings of being inadequate may spur
      you on to tackle immense undertakings in order to feel more valued or worthy.
      Stress from trying to accomplish too much may make you prone to headaches. Saturn
      in Aries calls for you to be self-sacrificing. Top
  - sign: taurus
    text: If you have Saturn in Taurus, you are very persistent in carrying out your
      goals. You can be overly concerned with material possessions and in wanting
      to squirrel away too much for that proverbial rainy day. You tend to place too
      much emphasis on material goods and possessions for security and if carried
      too far, you can become miserly and miserable due to worrying about what might
      happen tomorrow and will you have enough money to cover things. You need to
      re-evaluate your values and where true security comes from. On the positive
      side, you are a tireless worker and have patience, caution, determination, discipline,
      organizing ability and can go the distance when those around you fall. Hard
      work is your forte. Your feelings are serious, well-controlled and not easily
      changed, although at times it may be hard for you to forgive and forget. Loyalty
      is important to you. Building structures that last is a need you have. Top
  - sign: gemini
    text: If you have Saturn in Gemini, your thinking is deliberate and serious and
      you possess organization skills, concentration and mental stability. You can
      focus on deep and difficult matters and come up with practical solutions to
      problems. You enjoy learning. But there may also be tendencies towards cynicism,
      depression, and pessimism. Nervous tension can be a problem and the intake of
      air into the lungs or the oxygenation of the blood can be restricted. Your lungs
      need plenty of oxygen. It is best for you to sleep in a well-ventilated room.
      Saturn here steadies your mind and helps control the natural flightiness of
      Gemini. This is a good position for Saturn, but you may need to develop faith
      in the future. It will be important for you to discipline your mind and learn
      to think and act methodically if you are to be successful in anything. Top
  - sign: cancer
    text: If you have Saturn in Cancer, you are protective and persevering and you
      worry over loved ones. You can be moody, fearful and insecure perhaps because
      you feel unloved, probably by one or both parents. These feelings may bring
      on within you feelings of inadequacy toward your own ability to be a parent.
      As a parent you may be very demanding and a strict disciplinarian to your children.
      Emotional depression is something you need to conquer. Your unconscious fear
      of being hurt by others can cause you to withdraw from too close an emotional
      involvement with others. You are kind, but may lack empathy. You can be so busy
      protecting yourself from hurts that you are unable to see the hurts of others.
      There is a tendency for improper digestion due to the lack of certain digestive
      juices in the stomach. It would be best if you did not drink liquids with your
      meals (except milk, which is a food). There is a need to curb the appetite,
      as it can get you into trouble. Land and property may give you emotional security
      and alleviate feelings of not having something to fall back on. Top
  - sign: leo
    text: If you have Saturn in Leo, you possess diplomatic, organizing, executive,
      and leadership ability along with a strong will. You tend to be self-reliant,
      conservative, and are extremely efficient. You may have difficulty expressing
      your emotions and your affections, which may make you appear cold and unloving.
      You need love, but may not know how to go about giving or receiving it, thus
      you may isolate yourself from others. Your love is motivated by strong feelings
      of duty and responsibility and you show your love by taking care of business
      and doing what is required or by giving material things to loved ones instead
      of yourself, which is what they really want. On the negative side, you may be
      cruel and quick-tempered, jealous, and may resort to underhanded means to satisfy
      your ambitions. Heart trouble is possible with this position. You need to be
      admired for your ability to get things done efficiently and effectively. Top
  - sign: virgo
    text: If you have Saturn in Virgo, you tend to be industrious, efficient, practical,
      exacting, scientific, organized, shy, thrifty, studious, economical, and punctual.
      You have common sense and the ability to manage others, but may be a bit of
      a perfectionist. Detailed work does not bother you and you are able to focus
      and concentrate on the various minutia of any project. Your mind is deep and
      analytical and you probably have a good head for numbers. You may be prone to
      periods of depression or be prone to hypochondriac tendencies. Your work is
      usually neat and orderly and you dislike messes and dirt. There may be a desire
      for solitude. You need to stay busy because boredom brings unnecessary worry.
      Do not allow yourself to be critical of others. Top
  - sign: libra
    text: If you have Saturn in Libra, you are diplomatic, tactful, and you have balanced
      judgment which inspires trust. In matters if health there may be urinary problems
      or trouble with the kidneys. Saturn tends to obstruct the filtering action of
      the kidneys, allowing toxic elements to stay in the blood stream and intoxicate
      the body. Drinking distilled rather than spring, mineral or tap water would
      be better for your kidneys. There is a need for you to cooperate and share in
      harmony, patience, and love with other people. Marriage or partnerships may
      be restricting, requiring hard work and discipline so that you may learn the
      lessons of cooperation rather than competition. Marriage and partnerships give
      you a sense of security and for that reason you seek them out. You may marry
      for practical reasons, for money, or to someone a lot older or younger. Various
      possibilities exist with this position. You may take great trouble to find a
      mate who is able to demonstrate a similar integrity, and thus marry at a later
      age than most, or you may choose an older partner or a contemporary who is apt
      to be austere or undemonstrative. A desire for perfection may make you too demanding
      in the marriage or your view of marriage may be too conventional or old-fashioned.
      If Saturn is badly aspected, then you may be cold or regard marriage as a yoke
      with which you do not care to burden yourself. Or lastly, you may tell yourself
      that you will never find a partner who will measure up to your requirements.
      Top
  - sign: scorpio
    text: If you have Saturn in Scorpio, you can be very self-disciplined. You have
      executive ability and are perceptive and extremely capable. You may have psychic
      ability. People may find you difficult to understand because of your reserved
      exterior and secretiveness. Your mind may be mechanically oriented and you are
      resourceful, even under the most adverse circumstances, patient and persistent.
      The action and energy of Mars is combined with the forethought of Saturn in
      a most wonderful combination. Whatever you do is done with intensity. On the
      negative side, though, there is danger of stubbornness, revenge, lack of forgiveness,
      resentment, and ruthlessness. Tendencies to grub for money and prestige can
      cause harm. There can be health problems with constipation or hemorrhoids. There
      is a need to transform your desires. You need to learn when and how to let go.
      This also applies to eliminative bodily functions. Holding onto anger can cause
      stones to develop in the gall bladder or kidneys. Top
  - sign: sagittarius
    text: At its best, Saturn in Sagittarius gives a charitable and philanthropic
      turn to the mind with a desire to benefit and uplift mankind through discipline,
      system and self-help under just laws and true religious impulse. It brings trust,
      respect and honor in all undertakings. You are intuitive, philosophical, independent
      and persistent. Mental maturity comes later in life and promises success. You
      are generous with a wonderfully developed sense of responsibility. You have
      administrative and scientific abilities. Benefit can be gained from meditation
      and introspection. You may have poor circulation in the hips and legs. You need
      physical exercise and fresh air, especially in your sleeping quarters. On the
      negative side, you may be cynical, atheistic, selfishly ambitious, dogmatic,
      insincere and sarcastic. There is a need for everything to be proven before
      belief is possible. Top
  - sign: capricorn
    text: If you have Saturn in Capricorn, you are ambitious, self-controlled and
      you have organizing ability. You can be a disciplined, patient, hard worker
      who eventually receives the deserved rewards. There is a tendency to take life
      very seriously and duty and responsibility are very important to you. You understand
      that time and suffering serve a purpose and that happiness is not the final
      goal of existence. You may find it difficult to divide your energies between
      work and play. You have the ability to translate abstract concepts into concrete
      terms. You may experience feelings of loneliness and inadequacy and that could
      be one reason why you tend to work so long and hard. On the negative side, prestige
      and social standing may be extremely important to you and you will be tempted
      to do whatever you have to in order to acquire them. Selfishness and a great
      love and desire for power can also be present. Top
  - sign: aquarius
    text: If you have Saturn in Aquarius, you possess practical common sense, self-discipline
      and inner sources of strength which provide stamina. Although humane in nature
      with a friendly and sympathetic disposition, you may have difficulty in understanding
      other people's goals. You need to learn tolerance for other people and must
      develop forgiveness. You have the ability to exercise system, organization,
      discipline and tact in unusual and non- traditional ways. You can think ahead
      and plan things with an inventive flair. Seeing things in a whole new way is
      one of your strengths. You tendency is to be serious, impersonal, detached and
      scientific. On the negative side you can be opinionated, vindictive, cold and
      uncaring with a tendency to get quite aggravated if your plans are met with
      opposition. Top
  - sign: pisces
    text: If you have Saturn in Pisces, it may be difficult for you to set boundaries
      for yourself and others, or to be as disciplined and organized as you want or
      need to be. Things have a way of getting lost in the shuffle of everyday life
      and it may be hard for you to keep your touch on the pulse of things around
      you. Sometimes you just get lost in the fog and can't see your way clearly.
      You are intuitive, sympathetic, sensitive, imaginative and self-sacrificing.
      You are a practical idealist and have a tendency to take life perhaps too seriously.
      You may have the sense that your present life's troubles are due to actions
      from the past. And this is probably the truth. You must reap what you have sown
      in previous lives and Saturn comes to exact his payment. Perhaps this is why
      you tend to feel more sorrow, perhaps, than the usual person. There can be success
      in working behind the scenes, away from the public eye, perhaps doing research
      or working in institutions. On the negative side you can be indecisive and moody,
      with a tendency to react emotionally to negative conditions or people. Depression
      can set in if success escapes you or if you feel that you have been unfairly
      treated. You need to develop faith in the future and let go of the past. Dis-identifying
      from other people's troubles will allow you to help them in their own sorrows.
      Teaching what you have learned in your experiences is a fine road to soul growth.
      Top
  uranus:
  - sign: aries
    text: (1843/44 - 1850/51, 1927/28 - 1934/35, 2010/11 - 2018/19) Here the energy
      and assertiveness of Aries complements the forthright, nervous energy of Uranus.
      Unless negatively aspected, Uranus here should endow plenty of originality and
      the motivation to use it in positive ways. There will be erratic tendencies,
      however, and patience is not enhanced. This placing highlights the search for
      what is new, out-of-the-ordinary and different. Self-confidence and leadership
      power is reinforced. However, possible foolhardiness must be checked, since
      it can surface in an extremely eccentric way with the individual becoming involved
      in silly and daredevil feats. Caution must be developed. Uranus in Aries . Top
  - sign: taurus
    text: (1850/51 - 1858/59, 1934/35 - 1941/42, 2018/19 - 2025/26) Taurus highlights
      the stubborn quality of Uranus. If other fixed signs are prominent in the chart,
      the individual may proudly say, ‘Once I’ve made up my mind I don’t change it.’
      However, it the chart tends towards indecision, with a powerful emphasis on
      Libra or Pisces, this is a good placing, since it gives a combination of stability
      and Uranian originality. Either way, this placement makes for opposing tendencies.
      On the one hand, the fixed influence of Taurus makes one want to be conventional.
      This clashes with the natural Uranian urge to break free from all conventions.
      If balance is achieved, we often find an original and practical individual,
      which is when Uranus in Taurus is at its best. Uranus in Taurus . Top
  - sign: gemini
    text: (1858/59 - 1865/66, 1941/42 - 1948/49, 2025/26 - 2032/33) Uranus in Gemini
      is a lively placing, endowing originality, quick thinking and often brilliant
      ideas. Here is excellent potential. If Mercury and Jupiter are well placed in
      the chart, this adds a sharp attitude and quick responses. This is good for
      literary or academic work, a career in the media or communications. If poorly
      aspected, Gemini’s restlessness will be a problem. If Mars in involved in negative
      aspects to Uranus, distress, worry, and headaches may be a problem. Relaxation
      techniques such as yoga may help. Uranus in Gemini . Top
  - sign: cancer
    text: (1865/66 - 1871/72, 1948/49 - 1955/56, 2032/33 - 2039/40) The changeable
      moodiness of Cancer, combined with the unpredictability of Uranus, may at times
      cause problem. If you have Uranus in Cancer, friends may never know what to
      expect from you. Uranus is a cold, unemotional planet, always encouraging logical,
      clear-cut action, while Cancer is all intuition and very emotional. If Uranus
      is a personal planet, this can be a source of tension for the individual. Instead
      of trying to choose between opposing extremes, the individual would do well
      to let one complement the other. At its best, this placing enhances the imagination,
      making it very original. Uranus in Cancer . Top
  - sign: leo
    text: (1871/72 - 1878, 1955/56 - 1961/62, 2039/40 - 2045/46) With Uranus in Leo
      there is increased energy and boldness. Because of Leo’s fixed quality, stubbornness
      may be a problem. Self-confidence is boosted, and sometimes there is a liking
      for power. If properly managed, a talent for leadership arises. These individuals
      often have a creative flair. Uranus in Leo . Top
  - sign: virgo
    text: (1878 - 1884/85, 1961/62 - 1968/69, 2045/46 - 2051/52) Uranus in Virgo is
      a potential source of tension, especially if the individual is rather nervous
      or anxious, or if tension is evident in other areas of the chart. These energies
      can be put to good use as they will inject the mind with ability to analyze
      and research, and will also encourage a certain originality of approach to any
      problem or project that is under consideration. Since Virgo is an earth sign,
      it tends to be conventional - the familiar and well-tried is preferred, yet
      Uranus’ influence is quite the reverse, encouraging original thoughts and actions,
      and often unconventional behavior. Uranus in Virgo . Top
  - sign: libra
    text: (1800/01 - 1807, 1884/85 - 1890/91, 1968/69 - 1974/75, 2051/52 - 2058/59)
      Libra will add glamour, more power of attraction, and more of a romantic streak
      to Uranus. But if Uranus or Venus is a personal planet, problems may arise when
      the Uranian desire for independence fights with the Libran desire to relate
      to others. In this case, the individual may want a partnership but not a partner.
      This placing of Uranus makes for an excellent, caring, helpful, and sympathetic
      friend. These traits should be developed for use in intimate relationships as
      well. Uranus in Libra . Top
  - sign: scorpio
    text: (1807 - 1813/14, 1890/91 - 1897/98, 1974/75 - 1981, 2058/59 - 2065) Uranus
      in Scorpio gives extra power and intensity. You are brave and daring, but tend
      to avoid showing emotions, or even reject them. These individuals should find
      constructive outlets for their emotional tension. This placing indicates a potential,
      or a need, for power. This influence will be greatest if the Sun, Moon, or Ascendant
      is in Scorpio, or if Uranus is near the midheaven. This need for power streams
      from a desire to help heal the world in some way. There is great potential here,
      but if this energy is misdirected, life may drag these individuals down. Uranus
      in Scorpio . Top
  - sign: sagittarius
    text: (1813/14 - 1821, 1897/98 - 1904, 1981 - 1988) Uranus in Sagittarius opens
      the mind and makes it more original. This placement makes for a lively individual
      with a good sense of humor, and very good brains. The Sagittarian influence
      adds an adventurous spirit to the Uranian humanitarian desire. This means that
      these individuals will be useful in fixing our world. Uranus in Sagittarius
      . Top
  - sign: capricorn
    text: (1821 - 1828, 1904 - 1912, 1988 - 1995/96) Uranus is somewhat boxed in by
      Capricorn. The benefit is the ability to put problems into a coherent and logical
      perspective. However, conflicts will arise when Uranus’s unpredictability and
      shock tactics try to express themselves. Capricorn is the most conventional
      sign, preferring to do things ‘the proper way.’ Here Uranus’s energy is concentrated
      and may be put to good use. Uranus in Capricorn . Top
  - sign: aquarius
    text: (1828 - 1835/36, 1912 - 1919/20, 1995/96 - 2003) Uranus rules Aquarius,
      so these people will have many of the general Aquarian traits. They may be friendly
      and humanitarian, but independent and emotionally detached. Uranus’s influence
      is greater than usual here because it’s in its own sign. As always, its influence
      increases even more if Uranus is a personal planet in the chart. Uranus in Aquarius
      . Top
  - sign: pisces
    text: (1835/36 - 1843/44, 1919/20 - 1927/28, 2003 - 2010/11) When Uranus is in
      Pisces, idealism, sympathy, sensitivity, and sacrifice for others is joined
      with humanitarianism and logical thinking. There is much creative potential
      here. As with any potential, it must be channeled correctly or else the individual
      must beware of escapist tendencies. These are helpful people. Uranus in Pisces
      . Top
  neptune:
  - sign: aries
    text: (1861/62 - 1874/75, 2025/26 - 2038/39) Read about Neptune in Aries here
      .
  - sign: cancer
    text: (1901/02 - 1914/15/16, 2065/66 - 2078/79) If Neptune is in Cancer, sensitivity,
      emotions, and intuition is heightened, as is an inclination to worry. Top
  - sign: leo
    text: (1914/15/16 - 1928/29, 2078/79 - 2092/93) If Neptune is in Leo, a flair
      for creative work and photography may be present. A glamorous and dramatic air.
      Top
  - sign: virgo
    text: (1928/29 - 1942/43) Neptune in Virgo tends to lower the self-confidence
      resulting a feeling of inner discontent. However, if Virgo is prominent in the
      chart, Neptune in Virgo will stimulate the imagination that is sometimes lacking
      with earthy Virgo. Top
  - sign: libra
    text: (1942/43 - 1955/56/57) Individuals with Libra rising are most vulnerable
      to Neptune’s placing in Libra. Confusion or delusion may be present. If the
      rest of the chart indicates a laziness or lack of self-confidence, Neptune in
      Libra will increase that influence. If Neptune is not a personal planet, and
      if Libra is not prominent then it should not be a problem. In that case, Neptune
      in Libra will endow the individual with sympathy and kindness. Top
  - sign: scorpio
    text: (1955/56/57 - 1970) With Neptune in Scorpio, there is increased emotional
      intensity, but in a strong and powerful way. If Neptune is well-aspected and
      personalized, talents and ambition will be inspired. Top
  - sign: sagittarius
    text: (1806/07 - 1820, 1970 - 1984) With Neptune in Sagittarius, there is humanitarian
      awareness. If Sagittarius is prominent in the chart, here may be a generational
      leader. Top
  - sign: capricorn
    text: (1820 - 1834, 1984 - 1998) With Neptune in Capricorn, there may be a flair
      for the creative use of natural material. This placing makes for a determined
      but cautious individual who will not likely be vulnerable to the escapist tendencies
      of Neptune. Not likely to take the easy way out of difficult situations. Top
  - sign: aquarius
    text: (1834 - 1847/48, 1998 - 2011/12) Neptune in Aquarius is humanitarianism
      at its best, since Aquarius adds some backbone to the sensitive qualities of
      Neptune. Top
  pluto:
  - sign: gemini
    text: '(1882/83/84 - 1912/13/14) Pluto in Gemini: Inquisitiveness, curiosity and
      skepticism. Top'
  - sign: cancer
    text: '(1912/13/14 - 1937/38/39) Pluto in Cancer: Heightened levels of intuition
      and emotion. If negatively aspected, there can be psychological blockage. If
      business-orientation is indicated elsewhere in the chart, Pluto in Cancer increases
      it in the form of intuitive shrewdness. Top'
  - sign: leo
    text: '(1937/38/39 - 1956/57/58) Pluto in Leo: Heightened powers of leadership,
      especially if Pluto or Leo is prominent in the chart. Top'
  - sign: virgo
    text: '(1956/57/58 - 1971/72) Pluto in Virgo: Possible tendency to be obsessive,
      depending on the rest of the chart. If Virgo is not emphasized anywhere else
      in the chart, this may not be a problem. Also, a possible tendency to overcritical.
      Top'
  - sign: libra
    text: '(1971/72 - 1983/84) Pluto in Libra: Here is a tendency to want to rock
      the boat in relationships. If sun or moon is in Libra, there will be an active
      sex life. If Pluto is negatively aspected, there may be sexual problems. If
      Libra is prominent in the chart, or if Pluto rules your Sun, Moon, or Ascendant
      (in which case you will resonate more with Pluto), jealousy and possessiveness
      will be a problem. Top'
  - sign: scorpio
    text: (1983/84 - 1995) Pluto is at home in Scorpio, and its influence is greater
      here. This adds intensity and sense of purpose. If Pluto is negatively aspected,
      there may be psychological problems. If Pluto is in the 10th House, the expression
      of power will be noticeable. Top
  - sign: sagittarius
    text: '(1748/49 - 1762, 1995 - 2008) Pluto in Sagittarius: Wisdom in healing and
      transformation. Top'
planet_in_house:
  sun:
  - house: 1
    text: If you have the Sun in the 1st house, you are important to yourself and
      will spend much time and energy on your own personal affairs. It's not that
      you do not care about others, it is just that you have your work to do and it
      is very important to you. You want to shine and be noticed for who and what
      you are. You may want to lead or be in a position of dominance. You are confident,
      independent and responsible. But watch for tendencies to be power-seeking or
      dictatorial. Be alert to false pride and try to be more humble. Give proper
      credit to others for their contributions. Top
  - house: 2
    text: If you have the Sun in the 2nd house, you need to feel a strong sense of
      personal or self-worth. A desire for power through personal possessions, talents
      and money may engage your energies. Money comes and goes easily. You are generous
      and ambitious, but can be extravagant and grasping. You must watch a tendency
      to be possessive of or "lord over" people and things. If the Sun is afflicted
      by aspect, perhaps you do not feel loved or feel worthy of love. Top
  - house: 3
    text: If you have the Sun in the 3rd house, knowledge is important to you and
      you chase as much of it as possible. You enjoy passing on the knowledge you
      have gained. Although you are probably very open to new ideas, there yet may
      be the desire for scientific proof before anything can be believed. Your mind
      enjoys creating and it is thorough and self-reliant. Pride and intellectual
      domination may be something you need to work on, especially intellectual pride.
      Patience may also need developing. Misunderstandings can occur with siblings
      or neighbors due to your belief that you are always or mostly right. You have
      a strong desire to learn and this may take you on many short journeys. You need
      to communicate and there may be writing or speaking ability. Top
  - house: 4
    text: If you have the Sun in the 4th house, you desire to build strong inner and
      outer foundations, but, at times, you may have the wish to retreat from society
      when life becomes difficult. The influence of either or both parents is strong
      for good or otherwise. There is pride in the home and that is where you want
      to shine and show your creativity. That is where you can be the real you. You
      want to be king of your castle, but just don't be too demanding at home. No
      one likes a dictator. Top
  - house: 5
    text: If you have the Sun in the 5th house, you have a desire to reveal your creativity,
      either constructively or destructively. You are interested in all forms of creative
      self- expression, such as sports, books, acting, the dramatic, games and romance.
      You have the ability to enjoy life and to give enjoyment to others. Happiness
      comes from your artistic or creative endeavors. You need to watch a tendency
      to be dictatorial or to take unnecessary risks. Top
  - house: 6
    text: If you have the Sun in the 6th house, you feel a need to serve others or
      to be of service to them. Or perhaps it's that you simply want to be served
      yourself. There may be a tendency to wallow in self-pity, seek sympathy for
      any little thing, or to develop hypochondriac tendencies. You are a faithful,
      diligent and loyal employee who is usually helpful to fellow employees. Some
      with this position are domineering and develop a false pride with those they
      work with or for. You can be an administrator, but you may prefer to be an employee.
      If you are in a position of authority, be careful not to be the office tyrant.
      You are very happy when you are busy and you hate being bored. You take great
      pride in your work and your workplace. This is where you want to shine and be
      better than all others. Worry and anxiety, especially over the desire to do
      things perfectly, can be detrimental to your health. You need to learn how to
      relax and not let stress and tension get to you. With this position you should
      be especially careful to take good care of your physical body. Top
  - house: 7
    text: If you have the Sun in the 7th house, you want a partner that you can be
      proud of. In some way your sense of pride is involved in the choosing of a marriage
      partner. There may be a wish to gain social prestige and to marry someone who
      can be admired and respected or someone who is higher on the social ladder.
      Your partner must be one who encourages you to be your real self and one who
      wants you to fully develop your powers of inspiration, creativity and will.
      Your partner may be in a position of authority and this may help give you more
      confidence in yourself or more security within the framework of the relationship.
      You may be challenged to display a greater degree of confidence and to exercise
      authority more effectively and with greater magnanimity. You must seek a relationship
      where both people are equal. A partnership in which one is "superior" and the
      other "inferior" is not likely to be successful. That "always me-first" attitude
      is not conducive to a rewarding partnership. A need to feel part of a family
      is present. With this position marriage and partnerships are likely to assume
      a paramount and key role in your life. There may be a tendency to look for a
      "father figure" and, as you may be inclined to surrender the initiative to your
      partner, you are rather more likely to react than act first yourself, so that
      your partner may assume a dominant role. If your natal Sun is badly aspected,
      then the partners you attract may be egotistical, domineering, vain and ostentatious.
      If your natal Sun is well aspected, then partners are likely to be proud, firm-minded,
      self-confident, ambitious, honorable, frank and generous. Selfish pride and
      too much desire to have your own way may be the greatest challenges in your
      relationships. Top
  - house: 8
    text: If you have the Sun in the 8th house, you may need or get the chance to
      transform your selfish and self- centered ego through the sharing of your personal
      resources with others on an equal basis with no strings attached. Perhaps you
      have the desire to have others take care of you using their personal possessions.
      Your emotions are generally stable and usually are never portrayed outwardly.
      There is a striving for self-improvement and regeneration. Finances are usually
      steady and there is the possibility of an inheritance. There is interest in
      mystical, occult and psychic realms. Top
  - house: 9
    text: If you have the Sun in the 9th house, you may wish to find, understand,
      live and accept a higher ideal or philosophy. But, then again, you may be one
      who insists upon scientific proof before anything can be believed. You can be
      the far- sighted thinker, one of high ideals and tolerance of other people's
      views or the dogmatic fanatic who just parrots what others have told you. Generally,
      there is a quest for truth and wisdom and a love of travel, not necessarily
      physical. You may have an aptitude for foreign languages and a love of foreign
      culture. Top
  - house: 10
    text: If you have the Sun in the 10th house, you may have a desire to attain success
      and power for the benefit of others or to seek success and power for yourself
      without thought of anyone else. You want to shine and be recognized for your
      accomplishments. You want to be really good at something. There is strong motivation
      towards succeeding in a career and/or personal achievements. You have the ability
      to inspire others through your example. You are ambitious and self-aggrandizement
      is possible. People in high places can help or hinder your career. Top
  - house: 11
    text: If you have the Sun in the 11th house, you probably possess a desire to
      raise goals to a higher level and to seek ideas which would be of benefit for
      the group. Or you may desire to place your own goals and desires above the wishes
      of the group. You have the ability to make friends, many who are influential
      and wield power. You enjoy your work with groups. You are responsible, liberal
      and broad-minded. You are a humanitarian who would rather be popular than powerful.
      You have organizing ability and probably take the leadership role in group activities
      or friendly get-togethers. Top
  - house: 12
    text: If you have the Sun in the 12th house, there is the desire or the need to
      serve others in this lifetime. At times this is in direct conflict with a desire
      to seek seclusion from the world and/or wallow in self-pity seeking sympathy
      and service from others. This life may be a contemplative life due to the need
      to reshape negative character traits from past lives. You have an awareness
      of the oneness of life. You may lack confidence in your abilities. You have
      an empathy with sick or mentally disturbed people. You may develop or have clairvoyant
      powers and an interest in occult subjects and psychic phenomena. You may enjoy
      playing the martyr. Top
  moon:
  - house: 1
    text: 'If you have the Moon in the 1st house, moodiness and changeability are
      keywords for you. These emotions can bring on much indecisiveness, un-assuredness,
      and insecurity. Being self- conscious about your appearance can also bring about
      mood swings. You are sensitive and perhaps worry too much over what people might
      think or say about you. Forget about pleasing everyone (it can''t be done) and
      instead focus on doing your best. Develop self-confidence and the courage to
      be different and don''t let it get to you. You can be very sensitive to your
      environment so do not go to places that might bring up ill feelings or bad memories
      in you. Your sub-conscious is probably very strong and sometimes quite unmanageable.
      Be less sensitive to the real or imagined slights of the people around you.
      Stay positive. You can be quite restless and impulsive. Your mother perhaps
      affected you greatly as you were growing up. Some of your strengths and many
      of your weaknesses are probably due to this. Her influence is and may continue
      to be strong, both for good or ill. Concerning vocation: the emphasis is upon
      your individuality and doing your own thing. Try to find something that allows
      you to express your own uniqueness within your work. Find something that you
      can really put your heart and soul into. Without that deep emotional connection
      you will simply go through the motions and be unhappy in and with your work.
      Top'
  - house: 2
    text: 'If you have the Moon in the 2nd house, you want and perhaps need to possess
      both money and possessions for your emotional security. Your feelings and emotional
      well-being are connected with your material resources. Changes and fluctuations
      will occur in your financial situation. Perhaps you alternate between being
      thrifty and careless with your money. Concerning vocation: the emphasis here
      is on self-worth. You need a work structure that allows public view or access,
      or working with women or the public. Like a pretty piece of jewelry in a department
      store window, you should be within the public''s view while working. This may
      not entail working with the public directly, however. You feel as if you need
      to be seen while working. Becoming one with your work allows you to identify
      personally and emotionally with some life purpose and to project this to the
      public at large. Because you so closely identify with your work, your ideas
      of how successful you are as a person are directly tied in with the success
      you feel at your work environment. Top'
  - house: 3
    text: 'If you have the Moon in the 3rd house, you possess intellectual curiosity
      and may well express your true feelings through speech, poetry or writing. Intellectualizing
      your feelings is probable. There is a strong need for communication and for
      gathering information, which is later shared with people in general or women
      in particular. You have a fine sense of humor and like to joke and play around.
      Travel appeals to you because it affords new opportunities for learning. Routine
      of any kind probably bores you and you are constantly looking for variety. Your
      ideas change at a moment''s notice and you are forever flexible and adaptable
      to any situation. Learning is perhaps better accomplished through listening
      rather than reading. Your mind can be quite emotional at times. Concerning vocation:
      the emphasis is on communication and information exchange. Your personality
      gathers, shares and reacts to information. This position represents the intermediary,
      the go-between, and the dissemination functions. Top'
  - house: 4
    text: 'If you have the Moon in the 4th house, there is a strong sense of family
      and home with this position. A love of antiques perhaps grounds you to your
      roots. Security is very important to you and you seem to get that through your
      foundations, your home and family, and your parents. Things collected serve
      as reminders of the past which you maybe try too hard to hold on to. Many changes
      of residence can occur until you find your personal foundation or roots. One
      or both parents are strong in your life. Concerning vocation: the emphasis is
      on the home. Maybe working in your home would be most fulfilling or maybe you
      simply need to make your place of work very homey, using photographs, mementos,
      furniture, etc., to establish the most personal atmosphere. The need during
      work is for security and comfort. Top'
  - house: 5
    text: 'If you have the Moon in the 5th house, romances and attachments to children
      can be decidedly emotional. There is a constant search for pleasure and emotional
      self-expression. Activities concerning children are pronounced. Too much emphasis
      may be placed upon having a good time and being the center of attention. There
      are mood swings and fickleness in love affairs. A heightened desire to feel
      loved and important may need to be controlled. You are a pleasure-seeking person
      with a lot of charm. Fluctuating emotions may interfere with your creativity.
      Concerning vocation: The theatrical, exhibitionist, creative dimensions of the
      work needs are increased. Teaching and taking care of children are emphasized.
      Speculation and the dramatizing of all experiences are possible. Top'
  - house: 6
    text: 'If you have the Moon in the 6th house, you are considerate of fellow workers
      and desire to nurture them in a productive work environment. Service to others
      is a fine outlet for your personality. Moodiness and sensitivity can be a problem,
      though. Fluctuations in health are possible, perhaps mostly due to worry and
      feelings of insecurity. Emotional tension along with digestive troubles indicate
      the need to relax. Stop worrying. You should not eat when overworked, overtired,
      or when you are upset. Take care of your health and watch your diet. Concerning
      vocation: You are probably totally absorbed within your work situation. You
      can be a workaholic. Many job changes are possible and working with the public
      or with women is indicated. Top'
  - house: 7
    text: 'If you have the Moon in the 7th house, you seem to attract sensitive people
      as partners, perhaps those who want to "mother" you or be mothered. There can
      be many changes of partners and many relationships because of the need to find
      someone who can bring an ultimate security. This search continues because security
      can only be found within, not without. You desire companionship, hence many
      relationships. Your feelings are greatly influenced by those with whom you are
      in close personal contact. You want to be popular with others. You are inclined
      to seek partners who can bring out your sympathetic side and play on your emotions.
      For men there is often a tendency to seek a "mother figure" and to bring out
      in others a desire to mother, protect and care for them. You are therefore likely
      to attract a partner who is kind and domesticated. Both you and your partner
      may need to be on your guard against moody or fickle behavior. Marriage may
      be undertaken with the object of establishing a home. More than one marriage
      is possible. There is probably a compelling emotional need for a partner and
      for marriage. In order to get the best results from any partnership you must
      learn to control any tendency to be continually at the mercy of your moods,
      which may result from over-vulnerable feelings. Try to control a tendency to
      be too dependent on others for your emotional stimuli and you should discipline
      a constant desire for changes in the nature of the relationship. Concerning
      vocation: Your work situation is tied to the public, partnerships, a keen awareness
      of public expectation and the need to meet it. Perhaps marriage is essential
      to give clear focus to work security. For many with this position, the work
      profile can be labeled a "public personality." You are dependent upon others
      for the fulfillment of work needs. The process of relationships is extremely
      important. Top'
  - house: 8
    text: 'If you have the Moon in the 8th house, you desire security and perhaps
      look for it through other people''s possessions or resources. You have self-doubt
      and worry. You may be subject to jealousy, envy and possessiveness. Psychic
      sensitivity is noticeable and psychic abilities can be developed, hopefully
      along positive lines. There may be financial gain through a partnership, business
      or through marriage. You are intrigued by what motivates others. Preoccupation
      with sex or death can exist for you. Concerning vocation: A work situation dependent
      upon others'' resources is noted. Work involving reform, transformation, rehabilitation,
      mystery, psychology, playing detective, or research work appeals to you. Top'
  - house: 9
    text: 'If you have the Moon in the 9th house, you are a dreamer and muse often
      about the higher aspects of life. Since you may not be content with the way
      your life currently is going, you have the desire to search for fresh fields.
      This search may take you on many long travels, both physically and mentally.
      Security may be found in a religious or philosophical ideal. Your philosophy
      of life is what nurtures you and gives you security. You have a variety of interests,
      in sports, hobbies and studies. You make a stimulating teacher because of your
      personal interest in the subjects you teach. They are really a part of you and
      that comes across to those who listen to you. You may have precognitive dreams.
      Concerning vocation: the emphasis is placed upon the higher mind, the dimensions
      of philosophy, public mores, religion, law or sharing the reasoning of the public.
      Issues regarding foreign travel, relocation, even citizenship change are important
      dimensions to consider in the quest for work conditions that will bring personal
      success. Top'
  - house: 10
    text: 'If you have the Moon in the 10th house, what others think is very important
      to you. A desire for achievement can dominate your feelings. You may hold a
      public position managing or dealing with change, women or publicity. You have
      a personal charisma which enables you to influence others. Many changes of career
      are possible. You feel a need to be socially useful to society. Concerning vocation:
      You desire a take-charge position within work situations. Your individuality
      is emphasized, often to the point that no subordinate position within work can
      be easily tolerated. Your emotions must be controlled. Top'
  - house: 11
    text: 'If you have the Moon in the 11th house, popularity with women often comes
      with this position. Many of your friends will be female. The feeling of belonging
      to a group increases your feelings of security. If you feel you do not "belong",
      then negative emotions surface that all basically have to do with your own needs
      for security. Humanitarian projects may be important to you as you can develop
      your nurturing instincts with or for the group. You enjoy working for the good
      of the group instead of just your own good. You are responsive to the feelings
      of others. Concerning vocation: The network of friendships within the work situation
      is emphasized. Friends may help get the job, make the job rewarding and will
      probably endure after the job is done. A friend''s advice about work opportunity
      or direction is perhaps more important than that of a professional counselor.
      Top'
  - house: 12
    text: 'The Moon in the 12th house can indicate work behind the scenes in an institution,
      hospital or jail. There may be dealings with public welfare or those unfortunates
      of life. Conscious or subconscious sensitivity can be damaging if not held in
      check. You feel some sort of cross to bear which others may not be aware of
      and many troubles may occur. Secret enemies may try to take advantage of you.
      Through suffering comes obedience. Your mother may be of great distress to you.
      Serving others is the safest, shortest road to God. Teach to others what you
      have learned through your own suffering. Concerning vocation: You prefer little
      or no contact at all with the public in your job. Symbolically, this position
      is the author hidden away in the attic, the playwright who will not attend a
      performance of his work, the behind-the-scenes person. The personality is hidden
      and may be limited and confined. In work, these conditions are preferred in
      order to provide maximum security and comfort to the personality. Top'
  mercury:
  - house: 1
    text: If you have Mercury in the 1st House, you are adaptable, clever, inquisitive,
      eloquent, witty, and perhaps high-strung. You want to know something about a
      lot of things. Your speeches and writings reflect your own personal opinions.
      You may have jittery nerves which keep your body slim, but which could cause
      nervous disorders. You love talking about what interests you. Top
  - house: 2
    text: If you have Mercury in the 2nd House, you may use your wit, knowledge, and
      versatility to make money. At the very least you like to talk about money -
      it is on your mind. You may earn money with an ability to communicate ideas
      to others through writing and speaking. You may have financial skill, but your
      money may come and go, regardless. Top
  - house: 3
    text: If you have Mercury in the 3rd House, you are clever, alert, adaptable,
      versatile and studious. Mercury here stimulates the mind and the body. You can
      express your ideas fluently and you have the ability to bring your ideas to
      completion. You are apt to be a jack-of-all-trades. There may be many short
      journeys. This is a good position for teachers, for those concerned with detailed
      work, or for work with computers. Writing or speaking ability is present. Top
  - house: 4
    text: If you have Mercury in the 4th House, you tend to be studious, with literary
      interests. You like to study at home. Continual studying gives you a sense of
      inner security. You may be high-strung and need to learn to relax and take a
      break from all that book work. There can be many changes of residences due to
      your restlessness and your need to find a place for yourself. Wherever you end
      up, your home will no doubt contain a study area or a special spot where you
      can just talk to friends and acquaintances. Top
  - house: 5
    text: If you have Mercury in the 5th House, you have a need to prove your intelligence
      and to use that intelligence in creating things of a mental nature - mental
      children, as it were. You desire to pass on your knowledge to others and to
      learn from them as well. Teaching children or young adults may provide quite
      a lift for you. Games of strategy and skill challenge your intellect. You desire
      to communicate your thoughts in a clever, inspiring and dramatic manner. You
      may have acting, writing, or speaking ability. As a teacher, you enjoy stimulating
      the minds of others and encouraging your students to greater things. Romances
      probably need to involve someone with whom you can communicate intelligently
      and relate to mentally. For you, sexiness is in the brain. Top
  - house: 6
    text: If you have Mercury in the 6th House, you have analytical ability with a
      possible love of computers and electronics. If you become too concerned with
      details, your nerves may become frayed, thus causing health problems. Any ill
      health reflects wrong thinking and perhaps worry. You may be restless with a
      desire for frequent job changes. Service, possibly of a mental nature, appeals
      to you. Variety in your work or workplace is important. Issues of health and
      diet interest you. Top
  - house: 7
    text: If you have Mercury in the 7th House, your relationships tend to gravitate
      towards people who are intelligent, thought-provoking, witty and learned. You
      desire your spouse or business partner to be sharp, curious, clever and alert.
      You need to communicate and exchange ideas and information with your partner.
      Promotion of ideas to and from others appeals to you and you are always up for
      a good debate, discussion or argument. You may spend much time thinking about
      your relationship or relationships in general. Marriage may be quite often on
      your mind. You desire a marriage or business partner that provides you with
      mental satisfaction and challenge. A partner who challenges you mentally and
      one who helps you function on more of an intellectual level is what you are
      looking for and need. Their value is enhanced if they help you better adapt
      and more effectively communicate with others. The person who gives you a lively
      flow of ideas, ideas that challenge and test your own mental processes, one
      who brings out your best mentally, stimulates you in a way that others may not
      understand. Yet that is what you seek in a partner. Your partner may be quick-witted,
      fluent, volatile, restless, high- strung as well as outspoken, argumentative,
      wordy and critical. Nervousness or mental imbalance may be present. Your partner
      may possibly be connected with education, writing, traveling, sales, language
      interpretation or clerical, secretarial, typing or computer work. In order to
      achieve the most positive results from any partnership you should learn to control
      your argumentativeness and your desire to criticize. Top
  - house: 8
    text: If you have Mercury in the 8th House, you have talent for analysis, research,
      insight, tax preparation, insurance and perhaps detective work. You want to
      get to the bottom of who, what, where and why. You are a born investigator.
      You may tend to worry over fluctuating finances. Watch a tendency to gossip
      about others. Your mind may be preoccupied with death, sex, healing, magic or
      psychic phenomena. Top
  - house: 9
    text: If you have Mercury in the 9th House, you are flexible, with an adaptable
      mind which has an interest in perhaps intellectual pursuits, law, religion or
      philosophy. You have many ideas and beliefs with the ability to express them
      well verbally. You probably enjoy travel and foreign culture and it is particularly
      educational for you. You have the ability to learn foreign languages or to be
      a translator. You may be a teacher or be involved in higher learning in some
      other way. Interest may exist in publishing or advertising. Top
  - house: 10
    text: If you have Mercury in the 10th House, perhaps you will write or speak as
      a career. The teaching profession may hold promise for you. You have the ability
      to communicate your ideas to others and to be recognized for them. Your manual
      dexterity and mental alertness may lead you to a field where this is a real
      necessity. You may have several jobs, as you have a variety of talents. There
      is a possibility of travel in your profession. Top
  - house: 11
    text: If you have Mercury in the 11th House, you have an original, comprehensive,
      adaptable and intellectual mind. Your goals are obtained through the use of
      your mind. You choose friends who stimulate your mind, perhaps younger friends.
      You find it stimulating to converse with those friends who share opposing views.
      You could be the spokesman or secretary for your favorite group or organization.
      Top
  - house: 12
    text: If you have Mercury in the 12th House, you have a perceptive, intuitive
      and subtle mind with an interest in the metaphysical world. You can absorb knowledge
      intuitively and you understand more than you wish to divulge. You are secretive
      and have the ability to understand the deeper meanings of tones of voice and
      hand gestures. Secret enemies may try to undo you or speak evil of you. You
      may lack confidence in yourself. You may find yourself limited or incapacitated
      if you allow your nerves to become too frayed. Be careful of your ears and your
      hearing, which may be weak. Top
  venus:
  - house: 1
    text: If you have Venus in the 1st House, you are friendly and charming with a
      magnetic personality. You are the honey in life that draws the bees. You always
      seem to know what to say with regard to what people want to hear. Whether it
      is the truth or not is the problem. You have an uncanny ability to attract everything
      you need in life. People and things just come to you. But, you must guard against
      using people to get what you want. You enjoy and have an appreciation of beautiful
      and luxurious things. You can also be quite selfish and self-centered. Acting
      like the spoiled brat is also a danger. Top
  - house: 2
    text: If you have Venus in the 2nd House, you attract money and personal possessions,
      especially when needed. You spend money as fast as you earn it, sometimes faster.
      Your hidden talents can be beneficial to others, if you apply yourself. Don't
      be afraid to work. Your money is used to buy beautiful, artistic, and/or musical
      things. You like a certain amount of luxury to surround you. Money may come
      to you through a partner or relationship. Top
  - house: 3
    text: If you have Venus in the 3rd House, you may be artistic and creative in
      speech and writing and you express yourself well in either. You have a love
      of travel, yet your immediate surroundings are probably quite harmonious and
      comfortable. Relations with neighbors and siblings are probably easy-going and
      pleasurable. Because you dislike disharmony, you avoid confrontations with people
      in your immediate environment, hating to rock the boat. Top
  - house: 4
    text: If you have Venus in the 4th House, you desire beautiful things and a nice,
      rather luxurious home. You have an artistic nature with a talent for making
      people welcome in your home. Entertaining at home gives you real pleasure. There
      is a love of family and children. The latter part of life may be pleasant and
      comfortable, although you may find a tendency to add weight in later life. Top
  - house: 5
    text: If you have Venus in the 5th House, you are affectionate, creative and attractive
      to the opposite gender, perhaps too attractive for your own good. You probably
      have talent in drama, art, or music and these may be your favorite hobbies.
      Perhaps there is love of the stage and of performing. You might make a delightful
      and expressive teacher because of your love of children. You certainly enjoy
      having a good time and people may consider you a party animal. Over-indulgence
      needs to be watched. Top
  - house: 6
    text: If you have Venus in the 6th House, you are diplomatic, well liked by employees
      and/or fellow workers and you have a desire to bring about better working conditions
      for them so that working will be enjoyable. This is a fairly good position for
      health unless you abuse your body through self-indulgence and rich, sweet food.
      An excess of sugar and starches should be avoided. You can be the mediator when
      differences of opinion occur on the job or in the office. You can bring peace
      and understanding. Top
  - house: 7
    text: If you have Venus in the 7th House, you are charming, sociable and friendly
      and it is easy for people to see your loving nature. Partnerships are generally
      happy and harmonious. But your desire for peace and harmony at all costs may
      be detrimental to you if you do not stand up for your own needs. You desire
      a spouse who is attractive and probably well off financially. Creature comforts
      and enjoying them with your partner are desired. Take care that you do not get
      in the habit of expecting too much from others, though. You have a deep appreciation
      of the value of relationships. Too great an emphasis on affection might cause
      problems for you. A desire for the perfect relationship may be so strong that
      any imperfections in your relationship could be blown up beyond proportion.
      Balance and poise are necessary You seek a partner that can supply you with
      "the good life". You want beauty, luxury and the finer things in life and you
      seek a partner who can provide these. Perhaps marriage will bring you to a higher
      station in life. Over-indulgence and over-emphasizing the sensual side of life
      can lead to problems. You must have a partner you feel is cooperative rather
      than competitive. If Venus is aspected poorly in your chart, then perhaps your
      partner's moral standards are subject to question. Top
  - house: 8
    text: If you have Venus in the 8th House, you may be enjoying physical comforts
      and prosperity perhaps due to your partner's efforts. You may inherit money
      which allows you the luxury you seek. You may lack self-discipline and there
      may be a tendency to laziness as well as a preoccupation with sex. Trouble may
      come to you if you have a tendency to indulge your lower nature. You may be
      attracted to healing, psychic endeavors or metaphysical subjects. Perhaps you
      have an interest in magic. Top
  - house: 9
    text: If you have Venus in the 9th House, you probably have a love of travel and
      the ability to benefit from these travels. You may move far away from your place
      of birth. You possess the ability to promote understanding between different
      cultural or aesthetic groups. Beauty, art and music from foreign cultures appeals
      to you. You can be fair in legal dealings. There may be love of and attraction
      to religion or ceremony, philosophy, law or higher learning. Top
  - house: 10
    text: If you have Venus in the 10th House, your pleasant disposition and harmonious
      nature make you popular in your career and with the world at-large. People seem
      to want to do nice things for you, which can lead to laziness if you abuse this
      energy. You have a loving and friendly approach to the world with a general
      attitude of optimism. This placement can be favorable for public speaking and
      singing. Your voice may be used to please and inspire people. This position
      usually grants comfortable financial circumstances. Top
  - house: 11
    text: If you have Venus in the 11th House, you are sociable, tactful and friendly.
      You have many helpful friends. Be careful, though, that these friends do not
      encourage you to over-indulge yourself for that will have a detrimental effect
      on you and your health. Be careful also of pleasing your friends at a cost to
      yourself. You have the ability to put people at ease. You enjoy cultural and
      group pursuits. You have a strong desire to relax with congenial companions,
      though you can be imposed upon by friends because of your desire to do everything
      possible for their comfort and pleasure. Top
  - house: 12
    text: If you have Venus in the 12th House, your love of solitude and being your
      own best company may cause you to want to retreat from society. Pleasures are
      enjoyed in secret or behind the scenes. Clandestine relationships are possible.
      Self-indulgence through drink, drugs or sex can bring on self-undoing. There
      is a strong sense of compassion and a willingness to help and serve others.
      You may be a sucker for a good sob story. Success by social standards is unimportant
      to you. You want an understanding of the meaning of life. There is a tendency
      to keep relationships with the opposite gender a secret. You seldom reveal your
      innermost feelings. This position usually gives an interest in psychic or occult
      subjects. Top
  mars:
  - house: 1
    text: If you have Mars in the 1st House, you have an abundance of physical vitality.
      Sometimes there is so much energy that you become reckless, impulsive, and throw
      caution to the wind. You may experience cuts and burns on your head and face
      which may leave some sort of scar. You are assertive, independent, impatient
      and want to do your own thing. You have strong organizing ability. You are usually
      self-confident. Guard against accidents due to rushing around in your impulsiveness.
      You may be subject to higher than normal fevers. Top
  - house: 2
    text: If you have Mars in the 2nd House, much energy and action will be expended
      with respect to money, personal possessions and resources. You may have trouble
      controlling your spending habits and are likely to be an impulsive shopper.
      Saving is probably not your strength, but you should try to improve your savings
      ability. You might sometime need it for that rainy day. Money may come and go
      in order to de-emphasize its importance. Concentrate on developing your talents
      instead. Top
  - house: 3
    text: If you have Mars in the 3rd House, you are restless, perhaps high-strung,
      and probably have an abundance of nervous energy. You have an intense belief
      in your own ideas. You are alert, determined, and enthusiastic. You possess
      an abundance of mental energy. Developing analytical thinking is important,
      as impulsive thinking will bring difficulties. There can be problems with siblings
      or neighbors. There will be many short journeys. Energy is expended in neighborhood
      activities. Top
  - house: 4
    text: If you have Mars in the 4th House, there is an early striving for independence
      and a desire for security and a home of your own. There may be tension or antagonism
      in your family environment. Perhaps you are too demanding of those closest to
      you. You must overcome your hidden antagonisms and quarrelsomeness. Your strong
      emotions must be toned down and controlled. Go out and do some yard work to
      work off the excess energy. Top
  - house: 5
    text: If you have Mars in the 5th House, there is a desire to be creative and
      you will expend much energy in that direction. You may be a gambler, a risk-taker,
      or a speculator. You are sports-loving and enterprising and like to have a good
      time. There may be some friction through children due to selfishness in past
      lives. Attraction to and from the opposite gender is fairly certain. Much energy
      will probably be directed toward dating and romance. Top
  - house: 6
    text: If you have Mars in the 6th House, you are industrious, efficient, tireless,
      dynamic and active in work. You may have a tendency towards irritation and impatience
      with co- workers and employees who lack these qualities. You are mechanically
      minded with good vitality and strong recuperative powers. You tend to run fevers,
      perhaps higher than normal, when ill. There is a danger of burns, scalds, and
      accidents sustained in the course of work or employment. Many of these may happen
      because of impulse, haste, and impatience. Top
  - house: 7
    text: If you have Mars in the 7th House, you are independent, like to have your
      own way and you must develop gentleness and diplomacy in order to avoid rubbing
      people the wrong way. You need to learn how to cooperate with others. Relationships
      energize you and you get a great deal of stimulation from them. You desire an
      active partner who can help you share in the goings-on of the world. Your partner
      needs to challenge you, help you initiate projects and perhaps compete with
      you. You need a sparring partner! Your relationships have much energy and you
      need to channel that energy into constructive means and not into destructive
      ones. The competition between you and your partner might better be directed
      towards the outer world. In all your dealings with others you enjoy the element
      of challenge and competition. You may goad others just to see how they will
      react. The chase is important to you, perhaps more important than the end result.
      Because you enjoy the action, you may not mind losing battles to a partner who
      is prepared to carry the fight to you. Your marriage partner is likely to be
      very ardent, positive, active, capable and courageous, with a will of their
      own. Perhaps the partner you seek is someone who can play the role of a champion
      or a crusader. Mars here makes for an association where the passions have full
      play and a love match with much devotion is possible. The tendency is to marry
      early, often as a result of love at first sight, although if Mars is badly aspected,
      you may "marry in haste and repent at leisure". There may be strife and friction
      in marriage as a result of the partner's hasty temper, intemperance, extravagance,
      brashness, intolerance, over-demanding attitude or violence. In order to get
      the best results from marriage and partnership, you should try to be as cooperative
      and easy-going as possible, practicing gentleness and diplomacy rather than
      allowing any assertive or quarrelsome tendencies to gain the upper hand. Top
  - house: 8
    text: If you have Mars in the 8th House, there may be energy, desire, and enthusiasm
      for research, for getting to the heart of things, and for playing detective
      and uncovering secrets. There may be financial problems, probably through a
      partner, in order to de-emphasize the importance of money. There may be financial
      benefit through marriage or inheritance. There is a need to share willingly
      of personal resources in any cooperative relationship. You must learn to control
      your desires (passions) and your lower nature. There may be interest in healing
      or surgery. Top
  - house: 9
    text: If you have Mars in the 9th House, your mind is enthusiastic, but restless.
      You are independent in thought. Your religious zeal must be watched so that
      it doesn't turn into fanaticism. You have strong opinions and are happy to tell
      anyone who will listen what they are. You have a strong desire to travel, not
      necessarily physically, but mentally. You have a liberal, broad, and progressive
      philosophy about life and do not want anyone else imposing their beliefs on
      you. There is a possibility of strife with in-laws. You will fight for your
      convictions. You may need to watch a tendency towards believing you are always
      right. Top
  - house: 10
    text: If you have Mars in the 10th House, you have an ambitious, enthusiastic
      nature with lots of energy. You have good executive ability and organizational
      powers. You want to lead and show the way, taking the initiative in your career.
      Success comes through your own enterprise. You do best in an occupation with
      variety. Your self-reliance is strong and you are practical and results oriented.
      There may be some difficulty or friction with one of your parents or with superiors
      at work. Top
  - house: 11
    text: If you have Mars in the 11th House, you have strong desires and wishes,
      social leadership ability and many casual associations with energetic and enterprising
      friends. You probably put a lot of energy into your friendships. It is important
      that you seek the right type of friendships. You can be taken advantage of by
      friends or you can take advantage of them. Active participation in group activities
      suits you well. Leadership within the group also appeals to you. Top
  - house: 12
    text: If you have Mars in the 12th House, you may have intense emotional reactions
      and perhaps repressed desires and paranoia. People may sense this and cause
      problems for you. There can be trouble through slander or with secret enemies.
      You may have need to overcome deep, hidden, inner resentments. You may be subject
      to false accusations by hidden enemies. You feel an aloneness. Your energy should
      be directed toward gaining an understanding of the meaning of life and for the
      development of harmony and oneness with humanity. A love of working in secret
      or behind the scenes can make you effective in getting the job done. Top
  jupiter:
  - house: 1
    text: If you have Jupiter in the 1st House, you are generous, optimistic, cheerful,
      confident, well-intentioned, with good vitality. You probably like outdoor sports
      and are good at them. This placement brings many opportunities for personal
      growth and expansion, including a potential weight problem. Your confidence
      in yourself makes you a good leader and promoter because you have the ability
      to inspire the faith of others. You can, however, be extravagant, gullible,
      over-emotional, egotistical or self-indulgent. Top
  - house: 2
    text: If you have Jupiter in the 2nd House, you have the ability to be financially
      successful. Money seems to come to you and you have probably never missed a
      meal in your life. You have confidence and optimism in your talents and abilities.
      Your visionary ideas and investments usually prosper due to your intuitive appraisal
      of situations. You enjoy material possessions and may be termed "lucky". You
      inspire trust in others and may benefit from receiving financial assistance
      from others in order to develop your visionary and idealistic ideas. You must
      guard against self-indulgence and over-extravagance. Curb your desire for rich,
      sweet food and desserts. Top
  - house: 3
    text: If you have Jupiter in the 3rd House, you are philosophical, optimistic,
      conventional and considerate. You have strong intuition. This position expands
      and broadens your mind enabling you to comprehend easily. You are well liked
      by siblings, neighbors and relatives. There may be mental restlessness which
      can be helped through occupations that keep you moving. You must be careful
      not to scatter your energies. There is a tendency to be impractical or self-satisfied.
      Your mind tends to think in broad terms, not in details. Top
  - house: 4
    text: If you have Jupiter in the 4th House, you are generous, self-confident,
      hospitable and patriotic. Prosperity usually increases in later years. You desire
      a home that is spacious and comfortable. Parental influence is strong in shaping
      your character. Perhaps your parents shared a strong faith with you. Usually,
      considerable help and/or an inheritance is received from the parents. With Jupiter
      well-aspected, it is better to stay where you were born rather than move away
      from your birthplace. Guard against becoming ostentatious and watch out for
      self-indulgence. Top
  - house: 5
    text: If you have Jupiter in the 5th House, many opportunities for romance, dating,
      and activities involving children or teaching will probably come your way. You
      are optimistic and enjoy passing on your knowledge to those around you. You
      have creative ability which can bring success and happiness. There is a strong
      desire to make significant contributions through your creative self-expression.
      Children, which may be plentiful, can be a source of pleasure or over-indulgence.
      Guard against rash gambling and speculation. Top
  - house: 6
    text: Jupiter in the 6th House tends to give good health. Any health problems
      are usually caused by extravagance and over-indulgence, too much of a good thing.
      You are helpful to others and are a dependable worker with a sense of loyalty.
      You inspire cooperation and good will among your fellow workers. You enjoy your
      work and give of your time willingly. Watch that you do not overwork or overindulge
      in eating or drinking. There could be difficulties in the liver and blood or
      poor circulation due to over-indulgence. Top
  - house: 7
    text: If you have Jupiter in the 7th House, benefit, opportunities and wealth
      may come about as a result of marriage or partnerships in general. You seek
      a partner that can expand your visions, open up opportunities for expansion
      and help you grow. Your partner can strengthen your faith and deepen your religious
      or philosophical attitudes and ideas. You may feel that you need a partner to
      help you develop your moral outlook and social conscience. Your partner, who
      may be a member of one of the professions, may be more affluent than you. If
      Jupiter is badly aspected in your natal chart, then your partner may be somewhat
      opinionated, lazy, self-indulgent, extravagant and self-willed, sometimes untrustworthy,
      immoral, shameless and wasteful. You are able to bring out the generous and
      good-natured impulses of others, but in order to get the best results from the
      marriage partnership you may need to control any extravagant tendencies and
      prevent false pride from unduly affecting the smooth course of your relationships.
      Top
  - house: 8
    text: If you have Jupiter in the 8th House, you are optimistic and you have faith
      in your fellowman. There may be financial gain through marriage, partnerships
      or inheritances. You are strongly emotional and should use your emotional energies
      to tap your psychic abilities so you can benefit, uplift, and heal mankind.
      Gain, opportunity and expansion through the use of other people's money is possible.
      Top
  - house: 9
    text: If you have Jupiter in the 9th House, you are optimistic, tolerant, broad-minded,
      considerate and maybe a little bit fanatical. You may be prophetic, having strong
      intuition, good judgment and vivid dreams. You may be interested in law, religion
      and philosophies. You have the ability to guide and inspire others as to what
      the future might bring and to promote your own thoughts, ideas and ideals. You
      may benefit from travels and dealings with foreigners. Your accomplishments
      may not be recognized until the latter part of your life. On the negative side
      you may be quite dogmatic in your beliefs. Some experience a total absence of
      faith. Top
  - house: 10
    text: Jupiter in the 10th House may bring opportunity and expansion as well as
      success and honor to you in your profession or in your community. Much of the
      reason is your congenial and generous nature. You have a magnetic personality
      and people sense you will not let them down. Many opportunities will arise which
      are of benefit to you and to society as a whole. There is a strong sense of
      responsibility toward your career and toward personal achievement. You have
      the ability to get others to believe in your expansion-oriented, long-range
      plans, dreams and visions. Top
  - house: 11
    text: If you have Jupiter in the 11th House, you probably have lots of friends
      who are willing to do almost anything for you, and you for them. These friends
      are knowledgeable, idealistic and may be of foreign culture or descent. The
      social life appeals to you and this may be the cause of over-indulgence or over-extravagance
      on your part which could get you into trouble. You are popular, with faithful
      and influential friends. You have a natural ability to organize and plan large
      group activities. You are a strong supporter of groups, foundations and philanthropies.
      Top
  - house: 12
    text: If you have Jupiter in the 12th House, you tend to be philanthropic and
      have great faith in the future. You may have an "angel" to watch over you and
      assist you through any reversals. There is a love of humanity and a great desire
      to help others, especially those who cannot fend for themselves. Work in a hospital
      or jail is possible. Success comes in a quiet, unassuming manner in middle life.
      You can be unrealistic, though. It is important to think all ideas carefully
      through before carrying them out. Top
  saturn:
  - house: 1
    text: If you have Saturn in the 1st House, you are probably reserved, quiet, and
      serious. People may take you for quite a cold person. You are responsible, hard-working
      and duty comes first on your list of priorities. Self-controlled and disciplined
      are how others see you. You may have experienced a rather austere or difficult
      early childhood. Perhaps there was illness that kept you on the sidelines. Feelings
      of inferiority, insecurity, or unworthiness may push you to great ambitions
      and accomplishments. Perhaps you feel unloved or that you are not worthy of
      love. These feelings may have been activated in your early, formative years.
      Pessimism and depression may come upon you because everything looks like such
      a struggle for you. Keep your chin up and realize that no hard work is ever
      wasted and that rewards will come to you later in life if you buckle down now
      and toe the line. Survival issues may come into play. Top
  - house: 2
    text: If you have Saturn in the 2nd House, you tend to be thrifty, practical and
      responsible, especially with money and possessions. This placement does not
      deny money, but you must work hard for it. Sometimes you are so busy squirreling
      away money that you forget to enjoy it. Having money set aside for a rainy day
      is fine, but you probably don't need as much as you tend to want to have set
      aside. Poverty is possible with this placement due to a lack of understanding
      of the true value of money and possessions. There is a tendency to become depressed
      over material matters. Your possessions are apt to bring worries rather than
      happiness because you may need to learn to share with others. There may have
      been too much emphasis on materialism in past lives. You may need to re-evaluate
      your values. Attitudes of possessiveness toward others must be changed. Feelings
      of being unloved, unwanted, and unappreciated occur with this position. You
      must value yourself before others can value you. Love yourself first. Top
  - house: 3
    text: If you have Saturn in the 3rd House, your mind is serious, exacting, patient
      and orderly plus you have the ability to concentrate on deep subject matter.
      With this ability comes a tendency to depression, pessimism, loneliness or despondency.
      You have organizational ability and are probably conservative and traditional
      in your thinking. Mathematics and strategy games may appeal to you. Time consuming
      projects do not bother you. You may feel a bit isolated from siblings and neighbors
      or they may give you trouble. There may be issues of communication with either.
      Try to stay optimistic in your thinking and in the meantime simply keep working
      hard. Your lungs need plenty of oxygen, so try to sleep in a well-ventilated
      room. Top
  - house: 4
    text: If you have Saturn in the 4th House, you are probably conservative and perhaps
      find security in land or real estate or in old, traditional ways, beliefs, things
      or antiques. You may dislike change because of an unconscious fear of the unknown.
      You may have a desire to accumulate possessions, for security reasons. There
      may be many responsibilities and problems in your home or family life. You may
      be somewhat of a tyrant or strict disciplinarian in your home or with your family.
      Inner worries may cause ulcers. You may be a caretaker of someone or of your
      parents, perhaps because of a karmic debt to them. The later part of life can
      be more rewarding if you learn the lessons life has to teach you in your earlier
      years. If not, then old age may not be as pleasant. Top
  - house: 5
    text: If you have Saturn in the 5th House, you perhaps feel unloved and unappreciated.
      Romances can turn cold. Love affairs are serious and you may feel emotionally
      and creatively inhibited. Because of your emotional restriction, you can appear
      to be cold, unloving, and unresponsive. This prevents you from being as popular
      as you would like to be. You have a desire for others to look up to you. It
      is difficult for you to relax. Personal interests and hobbies need to serve
      a practical purpose for you in order for you to enjoy them. Parenthood may be
      a burdensome responsibility and you may be too restrictive towards your kids.
      It is difficult for you to show your love and appreciation. You need to learn
      how to express your feelings towards those you love, and not just through the
      giving of presents and material things. It is important for you to forget yourself
      and to learn to project warmth to others. Top
  - house: 6
    text: If you have Saturn in the 6th House, obstructions of health, or limitations
      in health, can come into play with this position. Diet may need to be watched
      and improved as your body may not assimilate everything it needs from the food
      you eat. Perhaps taking vitamins would help in this regard. Exercise would certainly
      be beneficial. There may be difficulties at the workplace, possibly because
      of your attitudes toward others. Perhaps the environment is not conducive to
      your best efforts or perhaps your fellow employees make life miserable for you.
      You cannot always expect others to work as hard as you or to grasp details as
      rapidly as you can. You may be a workaholic or you may simply need to learn
      "how" to work. In general, though, you are probably a practical, conscientious,
      hard worker who can work with details well. You may not be at your best with
      strict time deadlines, but you do try to always do your duty. Do not overwork
      to the point of exhaustion. The tendency to worry and to harbor anxieties may
      affect your health causing depression and perhaps hypochondria. Top
  - house: 7
    text: 'If you have Saturn in the 7th House, there may be the tendency to attract
      older, more serious partners. Partnerships may involve much duty, responsibility
      and hard work. There may be a karmic tie from the past to the partners in this
      life. Whatever the case, there may be a feeling of restriction, bondage, depression
      and anxiety in your relationships. They certainly can be enduring, though. Saturn
      here indicates you need to learn to cooperate with and to develop empathy for
      others. You are perhaps cautious about marriage, but, when committed, may find
      it very difficult to leave your marriage partner, even if you are unhappy. You
      may marry for security rather than love. Discipline is needed in relationships.
      There may be a very self-controlled and sometimes calculating attitude towards
      all forms of partnership. You are inclined to seek a partner who will awaken
      your sense of responsibility and give you a greater sense of purpose and will
      to succeed. For a woman there may be a subconscious desire to marry a "father
      figure" and the partner may well feel an urge to organize your life on a more
      effective basis. The responsibilities of marriage or the fear of marriage may
      delay marriage. If Saturn is well aspected in your natal chart, then this position
      usually indicates that one loyally abides by marriage vows and faithfully carries
      out marital duties. With a well placed and well aspected natal Saturn, the partner
      is likely to be a person of integrity, faithful, steady, reliable, industrious,
      persevering and economical, perhaps not over-demonstrative and preferring deeds
      to words, and providing a real anchor for the partnership. If natal Saturn is
      badly aspected, then there is a tendency to endure an unhappy marriage rather
      than to lose face by breaking up. If you neglect to make your partner happy,
      your own happiness will be affected in the same proportion. This position can
      also mean a second choice marriage, which endures in spite of boredom, unhappiness
      and a lack of '
  - house: 8
    text: If you have Saturn in the 8th House, you are a hard worker who is patient
      and thrifty. You have the capacity for self-discipline and this strong discipline
      can cause you to deny yourself a social and/or sexual life in your quest for
      financial security. Transform this desire into seeking soul growth through understanding
      and wisdom, which can perhaps best be obtained through relating to others in
      partnership relationships. "For what does it profit a man to gain the entire
      world and lose his own soul?". There can also be issues concerning abuse, sex
      and power. A deep sense of hurt from the past may also be felt. Limitations,
      obstructions and problems may be experienced with inheritances, other people's
      money, one's sex life, taxes and insurance. Attitudes toward sex may cause difficulties.
      A strong sensual nature requires restraint. Top
  - house: 9
    text: If you have Saturn in the 9th House, your religious and philosophical beliefs
      are probably quite orthodox and traditional. You take these beliefs very seriously.
      Your concentration upon deep subjects is probably quite good. You may be intolerant
      and critical of others and their beliefs. You may question absolutes, God and
      religion in general. There may be difficulties connected with foreign travel
      or foreign cultures. Frustrations and delays can occur during long journeys.
      Take care not to deplete your energy to the point of exhaustion through over-concentration.
      Top
  - house: 10
    text: If you have Saturn in the 10th House, you are self-reliant and independent
      with good business and organizing ability. Success for you comes slowly, through
      perseverance and hard work. You must accept your responsibilities, otherwise
      life will be a series of setbacks and failures. Chasing power and using others
      to get what you want will cause your downfall. You need to control your ambitions.
      Be careful of bridges you burn - you may need to cross back over them. There
      may be difficulties with either parent because of their discipline, strictness
      or a need to control your life. Top
  - house: 11
    text: If you have Saturn in the 11th House, you have many acquaintances, but only
      a few close friends, probably older ones. The friendships you make endure for
      many years. You are attracted to groups which have a serious or necessary purpose.
      You feel a strong sense of duty and responsibility to the groups you become
      involved in. The tasks that you do for any groups may receive very little personal
      recognition and may require hard work. In order to attain your goals and objectives,
      you have to be patient and willing to work hard. If your lessons are learned,
      the later part of life will offer greater rewards. You may experience a sense
      of never fitting in with the people or groups around you because of some perceived
      uniqueness. In any case there may be issues regarding feeling different from
      others. Top
  - house: 12
    text: If you have Saturn in the 12th House, you have the potential to develop
      strong inner discipline and sensitivity. There can be feelings of fear, doubt
      and a lack of confidence in yourself. There may be an unconscious desire to
      make restitution for wrongs committed in previous lives. Thus, you may feel
      fated and desire to retreat from society. A strong inner discipline gives you
      the ability to repay your past life debts, though. Your present path may involve
      serving mankind in some manner. Chronic health problems can be experienced if
      subconscious fears are not brought out into the open. There is a love of solitude.
      Work may be behind the scenes or it may involve an occupation where you do not
      come into contact with the general public. Top
  uranus:
  - house: 1
    text: If you have Uranus in the 1st House, you are strong-willed, independent,
      original, perhaps a bit eccentric, freedom-loving, and intuitive. You have an
      exciting and stimulating personality which tends to draw people to you. You
      may be willful, high-strung, nervous, and anxious. You may experience feelings
      of unrest and loneliness, perhaps because of the uniqueness you feel. Seeking
      new and unusual ways of expressing traditional ideas appeals to you. Listen
      to your intuition because it is probably very strong, or could be developed
      to a high degree. You can become a leader who will pioneer new paths for others
      to follow. You may be ahead of your time. You may not pay as much attention
      as you should to your physical state and appearance because of the myriad of
      thoughts that occupy your mind. Uranus in the first house . Top
  - house: 2
    text: If you have Uranus in the 2nd House, you can earn money in original and
      inventive ways. Money and possessions come and go in sudden, unexpected ways.
      There may be unusual and disruptive changes in your financial condition. You
      may value money for the freedom it gives you to pursue your inner talents, which
      may be rare and unique. You have the ability to get yourself out of financial
      difficulties. Uranus in the second house . Top
  - house: 3
    text: If you have Uranus in the 3rd House, your mind is independent, original,
      creative, unconventional, curious, perhaps somewhat eccentric, and unusual.
      People around you sometimes cannot understand how you think or why you express
      yourself in the ways you do. You may be ahead of your time. Mental restlessness
      causes you to always be on the search for new information and knowledge. You
      have unique ways of passing this new information along to others. Frequent changes
      of mind are likely as new data filters through you. Relationships with siblings
      and neighbors are likely to be unusual and perhaps somewhat high-strung and
      tense at times. Boredom is seldom a problem. The desire for fresh experience
      may cause you to travel extensively. Intellectual freedom is important to you.
      Uranus in the third house . Top
  - house: 4
    text: If you have Uranus in the 4th House, you may experience unsettled home or
      family conditions. These events usually happen quite unexpectedly, out of the
      blue. Your family heritage may be eccentric or unusual and family skeletons
      can appear. This position gives restlessness, perhaps with a desire to move
      often. Your parent(s) or your relationship with either parent may be unusual,
      which will affect you emotionally (nerves) for good or otherwise. There will
      be many changes in your life, including different localities. You desire to
      remain free from commitments to either a home or a community. You may be unconventional
      and not interested in how others view you. Later in life, you may develop an
      interest in astrology or in metaphysics. Uranus in the fourth house . Top
  - house: 5
    text: If you have Uranus in the 5th House, you definitely possess creative originality.
      Your hobbies are unusual and interesting. Your desire for independence may make
      love affairs and relationships with children unsettling. Your children may be
      very unique, so much so that neither you nor they can understand the other.
      You are disinterested in society’s social games and are more concerned about
      your own inclinations. Speculation can get you into trouble - be careful. Sudden
      gain and sudden loss are possible. Unexpected gains without any effort on your
      part can come to you, which may generate an attitude within that you just can’t
      lose. Watch out for that. Your love life is unusual, sometimes maybe even wild.
      Your approach to romance and dating may be somewhat cavalier, unconventional
      and/or rebellious. Uranus in the fifth house . Top
  - house: 6
    text: If you have Uranus in the 6th House, you have unique abilities and original
      methods, especially in your work. You may suffer from extreme nervous tension
      and strange accidents on the job. Your appearance and manner of dress are apt
      to be quite unusual. You like the kind of work that has irregular hours, is
      different, and has a lot of variety. You are a good worker, but must watch out
      so that you do not overwork. You can develop clever ideas which will aid you
      in your work. You are at your best when you can be independent and be your own
      boss. You may be impatient with others and can appear to be abrupt to and detached
      from your fellow workers. Strange and unexpected turns in your health can occur.
      Spasmodic health is also a possibility. Many times the cause is simply nervousness,
      anxiety, stress, and tension. Relax. Uranus in the sixth house . Top
  - house: 7
    text: If you have Uranus in the 7th House, your partnerships are unique or unusual,
      usually possessing a wonderful rapport or a total lack of understanding. You
      and/or your partner are generally unconventional and you do things for their
      shock appeal. Plenty of freedom is desired in the relationship and there may
      be a lack of desire for commitment. In fact, maybe you search out special situations
      in your relationships that ensure little commitment. Perhaps you are most attracted
      to those who are already in relationships or who are otherwise "unavailable".
      Because of the uniqueness that exists within your partnerships, it is likely
      that others will not understand them. You may not understand them yourself.
      You meet the most interesting and unconventional people in your life. Any need
      to control the other person in your relationships will probably lead to disaster.
      Partner and you will have to find your own comfort level regarding time and
      attention spent on the other. A lot of elbow room may be required. A relationship
      in which you feel you are free to grow is one that makes it possible for you
      to do so. Any limits or constraints placed on the relationship are likely to
      be met with a certain "hit the road" attitude. Sudden and unexpected turns are
      likely. Perhaps one person is required to be away from the other for long periods
      of time. This position may give many long distance, "casual" types of relationships.
      You probably seek a partner who provides the thrills and spills for you in your
      life. A partner who challenges you mentally and emotionally is desired. Your
      relationships may be lab experiments where you hope to learn who-knows-what.
      Someone who is inventive, individualistic, creative, original, out-going, eccentric
      or radical appeals to you. Your partner may possess considerable personal magnetism
      and occasionally a degree of genius, but eccentricities, erratic tendencies
      and even fanaticism may be present. Your approach to marriage may be highly
      idealistic or utop
  - house: 8
    text: If you have Uranus in the 8th House, you have strong psychic feelings and
      a keen intuition. You perhaps have unconventional ideas about life, sex and
      death, which you do not necessarily reveal. The afterlife is a great mystery
      for you and you may seek to probe for answers. The occult sciences in general
      may intrigue you. You may experience difficulties through nervous tension. Sudden
      loss or gain could come about with other people's resources. There can be an
      unexpected inheritance or financial gain through unusual sources. Be careful
      around electricity and machinery. An interest in healing, perhaps through the
      laying on of hands, attends this position. You may have entertained thoughts
      of suicide in earlier years. Uranus in the eighth house . Top
  - house: 9
    text: If you have Uranus in the 9th House, your thinking, ideas and philosophies
      are original, offbeat, independent and unorthodox. There may be a desire to
      study metaphysics or a fringe religion or foreign culture. Sudden and unexpected
      long journeys are possible. Mental journeys in the form of dreams, visions,
      intuition and prophecies are possible. Your mind ever seeks to expand, gain
      knowledge and journey where it has never gone before. Too much mental activity,
      though, can cause nervousness and perhaps lead to a mental breakdown. Uranus
      in the ninth house . Top
  - house: 10
    text: If you have Uranus in the 10th House, you are not a conformer and do not
      wish a career that is stable, uneventful and commonplace. You are highly independent
      and may wish to be self-employed. Your rebellious nature may cause you to do
      the opposite of what you are told to do in your line of work. Your strong imagination,
      intuition and creativity will be applied to any career you choose. Sudden changes
      in job fortune are probable. Routine work drives you batty. A career in electronics,
      computers, invention, metaphysics or mechanics is possible. Uranus in the tenth
      house . Top
  - house: 11
    text: If you have Uranus in the 11th House, this confers intuition, originality,
      inventiveness and creativity. Humanitarian ideals are important to you. Unusual
      friendships with unusual people are indicated. Friendships, goals and dealings
      with groups can change rather suddenly. You make friends easily, but prefer
      many acquaintances with only a few intimate friends. Your friends may see you
      as being somewhat aloof. You could be quite a rebel or reformer and it would
      be best if you use these energies along constructive lines rather than the opposite.
      Uranus in the eleventh house . Top
  - house: 12
    text: If you have Uranus in the 12th House, you tend to be highly intuitive and
      secretive, with humanitarian ideals. You may have feelings of loneliness. There
      may be nervous difficulties. There is interest in metaphysical subjects. You
      may have unique psychic experiences which you keep to yourself for fear of being
      ridiculed. You have a tremendous desire to feel free and a constant questioning
      of the meaning of life and of the imperfections you see around you. Unresolved
      difficulties in your subconscious mind need to be brought out and disposed of.
      You have a tendency to feel that something is going to "get" you, to sneak up
      on you, if you are not careful. It is as though you always have a sense of impending
      doom. You need to overcome this apprehension. Self-control must be developed.
      Uranus in the twelfth house . Top
  neptune:
  - house: 1
    text: If you have Neptune in the 1st House, you tend to be artistic, idealistic,
      dreamy, procrastinating, psychic, and very (hyper)sensitive to your environment.
      Getting lost in your own imagination can sometimes make you moody, frustrated,
      unstable or impractical. You may be a sucker for the sob stories of those who
      feel down and out. You may enjoy playing the role of savior, or of martyr. The
      day-to-day pressures of the world can drive you away and into your own little
      world. Be sure you do not get lost in it. You still have to live and function
      on this earth plane. Your physical body may be susceptible to all sorts of real
      or imagined ailments. You are like a sponge and can soak up the influences of
      the environments you are in. So be careful what you surround yourself with.
      Watch any medicine you take because a little probably goes a long way for you.
      Perhaps the secret for you is to lose your ego so that you will find yourself.
      Neptune in the first house . Top
  - house: 2
    text: If you have Neptune in the 2nd House, you have a strong imagination and
      psychic sensitivity which can be used to tap your inner talents. You receive
      intuitive hunches and are apt to have vivid dreams. You have an appreciation
      of beautiful objects. You seldom worry about money, which may be just as well,
      since your finances can be complicated and sometimes confusing. This placement
      can tend to make you extremely generous or extremely dishonest. If dishonesty
      is present, you will experience losses through theft, fraud and deception. Do
      everything on the up-and-up and money matters will go smoother. Avoid risky
      speculations and investments. Be completely honest with respect to money matters.
      Neptune in the second house . Top
  - house: 3
    text: If you have Neptune in the 3rd House, you are idealistic and artistic. Your
      mind soaks up information rather than acquiring it by brute force. Your ability
      to visualize and imagine is probably quite pronounced. Flashes of inspiration
      can come to you quite suddenly. There may even be traces of clairvoyance. Perhaps
      you have felt as if you could read people’s minds? Concentration on book work
      may be difficult for you. Did you ever try sleeping with the book under your
      pillow? Possible karmic obligations to siblings or neighbors may need to be
      reconciled. Some feelings of insecurity may cause nervous disorders. You may
      have a tendency to be unreliable or negative. Avoid procrastination and idle
      day-dreaming. Avoid all negative psychic practices and drugs. Neptune in the
      third house . Top
  - house: 4
    text: If you have Neptune in the 4th House, you may experience a sense of inner
      uncertainty, insecurity and confusion. Unexplained fears and anxieties may cause
      you to withdraw from living. You idealize the home environment and it may be,
      in reality, more in your imagination rather than in fact. A spiritual tie with
      one or both parents is likely. A desire to live by the sea is not uncommon with
      this position. You may have vague recollections regarding your true roots and
      this uncertainty may cause difficulties. Remember, with Neptune, things are
      not as they appear and you need to face reality in your home environment and
      with respect to your parents rather than what may be in your imagination and
      sub- conscious. Neptune in the fourth house . Top
  - house: 5
    text: If you have Neptune in the 5th House, you are artistic and creative. You
      have a flare for the dramatic and perhaps love being "on stage". You like playing
      the role of the entertainer. Chaotic love affairs with much confusion can be
      experienced or love affairs just seem to dissolve for no particular reason.
      In matters of love you can be the hopeless romantic or the one who is constantly
      looking for that white knight or princess to sweep you off your feet. Idealism
      is fine, but don’t lose your practicality or let your imagination run away with
      you. Your children may be unusual. Perhaps they require some special care. Great
      sacrifices can be made for children and love interests, but little may be gained
      in return. Neptune in the fifth house . Top
  - house: 6
    text: If you have Neptune in the 6th House, strange things can happen at the workplace
      or to your health. You seek to serve and to perhaps nurse and take care of others.
      Sometimes it may be difficult for you to get started on your work or to work
      logically and systematically in order to get the job done. In your work, you
      may encounter people who are "two-faced", causing you pain and suffering. You
      are extremely sensitive to your workplace conditions and you need pleasant and
      peaceful surroundings. If these are not present, then you may experience unusual
      health difficulties, some of which may be real and some of which are only in
      your head. You are a psychic sponge that absorbs the atmosphere around you.
      Herbal healing or holistic techniques may work better for you than traditional
      medical techniques. You are capable of making great sacrifices in your work.
      Just don’t play the martyr. Neptune in the sixth house . Top
  - house: 7
    text: If you have Neptune in the 7th House, there may be a tendency to idealize
      marriage or the marriage partner. Many sacrifices may be made for the spouse.
      The marriage partner can be spiritually minded, artistic or just plain confusing.
      Communication may be a problem due to your concepts and ideals not coinciding.
      There is the tendency to attract a partner whereby you or they play the role
      of martyr or savior. The feeling may be that your partner "needs" saving and
      that you're the only one who can "save" (change) them. Because of this your
      partner may be an alcoholic or a drug-user. Your imagination and your idealization
      of your partner may be more real to you than what your partner is in reality.
      If this is so, then there will come the day when your blinders are removed and
      you will see their true nature. This then may lead to great disappointment and
      discouragement when you find out that they or you have been living a lie and
      that things are not as they have appeared. With this position you must make
      absolutely sure you are dealing with the hard, cold facts of your relationship
      and not the romantic notions dreamed up from storybook tales. You are likely
      to seek a marriage partner who can provide a source of inspiration and bring
      out your capacity for compassion and loving understanding. There can be a tendency
      to see a prospective partner through rose-colored glasses or to weave imaginative
      fantasies about new contacts or hoped-for encounters. Consequently there is
      a possibility that the partner may not be the type of person conjured up by
      your imagination. There is some tendency to form partnerships based on admiration
      or pity. If your natal Neptune is afflicted, such admiration may have resulted
      from your having been dazzled by glamorous externals, while an over-active sense
      of pity may be exploited by a prospective partner so that you marry out of sentiment
      or misplaced sympathy. Possibilities exist that the partner is very sensitive
      and may need to be treated wit
  - house: 8
    text: If you have Neptune in the 8th House, you are psychic and intuitive, with
      dreams and visions which may be precognitive. You may have extreme sensitivity
      to the feelings of others. If you are not honest, you will suffer financial
      reverses in order to prove the futility of seeking happiness through material
      possessions. An interest in life after death and natural healing through the
      laying on of hands is possible. Be honest and above board in all dealings with
      taxes, insurance and all money matters. Neptune in the eighth house . Top
  - house: 9
    text: If you have Neptune in the 9th House, you tend to be idealistic, reverent,
      mystical and philosophical. You are drawn to ideas that espouse the oneness
      of all life and the idea of the immortal life of the Spirit. Dreams can be very
      vivid and possibly prophetic. If carried too far, your religious or metaphysical
      beliefs could border on fanaticism. Good judgment in these areas can be clouded
      and confused. Exaggeration can be present. Trouble with in-laws may surface
      due to lack of compassion and understanding. Be careful who you choose to follow
      as you may encounter wolves in sheep’s clothing. In your travels you prefer
      to wander around on your own without too much planning or forethought. Strange,
      unforeseen things can occur while traveling long distances. Neptune in the ninth
      house . Top
  - house: 10
    text: If you have Neptune in the 10th House, strange and confusing things can
      happen with respect to your career and your drive to be successful within it.
      Strong idealism attends this position so keep your eyes open with your feet
      on the ground. Your career may involve something artistic, inspirational, humanitarian,
      dramatic, promotional or psychic. The theater, chemistry, psychic activities,
      photography or dealings with drugs are possible career outlets. Your public
      image may have its ups and downs due to forces beyond your control. A feeling
      of rejection by one or both parents is possible. See another interpretation
      of Neptune in the 10th house by Aleister Crowley. Top
  - house: 11
    text: If you have Neptune in the 11th House, you are idealistic and interested
      in the common good. Strong hunches regarding your hopes and wishes are present.
      Because the influence of Neptune is elusive, there may be difficulty deciding
      upon your goals. Just dreaming about them will not bring them about. Friends
      may be weird, wacky, spiritual, unreliable, or deceitful, but probably artistic
      or of a musical bent. Be careful with some friends as they may not be what they
      seem. Some may want to introduce you to drugs or alcohol so be objective and
      clear-headed. Definite, practical and concrete goals with a firm faith in the
      future are called for. Then your dreams can come true. Neptune in the eleventh
      house . Top
  - house: 12
    text: If you have Neptune in the 12th House, you are reflective and intuitive.
      You have psychic ability which operates unconsciously. You may experience intense
      feelings of loneliness and of being held in bondage to a specific person. You
      feel a need to connect with a higher Power and to be part of the oneness of
      all life. There is interest in occult and mystical subjects. Serving those in
      some kind of confinement is a possibility. Serve or suffer may be a keynote
      in your life. Secret enemies may try to undermine you. Forgiveness, love and
      compassion need to be expressed and lived. Neptune in the twelfth house . Top
  pluto:
  - house: 1
    text: If you have Pluto in the 1st House, you are strong-willed, brave, self-sufficient
      and probably enjoy throwing your weight around. Yet you may lack self-confidence.
      Controlling others may become an issue for you. You crave experience and transformation.
      Regeneration is a topic that occupies your thoughts. There is a magnetism that
      surrounds you that draws other people to you, yet you may be a loner whom others
      find difficult to understand. You can be gentle and sensitive, yet will always
      fight for what you believe in. You don't back down from anyone. You are capable
      of great anger under the right circumstances and when this occurs, you can go
      off like an A-bomb. You may be a channel for healing and can perhaps develop
      this ability should you decide. Forgive and forget and don't brood over slights,
      whether real or imaginary. Trying to be a little more flexible wouldn't hurt
      either. Top
  - house: 2
    text: If you have Pluto in the 2nd House, you have financial ability with keen
      judgment, patience, energy, and will. You may possess unusual talents. This
      placement may give an inordinate desire for money and possessions. Watch the
      tendency to view loved ones as possessions. You may see money coming and going
      in order to de-emphasize its importance. Detachment may be necessary. You must
      learn to spontaneously share all possessions with others. Integrity in money
      matters is essential. Others may seek to control your resources and possessions
      or you may be quite demanding and controlling with your own resources, monetary
      and otherwise. Top
  - house: 3
    text: If you have Pluto in the 3rd House, your mind is versatile, inspired, probing
      and original. You perhaps have a keen ability to size up people and circumstances.
      You are probably good at understanding people's true motives. You want to know
      the answers to all your many questions. Research and figuring out puzzles or
      brain teasers may appeal to you. Perhaps you enjoy playing detective. You may
      be searching for that something that will give meaning to your life or searching
      for that area that will help you regenerate yourself or your thinking. Frustration,
      depression or anxiety may arise when the answers you seek are not forth-coming.
      Keep at it! Expressing yourself in writing may help alleviate the tension. This
      may help purify your thoughts, then allow new thoughts to enter. Once your thoughts
      and feelings have been purged, you may want to destroy the material as its purpose
      has been served. Top
  - house: 4
    text: If you have Pluto in the 4th House, you may have a good imagination and
      intuitive ability. There is a desire for a loving home atmosphere, yet power
      struggles and a desire to wear the pants in the family may cause problems. The
      influence of one or both parents is strong for good or ill. Perhaps one or both
      are manipulative or controlling. You may possess an explosive temper due to
      the inner tension at home. You may feel restless in the place of your birth.
      The home may be your place for regeneration. Top
  - house: 5
    text: If you have Pluto in the 5th House, you have unusual talents and hobbies.
      Great creativity and self- expression is possible. Your children may be unique
      and it may be difficult for you to understand them or for them to understand
      you. There may be too much emphasis on sex in romantic relationships and issues
      of power and control can surface therein. There is an inner drive to be creative
      and it would be best if this creativity were not channeled through sex. Find
      a creative hobby instead. Top
  - house: 6
    text: If you have Pluto in the 6th House, great personal transformations can occur
      because of your work or your workplace environment. You may have the desire
      to become involved in workplace issues or labor union goings-on. You strive
      for cooperation and thoroughness in your work habits and you can be a hard taskmaster
      for fellow employees or for the workers under your command. Guard against trying
      to be too controlling of how they work. You have the ability to work long hours
      on nervous energy until your body cannot take any more. You enjoy troubleshooting
      and solving problems that others cannot solve. Detective work on the job is
      fun for you. You have the ability to encourage people to discuss deep-seated
      problems and then analyze the problems logically. There may be an interest in
      healing. You could be a channel for healing or you might simply be a hypochondriac.
      You are apt to unconsciously project criticalness to fellow workers without
      speaking. There may be difficulties through infectious, deep-seated diseases
      or problems in the colon area. Top
  - house: 7
    text: If you have Pluto in the 7th House, control and power issues along with
      feelings of ownership are present with the partner or spouse. Cooperation with
      the mate will need to be learned. A partner may be selected based on that person's
      ability to stand their ground and not give in. A partner such as this could
      make the relationship very combative and competitive rather than harmonious
      and equal-sided. You are inclined to seek a partner who will provide a challenge
      to discover new resources within yourself that will give you the power to transcend
      previous performances and to transform certain aspects of your being. A partner
      who makes you feel growth and intensity is one you seek. There is a tendency
      to admire well developed will power in others, with the result that you may
      attract those who tend to dominate you, possibly feeling that if you have to
      cope with a somewhat overpowering personality you may discover more effectively
      the full extent of your own resources. There are intense feelings and reactions
      in your relationships. You have a need to cooperate with others and expect total
      commitment in your partnerships. Trouble can occur when this same sense of commitment
      is not felt by the other person in the relationship. Top
  - house: 8
    text: If you have Pluto in the 8th House, you possess strong intuition and good
      business sense. You have an analytical mind, with courage, fortitude and an
      interest in the metaphysical world. You may have clairvoyant abilities. There
      is a possibility of an inheritance. There may be concern or difficulty over
      money through marriage or through a business partner. There can be financial
      upheavals and transformation may come through this means. You search for the
      meaning to life and may develop a fascination or interest in death and the afterlife.
      You want to know how the Universe ticks. This position develops insight, self-awareness,
      independence and regeneration. Any tendency to dominate, control, or possess
      others must be dealt with in a positive manner. A strong desire nature will
      need to be overcome if regeneration is to occur. Top
  - house: 9
    text: If you have Pluto in the 9th House, you are intuitive and may be clairvoyant.
      Travel in other dimensions is possible during sleep. There is an inherent interest
      in religion and philosophy. You want to know why and how. There can be the danger
      of such total belief in your own ideas that it borders on fanaticism, with total
      disregard for the thoughts and beliefs of others. Develop tolerance for other's
      beliefs. You search for Truth as a starving man looks for food. You want to
      know everything. Metaphysical experiences are possible and transformation can
      occur through dreams, long distance travel or philosophical insights and revelations.
      You can suffer mental strain from studying too intensely. You must control your
      desire to always be right no matter what. Top
  - house: 10
    text: If you have Pluto in the 10th House, unforeseen activities can affect your
      career. Elements of the world society can directly influence your job or your
      status in the world. You are self-assertive and need to incorporate diplomacy
      and patience into your personality, especially when dealing with the world at
      large. This position can give a desire for power, a desire to retreat from society
      or a desire to be of benefit and service to society. Using power and force to
      get your way will bring your downfall. Use your skills to uplift society and
      the masses. You enjoy working behind the scenes to accomplish your goals. You
      have an instinct for knowing why people do the things they do. Top
  - house: 11
    text: If you have Pluto in the 11th House, loyalty of friends is important to
      you. Some friends may try to be quite controlling of you or you may be quite
      controlling of them. Intensity of friendships really appeals to you. Your friends
      may find you rather charismatic. They perhaps see you as the rebel or the reformer
      or idealist. Friends will come and go as the need for your own growth changes.
      This is all part of the cosmic process. What ceases to grow, dies. This includes
      friendships and all relationships you may have with different groups of people.
      Groups and organizations can play major roles in your regeneration or transformation.
      Your dedication to high ideals can be used for the benefit of all mankind, if
      you apply yourself. You have leadership ability and the will to fight for "causes"
      that are beneficial to others. Top
  - house: 12
    text: If you have Pluto in the 12th House, you feel a need to search for truth
      and wisdom so that you can understand life. Perhaps life has enslaved you in
      some way and you are searching for transformation or regeneration. Occasional
      upheavals in your life come about in order to bring you back to the correct
      path. There is a desire to retreat from society in order to re-analyze your
      life. You can become a champion of the downtrodden masses. Serving others in
      this life may be important for you. You enjoy working behind the scenes. Top
house_cusp:
  aries:
  - house: 1
    text: Aries Rising individuals project themselves with intense energy and primal
      power. If Aries is on the 1st house cusp ( Aries Rising ), your decisiveness
      enables you to act on your ideas the minute they are formed. People with Aries
      rising do not waste time. They are competitive and have the urge to excel in
      everything they do. They must continually prove themselves to themselves through
      action. Top
  - house: 2
    text: People with Aries on the 2nd house cusp make money by starting new projects.
      They expend considerable energy in the monetary area and spend money impulsively,
      sometimes in excess. They may be inclined to ignore the facts of reality. They’re
      constantly searching for new ways to make money. Top
  - house: 3
    text: People with Aries on the 3rd house cusp may be pushy and argumentative about
      their own ideas and theories. They have a tendency to create tensions and instigate
      rivalry among their brothers and sisters. However, they are intellectually creative
      and may open up new ways to express and use ideas. Top
  - house: 4
    text: If Aries is on the 4th house cusp, you are aggressive in matters relating
      to home and family. The home is sometimes a battlefield for emotional spats.
      The home is generally filled with mechanical devices and tools. Top
  - house: 5
    text: If Aries is on the 5th house cusp, you expend much energy in creative activity.
      In the realm of love and romance, you are passionate and aggressive. People
      with Aries on the 5th house cusp usually like sports, especially those involving
      competition and combat (boxing, wrestling, football). These people are dominating
      in their relationships with children, yet at the same time, they may be generous.
      Top
  - house: 6
    text: If Aries is on the 6th house cusp, you are efficient, powerful, and original
      in tackling tasks that would seem impossible to others. Since they accomplish
      things more efficiently than any other sign on the 6th house cusp, these people
      appear to be self-propelled in all that they do. Since they are natural leaders,
      they tend to be a little bossy with their subordinates and coworkers. They extend
      a helping hand when others are in trouble, but they expect those people to get
      the strength and independence they need to keep going on their own. Top
  - house: 7
    text: If Aries is on the 7th house cusp, you can be aggressive in order to gain
      the cooperation and attention of others. You also have the power to motivate
      other people into action without their realizing it. Your partners must understand
      that if they want peace, they need to stay busy and work hard. Top
  - house: 8
    text: If Aries is on the 8th house cusp, you are subject to accidents and fevers,
      which can change your whole life if you aren’t careful. Legacies are often the
      subject of extended litigation. Disagreements arise in matters relating to joint
      finances. Since your opportunity for regeneration is through decisive action,
      your pattern is to initiate projects as well as finish ones that other people
      have started. Top
  - house: 9
    text: If Aries is on the 9th house cusp, you instinctively “know” that all things
      originate in the Eternal. As a result of your visionary thinking, your creativity
      is often expressed dramatically. You don’t want to be held back by traditional
      religious practices. However, you tend to be a crusader for your ideals, and
      you often fight hard for what you believe in. Top
  - house: 10
    text: If Aries is on your 10th house cusp, you act on impulse when it comes to
      work and your public image. If employed, you can easily be hurt by harsh or
      unfair treatment by those in authority. Top
  - house: 11
    text: If Aries is on the 11th house cusp, there is a constant effort to make new
      friends. People with this placement are always switching groups, leaving behind
      old friends who they will meet up with again later. These people tend to organize
      group projects. They are very outspoken about what they want and often try new
      and unusual ways to make their hopes and wishes come true. Top
  - house: 12
    text: If Aries is on the 12th house cusp, impulsiveness and headstrongness can
      be the cause of your undoing, although courage and decisiveness are your hidden
      strengths. You secretly initiate new activities in order to stay ahead of your
      competitors. Top
  taurus:
  - house: 1
    text: If Taurus is in on the 1st house cusp (Taurus Rising), you can express your
      potential for power through your financial dealings, and through structuring
      material and resources. You love the good things of life and create beauty in
      some form. Top
  - house: 2
    text: If Taurus is in on the 2nd house cusp, your practicality and willingness
      to adapt to the methods of business or trade pay off in the ability to earn
      money. However, you tend to dissipate your earnings in luxuries. You attach
      special importance to the tools of the trade. Top
  - house: 3
    text: If Taurus is in on the 3rd house cusp, being slow and deliberate in forming
      ideas, you are stubborn to change your mind once a decision has been made. Your
      thinking is concentrated on moneymaking or on artistic endeavors. Top
  - house: 4
    text: If Taurus is in on the 4th house cusp, since you admire elegant homes, much
      of your financial resources are channeled into creating a beautiful personal
      environment. You like to be surrounded by music and art in your home. The home
      is where your maternal or paternal instinct expresses itself in providing for
      your family. Top
  - house: 5
    text: If Taurus is in on the 5th house cusp, you are sensual and romantic in the
      affairs of the heart. You’re consistent in your love and affection toward your
      children. You invest a great deal of pride in them, especially if their accomplishments
      are greater than your own. You want your children to have the good things of
      life. You gain pleasure from luxurious surroundings and good food. You appreciate
      art and music. Top
  - house: 6
    text: If Taurus is in on the 6th house cusp, you enjoy projects that are beautiful
      and artistic. You will work hard only if you can see a monetary gain from your
      efforts. Your health is generally robust, providing you don’t overeat or become
      self-indulgent in any way. Top
  - house: 7
    text: If Taurus is in on the 7th house cusp, you attract wealthy marriage partners.
      You are cooperative in partnerships but expect some practical gain as a result.
      You spend money on lovely things that have quality. You also spend money on
      your partners and take great pride in the fact that they look good. Top
  - house: 8
    text: If Taurus is in on the 8th house cusp, you will cooperate to help your partners
      earn money, but your love of beauty makes you prone to spend it on adornment.
      You also have the power to generate wealth from sources that are unknown to
      others. People with this placement usually die peacefully, and begin and end
      things peacefully in general. Top
  - house: 9
    text: If Taurus is in on the 9th house cusp, you take a down-to-earth view of
      social concepts and religion and are not likely to change your views on these
      subjects. You insist on fairness and justice in the area of finances and relationships.
      Top
  - house: 10
    text: If Taurus is in on the 10th house cusp, you earn money primarily to support
      the high standard of living that fits your dignified self-image. You desire
      prominence and wealth. Top
  - house: 11
    text: If Taurus is in on the 11th house cusp, you have an attraction for artistic,
      stable, and wealthy people. This is one of the secrets of your own ability to
      amass wealth and financial resources. Very often you invoke the aid of your
      wealthy friends to finance your carefully worked-out plans. Top
  - house: 12
    text: If Taurus is in on the 12th house cusp, youou are likely to be affected
      by conditions from the past that don’t change easily. There is a tendency to
      be more persistent on the unconscious level than on the conscious level. Your
      self-undoing comes from your unconscious materialistic desires. Top
  gemini:
  - house: 1
    text: If Gemini is on the 1st house cusp ( Gemini Rising ), you are an original
      and creative thinker and tend to dominate your circles intellectually. You also
      have the power to visualize your ideas and express them scientifically. Since
      you tend to identify yourself with your ideas, your most dynamic form of expression
      is intellectual. Top
  - house: 2
    text: If Gemini is on the 2nd house cusp, you make money from original ideas and
      practical thinking with respect to material resources. You’re not confined to
      one financial outlet. Top
  - house: 3
    text: If Gemini is on the 3rd house cusp, you like to be known for your originality
      and individuality. You’re intelligent and versatile in expressing ideas and
      thrive on being considered so by others. You like to discuss your ideas with
      relatives and neighbors. However, you need to focus and concentrate your thoughts
      in order to bring them to manifest. Top
  - house: 4
    text: If Gemini is on the 4th house cusp, you may travel a good deal and often
      change your residence. There is usually a large library in your home. You give
      a great deal of thought to domestic affairs. Top
  - house: 5
    text: If Gemini is on the 5th house cusp, in love, passion is not characteristic
      of you. You derive pleasure from intellectual pursuits and prefer intelligent
      companions with whom you can establish brother-sister relationships. You can
      be critical of your loved ones. You produce children of outstanding intellectual
      ability. People with this placement often have twins. Top
  - house: 6
    text: If Gemini is on the 6th house cusp, you are versatile and ingenious in organizing
      your work and can handle several jobs at once. Your fraternal attitude toward
      coworkers and employees is one of the secrets of your management ability. You
      have numerous ideas on how to increase efficiency. Top
  - house: 7
    text: If Gemini is on the 7th house cusp, this frequently indicates that there
      is more than one marriage or partnership, since you often have your eyes on
      greener fields. Even though you are primarily a loner, you attract people who
      are intelligent and versatile, and who can help you in practical ways. You are
      astute and intelligent in public relations. However, you often prefer that your
      partners represent you and your ideas. Top
  - house: 8
    text: If Gemini is on the 8th house cusp, you are full of ideas concerning joint
      finances. You’re often occupied with thoughts concerning death and the affairs
      of the dead (legacies, wills). You are intellectually interested in mystery.
      Top
  - house: 9
    text: If Gemini is on the 9th house cusp, for you, religion and philosophy must
      be practical in applications and logically comprehensible. You may like to write
      about and discuss those matters. You may often be involved in numerous religious
      activities, or subscribe to more than one religion or philosophy. Top
  - house: 10
    text: If Gemini is on the 10th house cusp, you make work in the field of communications.
      You engage in professions that allow you to use both mind and hands to implement
      your original ideas, and these ideas bring you fame and recognition. Top
  - house: 11
    text: If Gemini is on the 11th house cusp, you choose friends who are intelligent
      and ingenious, whose ideas can help you attain the power you seek. You cultivate
      diversity and intellectual stimulation in your friendships. Top
  - house: 12
    text: If Gemini is on the 12th house cusp, your hidden support comes from your
      ability to keep your ideas secret. Thus, you provide your own impetus for growth.
      Yet you have a self-destructive habit of discussing your emotional problems,
      verbalizing what should remain concealed. Top
  cancer:
  - house: 1
    text: If Cancer is on the 1st house cusp (Cancer Rising) , you tend to be emotionally
      volatile. You expend a great deal of energy through your feelings and are romantic
      and dramatic in your emotional expressions. However, your emotions are supported
      by your will. You identify strongly with your family and family-related concerns.
      Top
  - house: 2
    text: If Cancer is on the 2nd house cusp, you acquire money through your adaptability
      and receptiveness to the people around you. You instinctively know what others
      need for growth and nourishment, and by responding to these needs you are often
      able to make money. Thus, your emotional and financial affairs are interrelated.
      Generally, you have something tucked away as a nest egg. You are emotionally
      tied to this and protect it at all costs. Top
  - house: 3
    text: If Cancer is on the 3rd house cusp, a maternal/paternal attitude prevails
      toward brothers, sisters, and neighbors. You tend to travel in connections with
      business and financial affairs. Top
  - house: 4
    text: If Cancer is on the 4th house cusp, you gain deep emotional satisfaction
      from home life. You’re dedicated to your family, which is the base of your operations.
      Top
  - house: 5
    text: If Cancer is on the 5th house cusp, you’re highly emotional and sentimental
      about your loves, enshrining them like rare paintings. You enjoy rich foods
      and tend to be overweight. You derive pleasure from familial contacts and are
      maternal toward your children. Men with this placement attract women who remind
      them of their mothers. Top
  - house: 6
    text: If Cancer is on the 6th house cusp, you tend to word where there are people
      and constant activity; your work often involves civic and community life. Your
      health greatly depends upon your emotional state. When you’re emotionally upset,
      you may experience “butterflies in the stomach,” although this is rarely outwardly
      apparent. Top
  - house: 7
    text: If Cancer is on the 7th house cusp, you’re strongly attached emotionally
      to your spouse or partner. However, the fact that your partner can also be emotionally
      dependent on you presents problems at times. You are also emotional about your
      relations with the public and with close friends. You regard close friends as
      members of your family. Top
  - house: 8
    text: If Cancer is on the 8th house cusp, you are intensely emotional regarding
      your own death. It’s imperative for you to be remembered fondly after you die.
      You must make certain that your affairs are in order and that those you leave
      behind have been provided for. In joint finances, your partner generally earns
      money which provides for your own betterment. Top
  - house: 9
    text: If Cancer is on the 9th house cusp, you’re emotional and tenacious in the
      areas of religion and philosophy. You have foresight, and are psychically perceptive,
      yet you cling to family religion. If you do travel, you prefer to do so by water.
      Top
  - house: 10
    text: If Cancer is on the 10th house cusp, you’re acutely sensitive to your reputation
      and standing in the world. It’s important for you to be considered responsible
      and respectable. In many ways there is a close tie between professional activity
      and the home life. People with this placement often have partners in their profession
      or business. Top
  - house: 11
    text: If Cancer is on the 11th house cusp, you develop unusually strong emotional
      attachments to friends, as well as to the groups and organizations to which
      they belong. Your home can be a place of group activity for your friends. Top
  - house: 12
    text: If Cancer is on the 12th house cusp, you seek seclusion and privacy in your
      domestic environment. You use your home for contemplation and spiritual searching.
      You appear strong and unaffected by criticism, but actually are surprisingly
      moody and emotionally vulnerable. You rarely show how deeply hurt you are by
      rejection and rebuff. Top
  leo:
  - house: 1
    text: If Leo is on the 1st house cusp (Leo Rising), you project yourself with
      dignity, energy, and will, but at times you are abrupt and overbearing. You’re
      determined to express yourself wherever you see fit, and will sometimes enter
      into and dominate a situation without being invited. Top
  - house: 2
    text: If Leo is on the 2nd house cusp, you express power through financial matters,
      but you want your money to be used for your children, family, and home. You
      generally earn money by being placed in positions of authority. Top
  - house: 3
    text: If Leo is on the 3rd house cusp, you express power through creative thinking
      and invest your ideas with great energy. Thus, you think in large and dramatic
      terms. Your mental ingenuity is often expressed in art. Your journeys are likely
      to have a pleasurable or creative purpose; you tend to travel to see loved ones,
      or romantic lovers. Top
  - house: 4
    text: If Leo is on the 4th house cusp, you express your power through the home
      and family. Generally, your home is a showplace through which you express your
      creativity and status. You entertain lavishly, and those who come into your
      home are treated with warmth and love. Top
  - house: 5
    text: If Leo is on the 5th house cusp, you’re ardent in love. You identify strongly
      with your children and you want to be proud of them. Your constant flow of creative
      energy is often expressed in art. You like to excel in sports and competitive
      games. You can be lucky in speculation, although as a rule you do not engage
      in it. Top
  - house: 6
    text: If Leo is on the 6th house cusp, most of the time Pisces will be rising.
      These usually meek individuals may be quite domineering over co-workers and
      subordinates; they have a feeling of authority where work and services are concerned.
      They glory in the sacrifices they must make in their profession and service.
      Their illnesses are often psychosomatic and are used to attract attention. They
      tend to be low in vitality because the Neptune influence on their solar First
      House makes them dissipate their energy. Top
  - house: 7
    text: If Leo is on the 7th house cusp, you attract marriage and business partners
      who are powerful and well established, and occasionally dominate you. However,
      you’re very independent, and this domination is never carried to the point of
      suppression. Your marriage partners are generally amorous and have their own
      place in the sun. Top
  - house: 8
    text: 'If Leo is on the 8th house cusp: Since Leo, the sign ruled by the sun,
      is on the eighth house, people with this placement live a long time. (The sun
      is the giver of life and it holds off death.) Even if you are generous, you
      like to control joint resources. You also like to control the dispensing of
      the goods of the dead. Often, people with this placement are executives in insurance
      companies. Top'
  - house: 9
    text: If Leo is on the 9th house cusp, you take long journeys, physically or mentally.
      You don’t appear to want fame, but your subconscious mind and your philosophy
      are somehow geared to attaining it and to achieving a position of importance.
      You give your philosophy the power of your being. Your eyes are always on distant
      goals. Top
  - house: 10
    text: If Leo is on the 10th house cusp, you’re ambitious in your profession and
      proud of your standing in the community. Those with this placement often achieve
      positions of leadership and authority and are admired for their accomplishments.
      Top
  - house: 11
    text: If Leo is on the 11th house cusp, an external source of strength and security
      must be established. Therefore, you cultivate friendships with influential people
      of genius and creativity, since your own creative self-expression is often linked
      with these friends. Top
  - house: 12
    text: If Leo is on the 12th house cusp, you possess astonishing strength that
      is not apparent until you are tested. This depth of willpower is your unconscious
      support. Your self-undoing may come from pride and hidden egotism. Top
  virgo:
  - house: 1
    text: If Virgo is on the 1st house cusp (Virgo Rising), your mental acuteness
      is expressed in practical affairs. You are systematic and well organized in
      developing ideas and executing them. No detail is too small for you to notice
      or explain, and your success is due to this careful attention to fine points
      and details overlooked by others. Perfection is your goal, and there are no
      flaws in what you do. Quality supersedes quantity. Top
  - house: 2
    text: If Virgo is on the 2nd house cusp, since you like teamwork in business,
      you will include your friends in financial plans, or perhaps make your money
      through large corporations or group endeavors. Top
  - house: 3
    text: If Virgo is on the 3rd house cusp, You’re precise in speech, letter writing,
      and the formation of ideas, these ideas always being practical and workable.
      Journeys and short trips are meticulously planned and organized. However, you
      are critical of brothers, sisters, and neighbors. Top
  - house: 4
    text: If Virgo is on the 4th house cusp, you prefer to (and often do) work at
      home. You serve your family and are fastidious and discerning in the home. Like
      the Moon, you move around constantly. If possible, you combine visits with financial
      gain. Top
  - house: 5
    text: If Virgo is on the 5th house cusp, you express power through careful, analytical
      thinking and close attention to detail. You’re a perfectionist in social matters,
      making certain that everything is in its proper place, scrupulously organized
      to the last detail. There is a tendency to be overly critical in affairs of
      the heart. You want everything to be so perfect that your loved one becomes
      ill at ease under your constant scrutiny. Top
  - house: 6
    text: If Virgo is on the 6th house cusp, care and precision characterize your
      work, and in many respects it’s of superior quality. Yet you often leave something
      unfinished because your perfectionist tendencies make it difficult for you to
      complete a task on time, or because your enthusiasm dies down. Top
  - house: 7
    text: If Virgo is on the 7th house cusp, you attract hardworking, efficient, and
      exacting partners who help you manage your practical affairs. Top
  - house: 8
    text: If Virgo is on the 8th house cusp, your concern for matters of health and
      death makes you insurance-minded. You’re always alert in situations of danger
      where accidents could occur. You attract a partner who helps to expand the family
      income with practical ideas and service. Top
  - house: 9
    text: If Virgo is on the 9th house cusp, your philosophy is based upon efficiency
      and hard work. You have practical ideas that can be utilized within the existing
      social structure. Any philosophy you respect must be consistent in every detail.
      Some individuals with this placement have fine legal minds, due to the awareness
      of detail and capacity to do research that this placement gives. Top
  - house: 10
    text: If Virgo is on the 10th house cusp, you are usually particular about your
      public image. You appear circumspect, efficient, and organized and in your professional
      role may seem cold, aloof, and critical. Top
  - house: 11
    text: If Virgo is on the 11th house cusp, you exert yourself for your friends,
      especially those who need help. You cultivate friends through your work, and
      utilize the practical ideas and skills of your associates. Top
  - house: 12
    text: If Virgo is on the 12th house cusp, you tend to bring about their own downfall
      by excessive worry and nagging about trivial points. However, your hidden support
      is the ability to devote meticulous attention to secondary details that others
      may well overlook. The underlying base of your endeavors is well planned and
      organized. Top
  libra:
  - house: 1
    text: If Libra is on the 1st house cusp (Libra Rising) , you project your individuality
      through cooperation with other people; your personality must be focused on and
      mirrored in those with whom you cooperate. Your actions express beauty and grace,
      along with discipline, sternness, and a strong sense of justice. Your strongest
      virtue is your ability to see any matter from the viewpoint of the people with
      whom you are dealing. You do not like to be alone; you feel lost when you’re
      forced to rely entirely on yourself. Top
  - house: 2
    text: If Libra is on the 2nd house cusp, you tend to get involved in ventures
      with a partner, often the spouse. You have the ability to attract the money
      necessary to provide the beautiful and good things of life. The pattern of acquiring
      these things is irregular, however, since they you between frugality and extravagance.
      Top
  - house: 3
    text: If Libra is on the 3rd house cusp, you express your ideas gracefully. You’re
      friendly and fair with brothers, sisters, and neighbors. They like to travel
      in luxury. If you’re a writer, you like to have partners in your literary endeavors.
      Top
  - house: 4
    text: If Libra is on the 4th house cusp, you cultivate art, beauty, and refinement
      in the home and are emotionally attached to your household objects. You consider
      the family a partnership and insist on strict justice and fairness for all members;
      otherwise emotional problems arise that will put everything out of balance and
      affect the peace of the household. Top
  - house: 5
    text: If Libra is on the 5th house cusp, partnership is the channel for your creative
      power. You are attracted to people of refinement, grace, and balance. You derive
      great aesthetic pleasure from listening to music and enjoy intellectual discussion
      in social interchange. You have artistic ability of which other people are usually
      unaware; your artistic creativity is as much mental as emotional. Top
  - house: 6
    text: If Libra is on the 6th house cusp, you seek harmony with your co-workers,
      and this is probably one reason for your financial success. As an employer you
      are just and treat your employees as equals. Top
  - house: 7
    text: People with Libra on the 7th house cusp often marry without considering
      the major factors involved, and strife is a likely result. They tend to choose
      gentle and vulnerable marriage partners. Their mates are usually skilled in
      public relations and intent on presenting a good image to the world. Top
  - house: 8
    text: People with Libra on the 8th house cusp often have partners who contribute
      to joint resources. You enjoy the experience of working with others to devise
      better methods of making money. You also benefit from insurance and legacies.
      Top
  - house: 9
    text: If Libra is on the 9th house cusp, your philosophy and religion are based
      on the harmonious and beautiful. You like to travel for pleasure with partners
      or dear friends. Many people with this placement will marry in foreign countries
      or marry people of foreign birth. They tend to marry people of education and
      refinement. Top
  - house: 10
    text: People with Libra on the 10th house cusp often have partners in their professions.
      They are charming and skillful in winning over people who are in positions of
      power and thus gain promotions. However, they possess a strong sense of ethics
      in professional matters, and usually have good reputations and standing in the
      community. Top
  - house: 11
    text: If Libra is on the 11th house cusp, you often obtain your goals by surrounding
      yourself with unusual, attractive, artistic, and gracious friends who are stable
      and prosperous. You are likely to marry a friend, or a partner's friend. Top
  - house: 12
    text: People with Libra on the 12th house cusp who enjoy the seclusion of places
      of beauty are more refined and gentle than they would have one believe. Their
      hidden strength is their innate sense of justice and fair play, but their self-undoing
      may come from their unconscious desire for luxury. Top
  scorpio:
  - house: 1
    text: If Scorpio is on the 1st house cusp ( Scorpio Rising ), you project yourself
      with energy and willpower and are willing to stake your life to accomplish your
      aims. It’s futile to try to convince you that something cannot be done, since
      you will do it or die trying. You fortify your objectives with a tremendous,
      fixed, emotional intensity. You have the ability to draw on hidden sources of
      power to reach your goals. Top
  - house: 2
    text: If Scorpio is on the 2nd house cusp, you are resourceful and energetic in
      your means of making money. You have the ability to transform worthless materials
      into something of real value. You spend your earned money at a rapid rate. Nevertheless,
      you’re more concerned that your possessions have aesthetic than monetary value.
      Your partners often provide the money for elegant objects to satisfy your taste.
      However, you readily share these possessions with your partners, as well as
      with your friends. Top
  - house: 3
    text: If Scorpio is on the 3rd house cusp, your speech and communication style
      is brief and to the point, and frank. You are energetic, extremely resourceful,
      and creative in your thought process. Words well said function as a healing,
      soothing balm for you, and are beautiful music to your ears. Top
  - house: 4
    text: If Scorpio is on the 4th house cusp, it’s in your nature to do a lot of
      growling around your family (most people with this placement have Leo Rising).
      But the privilege to growl is confined to the king (you). Outsiders should not
      step on the toes of any member of your family or they will know what it is to
      have a lion at bay. Often there is a great deal of activity in the basement
      of your home (or your den, or other private room). You need your own private
      ‘den’ somewhere. Top
  - house: 5
    text: If Scorpio is on the 5th house cusp, your children are subjected to intense
      emotionality. Although when it comes to your children, you’re very generous
      and provide it all, your excessive concern may lead to domination if it’s not
      controlled. You tend to be jealous of your loved ones. You’re extremely sensual
      in your romantic life. Actors with this cusp overlay pattern express great emotional
      intensity on stage. Top
  - house: 6
    text: If Scorpio is on the 6th house cusp, you have to regenerate yourself through
      the areas of work and service. Only by making your ideas effective in a practical
      way can you transform yourself and get a new start in life. This cusp overlay
      pattern usually means you have Gemini Rising. Gemini rules the nervous system,
      and this Sixth House placement of the highly emotional Scorpio indicates that
      the expression or repression of desires strongly influences your health. So
      there is a necessity to use the mind in such a way as to improve the health.
      Top
  - house: 7
    text: If Scorpio is on the 7th house cusp, you are attracted to power and status.
      You seek energetic partners, those who excel in creative expression and the
      power to accomplish. However, you must guard against jealousy, combativeness,
      and possessiveness with partners. Coinciding with the Scorpio need for regeneration
      where partners and the public are concerned is the need for spiritual detachment.
      Top
  - house: 8
    text: If Scorpio is on the 8th house cusp, you often have secrets and conflicts
      with respect to your partner’s finances. There are likely to be problems concerning
      affairs of the dead, such as wills and legacies. Top
  - house: 9
    text: If Scorpio is on the 9th house cusp, you’re a religious and philosophical
      crusader, often engaging in arguments over religious beliefs. If you’re involved
      in litigation of any sort, there is generally a great deal of fiery protest.
      Top
  - house: 10
    text: Historically, many with Scorpio on the 10th house cusp (Aquarius Rising)
      have been revolutionaries, since they are at odds with the established regime
      or those who have authority over them. Aquarius Rising individuals do not wish
      to dominate or be dominated. Their opportunities for self-renewal come through
      their professions, and often acclaim follows. Top
  - house: 11
    text: If Scorpio is on the 11th house cusp, you tend to surround yourself with
      dynamic, aggressive, and powerful friends, who can handle many of the difficult
      jobs you are too reserved to tackle. You have your private source of agents
      to carry out your purposes or wishes. You seldom choose weak individuals as
      friends. Top
  - house: 12
    text: If Scorpio is on the 12th house cusp, your hidden support is your resourcefulness.
      You’re able to perceive as valuable things that others have overlooked. You
      also know how to cultivate hidden talents in others. Your downfall can be caused
      by secret resentments and concealed love affairs. Top
  sagittarius:
  - house: 1
    text: If Sagittarius is on the 1st house cusp ( Sagittarius Rising ), you project
      yourself with optimism. Your ambitions are geared to large-scale goals. You
      appear to be friendly, interested, and jovial. However, you have a tendency
      to take things for granted and to think solely in terms of your own affairs
      and perspective. Your power comes from your ability to influence other people
      to subscribe to a system of thinking that is arranged to provide you with all
      the advantages. Nevertheless, your optimism is a source of inspiration to those
      with whom you have contact. Top
  - house: 2
    text: If Sagittarius is on the 2nd house cusp, generally, you have good luck in
      financial matters and know how to make money multiply. You expand your activities
      through money, and there are usually adequate financial resources to further
      your ends. You may provide financial support for religious and educational institutions.
      Economic Theorists often have this cusp overlay. Top
  - house: 3
    text: If Sagittarius is on the 3rd house cusp, you are philosophic and visionary
      in expressing your thoughts and ideas. You’re concerned with religion and social
      values, and you rank ideas in terms their usefulness in the larger social order.
      You’re generous toward brothers, sisters, and neighbors, even though you may
      be separated from them. Many times, your short trips, whether mental or physical,
      take you to places you’ve never been. You frequently receive messages from and
      communicate with people in faraway places. Top
  - house: 4
    text: If Sagittarius is on the 4th house cusp, a spacious and comfortable home
      is important to you. You like to provide a place for everything and see to it
      that everything is in its place. While you treat visitors generously, you are
      especially generous with your own family. Your family, indeed, usually gets
      along better than most. Top
  - house: 5
    text: If Sagittarius is on the 5th house cusp, it’s important to you to provide
      the best for your children, even to the extent of spoiling them. You’re artistic
      and creative, and usually flamboyant. You enjoy giving lavish parties and will
      spend your last cent to present a spectacular evening. Involvement in sports
      or religion is characteristic, since one or both is a source of great pleasure
      for you. You especially like religious and philosophical dramas that give you
      insights into life’s significance. Top
  - house: 6
    text: If Sagittarius is on the 6th house cusp, since you’re generous in helping
      others, your spiritual self is able to mature through service. However, you
      must be free to follow your own inspiration in work. You have a great belief
      in faith healing and the power of positive thinking. You will work hard and
      selflessly for others, believing that if you help one, you help all. Top
  - house: 7
    text: If Sagittarius is on the 7th house cusp, you tend to emphasize ethical,
      religious, and philosophical values when choosing personal affiliations. You
      are usually lucky in marriage and have good relations with the public. Top
  - house: 8
    text: If Sagittarius is on the 8th house cusp, there is much legal activity in
      regard to wills, insurance, or other people’s money. Individuals with this placement
      often profit through inheritance. Your partner is usually financially stable,
      and useful in your progress toward the next green field. Top
  - house: 9
    text: If Sagittarius is on the 9th house cusp, you have strong, dedicated religious
      (or philosophical) beliefs, which generally follow conventional patterns. There
      is a natural interest in philosophy and higher education. You’re always longing
      for “greener pastures” and have periodic fits of wanderlust. Top
  - house: 10
    text: If Sagittarius is on the 10th house cusp, you can succeed as an executive
      who has a great deal of vision, but you’re not always practical. This cusp overlay
      is typical of those who work in the fields of education, religion, and travel,
      achieving fame in these areas through their religious and spiritual accomplishments.
      You like to be considered a philanthropist, and are generous in your professional
      contacts. Top
  - house: 11
    text: If Sagittarius is on the 11th house cusp, you enjoy famous and optimistic
      friends who inspire you to greater accomplishments. People with this cusp overlay
      usually have numerous friends. You join many large organizations which help
      you to expand personally. Top
  - house: 12
    text: If Sagittarius is on the 12th house cusp, when you’re alone and removed
      from the business world, you are philosophically oriented. Your philosophy of
      life is the hidden support guiding and inspiring your thinking. Your undoing
      may come as a result of lofty aspirations which you are unable to fulfill in
      your present circumstances. Top
  capricorn: []
  aquarius:
  - house: 1
    text: If Aquarius is on the 1st house cusp ( Aquarius Rising ), you’re original,
      creative, independent, wishing to make your own unique contribution to the common
      good. At the same time, you’re fun-loving, people oriented, and friendly in
      an impersonal way. You’re modest and don’t like to call undue attention to yourself.
      You would rather be loved than admired. You find your source of power in group
      activity within a close circle of friends. Top
  - house: 2
    text: If Aquarius is on the 2nd house cusp, you make money in original and unusual
      ways through groups and organizations. People with this cusp overlay are often
      associated with corporate enterprises, achieving financial success by producing
      the most costly innovations and the most ingenious techniques in their fields.
      Top
  - house: 3
    text: If Aquarius is on the 3rd house cusp, you’re able to communicate ideas in
      exciting and ingenious ways. Your ideas come in flashes of intuition, but you’re
      capable of putting them to practical application. You’re progressive in thought,
      insisting that ideas have a practical function based on values that have stood
      the test of time. You think in humanitarian terms. Unusual and peculiar relationships
      exist with brothers, sisters, and neighbors, who come unexpectedly in and out
      of your life. Top
  - house: 4
    text: If Aquarius is on the 4th house cusp, the home environment is unusual and
      distinctive. As a rule, for people with this cusp overlay, there is something
      out of the ordinary about your home, family, or both. Rather than visiting your
      friends, you like them to visit you. Top
  - house: 5
    text: If Aquarius is on the 5th house cusp, you also like exciting and unusual
      loves. A great source of pleasure comes from the study of unique things, friends,
      and group activities. Your children are a peculiar mixture of originality and
      mental discipline, but your children’s bodies are not always as strong as the
      will that is expressed through them. In art and the theater, structure is especially
      important to you, and you enjoy pieces that are both unusual and dramatic. Top
  - house: 6
    text: If Aquarius is on the 6th house cusp, in your work, you’re humanitarian,
      creative, original, yet methodical, employing original techniques. You treat
      coworkers as friends and enjoy group projects. However, you lose interest in
      a project if all the group members are not willing to see it through to its
      completion. Top
  - house: 7
    text: If Aquarius is on the 7th house cusp, you’re humanitarian in public relations
      and enjoy creating the image of altruism. You have an instinct to centralize
      things in partnerships; if you’re married, you want to know, for no rational
      reason, all whereabouts and activities of the spouse. The king must know what
      his queen is up to! Top
  - house: 8
    text: If Aquarius is on the 8th house cusp, you’re interested in the spiritual
      side of life. Many people with this cusp overlay have ability as mediums. They
      are uniquely connected with the goods of the dead. When friends pass away, the
      loss stirs them deeply, more than they demonstrate outwardly. Top
  - house: 9
    text: If Aquarius is on the 9th house cusp, there is a tendency to be progressive,
      unusual, and freethinking in matters of religion, philosophy, and higher education.
      You like to associate with people involved in these fields. You’re curious about
      foreign cultures. Since inspiration comes in sudden flashes, you go on long
      journeys suddenly, without much preparation. Top
  - house: 10
    text: If Aquarius is on the 10th house cusp, there is a tendency to work in groups
      where matters of profession are concerned; hence, involvement with large corporations
      and group endeavors. You like to have the reputation of being associated with
      prominent and stable, yet unusual and ingenious, people. Top
  - house: 11
    text: If Aquarius is on the 11th house cusp, you’re capable of establishing many
      friendships and working well in groups, especially with young people. However,
      your individualism sometimes prevents you from having many friends. You are
      also erratic in your associations. Top
  - house: 12
    text: If Aquarius is on the 12th house cusp, you can bring about their self-undoing
      by burdening your associates with your problems and alienating your friends
      by requiring constant sympathy and support. On the positive side, your spiritual
      rapport with your friends can be your hidden support. You have an unconscious
      desire to serve humanity and a universal awareness that enables you to tap the
      deeper levels of consciousness. Top
  pisces:
  - house: 1
    text: If Pisces is on the 1st house cusp ( Pisces Rising ), you’re sympathetic,
      adaptable, ethereal, and visionary. Your achievements are the result of your
      sensitivity to the subtle currents of your surroundings. Your mystical insight
      allows you to penetrate the subtleties of human nature. They also have artistic
      and musical ability. Top
  - house: 2
    text: If Pisces is on the 2nd house cusp, there is likely to be a laxity and impracticality
      in professional and money matters due to excessive generosity. However, it’s
      this generous spirit that often brings you good luck financially. You love the
      beautiful and good things of life, although this appreciation never makes you
      greedy. Top
  - house: 3
    text: If Pisces is on the 3rd house cusp, you may be surprisingly cryptic and
      highly emotional in their thoughts and communication. Very often their ideas
      are based upon intuitive insights. You organize your plans and ideas secretly.
      You also like to be alone when doing mental work. Top
  - house: 4
    text: If Pisces is on the 4th house cusp, the home is often a place of retreat,
      set aside for retrospection. Sometimes their houses are provided by institutions;
      they may live in parsonages, communal homes, university dorms, etc. Either way,
      they enjoy privacy in their homes. Top
  - house: 5
    text: If Pisces is on the 5th house cusp, you’re surprisingly sentimental in affairs
      of the heart; you serve your loved ones selflessly. Your children and your lovers
      are often a source of disillusionment to you. You gain pleasure from seclusion
      and from the study of mysticism. Top
  - house: 6
    text: If Pisces is on the 6th house cusp, circumstances in work and service require
      your unselfish devotion. You’re sympathetic to co-workers and employees. Sometimes,
      however, you assume more work than you can effectively handle, thereby creating
      confusion and problems. You may become a hypochondriac if you’re looking for
      an escape from your professional responsibilities. Your health is dependent
      upon your emotional state of being. Top
  - house: 7
    text: If Pisces is on the 7th house cusp, partners are often the avenue by which
      you expand into new fields; partners enhance your human understanding and emotional
      involvement. You attract people who are not nearly so well organized as you
      are. Top
  - house: 8
    text: If Pisces is on the 8th house cusp, even though you know that death ultimately
      comes to all people, you don’t dwell on the idea of dying. Conversely, you do
      everything possible to postpone the final day. Males especially, with this cusp
      overlay, are frequent pill poppers, even if the pills are vitamins and minerals.
      Generally there are strange conditions concerning inheritances. For many with
      this cusp overlay, their inheritances are dissipated even before they receive
      them. Top
  - house: 9
    text: If Pisces is on the 9th house cusp, religion plays a dominant role in your
      life, and your beliefs have a mystical connotation. Insights that seem to come
      from heaven help them solve your problems. Many with this cusp overlay (Cancer
      Rising) have written books on mystical subjects that have emotional appeal.
      They like to take journeys by sea. Top
  - house: 10
    text: If Pisces is on the 10th house cusp, you tend to be “otherworldly” and visionary,
      and not always practical with regard to work and public reputation. You’re elusive
      and hard to pin down in professional matters. Peculiar conditions are sometimes
      associated with your job and reputation, and there is always an element of mystery
      in your professional activity. Top
  - house: 11
    text: If Pisces is on the 11th house cusp, your compassion and sympathy is expressed
      by generosity to your friends. But friends can be a source of disillusionment
      to you if you’re unwise in your choice of friends. Top
  - house: 12
    text: If Pisces is on the 12th house cusp, you have an unconscious spiritual wisdom
      that is not apparent on the surface. You possess an intense empathy for humankind,
      yet at times you feel alone. Confusion on the unconscious level may sometimes
      be your undoing. Top
