planet_in_sign:
  sun:
  - sign: aries
    text: Aries sun natives can be inspirational, courageous, enthusiastic, original,
      independent, impatient, aggressive, headstrong, selfish, self-centered, and
      impulsive. The Aries person’s energies are directed toward building a new individuality,
      thus all the Aries’ energies are directed towards themselves and what they want.
      An Aries likes roles where their leadership abilities are put on display. Aries
      natives have executive and organizing ability which is mainly directed in starting
      things. Sustaining projects is not their strength, but initiating projects is.
      The tendency to "damn the torpedoes" and ram full-speed ahead must be controlled.
      Aries natives are capable of great accomplishments if they learn how to constructively
      use their abundant energies. Aries natives are naturally enthusiastic and are
      always ready for activity and competition. They are inspiring to others because
      of these tendencies. Ideas and creative projects seem to flow from them in a
      never-ending stream. They are full of energy and never lack courage. Because
      Aries natives can be pretty self-centered, they must remember that other people
      may have good ideas and can assume responsibility and leadership roles, too.
      The natural tendency for an Arian is to stand alone and do everything themselves.
      But cooperation with others can be very effective in getting things done to
      the end rather than simply starting things and quitting before completion. Aries
      natives have a tendency to start a project, then to suddenly lose interest in
      it if progress is too slow or things have become too complicated. Aries natives
      are very straight-forward and are neither subtle nor devious. They say what's
      on their mind and they pull no punches. They don't hold grudges and although
      they can get quite angry, they do not hold it in and stew about what bothers
      them. They blow in and out like some great Midwestern thunderstorm. It may be
      violent while it lasts, but it is usually over quickly. Aries natives are prone
      to headache
  - sign: taurus
    text: Taurus natives are generally strong, quiet, deliberate, practical, exacting,
      determined, persistent, persevering, compassionate and loyal. They like getting
      their hands on their work, building things, and seeing the tangible, practical
      results of their effort. Routine work does not bother them as long as the end
      result is useful and serves some concrete purpose. Possessions and material
      things are usually of great significance to Taurus natives. This is because
      they don't feel emotionally secure unless they can see and touch the objects
      they own. This intense need to possess and enjoy with the senses can drive Taurus
      natives to be extremely productive or extremely acquisitive. Lesser evolved
      Taurus natives can treat people as objects or possessions, thus leading to difficulty
      in relationships. Taurus people work at a slower pace than most, but they always
      finish whatever projects they start. Because of this, they are reliable, trustworthy,
      careful and steadfast. They are better at sustaining what others have started
      rather than starting things themselves. Taurus natives can be lead, but never
      pushed. It takes a lot to make a Taurus mad, yet if they are pushed over the
      edge, well, all heck can break lose. Simply imagine an angry bull and you know
      what a Taurus is capable of when he is pushed too far. You know the saying about
      a bull in a china shop, right? When angered, Taurus natives need plenty of time
      to cool down. It is best to just leave them alone. You will know when things
      are out of their system. With anything, Taurus natives need time to assimilate
      and mull things over. Don't rush them or push them. Taurus natives are slow
      to change their opinions, but once changed it is very difficult to change them
      back. People tend to feel secure around Taurus natives. In times of crisis,
      they are generally cool and collected and have the patience and ability to come
      up with practical solutions to problems. Taurus natives hate pain and being
      sick. Taurus natives have a lo
  - sign: gemini
    text: Gemini natives are friendly, clever, talkative, versatile, curious, perceptive,
      intuitive, and logical. At times, they can also be quite contradictory, restless,
      two-faced, critical, and impatient. Gemini people enjoy and need work that includes
      a great deal of variety. They love to do several things all at the same time,
      sometimes making them late for appointments. They abhor boredom. Gemini natives
      tend to flit from one experience to another, gathering in all types of information
      along the way, but seldom getting to the depth of any subject. They go broad
      and not deep. Persistence is not their strong suit. Gaining knowledge and disseminating
      it is their real talent. Hence, they make wonderful salespeople or teachers
      if they stick around long enough to get all the facts instead of only half the
      story. Even if they do not possess all the facts, since they are never at a
      loss for words, they will continue with their story as if they did have all
      the facts. It is important for a Gemini natives to seek intellectual satisfaction.
      Mental stagnation turns them off, so they read extensively and communicate widely
      in order to satisfy this longing for mental stimulation. This discontent can
      make them either very ambitious, or it can incline them to jump from one thing
      to another, searching for the greener grass which never appears. Gemini natives
      usually think quickly on their feet and have the ability to use the right words
      in any situation. They possess tremendous wit and a good sense of humor. Other
      people may have difficulty in keeping up with their rapid change of subjects.
      Because Gemini natives think so quickly, they often finish other people's sentences
      for them. This can be most frustrating for the person trying to express their
      own thoughts. There is a need to learn how to control the tongue and allow slower
      people to express their own opinions and ideas. Since Gemini natives have the
      capacity to see both sides of any issue, they may fluctuate back and forth betwee
  - sign: cancer
    text: 'Cancer natives have a strange way of moving through life in a sideways
      manner, never approaching life head-on, but always from the side. They generally
      do not tackle anything straight away, but always from the flank. Emotionally,
      they are up one minute and down the next. These mood swings are sometimes difficult
      for others to understand and deal with. Cancer natives are tenacious, sympathetic,
      industrious, sociable, thrifty, and protective. They can also be argumentative,
      sensitive, emotional, martyr-like, intuitive, psychic, and patriotic. Cancer
      natives respond to life through their emotions rather than through their minds.
      They tend to absorb the emotional vibrations of wherever they''re at, so it
      is important to always be in positive environments. Because they live in their
      feelings, they unconsciously seek sympathy and attention and affection from
      others. They have a strong need to feel secure. Home and family bring the highest
      sense of security. Because of all this, they want to be first with those they
      love or they are very unhappy. Cancer natives must learn to release their loved
      ones to live their own lives. Cancer natives are well-known for changing - their
      minds, their moods, anything. Since they usually possess a slower moving life
      force, they are usually less active than others. In order to be active, they
      must first motivate their mind. In general, they dislike exercise. As a consequence,
      they may become out of shape and gain weight in later years. Cancer natives
      most often have excellent memories. This causes them to reminisce about the
      past and how things were done then. They are generally pack rats, saving everything,
      especially if it has some sentimental value. This gives a sense of security.
      Cancer natives are home loving, fond of family life and domestic tranquility,
      enjoyers of travel and adventure, quietly tenacious and hard working for the
      welfare of the family. No matter how far they may roam, they always want a home
      to come back to. They may '
  - sign: leo
    text: Leo natives are dignified, courageous, affectionate, powerful, generous,
      playful, optimistic, ambitious, loyal, and cheerful. On the negative side, though,
      they can be quite demanding, intolerant, domineering, lazy, closed-minded, and
      self-centered. They choose to do things that give them wide scope for creativity,
      organizing, and leadership. Although appearing strong on the outside, most Leos
      are inwardly sensitive and their feelings are easily hurt. When this occurs,
      they can turn on the object of their affection, when their pride is hurt. Leo
      natives have a decided flair for the dramatic and they enjoy telling stories,
      being the center of attention, having a good time, and running the show. Mean
      and cruel acts are generally beneath them, but they do not hesitate to use force
      when needed. No matter what their actions, they always have the belief that
      whatever they do is for the other person's benefit. If a Leo is angered, he
      immediately goes into his kingly role, "mounting his throne" and quickly putting
      the opposition or challenger in their proper place. Leos literally roar at people
      when they are angry. But once their tirade is over, they forgive and forget
      and never hold a grudge. At their best, Leos are affectionate, cheerful, optimistic
      people who can be counted on to bring sunshine into other people's lives. They
      are exceptionally generous. Money appears to slip through their fingers as if
      it were grains of sand. And, like the sand, they have no idea where it has gone.
      Leos usually have vitality and good health, with strong recuperative powers.
      When they are ill, they have a tendency to run high fevers. They are seldom
      depressed, but when they are, they are devastated. Fortunately, their resilient
      powers are excellent, so they are soon sunny and happy again, unless their heart
      has been broken. That is the one thing a Leo has difficulty in overcoming. This
      can actually lead to physical troubles with their own heart. Leos need to admire
      their marriage partner.
  - sign: virgo
    text: 'Virgos desire purity and perfection in all they are and all they do. They
      are generally reserved, shy, analytical, discriminating, precise, industrious,
      systematic, considerate, punctual, and reliable. Virgos are hard workers who
      usually have a great deal of common sense and are practical, with a flair for
      detailed work. On the negative side, though, they can also be aloof, skeptical,
      picky, sarcastic, depressed, critical, pessimistic, whiny, and self-centered.
      Virgo natives are happy when they can work with a lot of details, usually of
      a technical or analytical nature, in and for the service of others. They do
      not have to be the boss as service is more important than leadership. Virgo
      natives have curious and inquiring minds, with keen analysis and excellent memories.
      They enjoy analyzing people, situations, and problems. They always want to know
      how, why, when and where. It is sometimes hard for a Virgo to relax because
      boredom is something they cannot stand. They want to be busy, either doing or
      learning. A Virgo can generally be depended upon to fulfill a promise. They
      have a flair for organization and enjoy setting up schedules. There is an inborn
      love of order and harmony. They are always subconsciously seeking perfection
      in whatever they attempt. Because they push themselves so hard to be perfect,
      they have a tendency to look for perfection in others. If they find it lacking,
      they can become pretty critical and faultfinding. Virgos have a tendency to
      worry. This is because they desire perfection and are always thinking about
      how something can be made better or how they can do something better, even,
      and especially, after the fact. This tension can affect their health, causing
      intestinal disorders. Virgos need to develop a positive outlook on life, as
      this has a direct affect on their health. If they become too anxious about life,
      they can become hypochondriacs. They are generally healthy and are always looking
      for new ways to take care of themselves, usually '
  - sign: libra
    text: Libra natives like to weigh the pros and cons of a situation before they
      come to any conclusion. If carried too far, they get to the point where they
      can't come up with any conclusion, thus they can be very indecisive. They tip
      the scales one way, then the other, hoping to find the proper balance. Libra
      natives have an innate sense of fairness, though, and can be diplomatic, cooperative,
      helpful, idealistic, sociable, dependent, insincere, lazy and self-indulgent.
      Libra natives are happiest when in partnership or in situations where they can
      adjust or work with human relationships. Pleasant surroundings are important
      to them. Because Libra natives enjoy people and human interaction so much, they
      have a difficult time being alone. Because of this, they need to share their
      life with someone. Unfortunately, they have a tendency to be "in love with love",
      because of their romantic and sentimental natures. Thus, they could rush into
      marriage without forethought and end up in a difficult relationship. Libra natives
      find it virtually impossible to remain emotionally stable if there is discord
      around them. This leads to their wanting peace at any price, which allows others
      to take advantage of them. They want to be liked by everyone, sometimes to their
      detriment. As mentioned, indecisiveness can be one of the hardest problems for
      Libras to overcome. If they wait too long to make a decision, they may miss
      many excellent opportunities. Since they have the ability to see both sides
      of an argument, they generally do not like to choose either one. Since they
      are able to see the entire issue, if they are asked for help, they can give
      sound, practical advice. But their attempt to be all things to all people can
      lead them into hot water. They have difficulty saying "no". The other problem
      Libras find difficult to deal with is the desire to put off work for as long
      as they can. This gives them a reputation for being lazy. They aren't lazy,
      of course, if the proper motivation is ther
  - sign: scorpio
    text: Two animals are used to represent Scorpio, the eagle and the scorpion. The
      eagle is capable of reaching great heights because he has mastered his lower
      nature and overcome his passions and the temptations of the sensual sphere.
      The eagle has risen above the physical world because he has regenerated himself.
      The scorpion, however, represents those who have not regenerated their thoughts
      and actions and are still living degenerate lives. They use their cunning and
      strike when least expected. These are the ones who satisfy their passions regardless
      of consequences. Scorpios in general are ambitious, efficient, courageous, resourceful
      and intuitive. But, they can also be jealous, sarcastic, resentful, stubborn,
      possessive and vindictive. Scorpio people enjoy impossible tasks. They like
      work that demands continued, determined effort and intense concentration. They
      are born detectives. Scorpio gives a strong will and determination to accomplish
      anything undertaken. Scorpio natives possess an analytical mind, strong intuition,
      reasoning powers, perception, long range planning ability, magnetism and energy.
      Scorpio natives have very definite opinions. These opinions can be so rigid
      that no amount of persuasion will make them change their minds. Scorpio natives
      make friends easily and give unwaveringly to them. In these relationships, they
      like to know what your plans are, but, because of their secretiveness, they
      do not necessarily want you to know what they are planning. They are capable
      of extreme self-sacrifice for those they love. If any of their loved ones are
      threatened in any way, they feel that they, too, are being threatened. This
      causes them to instinctively strike out, either verbally or physically. Because
      a Scorpio's unconscious mind is more in control than their conscious mind, they
      lose all sense of judgment under criticism. Under attack, they make effective
      use of both silence and sarcasm. Unfortunately, their sarcasm can become vindictive.
      They can, and wil
  - sign: sagittarius
    text: Sagittarius natives tend to be idealistic, optimistic, dependable, open-minded,
      friendly, honest and versatile. But, they can also be tactless, irresponsible,
      showy, boastful, self-righteous, arrogant, quarrelsome, fanatical, dogmatic
      and dictatorial. Sagittarius natives like any work where foresight and a willingness
      to take a chance is offered, while at the same time, they try to avoid detailed
      work. Sagittarius natives are usually outspoken, sometimes to the point of bluntness.
      Simply blurting out their ideas and opinions is due to their never-ending search
      for truth and wisdom. Others think Sagittarius natives are pretty tactless and
      the statement that "truth hurts" fits their way of thinking. Regardless of their
      undiplomatic remarks, others instinctively feel as if the Sagittarian means
      them no real harm and is only interested in raising their consciousness. Some
      Sagittarius natives have reckless gambling tendencies and will bet it all on
      the drop of a hat. Travel and even long walks appeal to them because they make
      the Sagittarian feel free - and he needs to feel free. Sagittarius natives are
      philosophical and they want to understand the deeper issues and abstractions
      of life. They have a certain faith in higher things that generally always keeps
      them of an optimistic bent, no matter what difficulties are currently besetting
      them. They want to understand the meaning of life. This helps to keep them growing
      and expanding, which is something they need to do. This desire for expansion
      can cause them to overextend themselves with too many activities and to use
      up their energy too rapidly. They need to take intervals of rest to recuperate
      between projects. Sagittarius natives need to learn how to concentrate on their
      current projects and stick with them to the end. Always full of enthusiasm,
      they tend to show it more at the start of new endeavors, then it tends to lessen
      as the project goes along and gets stuck in details, or the going gets a little
      rough, or it si
  - sign: capricorn
    text: Capricorn natives have the desire to climb whatever mountains are necessary
      and to stand on their own two feet in order to work out their ambitions and
      their salvation. They are conservative, organized, methodical, traditional,
      responsible, honest, efficient, patient, practical, authoritative, disciplined,
      serious and goal-oriented. On the negative side they can be worried, pessimistic,
      retaliatory, suspicious, stubborn and intolerant. They are happiest in careers
      calling for organizing ability, integrity and perseverance. They have a fear
      of failure. Their quiet exterior makes Capricorn natives appear to be loners.
      They build a wall of reserve around them in order to protect themselves from
      the ill winds of the world around them. Nothing gets in the way of their plans
      and ambitions. They strive for security by holding fast to duty and responsibility.
      Work is very important to them and they do not take it lightly. Many Capricorn
      natives have an inferiority complex and this sometimes is what drives them so
      hard to succeed. They want to look good in front of the world. Capricorn natives
      like to plan their every move, weighing all the pros and cons of any issue in
      advance. They are dependable, particularly in a crisis. When asked, they give
      sound, practical advice. They are, as a rule, not aggressive people, and only
      express hostility as a defense when attacked. At times, Capricorn natives can
      be very sensitive to hurts and feel alone as if no one understands them. A negative
      Capricorn will seek retribution for wrongs done him. Capricorn natives need
      people, but they have a tendency to isolate themselves from people due to their
      reserve and fear of being hurt. They can be very loyal to close friends and
      people they care about. Respect and recognition is important to them. Encouragement
      and praise are essential for motivating a Capricorn. A fear of being without
      material things makes it mandatory that Capricorn natives have a regular income.
      Their attainments in life ar
  - sign: aquarius
    text: Aquarius natives tend to be friendly, original, intuitive, broadminded,
      nonconforming, different, independent, freedom-loving, scientific, unusual,
      and helpful. They can also be impersonal, unpredictable, tactless, rebellious,
      unconventional, stubborn, rigid, radical, bohemian and eccentric. Aquarius natives
      like any work which calls for inventiveness and the detached application of
      special rules or formulas. Aquarius natives seek to share knowledge with others
      in order to bring about a better life for all. Group activity is their customary
      mode of operation. Helping others so they can help themselves appeals to an
      Aquarian. Aquarius natives are friendly, yet detached. They have warmth, yet
      they seem distant. Although appearing cold or aloof, they are not really indifferent
      to others. It's just that they are much more concerned with humanity as a whole
      rather than any one particular individual. Since Aquarius natives generally
      do not have large, pompous or stuffy egos, they rarely bother to exert themselves
      to win approval or compliments. Aquarius natives get excited about bringing
      new ideas and methods into old, traditional environments. They are philosophical,
      visionary and idealistic. Feelings of friendship drive them to try to improve
      the lot of everyone they can. Sometimes the people they want to help don't understand
      these new ways and react negatively toward them. Sometimes Aquarius natives
      are simply ahead of their time, although sometimes they are just cranks. Aquarius
      natives have the determination and persistence to get ahead, but sometimes their
      energy level is relatively low, which causes them to drop projects before they
      are completed. Their minds are analytical and scientific and they have the ability
      to think things through to an accurate conclusion. Although they generally have
      good powers of concentration and are able to assimilate a lot of information,
      there are times when they are just plain absentminded. Aquarius natives usually
      get along well w
  - sign: pisces
    text: 'Pisces natives are sympathetic, compassionate, unassuming, idealistic,
      intuitive, congenial, adaptable, psychic, emotional, creative, secretive, versatile,
      imaginative and self-sacrificing. They can also be impressionable, indecisive,
      self-pitying, hypersensitive and changeable. They need to serve others. Pisces
      natives are sentimental and romantic in love. At times, they expect too much
      from others and then feel hurt if the other person doesn''t come through for
      them. They have a strong tendency to place their loved one on a pedestal. This
      leads to disillusionment when they discover their loved one has faults, too.
      The symbol for Pisces is two fish going in opposite directions connected by
      a cord. One fish represents the personality and the other represents the spirit.
      These two opposing forces operate within a Pisces, causing insecurity and indecisiveness.
      Handling these forces in a positive manner is very difficult for them. Some
      will seek to escape these pressures through eating, alcohol, drugs or other
      excesses. That is what one of the fish represents. The other fish represents
      the Pisces rising to great heights through self-denial, sacrifice and then ultimate
      attainment. Pisces natives learn through suffering and they need to learn perseverance.
      Pisces natives tend to absorb the information and environment around them. Thus
      it is important that they surround themselves with uplifting people and circumstances.
      Pisces natives are creative, self-sufficient people whose minds are extremely
      active, due to their strong imagination, which they can sometimes get carried
      away with. They sense and feel things that others are not aware of. Pisces natives
      generally do not possess strong willpower nor do they have a dynamic approach
      to life. Although they can appear to be very determined on the outside, underneath,
      inner doubts are brewing. This insecurity causes them to need reassurance from
      others. One of their greatest needs is to learn to understand their emotional
      ups '
  moon:
  - sign: aries
    text: If you have the Moon in Aries, adaptability and inconstancy in your efforts
      to initiate are present here. Frequent emotional upheavals due to a fiery temper
      are possible. Patience is not your strong suit and if things don't happen the
      way you want, and now, well, you can go off like a bolt of lightning. Your tendency
      is to be spontaneous, temperamental, impetuous, headstrong and you dislike restraint.
      You are very direct in thought, action, and speech and everyone knows how you
      feel. You pull no punches. You can be a very bossy individual if you do not
      try to control your moods. A desire to be in the limelight or in charge of things
      is present. You hate showing any personal weakness or that you need any support,
      comfort, or nurturing from others. Your enthusiasm for starting new projects
      is contagious and you are probably a better starter than a finisher. You are
      adventurous, courageous, and independent. You don't like complainers and are
      always ready to meet any challenge. A fair amount of physical activity is good
      for you so you can work off those moods you get into once in a while. You have
      a creative, flamboyant personality that likes to trail-blaze in unusual ventures.
      Perhaps your accomplishments cover inferiority feelings that lie beneath the
      surface. Back to Moon in Aries main page Top
  - sign: taurus
    text: If you have the Moon in Taurus, your emotional nature is steadied and others
      find this quality soothing in you. You are generally even-tempered and peace-loving
      and are not easily ruffled or given to emotional displays. You can be downright
      stubborn at times, especially when it comes to making changes that are emotional
      in nature or that require emotional adjustment. You seek security and often
      expect this security to come from materials possessions and resources. Hence,
      you desire to collect material goods and money. You cling to things from the
      past or things you are used to in order to find this security. You need a great
      deal of affection and closeness and this helps to lessen feelings of insecurity.
      But sometimes you hold onto people much too closely so they feel they can't
      breathe. You expect loyalty in love and you are very devoted to those you care
      about. You have the tendency to indulge in sensual comforts and activities.
      Eating rich or sweet food seems to give you security. You may have a weight
      problem because of this. Food can become a substitute for emotional satisfaction
      and love. You are resourceful, determined, and persistent. You perhaps have
      a green thumb and are good at getting anything to grow and prosper. You are
      happiest when working with your hands, probably with the earth or things of
      the earth. You can be lead but never pushed into doing things. You hate and
      fear sickness and pain. Too great a comfort with the status quo can prevent
      you from making necessary changes. Don’t be too rigid in thought or deed. Back
      to Moon in Taurus main page Top
  - sign: gemini
    text: If you have the Moon in Gemini, you tend to intellectualize your feelings.
      Your moods come through your words. At times you are totally unaware of your
      own or other people' deeper feelings and emotional needs. You talk out your
      feelings and moods. Your primary need is to communicate and to share knowledge.
      You tend to avoid heavy, emotional relationships and involvements because their
      is some tendency to superficiality. Commitment scares you. You require plenty
      of mental stimulation and you feel closest to people with whom you can share
      thoughts and mental interests. You get turned on sexually through the mental
      side of things. You have a versatile and receptive mind with a great desire
      for knowledge. You can be charming, witty and warm-hearted. Nervous tension,
      anxiety, and stress may be a problem for you. You probably dislike arguments
      and have a tendency to talk too much. You may tell people what they want to
      hear rather than the truth. Mental control should be developed or else indecisiveness
      and constant changing of your mind will become a way of life for you. Back to
      Moon in Gemini main page Top
  - sign: cancer
    text: If you have the Moon in Cancer, you very easily respond to the emotional
      environment in which you are placed. You soak up feelings like a sponge. Perhaps
      this is why you so easily become moody, irritable and inconstant in thought
      and feeling. Learning to control your own moods may be very difficult, yet necessary,
      for you. Your greatest need is to nurture and mother someone or ones. You often
      appear irrational to others because you can't always explain the reason or source
      of your feelings. Anyone who lives with you must accept your ups and downs and
      appreciate your need for times of withdrawal. You are also very sympathetic
      and understand the unspoken feelings and needs of others. You take slights very
      personally and though you may forgive a mistake by a friend or loved one, you
      never forget it. Security is very important to you and you look for it in your
      home and family life. Your senses and emotions are quite strong and it would
      be wise for you to listen to your intuitive side as you can be quite psychic.
      You are very tenacious and you do not give up or let go of things or people
      easily. Your mother is/was a strong influence for good or ill in your life.
      You are basically an introvert, but will do whatever it takes to protect and
      defend your family or loved ones. You tend to be a pack-rat because everything
      has an emotional memory behind it and you find security in all those memories.
      Nothing or no one is ever gone if they leave their memory behind. Thus, you
      can become quite possessive. You have the memory of an elephant, but you must
      learn to forgive and forget past hurts. Back to Moon in Cancer main page Top
  - sign: leo
    text: If you have the Moon in Leo, you are warm, generous, and loving in your
      affections and you bring out great devotion and loyalty in your loved ones.
      You want to be worshipped and adored like the king or queen you feel you are.
      You want and need a partner you can be proud of and your own pride is very important
      to you. You cannot love someone you don't respect and aren't proud of. It is
      important to you that you feel recognized and appreciated. Your feelings get
      hurt when you feel ignored. You dislike emotional games and dishonesty. You
      are popular, generous, dignified, loyal and ambitious and have a persevering,
      penetrating mind with leadership and creative ability. You dramatize the events
      in your life and your feelings. On the negative side, you may be ego-oriented,
      vain and/or ostentatious with a tendency to wear your heart on your sleeve.
      Back to Moon in Leo main page Top
  - sign: virgo
    text: If you have the Moon in Virgo, you are very sensitive, cautious, and perhaps
      shy about showing others your feelings. Though you may love and care for someone
      a great deal, you rarely express those feelings openly and freely. You are perhaps
      more mental than emotional, at least outwardly. Very often your love for someone
      will be expressed by trying to help them, doing something tangible to benefit
      them, or serving them in some way. It may be difficult for you to receive warmth,
      affection, or appreciation, for you often feel that you don't really deserve
      it or that "they don’t really mean it". You can therefore seem rather cool and
      aloof, much more so than you feel. At times you can be so critical of others
      that you drive them and their love away. You need to learn how to forgive yourself
      and others when you or they do not measure up to perfection. This need of yours
      for perfection can be quite stifling to your own happiness. You tend to be industrious,
      trustworthy, intuitive, reserved, practical and down-to-earth, especially where
      emotions are concerned. Intelligence, usefulness and fastidiousness are important
      themes. You have the ability to analyze people and situations and, then, find
      the quickest, most efficient method of accomplishing whatever is needed. This
      may make you an excellent housekeeper, nurse and/or manager. You must, however,
      watch your tendency to nit-pick or to become overly fussy concerning small details.
      You like to serve others, but find it difficult to understand the feelings of
      others. Your greatest need is to learn tolerance and to serve those around you.
      Back to Moon in Virgo main page Top
  - sign: libra
    text: If you have the Moon in Libra, you are kind, sympathetic, agreeable, optimistic,
      fair, and very fond of social pleasures. You are a considerate and thoughtful
      friend, and have a real flair for making others feel accepted and appreciated.
      At the same time you probably possess good reasoning powers and the ability
      to form correct judgments. There is love of art and music with perhaps decided
      ability as a performer. You have a need for people and relationships. You avoid
      personal confrontations or any expression of intense, unpleasant behavior or
      emotion. You strive for peace, harmony, and perfect balance. You feel unsuited
      for menial physical labor and you hate to get your hands dirty. Your desire
      to be liked by everyone may cause you to seek peace at any price, thus you can
      be evasive on issues due to your desire to keep the peace. You can be quite
      vacillating and indecisive. You are much more at odds with yourself than people
      would guess by looking at you from the outside. It is sometimes very difficult
      for you to make up your mind because you see all sides of any issue and you
      always want to be fair. You must learn to stand up for your principles. Back
      to Moon in Libra main page Top
  - sign: scorpio
    text: If you have the Moon in Scorpio, you are secretive and inclined to brood
      in silence over the wrongs that people have done, either in reality or simply
      in your own mind. The mental and emotional focus may be on sensual things or
      on sex or death. You find it difficult to trust people as you are suspicious
      of their inner thoughts and plans. You open yourself up to very few as you do
      not find it easy to trust others. Allowing yourself to be vulnerable and to
      relinquish control in relationships is not easy for you. You love with passion
      and you hate with passion. Everything is done emotionally, with intensity. You
      can be very jealous and possessive in your relationships. Perhaps your mother
      was very controlling. You have a habit of holding on to wrongs that have been
      done in the past and not forgiving nor forgetting, and to keep such feelings
      to yourself. Guilt, resentment and vindictiveness need to be overcome. You must
      learn to let go or your health will suffer. Learn to express your feelings outwardly
      rather than repressing them within. You are not content with superficial appearances
      and are always probing beneath the surface of things for hidden motives. You
      have a great deal of emotional depth. The potential for success is great when
      control and discipline are learned. You are magnetic, energetic, independent,
      aggressive, patient, and determined. Self-control of the passions is mandatory.
      Back to Moon in Scorpio main page Top
  - sign: sagittarius
    text: If you have the Moon in Sagittarius, you are independent, outspoken, open,
      generous, enthusiastic, idealistic, inspired, and optimistic and these qualities
      attract many friends and acquaintances. You seem to thrive on travel, sociability,
      fellowship, and expressing your opinions to whomever will listen. In addition,
      you are adventurous, playful, freedom-loving, and always ready for a good time.
      You rarely allow difficulties to keep you down, for no matter how bleak the
      past or present, you always expect a better, brighter future. In fact, you are
      uncomfortable with your own or other people's problems and emotional pain. You
      often try to "cheer up" or offer philosophical advice to those who are hurting,
      but unwittingly you avoid or ignore the emotions involved. Friendship means
      a great deal to you, perhaps even more than love or romance. For you to be happy,
      your mate must be your best friend and encourage your aspirations and ideals.
      You also need a great deal of emotional freedom and mobility. On the negative
      side, you may be rather intolerant, closed-minded, dogmatic, arrogant, non-objective,
      risk-taking, or possess a holier-than-thou attitude. Back to Moon in Sagittarius
      main page Top
  - sign: capricorn
    text: If you have the Moon in Capricorn, you tend to be very serious and responsible,
      thinking that duty calls first before all else. You are not comfortable displaying
      your emotions for all to see and you certainly don't want them to think that
      you need help and support. You never want to appear emotionally weak. There
      is a great sense of ambition within you, perhaps because you feel unloved, unwanted
      or inadequate. You then work very hard because it makes you feel important or
      needed. You need to feel secure in your own authority. Security needs are what
      drive you. You may be shy and insecure over your own worth and can be overly
      sensitive to real or imagined hurts. Sometimes you feel as though you have to
      carry the weight of the world on your shoulders. You are especially uncomfortable
      with emotional dependency, and will tell yourself and others (even children)
      not to be a "baby". You need to accept that no one is self-sufficient all the
      time, and to be gentler with your "childish" emotional needs and wants. To others,
      you may appear to be rather hard-nosed and tough, with a business-like attitude
      toward their personal concerns and feelings. Your feelings and loyalties run
      deep, but you often do not let people know how much you care. You also need
      to learn to relax, enjoy yourself, and play sometimes. You are conservative,
      reliable and ambitious. You have the ability to bring plans to completion. On
      the negative side, you may be ruthless in your desire for power and success.
      Selfishness and manipulation are possible. You desire recognition. The emotions
      are steady, but can be quite cold. Back to Moon in Capricorn main page Top
  - sign: aquarius
    text: If you have the Moon in Aquarius, your emotions tend to be guided by intellect
      and you can be very detached when it comes to dealing with them. Others may
      think you cold and aloof because they don't understand the ways in which you
      deal with your feelings. This position steadies your emotions. You find security
      in dealing with and working with groups of people, especially in endeavors that
      benefit the majority. You are inventive, original, and progressive in thought
      and want to make the world a better place to live in. Family ties and attachments
      may not be as important to you as they are to others and you perhaps often consider
      your friends closer to you than your blood relatives. You need freedom and independence
      in your relationships with others. You back away at times if they get too close.
      You very much hate a partner who is jealous and possessive. You like to experiment
      and play the field. There is small affection for the conventional and the traditional.
      You tend to be friendly, intuitive, humane, progressive and independent. You
      are broad-minded with a desire to investigate all knowledge. You may have difficulty
      in understanding the emotional needs of others. At times you express unusual
      ideas simply to shock or surprise others out of their lethargy or just to see
      what kind of a reaction you’ll get. On the negative side you can be impersonal,
      stubborn, erratic, rebellious, rigid, emotionally cramped and selfish. Back
      to Moon in Aquarius main page Top
  - sign: pisces
    text: If you have the Moon in Pisces, your emotions are expressed sympathetically
      and compassionately. You are sensitive, kind and gentle, imaginative, shy, tender-hearted,
      and have an innate understanding of how other people feel and react to situations.
      It hurts you if another is hurt. Because of your kindness and non-judgmental
      attitude, people in trouble, pain or confusion come to you hoping to find answers.
      It is difficult for them to think that you may be in pain yourself, but even
      if you are, you will do your best to help them or teach them. You seem to sense
      that all the pain you have suffered is for a higher purpose, if only to teach
      others or help show them the way. At times, though, your softheartedness is
      taken advantage of and then you feel the need to withdraw, to regain your strength
      and composure. Music plays an important part in your life and you are instinctively
      drawn to it. It is as a voice from your spirit’s true home. It helps you to
      express the emotions within that sometimes are so nebulous or vague that they
      cannot be put into words. You have a very romantic nature and can fall in love
      with love. Sometimes your feelings and fantasies get so carried away that you
      become overly emotional or sentimental, much to the dismay of those around you.
      You have your moody spells that people do not know how to deal with. You are
      not afraid of difficult or hard work and you especially like to work for those
      less fortunate than yourself. You prefer to work behind the scenes, as you may
      be easily drained of energy by others. There may be talent in art, dancing or
      music. Tendencies to daydreaming may need to be controlled. Back to Moon in
      Pisces main page Top
  mercury:
  - sign: aries
    text: If you have Mercury in Aries, you are outspoken and direct in speech and
      actions. Your thoughts are original and filled with enthusiasm and great energy.
      You love a good argument or debate and like to compete and strategize with your
      mind. You say what you mean and don't pull any punches. You are opinionated
      and love to share those opinions, even if not asked to do so. You love controversy
      and might need to develop a little more tact in how you express your own thoughts.
      Your mind is restless and filled with much nervous energy. It is hard for you
      to sit still. You always have to be busy, especially with your hands. Mechanical
      ability may be present. Your thoughts and words are quick and impulsive and
      you may at times suffer from foot-in-mouth disease. A lack of patience and concentration
      in carrying out your plans may be evident. Great wit and an entertaining personality
      help make you popular. You don't like to be told how to do things and want the
      freedom to do things your own way. There never seems to be enough time to do
      all the things you have on your mind. You may be quick-tempered, but hardly
      ever carry a grudge. You get over things quickly, then move on. Top
  - sign: taurus
    text: If you have Mercury in Taurus, your manner of thought and speech is slow
      and quite deliberate. You do not change your mind quickly and see no reason
      to do so. You are determined, practical, methodical, and conservative in most
      things you do. You have patience and the ability to stick with things until
      the end. You may assimilate material at a slower pace than others, but once
      a concept is learned, it is never forgotten. You hate being forced or rushed
      into a decision or an action, especially if you have not been given time to
      think it all through and evaluate the practicalities of the situation. Once
      your mind is made up, that's it. It will take a lot to undo it. Perseverance
      is one of your best traits. You enjoy sustaining what others have started, especially
      if you can see tangible, practical results. You love to build things. You succeed
      not so much because of your mental brilliance, but because you have the ability
      to concentrate and follow a project through to its completion. You may have
      an artistic or musical aptitude. Perhaps you sing or speak for a living. Common
      sense is not uncommon in you. Top
  - sign: gemini
    text: If you have Mercury in Gemini, you have an extremely adaptable, energetic,
      active, alert, curious, and versatile mind. You seek knowledge, either through
      reading or conversation, or through travel and talking with the new people you
      constantly meet. You have so much nervous energy that this can sometimes cause
      great stress which must find an appropriate release. Exercise is a good way
      to release this tension. You are clever, witty, and always have a joke or comeback
      ready for any situation. You love being involved in multiple things at once
      and this may be a problem - too may irons in the fire at the same time. You
      are quick to grasp new concepts and equally quick to lose interest in an idea
      or project once your curiosity has been satisfied. You like to taste a little
      bit of everything - concentration and disciplined study are not your strong
      points. You are handy with your hands and may be ambidextrous or mechanically
      inclined. Debate and argument appeal to you. There is a tendency to scratch
      the surface with the things that strike your interest without learning anything
      very deeply. This is the jack-of-all-trades, master-of-none position. There
      is danger, then, of superficiality. Control of thought, word, and action is
      necessary in order to be successful. Find your focus, stay with it and develop
      perseverance. Journalism, speaking, teaching, sales, advertising, or writing
      may appeal to you. Mentally restless, you may change jobs or locations frequently,
      or do work that involves movement, travel, and variety. You grasp concepts easily
      and may become impatient with those who don't learn as quickly. Top
  - sign: cancer
    text: If you have Mercury in Cancer, your mind is connected with your memories,
      feelings, and emotions from the past. You tend to hold on to the memories of
      things because they give you security. You are highly interested in inner, subjective,
      and personal issues, and your thinking is based more on feelings, intuition,
      personal experiences, and prejudices rather than reason or logic. Intellectual
      abilities and accomplishments without heart or soul mean little to you. You
      are a sensitive listener and deeply interested in a person's feelings and inner
      life. In addition to psychology, you are probably drawn to education, art, poetry,
      music, or mythology. You are shy and somewhat reticent about speaking in public,
      but you will open yourself up and share your thoughts in small, intimate, little
      family-type circles of people you know and trust. You perhaps enjoy keeping
      a diary or chronicle of your thoughts and feelings regarding your day-to-day
      happenings. Your mind retains and absorbs knowledge easily. You are intuitive,
      psychic, and sympathetic, yet may become depressed over your own problems and
      the problems of the world. You may have difficulty in getting to the root of
      the problem because you so easily become involved emotionally with the people
      instead of the problem. You may have difficulty in making decisions or you may
      simply change your mind constantly. Mental focus and control must be developed.
      Top
  - sign: leo
    text: If you have Mercury in Leo, you have strong, fixed opinions and love to
      express your thoughts energetically and dramatically. You wholeheartedly identify
      with your beliefs. You can be a warm, convincing, entertaining speaker and an
      effective story teller. Exaggeration plays a key role in all your tales and
      expressions. You put on a good show no matter who the audience is. You have
      a distinctive style of expressing yourself. Teaching ability is present. You
      have many creative ideas and want to have a voice in decision-making. You take
      great pride in your mind and thought processes and others may think of you as
      a bit of a know-it-all. You need to watch a tendency towards false pride, intolerance,
      stubbornness, needing appreciation for everything you do or say, and becoming
      overly impressed with your own abilities. You could be a good politician, spokesperson,
      group leader, director, or coach. You need to be admired for your mind. Top
  - sign: virgo
    text: If you have Mercury in Virgo, you are an exacting perfectionist with a clear,
      logical, and analytical mind with an aptitude for work that requires meticulous
      attention to detail and efficient organization. Well-grounded, practical, and
      possessing a great deal of common sense, you tend to develop specialized skills
      and technical expertise in some practical field. Knowledge, ideas, and theories
      don't really interest you unless they are useful in a practical, tangible way.
      You love to analyze, measure, and dissect everything, but perhaps you miss hints,
      nuances, and subtle shades of feeling and meaning. Your strengths are in your
      precise thinking, careful craftsmanship, and mastery of technical skills. You
      tend to be very good at what you do and are critical of others' work if it does
      not meet your high standards. You are systematic, adaptable, stable, flexible,
      and good with details, although you may have a tendency to be pessimistic, sarcastic,
      intolerant, complaining, whiny, critical, or get lost in the details and lose
      the forest for the trees. Top
  - sign: libra
    text: If you have Mercury in Libra, one of your best talents is your ability to
      see all sides of an issue, and to negotiate and bring about compromise and reconciliation.
      You are diplomatic, fair, tactful, and reasonable, possessing considerable social
      finesse. You work well with all groups of people. You are objective and somewhat
      detached from emotional bias and may make an excellent consultant, mediator,
      or public relations person. You insist upon fair play and seek peace and harmony
      in all situations. Your fine aesthetic sensitivities allow you to work in artistic
      or cultural environments. You have a persuasive, rational, well-balanced mind
      with artistic sensitivities. You are flexible and willing to listen to all sides
      of an issue. This may lead to vacillation and indecision, though, because sometimes
      you cannot make up your mind as to which side has the most merit. Your thinking
      process works by means of comparing things and finding analogies. This is when
      you are at your best. Top
  - sign: scorpio
    text: If you have Mercury in Scorpio, you have excellent mental concentration
      and the ability to become completely immersed in your work. You love ferreting
      things out and are a natural detective. Your mind may dwell on the sensual side
      of life and may think about sex or death often. You seem to know things at an
      instinctive, nonverbal level and prefer learning through direct experience or
      apprenticeship rather than vicariously via books or lectures. You have mechanical
      ability and work well with your hands. You may develop healing ability through
      your hands. You are quick-witted, resourceful, shrewd, direct, sharp-tongued,
